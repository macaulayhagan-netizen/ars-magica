e)","Transform Into Whirlwind: 3 points, +2 Init, Auram","This faerie may appear as a beautiful maiden, a crone or an adolescent girl. She wears a white dress and carries a scythe or shears. She may travel as a dust devil, and is used as a nursery terror, to frighten children so that they do not harm crops.","Południca usually appears around noon on hot days, and asks farmhands difficult questions, or engages them in conversation. If the farmhand tries to change the topic of their conversation, or cannot answer one of the faerie's questions, she gives him heatstroke. If particularly annoyed at this farmhand she might instead drive him insane, or cause his death from hyperthermia. Południca are unable to spend Might points during the winter."],"page":"","latin":"","might":"10","size":"0","blurb":"- Scythe: Init +1, Attack +6, Defense +4, Damage +5","source":"ArM5 Core","id":43},{"name":"Tarlan the Wolf","realm":"Faerie","fields":[["Faerie Might","20 (Animal)"],["Characteristics","Int -2, Per +5, Pre 0, Com -3, Str +3, Sta +3, Dex +2, Qik +3"],["Confidence Score","1 (3)"],["Virtues and Flaws","Incognizant"],["Personality Traits","Relentless +3, Cheerful -3"],["Reputations","Soul-eating demon (local) 1"],["Combat",["Bite: Init +9, Attack +10, Defense +10, Damage +6"]],["Soak","+7"],["Wound Penalties","-1 (1-4), -3 (5-8), -5 (9-12), Incapacitated (13–16)"],["Pretenses","[Area] Lore 6 (hunting tracks), Athletics 5 (running), Awareness 8 (spotting quarry), Brawl 3 (bite), Hunt 10 (human beings), Living Language 2 (threats), Stealth 9 (hunting), Survival 7 (forests)"],["Equipment","None. He's a wolf."],["Encumbrance","0 (0)"],["Vis","2 pawns of Intellego in his nose, 1 pawn of Intellego in each ear."]],"description":["Age: n/a","Marked Quarry: 1 point, Init +5, Mentem:","Tarlan can pick a single human being whom he can see and who can see him, and mark him as quarry for the hunt. This inspires the victim with a strong fear of Tarlan, requiring a Brave roll against an Ease Factor of 9 to overcome, and specifically makes him likely to run.","Prey's Vigor: 1 point, Init +8, Corpus:","By breathing on a tired person (anyone who has lost Fatigue levels), Tarlan can restore them to full vigor (i.e. all Fatigue levels are regained). However, the target also ages one year. This power can only be used if the target is close enough to actually feel the wolf's breath on his skin, and only works on adults.","Silent Running: 0 points, constant, Imaginem:","Tarlan makes no noise unless he deliberately decides to.","A large, deep black wolf with eyes that glint even when there seems to be no light around. He moves silently and can stay hidden unless he really wants his quarry to see him.","Tarlan exists to hunt people. He picks individuals who are in the wilderness by themselves, marks them as quarry, and then harries them to exhaustion. Once they can run no further, he bursts out of cover, and, somehow, the victims regain their vigor at that moment, finding that they can run away once more. The wolf can keep the hunt up indefinitely, but normally he times a final attack, on an exhausted victim, to happen just before dawn. If the quarry is particularly resourceful, he might keep the hunt up longer.","Tarlan does not always kill his victims, leaving some alive to tell the tale of their ordeal. He likes the idea that people are scared of him even before he uses his power. Indeed, he has occasionally not needed to use Marked Quarry at all.","The wolf does have one weakness. He cannot enter holy ground, so a victim who can run into a church or graveyard is safe. Tarlan knows this, and tries to herd his victims away from such places. In addition, because Prey's Vigor cannot affect children, Tarlan never hunts them. In fact, he's come to feel somewhat protective of them, on the grounds that, if he can't hunt them, no-one else is going to. Finally, The Gift inspires respect in the faerie. He never hunts Gifted individuals, and might even be happy to work with one who let him hunt people."],"page":"","latin":"","might":"20","size":"","blurb":"Tarlan can pick a single human being whom he can see and who can see him, and mark him as quarry for the hunt. This in…","source":"ArM5 Core","id":44},{"name":"Valkyrie","realm":"Faerie","fields":[["Faerie Might","20"],["Characteristics","Int 0, Per 0, Pre 0, Com 0, Str 0, Sta 0, Dex +3, Qik +1"],["Size","0"],["Virtues and Flaws","Faerie Sight, Faerie Speech; Incognizant, Visions*"],["Personality Traits","Brave +5, Judgmental +3"],["Combat",["Axe and Round Shield (unmounted): Init +2, Attack +16, Defense +12, Damage +6","Axe and Round Shield (mounted): Init +2, Attack +19, Defense +15, Damage +6"]],["Soak","+9"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20), Dead (21+)"],["Pretenses","Awareness 9 (battlefields), Brawl 9 (einherjar), Ride 5 (wolf), Single Weapon 9 (giants)"],["Equipment","Arms, armor, wolf mount, vast quantities of wine."],["Vis","4 Corpus, a dead vulture"]],"description":["* Valkyries know where and when worthy men are likely to die","Fly: 0 points, constant, usually Corpus but sometimes Animal:","The character is capable of flight. The character may use the Athletics skill to simulate difficult maneuvers, but may not engage in combat while flying incredibly swiftly. The faerie may not fly when heavily encumbered, or with a passenger of its Size or more, unless assisted by another faerie that shares the load.","Shield maidens or crones that ride wolves above battlefields, and select the worthy dead. They have excellent equipment and extraordinary training."],"page":"","latin":"","might":"20","size":"0","blurb":"* Valkyries know where and when worthy men are likely to die","source":"ArM5 Core","id":45},{"name":"Wolf Mount","realm":"Faerie","fields":[["Faerie Might","20 (made of the glamour of the Valkyrie and shares her Might pool)"],["Characteristics","Cun +2, Per 0, Pre -2, Com 0, Str +2, Sta +3, Dex +2, Qik -4"],["Size","+3"],["Virtues and Flaws","Faerie Sight, Ferocity (when hungry) Sharp Ears"],["Personality Traits","Brave +3, Cowardly +3"],["Combat",["Teeth: Init –2, Attack +12, Defense +6, Damage +3"]],["Soak","+7"],["Wound Penalties","-1 (1-8), -3 (8-16), -5 (17-24), Incapacitated (25-32), Dead (33+)"],["Pretenses","Athletics 5 (distance running), Awareness 3 (smell), Brawl 5 (teeth), Hunt 4 (track by smell), Survival 3 (winter)"],["Vis","None: the wolf is an extension of the valkyrie."]],"description":["When the valkyrie uses Fly the wolf, as part of her glamour, flies too. The valkyrie can carry a passenger with the aid of her wolf.","A wolf the size of a horse, with saddle and harness. Its thick fur gives it a Protection of 1 and it wears leather covers which act as partial barding.","These minor goddesses of the Norse pantheon are no longer worshiped in Mythic Europe, but have been encountered by magi in Elysium, and in their ancient places of power in Scandinavia. Their name means \"Chooser of the Slain\", because they are believed to choose who lives and dies during battle, and which spirits are worthy of transformation into einherjar, spiritual warriors awaiting Ragnarok. They also act as serving maids in Valhalla. Many have names that evoke the tumult of battle. They ride through the sky, invisibly, on wolves."],"page":"","latin":"","might":"20","size":"+3","blurb":"When the valkyrie uses Fly the wolf, as part of her glamour, flies too. The valkyrie can carry a passenger with the ai…","source":"ArM5 Core","id":46},{"name":"Baal-Peor","realm":"Infernal","fields":[["Infernal Might","30 (Corpus)"],["Characteristics","Int +1, Per +2, Pre -5, Com +1, Str +4, Sta +5, Dex +1, Qik +1"],["Size","+2"],["Confidence Score","3 (9 points)"],["Virtues and Flaws","Oversensitive (coitus), Obese"],["Personality Traits","Proud +6, Hungry +3, Shame -3"],["Reputations","Treasurer of Hell 6 (Infernal), Demon of Filth 5 (Infernal)"],["Combat",["Noxious Vomit: Init +9, Attack +12, Defense n/a, Damage +12*","Claws: Init +4, Attack +5, Defense +6, Damage +6**"]],["Soak","+8"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22–28)"],["Abilities","Artes Liberales 4 (arithmetic), Brawl 4 (claws), Civil and Canon Law 4 (trade), Folk Ken 6 (fornication), Infernal Lore 5 (wealth), Intrigue 7 (envy), Medicine 4 (poisons), Profession: Merchant 7 (unfair deals)"],["Vis","6 pawns of Perdo, in tongue"]],"description":["* See power description","** Claws are coated in excrement. Unless injuries are cleaned carefully, they will fester and never heal. A roll on the Recovery Table that results in an Improvement indicates stability, while a Stable result indicates that the wound worsens. Once the infection has set in, only Divine aid in healing cleanses the wounds.","Fatigue levels: OK, 0/0, -1/-1, -3, -5, Unconscious","Form of Woman, 0 points, Init 0, Corpus:","Baal-Peor can take the form of a woman, although he cannot use this power to mimic a specific woman. He always chooses a form which will be considered beautiful by the target audience of his schemes.","Noxious Vomit, 1 point, Init +9, Corpus:","This power allows Baal-Peor to spray vast amounts of vomit (or, facing the other way, even less pleasant substances) through an area. His vomit is an expression of his spiritual vileness, and does the damage indicated in his combat statistic through corrosion, except to characters with True Faith, whom it cannot touch. The target must make a Strength + Size stress roll against an Ease Factor of 9 or be sent flying backwards. Anyone successfully struck by this vileness continues to suffer +3 damage in each round until it is washed off. This damage does not stack for multiple successful attacks.","Swallow Assault, 5 points, Init +3, Terram:","Baal-Peor may avoid injury from mundane objects by opening his maw so wide that the attack slides harmlessly down his throat.","Coagulation, 3 points, Init −1, Corpus","Obsession, 1 to 3 points, Init –5, Vim: Shamelessness, Gluttony","Shroud the Stench of the Pit, variable points, Init +3, Vim:","This power may be used in two manners, both of which affect the expression of other supernatural powers. A demon can conceal the Infernal nature of any other supernatural power, making it appear to be magical or faerie instead. This power is used on an overt expression of power, to prevent spells from recognizing it as infernal in origin. Secondly, it may be used on more subtle powers to remove all stench of the supernatural, making them appear wholly mundane. This power costs Might points equal to the original cost of the power being concealed, or Might points equal to the magnitude of the Infernal effect if it does not cost might to use. This power lasts for as long as the power it is masking.","The Wealth of Nations, 3 points, Init 0, Terram:","The demon can summon riches, each use of this power can create wealth equivalent to up to pound of gold for every point of Infernal Might possessed by the demon. This wealth can be of any form — gold, gems, rich tapestries, ivory, etc. — but it is always has intrinsic value, rather than being valuable because of its utility (a roomful of grain, for example). This wealth is not created, it is instead summoned from somewhere else, chosen by the demon, usually for the greatest effect. This might be a royal treasury on the other side of Europe or the purse of the man standing next to you.","His Master's Voice, variable points, Init +1, Vim:","The demon can summon other demons or corrupt beasts to its current location. This costs one Might point for every point of Infernal Might of the being summoned, so is used sparingly. The demon has no control over the demon he has summoned.","Weakness: Running water","Baal-Peor appears as an immensely fat naked man, with rolls of flab cascading down his body. He is completely hairless, and has a repulsive, snake—like tongue. He wears a serpent wrapped around his girth like a belt, and its head is usually draped over his shoulder.","Baal-Peor (or Belphegor) is a demon of wealth. He creates discord by moving mortal riches in disruptive ways (using the Wealth of Nations power). He gives money to the vulnerable, so that the strong are tempted to take it. He gives the possessions of the powerful to others. This tempts the recipients to keep their stolen treasures, and rouses the powerful to recover them by force.","Baal-Peor was worshipped, in ancient times, less as a wealth-god than as an embodiment of the desire to consume everything and transform it into vileness. His title, \"Lord of the Openings\" describes him: an unfillable mouth leading to a ceaseless defecation. Priests and pilgrims used the space before his statue as a latrine, as a form of worship. Baal-Peor, it is said, was sent by his masters to seek the truth of rumors that humans lived in marital bliss. He tried to live as a woman, but was so disgusted by marital relations that he fled back to Hell."],"page":"","latin":"Lord of Filth","might":"30","size":"+2","blurb":"** Claws are coated in excrement. Unless injuries are cleaned carefully, they will fester and never heal. A roll on th…","source":"ArM5 Core","id":47},{"name":"Bartholomew","realm":"Infernal","fields":[["Infernal Might","50 (Mentem)"],["Characteristics","Int +3, Per +2, Pre +3, Com +5, Str –1, Sta 0, Dex –1, Qik –1"],["Size","0"],["Confidence Score","2 (9)"],["Virtues and Flaws","None"],["Personality Traits","Slothful +3, Gregarious +2, Retiring –2"],["Reputations","Excellent adviser on money matters 5 (local)"],["Combat",["Fist: Init -1, Attack -1, Defense -1, Damage -1"]],["Soak","+8"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20)"],["Abilities","[Area] Lore 6 (trade routes) (Three of these, for the area where he lives, the larger area including it, and the whole of Europe), Artes Liberales 2 (arithmetic), Bargain 10 (trade goods), Charm 5 (merchants), Etiquette 4 (merchants), Folk Ken 8 (merchants), Guile 10 (trading), Intrigue 5 (market politics), Language 6 (trade talk), Latin 6 (ecclesiastical), Profession (merchant) 10 (cloth)"],["Equipment","Fine clothes, a nice house, trade goods."],["Encumbrance","0 (0)"],["Vis","10 pawns of Mentem vis, one in each of his fingers. Infernally tainted."]],"description":["Age: n/a (50)","Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Merchant's Blessing, 2 points, Init +0, Mentem:","The recipient of this blessing seems trustworthy to most people, and gets a +3 bonus on all social rolls to do with trading. People react to him as if he has an excellent reputation for honesty, fair dealing, and getting high quality goods cheaply. The blessing lasts for a week, unless Bartholomew chooses to renew it.","Merchant's Curse, 1 point, Init +0, Mentem:","The inverse of Merchant's Blessing, this curse makes people treat the victim as if he had a strong reputation for dishonesty, cheating and reneging on deals, and selling shoddy goods at inflated prices. He also has a –3 penalty to all social rolls to do with trading. The curse lasts for a week, unless Bartholomew chooses to renew it.","Merchant's Knowledge, 0 points, automatic, Mentem:","Bartholomew knows what someone in receipt of his curses or blessings is doing with their business.","Project Blessing, 2 points, Init +0, Vim:","Bartholomew can bless a particular commercial venture, so that chance favors it whenever possible. This results in a very successful trading venture. The blessing only lasts for one day, which isn't normally long enough to have an effect, but Bartholomew can renew the blessing every day, if he so chooses.","Project Curse, 1 point, Init +0, Vim:","The inverse of Project Blessing, this effect makes everything that could go wrong, go wrong. It takes at most a month to drive someone to bankruptcy through this power. As for the blessing, the curse only lasts for one day at a time.","Coagulation, 3 points, Init –1, Corpus","Obsession, 1 to 3 points, Init -5, Vim: Avarice","Weakness: Ordering","Bartholomew appears as an older, but still vigorous, merchant. He is plump, but not fat, and while he never appears positively cheerful, he also never seems angry, or impatient, at least not with other merchants. His clothes are of excellent quality and taste.","Bartholomew is a well-established and moderately successful merchant in a trading city. He is known for being lazy, but still making an extremely comfortable living from his trade. He also willingly gives advice to other merchants, and they have noticed that following his advice makes them rich, while disregarding it makes them poor. Most people in the city also think that Bartholomew attends church regularly. In fact, being a demon, he has never set foot inside a consecrated building. He has, on the other hand, made substantial donations to the Church, and those donations are well known.","The advice he gives is good business advice in itself, but he normally backs it up with his blessings, at least for a while. If his advice is ignored, he uses his curses to make sure that people suffer. The demonic features of his advice are very, very subtle. Merchants following them often find that they need to work on Sundays, although Bartholomew does not explicitly suggest that, and that they are often away from home on religious holidays, and thus unable to attend their local church. Further, he gives advice about charity, suggesting that the merchant give money away to reinforce his social standing. He also gives extensive advice on how to calculate how much to give, so that it doesn't cause the merchant financial problems.","This has the effect of making the merchant feel that he is doing a lot of good by giving alms, while removing any actual virtue it has. Anyone following Bartholomew's advice gives only for their own glory, and thus earns no merit. They are sinners, but they don't realize that they are, and thus they do not see the need to repent and reform. Bartholomew's strategy is subtle, but it wins many souls for Hell."],"page":"","latin":"","might":"50","size":"0","blurb":"Merchant's Blessing, 2 points, Init +0, Mentem:","source":"ArM5 Core","id":48},{"name":"Bomburkhan","realm":"Infernal","fields":[["Infernal Might","5 (Vim)"],["Characteristics","Int -2, Per 0, Pre 0, Com 0, Str -9, Sta +1, Dex +6, Qik +7"],["Size","-9"],["Virtues and Flaws","Weak-Willed, Short Attention Span"],["Personality Traits","Resentment of Being Controlled +5, Selfish +5, Brave -6"],["Reputations","none"],["Combat",["Dodge: Init +7, Attack n/a, Defense +14, Damage n/a"]],["Soak","+1"],["Wound Penalties","-1 (1), -3 (2), -5 (3), Incapacitated (4)"],["Abilities","Athletics 5 (flying), Brawl 6 (dodge), Guile 6 (boasts)"],["Vis","1 pawn of Vim, in wings"]],"description":["Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Make a Liar of the Boastful, 5 points, Init 0, Vim:","If this imp hears a boast and expends all of his Might points, he can immediately grant someone nearby an Ability or Power which will contradict that boast, and cause them to use it immediately. Thus if someone proclaims that she is the most beautiful woman in France, Bomburkhan can immediately make someone more beautiful than the boaster. This power must penetrate Magic Resistance to grant the Ability or power to the person, and that talent lasts for 1–10 rounds only (roll a simple die). A physical change, such as the example given above, lasts until the boaster and the target can no longer see each other.","Insignificance, 0 points, Init 0, Vim:","No Magic, Infernal or Faerie power can force Bomburkhan to use any of his nowers","Misfortune, 0 points, Init 0, Vim:","As an agent of misfortune, the presence of the demon causes the worst luck. In games of sheer chance, the odds always favor the opponent of the imp's target. In other matters where luck is more of a factor than judgement or skill, the target receives a penalty of -2 to any rolls. This misfortune lasts until the demon grows bored or is driven off","Coagulation, 1 point, Init –1, Corpus","Obsession, 1 to 3 points, Init -5, Vim: Boastful","Weakness: Vulnerability (salt)","Bomburkhan appears as a jet-black bat, no bigger than a person's hand, but with a pinched and twisted human face protruding from the black fur.","Bomburkhan was released from Hell after the false bravado of a Crusader led to the capture of Jerusalem. Since then he has taken great delight in puncturing the over-inflated egos of the prideful. This demon has an ability that could be exceedingly powerful, depending upon the magnitude of a speaker's self-importance. For example, should a magus declaim \"no-one can breach my Parma Magica!\", a nearby grog might suddenly hurl a Pilum of Fire which slices straight through it! Fortunately for all concerned, this power uses all of Bomburkhan's Might pool, and he grows bored very easily, wandering off once his mischief is done."],"page":"","latin":"","might":"5","size":"-9","blurb":"Make a Liar of the Boastful, 5 points, Init 0, Vim:","source":"ArM5 Core","id":49},{"name":"Bordelon","realm":"Infernal","fields":[["Infernal Might","15 (Corpus)"],["Characteristics","Int +2, Per +1, Pre 0, Com +2, Str -1, Sta 0, Dex +3, Qik +4"],["Size","0"],["Confidence Score","1 (3 points)"],["Virtues and Flaws","Piercing Gaze, Puissant Leadership"],["Personality Traits","Cruel +6, Stern +5, Implacable +3"],["Reputations","None"],["Combat",["Switch: Init +6, Attack +11, Defense +10, Damage +4"]],["Soak","+2"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16–20)"],["Abilities","Leadership 6+2 (children), Single Weapon 5 (switch)"],["Vis","3 pawns of Mentem, in hair."]],"description":["Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Crushing the Will, 2 points, Init 0, Mentem:","This power saps the will and vitality of its target, leaving him listless, less energetic and withdrawn. All Personality Trait rolls suffer a —3 modifier, and the target may not spend Confidence points to increase other rolls. Each use of this power lasts until the victim has slept for at least 6 hours.","Chastise the Disobedient, 0 points, Init +3, Corpus:","Every strike of Bordelon's switch inflicts a fearsome sting. Double the wound penalties inflicted by the weapon, although these extra penalties vanish after an hour. Wound penalties caused by any actual wounds she inflicts are healed as normal.","Coagulation, 2 points, Init -1, Corpus","Obsession, 1 to 3 points, Init –5, Vim: Shame","Betrayal of the Heart, 2 points, Init 0, Mentem:","Bordelon can see into the hearts of mankind and draw forth the most secret thoughts — people's fears and sins. Each use of this power reveals to the demon one fact about the target to which he would never admit. Truly holy people may be immune to this power, if they have no secrets, no matter how petty.","Whispers Behind the Back, 2 points, Init 0, Mentem:","Exactly as the spell Pains of the Perpetual Worry, this power gives the victim a nagging, taunting, painful emotion linked to their secret sins. It is a recurrent sense of anxiety that their secret will be uncovered, and a suspicion that everyone already knows it and is taking about the target behind his back. This power lasts for a month.","Weakness: Protected Group (red-haired women)","Bordelon appears as a stern-faced old woman, with hair tied back in such a tight bun that it distorts her face. Her small horns are hidden within this hair. Her skin is mottled with liver-spots, and she wears an austere gown which covers her cloven hooves and forked tail. She affects the demeanor of a stern governess. She carries a switch of willow bound with leather, which she wields with expert ability to inflict the most pain.","Bordelon believes that meekness is a virtue, and that those who strive to better themselves are victims of pride. Her goal is to crush all ambition and prevent those whom she watches from committing the very sin of Satan himself. Bordelon chooses a child early on in his life, and becomes his personal tormentor (granting the Story Flaw Plagued by a Demon). The child soon learns that the demon's periodic appearances are more frequent whenever he tries to distinguish himself from his peers, so her victims tend to become withdrawn, unambitious and meek. Whenever her victim acts in a way that would grant a Confidence point due to increased selfworth, he can expect a visit from Bordelon to punish the presumption."],"page":"","latin":"a Personal Tormentor","might":"15","size":"0","blurb":"Crushing the Will, 2 points, Init 0, Mentem:","source":"ArM5 Core","id":50},{"name":"Buran of Yenghissar","realm":"Infernal","fields":[["Infernal Might","25 (Auram)"],["Characteristics","Int -5, Per 0, Pre +3, Com -2, Str n/a, Sta n/a, Dex +3, Qik +6"],["Size","+4"],["Confidence Score","1 (3)"],["Virtues and Flaws","Jinni, Berserk, Strong-Willed, Wilderness Sense, Fury (Major) (when summoned), Greater Malediction (bound by bargains), Mute"],["Personality Traits","Untameable +5"],["Reputations","Scourge of Yenghissar 2 (local)"],["Combat","Not applicable, the buran is an insubstantial spirit"],["Soak","Not applicable, the buran is an insubstantial spirit"],["Wound Penalties","Not applicable, the buran is an insubstantial spirit"],["Abilities","Arabic 5 (understanding)*, Folk Ken 3 (travelers), Theology: Islam 3 (jinn), Survival 5 (desert), Taklamakan Lore 5 (legends), Wilderness Sense 2 (weather)"],["Vis","5 pawns of Auram vis prava, left behind as black sand when dispersed."]],"description":["* Represents level of understanding as the spirit is Mute.","Delusion of the Desert, 1 or 5 points, Init +3, Imaginem:","This evil spirit can create illusions of a lost traveler's companions or a welcoming oasis, only to launch itself in fury at an unsuspecting victim. Alternatively it can create images of itself as a humanoid sandstorm with glowing fiery eyes in order to terrify its victims prior to their deaths. A minor illusion which affects an Individual amount of material (such as the demon itself) costs one point, a larger illusion which fills a room costs five points. These visions always have a flaw, however (they smell wrong, can only be seen by one target, etc.).","Elemental Control of Wind, variable points; Init +1; Auram:","The buran has control over the winds of nature, which it uses to wreak destruction on the desert fringes. It may create any Creo, Muto, or Rego effect appropriate to Auram, at a cost of 1 Might Point per magnitude of effect. The demon cannot create any effect with a level greater than its Infernal Might, nor duplicate Ritual effects.","Recalcitrance, 0 points, Init constant, Vim:","Any attempt to control (but not destroy) the buran with any form of Supernatural Power (magical, Divine, or otherwise) treats the demon's Might as if it were 150% its actual Might, or otherwise has its Ease Factor increased by 50%. For example, a Circular Ward Against Demons of 38th level is needed to stop this demon.","Weaknesses: Protected Group (individuals that invoke the Bismillah invocation)","Usually manifests as a giant shapeless vortex of raging black sand using its Auram powers. To those with Second Sight, a giant humanoid shadow can be discerned within the sandstorm.","This wild desert storm spirit, or buran, once plagued the small village of Yenghissar along the route to Khashgar, bringing devastation to the crops and herd animals every seven years. It is now bound by an Infernally-aligned sahir using the Goetic Art of Binding (see Realms of Power: The Infernal, page 117). A speechless, destructive force of fury incarnate, it rages to be released and constantly strives to create elemental havoc around the thoughtless sahir who has trapped it within his ancestral sword.","Unlike many other corrupt jinn, the buran lacks the Coagulation and Obsession powers common to most demons and is an insubstantial spirit, unable to affect the physical world except through its magic. It is an example of an Infernal storm spirit likely to be found in the Taklamakan Desert, although much stronger and less powerful creatures also exist (see The Cradle and the Crescent, Chapter 9: On the Silk Road and Beyond...). Many travelers' tales tell of companions fallen behind who are tempted off the track by the illusions created by these demons."],"page":"","latin":"","might":"25","size":"+4","blurb":"* Represents level of understanding as the spirit is Mute.","source":"ArM5 Core","id":51},{"name":"Demonic Steed","realm":"Infernal","fields":[["Infernal Might","7 (Animal)"],["Characteristics","Cun –2, Per 0, Pre –6, Com –4, Str +4, Sta +4, Dex +1, Qik +1"],["Size","+3"],["Virtues and Flaws","Enduring Constitution, Improved Characteristics, Lesser Infernal Power*, Long Winded; Proud; Corrupted Beast*"],["Personality Traits","Vain +6, Brave +1"],["Combat",["Kick: Init +3, Attack +7, Defense +7, Damage +5"]],["Soak","+4"],["Wound Penalties","-1 (1-8), -3 (9-16), -5 (17-24), Incapacitated (25-32)"],["Abilities","Athletics 5 (long-distance running), Brawl 3 (hooves)"],["Vis","2 pawns of Animal, in hooves."]],"description":["* These Virtues and Flaws are a result of its corruption","Fatigue levels: OK, 0/0, /0/0, -2, -4, Unconscious","The Unimpeded Traveler, 0 points, Init +1, Animal:","This steed is not impeded by poor terrain, and may move at maximum speed along even the poorest of roads, achieving 30 miles a day. It may even cross open water and chasms, unsupported by ground, but can do this only at a trotting pace.","A fearsome black stallion with bloodshot eyes, fangs in its mouth, and hooves of iron.","This horse is one of three created by an Infernalist magus in a tribunal at the fringes of the Order by repeated applications of a tainted version of Steed of Vengeance (Muto Animal Level 35). There were many failures before he successfully created these three corrupted beasts. Because the spell is well-known, he is able to use the steeds in front of other magi with impunity."],"page":"","latin":"","might":"7","size":"+3","blurb":"* These Virtues and Flaws are a result of its corruption","source":"ArM5 Core","id":52},{"name":"Fimus","realm":"Infernal","fields":[["Infernal Might","10 (Terram)"],["Characteristics","Int -2, Per +2, Pre -2, Com +2, Str +4, Sta +4, Dex 0, Qik -4"],["Size","+2"],["Virtues and Flaws","Puissant Great Weapon, Poor Eyesight, Simple-Minded"],["Personality Traits","Untamable +5, Intimidating +3"],["Reputations","Champion of Hell 1 (Infernal)"],["Combat",["Cudgel: Init –3, Attack +13, Defense +6, Damage +11","Fist: Init –4, Attack +6, Defense +2, Damage +4"]],["Soak","+15"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22–28)"],["Abilities","Athletics 3 (pursuit), Awareness 4 (foes), Brawl 5 (fist), Great Weapon 6+2 (cudgel)"],["Vis","2 pawns of Terram, in eye."]],"description":["Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Elemental Control of Earth, variable points, Init +1, Terram:","Fimus has control over earth, which he uses to wreak destruction in the world. He may create any Creo, Muto or Rego effect appropriate to Terram, at a cost of 1 might point per magnitude of effect. The demon cannot create any effect with a level greater than his Infernal Might, nor duplicate Ritual effects. He prefers effects such as Wielding the Invisible Sling and Rusted Decay of Ten-Score Years.","Born of Rock, 0 points, Init 0, Terram:","The body of this demon is made from solid rock. This makes it exceedingly heavy and almost impossible to harm with mundane means.","Death's Vengeance, 0 points, Init +10, Terram:","Upon death, this demon's body explodes, sending shards of debris up to 20 paces in all directions. Treat this as a physical attack against all within range that can be dodged but not otherwise defended against. The Attack Bonus is +12, and the Damage is +15.","Coagulation, 1 point, Init -1, Corpus","Obsession, 1 to 3 points, Init -5, Vim: Cowardice","Recalcitrance, 0 points, Init constant, Vim:","Any attempt to control (but not destroy) the demon with any form of supernatural power (Magical, Divine or otherwise) treats the demon's Might as if it were one and a half times its actual Might, or otherwise has its Ease Factor increased by 50%. For example, a Circular Ward Against Demons of 30th level is needed to stop Fimus.","Weakness: Abhorrent Material (Cinnamon)","Fimus appears as an immense man apparently put together out of boulders. He has but one eye, in the center of his forehead. He carries an immense cudgel made out of a stalagmite.","Fimus is but one of many brother-demons (all with the same name); their mother produces more every time she evacuates her bowels. He and his brothers are popular foot-soldiers and shocktroops used by other demons, because they are effective warriors, and too stupid to effectively entertain rebellious thoughts. Each of the brothers has a different Abhorrent Material, depending upon what their mother had been eating prior to their birth."],"page":"","latin":"Warrior Demon","might":"10","size":"+2","blurb":"Elemental Control of Earth, variable points, Init +1, Terram:","source":"ArM5 Core","id":53},{"name":"Michael","realm":"Infernal","fields":[["Infernal Might","10 (Corpus)"],["Characteristics","Int +2, Per +2, Pre -2, Com -2, Str 0, Sta 0, Dex +1, Qik +1"],["Size","-2 to +1"],["Virtues and Flaws","None"],["Personality Traits","Cruel +3, Wrathful +3"],["Reputations","None"],["Combat","Michael does not normally fight, and if he does he uses whatever weapons are suitable for his current disguise."],["Soak","+0 (unless wearing armor)"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20) (Michael always takes wounds as a Size 0 creature, even if his current Size is different.)"],["Abilities","Athletics 5 (running away), Awareness 4 (victims), Craft (practical jokes) 8 (painful and humiliating ones), Folk Ken 5 (figuring out what will make someone most angry), Guile 10 (pretending to be someone else), Intrigue 3 (maneuvering people into his plots)"],["Equipment","Whatever is appropriate to his current role."],["Encumbrance","Varies"],["Vis","2 pawns of Muto in his heart (Infernally tainted)"]],"description":["Age: n/a (varies)","Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Change Form, 0 points, Init +0, Corpus:","Michael can change his appearance to match that of any human being. The change includes clothes and other equipment, as necessary.","Coagulation, 3 points, Init -1, Corpus","Obsession, 1 to 3 points, Init -5, Vim: Sensitivity to Mockery","Working Material, 1 point, Init +0, Terram:","Michael can create whatever he needs to set up a particular practical joke.","Weakness: Abhorrent Material (salt)","Michael appears as he needs to for his latest role. As a demon, he doesn't need, nor does he have, a 'natural' form.","Michael (he likes taking the name of a famous angel) is a minor demon who tempts people to wrath. He sets up elaborate, painful, and humiliating practical jokes, and makes sure that he is seen in the form of one of the victim's friends while doing so. If possible, he ensures that the victim sees him, in the form of the friend, laughing at their misfortune before running away.","He normally stays around to watch the resulting confrontation, because if it isn't heated enough he sets up another, even more hurtful, joke. He is especially happy if both friends become angry, and the friendship is ruined. Since both parties feel that the other was unreasonable, sometimes they can nurse their anger for years, which is exactly what Michael wants.","While Michael's jokes are normally painful and humiliating, they are almost never fatal. He wants people to sin so that they damn their souls, not die and possibly go to Heaven."],"page":"","latin":"","might":"10","size":"-2 to +1","blurb":"Michael can change his appearance to match that of any human being. The change includes clothes and other equipment, a…","source":"ArM5 Core","id":54},{"name":"Polandrus","realm":"Infernal","fields":[["Infernal Might","20 (Animal)"],["Characteristics","Int +1, Per +2, Pre 0, Com +2, Str +2, Sta +2, Dex +2, Qik +3"],["Size","0"],["Confidence Score","1 (3)"],["Virtues and Flaws","None"],["Personality Traits","Envious +3, Proud +2, Calculating +2"],["Reputations","None"],["Combat",["Bite: Init +18, Attack +11, Defense +9, Damage +8"]],["Soak","+6"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20)"],["Abilities","[Area] Lore 3 (livestock), Bargain 7 (for sins), Brawl 5 (bite), Charm 4 (frightened people), Folk Ken 3 (peasants), Guile 8 (when making deals), Hunt 6 (livestock), Language 6 (making deals), Leadership 4 (wolves), Survival 5 (woods)"],["Equipment","None"],["Encumbrance","0 (0)"],["Vis","1 pawn of Animal in each of four large canine teeth, all Infernally tainted."]],"description":["Age: n/a","Fatigue levels: OK, 0, –1/–1/–1, –3, –5, Unconscious","Calm Person, 1 point, Init +18, Mentem:","Makes the target person unnaturally calm about talking to a large wolf. It doesn't lessen their fear, just the sense that it is something they should act on immediately.","Dominate Wolves, 0 points, Init +18, Animal:","Polandrus can establish absolute control over any wolf. The wolf doesn't like it, but Polandrus doesn't care. This power applies to mundane wolves, wolves with Might scores, and to characters who can naturally take the form of a wolf, including shapechangers, lycanthropes, skinchangers, and Bjornaer with wolf heartbeasts, but not including magi who change using spells. Once established, the domination lasts until Polandrus decides to drop it, the dominated wolf enters a Dominion aura of level 3 or higher, or someone dispels the power.","Coagulation, 3 points, Init -1, Animal","Obsession, 1 to 3 points, Init –5, Vim: Secrecy","Weakness: Vulnerability (Holly)","An extremely large, jet black wolf, with red eyes.","Polandrus targets livestock farmers. He dominates a few wolves, and then kills some livestock, making sure that someone sees the wolves do it. A little later, he confronts the peasant in question, offering to ensure that the wolves do not attack for a week if the farmer does something innocuous, such as not wear a particular tunic. Polandrus comes back every week, and the requirements gradually become sinful, and more and more heinous. By the end, the wolf relies more on the threat to expose the farmer's deeds than on the threat to the livestock.","Polandrus is unnaturally fast in combat, much more so than in normal situations. However, he never attacks people unless he is attacked first."],"page":"","latin":"","might":"20","size":"0","blurb":"Makes the target person unnaturally calm about talking to a large wolf. It doesn't lessen their fear, just the sense t…","source":"ArM5 Core","id":55},{"name":"Two-headed Hound","realm":"Infernal","fields":[["Infernal Might","10 (Animal)"],["Characteristics","Cun 0, Per +2, Pre -6, Com 0, Str 0, Sta +2, Dex +1, Qik +2"],["Size","0"],["Virtues and Flaws","Greater Infernal Power*, Ferocity* (against intruders), Improved Characteristics, Long Winded, Sharp Ears, Horrifying Appearance*, Reckless, Corrupted Beast*"],["Personality Traits","Hatred of Owner +6, Hatred of Humans +5, Hatred of Self +3, Reckless +3, Vigilant +1"],["Combat",["Bite: Init +2, Attack +11, Defense +10, Damage +1"]],["Soak","+2"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20)"],["Abilities","Athletics 4 (pursuit), Awareness 4 (keeping watch), Brawl 6 (bite), Hunt 4 (track by scent)"],["Vis","2 pawns of Vim, one in each head."]],"description":["Ferocity Score: 1 (3 points)","* These Virtues and Flaws are a result of its corruption","Fatigue levels: OK, 0, -1, -3, -5, Unconscious","Spit Fire, 4 points, Init +6, Ignem:","The hound may spit a bolt of fire at its opponents; which does +15 damage to the individual it hits. The creature may bite one opponent and spit fire at another in the same round.","This huge dog has two slavering heads protruding from its massive shoulders
