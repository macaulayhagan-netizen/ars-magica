e is reduced by 5.","Grant Wrathful, 5 points, Init –12, Vim:","The target gains the Wrathful Flaw. Adranus can grant the Flaw temporarily, in which case it does not recover the Might Points spent until it withdraws the Flaw, or permanently, in which case its Might Score is reduced by 5.","Hibernation, 15 points, Init –32, Vim:","The spirit remains completely inactive for a year (spending no other Might points); the 15 points spent on this power are saved and added to the Might Pool for the first year out of hibernation. In this fashion, the Might Pool may exceed the permanent Might score (50). Using this power, the volcano can save up Might points over many years in succession and have a great amount to spend in the single year in which it awakens.","Manifestation, 4 or more points, Init equal to (Qik – Might points spent), Animal","R: Touch, D: Conc, T: Ind or Group","Manifests the spirit's consciousness among animals it touches, temporarily granting them a Might score equal to the Might points spent, and controlling their actions. It is a Rego Herbam effect of Level 20 to control a plant that is a pace in diameter (costing 4 Might points), and a Rego Animal of Level 25 to control a single creature of Size +1 (costing 5 Might points). For an extra 2 Might points, a group of ten standard creatures (or the equivalent mass) can be controlled. For each additional 2 Might points spent, the mass of creatures controlled is multiplied by 10. The spirit cannot spend more Might points on this power than the magnitude of its Magic Might. Humans and other sentient beings cannot be controlled by this power. Adranus is considered to be touching any animal on the mountain.","ReHe 20 or more (Base 10, +1 Touch, +1 Conc) or ReAn 25 or more (Base 15, +1 Touch, +1 Conc)","Master of Earth, variable points, Init -2 - Might cost, Terram:","Duplicates any non-Ritual Muto Terram or Perdo Terram spell no greater than 50th level at a cost of 1 Might point per magnitude of the effect.","Presence, 0 points, constant, Imaginem","R: Arc, D: Sun, T: Ind","Grants awareness of everything that happens within the bounds of Mount Etna. In essence, the spirit is coterminous with its associated landscape feature, so it is present simultaneously everywhere within its boundaries. The area controlled by the spirit can produce a yearly harvest of 5 pawns of Ignem vis, which manifests as physical objects within the controlled region. Harvesting this vis does not erode the spirit's Might.","InIm 30 (Base 2, +4 Arc, +2 Sun, +1 constant effect, +1 non-Hermetic effects)","Regio, 15 points, Init –32, Vim:","By permanently spending Might, the spirit can add levels to the regio around the volcano's crater.","Ruler of Lava, variable points, Init -2 - Might cost, Terram:","Duplicates any non-Ritual spell pertaining to lava no greater than 50th level, at a cost of 1 Might point per magnitude of the effect.","Ruler of Smoke, variable points, Init –2 – Might cost, Auram:","Duplicates any non-Ritual spell pertaining to smoke no greater than 50th level, at a cost of 1 Might point per magnitude of the effect.","Mount Etna is a conical and blasted peak that rises ten thousand feet above the eastern end of the island of Sicily."],"page":"","latin":"the Spirit of Mount Etna","might":"50","size":"","blurb":"Crafter of Fire, variable points, Init -2 - Might cost, Ignem:","source":"ArM5 Core","id":12},{"name":"Air Elemental","realm":"Magic","fields":[["Magic Might","15 (Auram)"],["Characteristics","Cun +1, Per +2, Pre 0, Com 0, Str +3, Sta -4, Dex -2, Qik +4"],["Size","0"],["Virtues and Flaws","Keen Vision, Shapeshifter, Ways of the Storm, Poor Memory, Short Attention Span, Simple Minded."],["Personality Traits","Storm +3*"],["Combat",["Jupiter's Touch Power*: Init +5, Attack +5, Defense n/a, Damage +30"]],["Soak","+0"],["Wound Penalties","-1 & 1 Might point (1-5), -3 & 3 Might points (6-10), -5 & 5 Might points (11-15), Incapacitated & 5 Might points (16-20), Dead & all Might points (21+)"],["Abilities","Area Lore 3 (high points), Athletics 3 (storm force winds), Awareness 3 (metal objects), Brawl 3 (Jupiter's Touch Power), Penetration 2 (Jupiter's Touch Power), Shapeshifter 4 (birds)"],["Vis","3 pawns of Auram, in body."]],"description":["* Includes Way of the Storms","Suffocate, 0 points, Init +2, Auram:","see insert on previous page for details","Jupiter's Touch, 1 point, Init +3, Auram:","see insert on previous page for details","*Charge of the Angry Winds , 1 point, Init +5, Auram:","As the spell of the same name; add the elemental's Strength to all the Ease Factors for acting within the wind. CrAu 15 (Base 3, +2 Voice, +1 Conc, +1 unnatural)","Notes: A creature born of storms, it can be devastating if roused.. Its Shapeshifter Virtue allows it to adopt the forms of the creatures it has seen: a raven, an eagle, a hound, and a bull."],"page":"","latin":"","might":"15","size":"0","blurb":"Jupiter's Touch, 1 point, Init +3, Auram:","source":"ArM5 Core","id":13},{"name":"Aneirin the Bard","realm":"Magic","fields":[["Magic Might","15 (Imaginem)"],["Characteristics","Int +3, Per +3, Pre +2, Com +4, Str n/a, Sta n/a, Dex n/a, Qik n/a"],["Size","n/a"],["Personality Traits","Careful +3, Observant +2"],["Combat","n/a"],["Soak","n/a"],["Wound Penalties","n/a"],["Abilities","Area Lore Stonehenge Tribunal 10, Magic Lore 8, Music 12, Teaching 5"],["Vis","If his spirit is somehow bottled rather than banished 2 Imaginem Vis remains."]],"description":["Discorporate, 0 points, Vim:","Aneirin never physically manifests, save as a shadow and a melodic voice. He can only be harmed with magic.","Names of Power, 0 points:","Aneirin knows many names of minor spirits and can teach them as a result of a Pact.","One of the five great Welsh poets believed by the Order to have left Daimons behind after their death (the other four being Taliesin, Talhaearn Tad Awen, Blwchbardd, and Cian). Famous for a single poem, Y Gododdin, Aneirin praises his fellows among the war band of Mynyddawg Mwynfawr (Mynyddawg the Wealthy) of Caereidyn (near Edinburgh), an army 300 strong sent on a doomed mission to recapture an old Roman stronghold from the Saxons. His tomb lies somewhere in the Cambrian Mountains. His spirit wanders across the entire mountain range, helping those who further his ideals and punishing those who go against them, but he is most powerful within his own tomb."],"page":"","latin":"","might":"15","size":"n/a","blurb":"Aneirin never physically manifests, save as a shadow and a melodic voice. He can only be harmed with magic.","source":"ArM5 Core","id":14},{"name":"Baghl","realm":"Magic","fields":[["Magic Might","15 (Terram)"],["Characteristics","Int -2, Per +2, Pre +1, Com -1, Str +3, Sta +3, Dex +1, Qik -1"],["Confidence Score","1 (3 points)"],["Virtues and Flaws","Jinn, Greater Immunity: Fire, Ways of the Mountains, Second Sight, Skinchanger, Strong-Willed, Tough, Greater Malediction (honor bargains made), Magical Air, Vulnerable Magic (mua'addhin's call); Reclusive."],["Personality Traits","Reclusive +5, Immutable +3, Proud +2"],["Combat",["Maul (warhammer): Init –1, Attack +11, Defense +3, Damage +15"]],["Soak","+10"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22–28), Dead (29+)"],["Abilities","Arabic 5 (stone), Athletics 3 (climbing), Great Weapon 4 (maul), Profession: Miner 3 (gemstones), Second Sight 4 (jinn), Theology: Islam 3 (jinn)."],["Vis","1 pawn of Terram vis can be collected every year from his haunt, in the form of a quartz-encrusted stalactite at the back of his cave. If slain in physical form, his body yields 3 pawns of Terram"]],"description":["Flesh to Stone, 2 points, Init -4, Terram:","Baghl can change any human he touches into stone until sunrise or until the morning call to prayer (Base 20, +1 Touch, +2 Sun).","Ruler of Earth, 1–3 points, Init 0, Terram:","Duplicates any non-Ritual Perdo Terram or Rego Terram spell less than or equal to 15th level at a cost of 1 Might point per magnitude of the effect.","Incorporeal, 0 points, Init Constant, Mentem:","Baghl is naturally both invisible and intangible, and cannot be influenced by the physical world. Magic can only directly target him if the caster can sense his existence. In this form he has no physical statistics or combat scores. Without taking a corporeal form, Baghl's physical characteristics are only used when dealing with other incorporeal creatures.","Donning the Corporeal Veil, 2 points, Init +1, Corpus:","Baghl can form the physical body described under Appearance to house his spiritual form, when doing so he acquires the physical characteristics, size, combat statistics, and Wound levels listed earlier. His arms and armor are also created with this power. He cannot become fatigued. This body lasts until he decides he no longer needs it. Killing the body does not kill Baghl.","Presence, 0 points, constant, Mentem:","Baghl is aware of everything that goes on within his haunt. This power needs to Penetrate to perceive beings with a Magic Resistance.","Baghl is the jinni of a dark cave found in the Elbruz mountains that was once used as a quarry until he drove off the miners. He may be appeased mainly by being left alone to enjoy his beautiful cave formations, although he sometimes agrees to converse with theological scholars. He appears as an obese man with a mule's head, pupilless eyes of jetblack stone, and quartz-veined limbs that heft an oversized maul. In physical form he can also assume the shape of a large black mule.","Jinn","The Free Virtue Jinn marks out a category of spirits associated with the Islamic lands. They are all vulnerable to the magic of the Sahirs (see The Cradle and the Crescent, Chapter 3), and may be part of the Magic, Faerie, or Infernal realms. See The Cradle and the Crescent, Chapter 4, for more information."],"page":"","latin":"an Earth Jinni","might":"15","size":"","blurb":"Flesh to Stone, 2 points, Init -4, Terram:","source":"ArM5 Core","id":15},{"name":"Caladrius","realm":"Magic","fields":[["Magic Might","14 (Animal)"],["Characteristics","Cun -1, Per +2, Pre +1, Com -2, Str –4, Sta +3, Dex +1, Qik +2"],["Virtues and Flaws","Lesser Immunity (to non-lethal diseases), Unaffected by the Gift, Compassionate (minor), Noncombatant"],["Personality Traits","Ibis* +3, Magnificent Appearance (Presence)* +3"],["Combat",["Dodge: Init +2, Attack n/a, Defense +5, Damage n/a"]],["Soak","+3"],["Fatigue Levels","OK, 0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-3), -3 (4-6), -5 (7-9), Incapacitated (10–12), Dead (13+)"],["Abilities","Athletics 3 (flying), Awareness 4 (food), Brawl 2 (dodging), Ignem Resistance (solar heat) 4. Survival 3 (wetlands)"],["Vis","3 Corpus (1 in each eye, 1 in the wings)"]],"description":["Healing Gaze, 4 points, Init –14, Corpus","R: Eye, D: Mom, T: Ind","By gazing into a person's eyes, the caladrius can draw out any non-fatal disease from a sick person into itself. This removes any disease of up to Incapacitating strength, or resolves a critical or lesser aging crisis. The caladrius must immediately fly up toward the sun or else the disease returns to the patient. CrCo 40 (Base 30, +1 Eye, +1 affect either disease or aging)","Perceive the Afflictions of Mortal Flesh, 0 points, Init +1, Corpus","R: Per, D: Mom, T: Sight","By sight, the caladrius can identify any diseases a person has and how serious they are. InCo 25 (Base 5, +4 Sight)","The caladrius is a magnificent, allwhite bird somewhat resembling a heron (but with shorter legs and beak). It has a long, gracefully curving neck and a short, slightly downward-curving beak.","\"If anyone is ill, the caladrius will tell whether the patient will live or die.\"","— Pierre de Beauvais","A caladrius is a mystical bird much sought by royal households. It can determine whether a sick person will live or die. If the patient is to die, the caladrius sadly turns away from him, but if he is to live, it gazes deeply into his eyes, drawing the sickness into itself. It then flies away toward the sun, going so high that the sun's rays burn away the disease (but they do not harm the caladrius itself).","A caladrius will not absorb a terminal illness (its Lesser Immunity would not protect it), but it will gladly heal any lesser ailment. It can heal either spontaneous diseases, which result from aging crises or diseases due to an external cause. As long as the crisis is not terminal or the disease does not cause a Lethal Wound, a caladrius can cure it. It can only heal wounds caused by disease, not those resulting from poison, combat, or other causes. It cannot remove Decrepitude."],"page":"","latin":"","might":"14","size":"","blurb":"Healing Gaze, 4 points, Init –14, Corpus","source":"ArM5 Core","id":16},{"name":"Chnoubis the Serpent","realm":"Magic","fields":[["Magic Might","30 (Mentem)"],["Characteristics","Int +3, Per +6, Pre 0, Com +2, Str 0, Sta +3, Dex +3, Qik +5"],["Personality Traits","Curious +4, Diplomatic +3, Proud +2, Noble +1"],["Combat",["Bite: Init +5, Attack +8, Defense +8, Damage +5*"]],["Soak","+9"],["Wound Penalties","-1 (1-4), -3 (5-8), -5 (9-12), Banished (13+)"],["Vis","On being banished his scales remain, containing 3 pawns of Intellego and 2 of Mentem vis"]],"description":["Size -1","On being bitten the victim must make a Fatigue test against Ease Factor 9 or lose a Fatigue level each round until he has succeeded for three consecutive rounds or fallen unconscious. While suffering these effects, the victim is unable to tell a lie (Penetration 25, Mentem), and is eager to talk to anyone present about anything on their mind, talking to themselves if necessary. Once the victim falls unconscious no further Fatigue is lost, but they awaken with a terrible headache and must make a Stamina stress roll (plus Art of Memory if they have that Ability) at Ease Factor 6 to recall what transpired.","Augury, varies, Init +5, Mentem:","By using this power Chnoubis is able to perform auguries as the Virtue Divination & Augury (see The Mysteries Revised Edition, page 58), with each Might Point allowing ten levels of success. If you do not have access to The Mysteries Revised Edition, this power allows Chnoubis to duplicate the effects of any Hermetic Intellego spell, and costs 1 point for every ten levels of the spell.","Aura of Rightful Authority, 4 points, Init +5, Mentem:","Equivalent to the ReMe20 Hermetic spell.","Discorporation, varies, 1 point, Init: +7, Mentem:","Becomes a discorporate spirit which can move as fast as lightning and is only visible to Intellego Vim magics or Second Sight. He sneaks up on victims invisibly and bites them, then listens to their secrets as the toxin takes effect.","A lion-headed serpent called upon for his abilities to scry and ferret out secrets. He claims to be a native of the Nile, but theurgists across Europe may successfully summon him. True to his visage, Chnoubis is a powerful fighter, but is much more interested in the power of words."],"page":"","latin":"","might":"30","size":"","blurb":"On being bitten the victim must make a Fatigue test against Ease Factor 9 or lose a Fatigue level each round until he …","source":"ArM5 Core","id":17},{"name":"Dietrich Von Bern","realm":"Magic","fields":[["Magic Might","35 (Corpus)"],["Characteristics","Int +2, Per +3, Pre +5, Com +3, Str +5, Sta +5, Dex +5, Qik +3"],["Size","+2"],["Personality Traits","Proud +3, Barbarous +2, Crafty +2"],["Combat",["Greatsword: Init +5, Attack+19, Defense +17, Damage +15*"]],["Soak","+22 (full chain mail drenched in dragon's blood)"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Banished (22+)"],["Abilities","Athletics 6, Great Weapon 10, Intrigue 6, Leadership 8"],["Vis","7 Řego"]],"description":["Dietrich's sword has been dipped in dragon's blood. No magical spell of a level 40 or lower can deflect, harm, or control it. After being hit, the dragon's blood burns, causing an extra +5 damage per round (armor does not soak) unless an alchemist, berbalist, or healer can cure the wound.","Sacred Kingship, 10 points, Init+3, Vim:","By laying hands on another character, Dietrich can permanently increase the character's Perception, Presence, or Communication by 1 point. He can only do this once per person, and can only to a maximum of +3. Increasing Presence this way is a very useful aid to the aspiring Mystagogue.","A hero in German poetry and song, Dietrich was the boy-king of Bern after the fall of Rome. During his reign, several great Nibelungen heroes, including Siegfried himself, were loyal members of his court. When his uncle Ermenrik, German ruler of Rome, conquered Bern, Dietrich fled to the court of Attila the Hun, where he went on many adventures and became one of the greatest warriors in history. He returned after his uncle died, retook Bern and captured Rome. He died in a quest for revenge against a friend who betraved him. and was buried in an ornate tomb in the Lessini Mountains, where the Alps cross over into Italy. His tomb is a treasure trove of weapons and armor, enchanted by being dipped in the blood of a great dragon Dietrich slew.","When anyone enters the tomb, however, the Daimon of Dietrich animates his hulking corpse. If you come seeking wisdom and prove yourself worthy, he will dispense kingly advice. If you come seeking power, you will face one of the greatest warriors on Earth, even in death. Another legend propagated by the Church says Dietrich, a heretic suspected of Arianism, was thrown into the volcanic Mount Etna. The legend of Dietrich appears in Das Heldenbuch (\"The Book of Heroes\") a collection of German romances published in the early 13th century, organizing the tales of the Ostrogoths and Franconians into two epic cycles."],"page":"","latin":"","might":"35","size":"+2","blurb":"Dietrich's sword has been dipped in dragon's blood. No magical spell of a level 40 or lower can deflect, harm, or cont…","source":"ArM5 Core","id":18},{"name":"Earth Elemental","realm":"Magic","fields":[["Magic Might","15 (Terram)"],["Characteristics","Cun 0, Per +1, Pre -2, Com -4, Str +3, Sta +6, Dex +2, Qik 0"],["Virtues and Flaws","Berserk, Great Stamina, Tough, Ways of the Cavern; Poor Memory, Short Attention Span, Simple Minded."],["Personality Traits","Cave +3*"],["Combat",["Bludgeon*: Init +3, Attack +11, Defense +7, Damage","Bludgeon when Berserk*: Init +3, Attack +13, Defense -5, Damage +9"]],["Soak","+9 (additional +2 when Berserk)"],["Wound Penalties","-1 & 1 Might point (1-5), -3 & 3 Might points (6–10), -5 & 5 Might points, (11-15), Incapacitated & 5 Might points (16-20), Dead & all Might points (21+)"],["Abilities","Athletics 3 (pursuit), Awareness 2 (interlopers), Brawl 3 (bludgeon), Penetration 3 (Slake Thirst Power), Stealth 2 (keeping still)"],["Vis","3 pawns of Terram, in body"]],"description":["* Includes Ways of the Cavern","Crush, 0 points, Init -2, Terram:","see insert for details","Slake Thirst, 1 point, Init +4, Aquam:","see insert for details","Note: This elemental was rarefied in a cavern with a Magic aura, and guards the vis source found therein with a furious passion."],"page":"","latin":"","might":"15","size":"","blurb":"* Includes Ways of the Cavern","source":"ArM5 Core","id":19},{"name":"Fire Elemental","realm":"Magic","fields":[["Magic Might","15 (Ignem)"],["Characteristics","Cun 0, Per –2, Pre +3, Com +1, Str –4, Sta 0, Dex +5, Qik +2"],["Size","0"],["Virtues and Flaws","Lightning Reflexes, Ways of the Forest Fire, Poor Memory, Short Attention Span, Simple Minded."],["Personality Traits","Forest Fire +3*"],["Combat",["Burn Power*: Init +3, Attack +12, Defense n/a, Damage +(Might Pool)"]],["Soak","+4"],["Wound Penalties","-1 & 1 Might point (1-5), -3 & 3 Might points (6-10), -5 & 5 Might points (11-15), Incapacitated & 5 Might points (16-20), Dead & all Might points (21+)"],["Abilities","Athletics 3 (leaping between fuel sources), Brawl 3 (Burn Power), Charm 3 (small animals), Penetration 3 (Fascination Power)"],["Vis","3 pawns of Ignem, in body."]],"description":["Recovers Might points in one quarter of the normal time, which for an elemental means 3 weeks rather than a season. For a Might 15 elemental this is approximately 2 Might points every 3 days.","* Includes Way of the Forest Fire","Powers","Burn, 0 points, Init +0, Ignem:","see insert for details","Fascination, 3 points, Init +6, Mentem:","see insert for details","Enliven the Gross Fire, 6 points, Init –10, Ignem:","This ritual-like power rarefies (creates) a fire elemental from a sufficient amount of raw elemental matter. The elemental can have any Might less than that of the creature using this power. The elemental is automatically under the control of the creature; this power can also be used to control elementals which are not of the creature's own making, but in this case must Penetrate the elemental's Might. When the creature has no further use for the elemental, its control lapses but the elemental remains.","Notes: Born of a lightning strike hitting a magically tainted tree (perhaps a vis source), this elemental has the frightening power to spawn more fire elementals, which it does if fought with water."],"page":"","latin":"","might":"15","size":"0","blurb":"Recovers Might points in one quarter of the normal time, which for an elemental means 3 weeks rather than a season. Fo…","source":"ArM5 Core","id":20},{"name":"Ghostly Warder","realm":"Magic","fields":[["Characteristics","Int +1, Per +1, Pre +1, Com +1,"],["Virtues and Flaws","None (may take Virtues and Flaws as a grog, if desired by the troupe.)"],["Personality Traits","Protective +3, two others chosen"],["Combat","n/a The ghost is non-physical, and so cannot be harmed by combat or harm others in"],["Abilities","[Area] Lore 5 (places children get lost), Awareness 5 (where her children are), Church Lore 1 (funerals), Divine Lore 1 (after death), Folk Ken 4 (people lying to her children), Living Language 5 (scolding), Magic Lore 2 (ghosts), Profession (housewife) 5 (cleaning)"],["Equipment","Apparently clothing, tools, and even pots and pans, as if she is in the process of cooking, but these are all ghostly and really part of her."],["Vis","None. Magi cannot render other characters' Ghostly Warders down for vis."]],"description":["Kinesis, 5 points, Init 0, Terram:","The ghost can move an object as if she were still physically present. One expenditure of Might allows her to move one object until she puts it down again. She has no combat Abilities, so she cannot fight wielding","An older peasant woman, rather gaunt, dressed in simple but well-repaired clothes and daily life. This may be a distaff and spindle, or a pot, or a broom; it changes from time to time. Note that she is invisible to characters without an appropriate Virtue.","This Ghostly Warder (see the Magical Warder Virtue, page 93) was the character's mother, aunt, or possibly grandmother. She still gives him all the advice he received as a child, such as to wear warm clothes and stay away from the river, but she is also quite perceptive, both about people and about mundane events."],"page":"","latin":"","might":"","size":"","blurb":"The ghost can move an object as if she were still physically present. One expenditure of Might allows her to move one …","source":"ArM5 Core","id":21},{"name":"Gudruty-kom the Giant","realm":"Magic","fields":[["Magic Might","40 (Auram)"],["Characteristics","Int 0, Per +1, Pre 0, Com -2, Str +8, Sta +6, Dex +3, Qik +3"],["Size","+3"],["Personality Traits","Hates Being Interrupted +4, Determined +3, Protective +2"],["Combat",["Brawl: Init +3, Attack +10, Defense +10, Damage +8"]],["Soak","+20"],["Wound Penalties","-1 (1-8), -3 (9-16), -5 (17-24), Banished (25+)"],["Vis","When he is banished his tongue remains, and contains 8 pawns of Auram Vis."]],"description":["Auram Magic, varies, Init +3, Auram:","May perform equivalent effects to any Auram magic at a cost of 1 point per magnitude, or for spells involving hail, 1 point per three magnitudes. Can perform Auram Ritual spells as if they were Formulaic spells; no extra time or vis is required.","Swallow Spells, 5 points, Init +3, Vim:","Can swallow any magical spell or effect with a level of 50 or less, completely dispelling it.","Gydryty-kom is the master of hail, a giant who can stretch his mouth from the ground to the clouds. He swallows storms and lightning, but grows angry when summoned because it interrupts his eternal battle with a Daimonic snake of fog that threatens to swallow the world. Gydryty-kom was once highly regarded in the lands of the Albanians, but his power has faded thanks to Christianity."],"page":"","latin":"","might":"40","size":"+3","blurb":"May perform equivalent effects to any Auram magic at a cost of 1 point per magnitude, or for spells involving hail, 1 …","source":"ArM5 Core","id":22},{"name":"Hipta the Nurse","realm":"Magic","fields":[["Magic Might","15 (Animal)"],["Characteristics","Int +3, Per +1, Pre +3, Com +2, Str varies, Sta varies, Dex varies, Qik varies"],["Size","varies from -5 to +2"],["Personality Traits","Calm +4, Protective +2"],["Combat","Varies with form"],["Soak","varies"],["Wound Penalties","Varies by form. Substitute Banished for Incapacitated"],["Vis","Leaves 3 pawns of Animal Vis in the form of a white feather when banished."]],"description":["Shapechange, 1 point, Init +5, Animal:","May change form into any natural or fantastic beast from size -5 to +2. The change is instantaneous, and she can always speak in any form.","Dispel, varies, Init +5, Vim:","May perform any Perdo Vim spell at will, for the cost of one Might point per magnitude. Hipta counts as familiar with all styles of magic for this purpose, and has a Penetration Score of 30, making invoking her a common way to end malevolent curses.","The nurse of Dionysus, Hipta is a powerful shapechanger but favors the form of a lovely dove. Her name and spells to summon her can be found in several ancient texts. She is invoked for forgiveness from curses and magical harm."],"page":"","latin":"","might":"15","size":"varies from -5 to +2","blurb":"May change form into any natural or fantastic beast from size -5 to +2. The change is instantaneous, and she can alway…","source":"ArM5 Core","id":23},{"name":"Honos","realm":"Magic","fields":[["Magic Might","30 (Corpus)"],["Characteristics","Int 0, Per +1, Pre +2, Com +1, Str +3, Sta +5, Dex +4, Qik +4"],["Size","0"],["Personality Traits","Honorable +6, Authoritarian +3, Disciplined +3."],["Combat",["Long Spear: Init +7, Attack+14, Defense +12, Damage +10"]],["Soak","+14 (silver cuirass)"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-20), Incapacitated (21-25), Banished (26+)"],["Abilities","Athletics 4, Great Weapon (long spear) 6, Leadership 6, Teaching (leadership) 3"],["Vis","Leaves 6 pawns of Corpus in his armor when banished."]],"description":["Instill Leadership, 5 points, Init +4, Mentem:","With a touch of his long spear, Honos can teach 17 experience points in the ability Leadership, to a maximum of Ability score 6. The Theurgist receives the insights immediately, but must then devote the season to study and reflecting upon them to gain the increase.","Centurions' Feast, 30 points, Init +4, Corpus:","Produces a magical feast sufficient to feed one hundred people. All who partake of the feast who possess the Flaw Dutybound are instantly cured of any Light and Medium Wounds, and gain +10 on their next recovery checks. The food lasts for one hour, then dissipates, but the effects are permanent.","Honos is a Roman Daimon of morality and military honor, with several temples built in his name. Honos appears as a young warrior in ancient armor, carrying a lance and a cornucopia (\"horn of plenty\"). Honos' temples in Rome have been destroyed or blanketed by the Dominion, although the Legion of Mithras are rumored to know the location of one surviving shrine where he can be invoked."],"page":"","latin":"","might":"30","size":"0","blurb":"Instill Leadership, 5 points, Init +4, Mentem:","source":"ArM5 Core","id":24},{"name":"Magical Wolf","realm":"Magic","fields":[["Magic Might","20 (Animal)"],["Characteristics","Int 0, Per +3, Pre +1, Com +1, Str +2, Sta +2, Dex +2, Qik +2"],["Virtues and Flaws","None"],["Personality Traits","Leader +3, Loyal +2"],["Reputations","None"],["Combat",["Bite: Init +12, Attack +10, Defense +14, Damage +9"]],["Soak","+7"],["Wound Penalties","-1 (1-4), -3 (5-8), -5 (9-12), Incapacitated (13–16)"],["Abilities","[Area] Lore 6 (game trails), Brawl 6 (biting), Hunt 7 (in a pack), Living Language 5 (hunting terminology). Survival 6 (forests)"],["Equipment","None. Magical though he is, he is still a wolf."],["Encumbrance","0 (0)"],["Vis","4 pawns of Animal, in head."]],"description":["Age: n/a","Decrepitude: n/a","Fatigue levels: n/a The magical wolf is tireless.","Pack of One, 2 points, Init +10, Animal:","The wolf can create five duplicates of himself, who can then fight as a trained group. For these purposes, treat the wolf as having a Leadership score of 5, so that he can get the full +15 group bonus to his attacks. The power lasts until the pack brings down its opponent, which may be a group, or disengages from the fight. As the pack is really all one creature, the nomination of a vanguard is arbitrary. Further, the group does not need to disengage and reform when the vanguard is killed, it can seamlessly transfer the role to another wolf. Finally, the wolf only dies if all the copies are killed. When the duplicates vanish, the least wounded wolf remains.","Terrifying Howl, 4 points, Init +0, Mentem:","Anyone who hears the wolf's howl is struck with fear of the wolf and of wilderness places away from the haunts of men. Someone already in a house will merely not want to leave. Overcoming this fear completely requires a Brave roll against an Ease Factor of 12. Acting sensibly while responding to it, such as heading back to the village carefully, requires a Brave roll against an Ease Factor of 6. Those who fail the easier roll simply flee in panic.","Wolf Lord, 0 points, constant, Animal:","Any wolf the magical wolf strikes in deadly combat dies instantly. In addition, the magical wolf can make mundane wolves follow his instructions even when he is not around, as long as the instructions are quite simple.","A gray male wolf, slightly larger than normal, but only slightly, and looking extremely healthy. His eyes, in particular, sparkle more brightly than should be possible.","The magical wolf does not care for such human niceties as names, and isn't particularly interested in human beings. Instead, he watches over all the wolves in his range, doing what he can to ensure their safety, health, and food supply. Sometimes, this means hunting wolves down himself, to keep population down, and in that case he removes the weak from the packs.","While he has no interest in human beings, he does see that they are important, and might be willing to negotiate with a village. On the other hand, he might decide to drive them out. This magical wolf has the same reactions to The Gift as a mundane animal, although other magical wolves may not."],"page":"","latin":"","might":"20","size":"","blurb":"Pack of One, 2 points, Init +10, Animal:","source":"ArM5 Core","id":25},{"name":"Portunes","realm":"Magic","fields":[["Magic Might","25 (Auram)"],["Characteristics","Int +1, Per +3, Pre 0, Com +1, Str 0, Sta 0, Dex 0, Qik 0"],["Size","n/a"],["Personality Traits","Watchful +3"],["Combat","None. Vanishes if attacked, and can only be harmed by Perdo Vim spells."],["Soak","n/a (never materializes)"],["Wound Penalties","n/a"],["Vis","None."]],"description":["Safe Harbor, 12 points, Init 0, Auram:","Guarantees calm weather in the harbor of a port for an entire season, and resists all spells that would disrupt this with a Magic Resistance of 60.","Opening Enchanted Locks, 8 points, Init 0, Vim:","Portunes can dispel any magical lock with a level of less then 40 with this power.","A Spirit charged with ports and harbors, the Greeks called him Palaemon and Melicertes. His purview also covers keys, locks, and domestic animals. In Rome he was worshipped as a god, with a temple located near the Forum Boarium. His feast, the Portunalia, is observed on August 17th. The rite to summon him involves throwing keys into a fire. When summoned, he appears either as a ghostly serpent or the shadowy visage of a bearded man in a leather apron, but he never takes on a solid physical form."],"page":"","latin":"Spirit of Safe Narbor","might":"25","size":"n/a","blurb":"Guarantees calm weather in the harbor of a port for an entire season, and resists all spells that would disrupt this w…","source":"ArM5 Core","id":26},{"name":"Pukis","realm":"Magic","fields":[["Magic Might","10 (Ignem)"],["Characteristics","Int –1, Per +3, Pre 0, Com 0, Str –1, Sta +4, Dex+3, Qik +6"],["Size","–2"],["Personality Traits","Mischievous +3, Loyal +3, Fickle +2"],["Combat",["Bite: Init +5, Attack +6, Defense+9, Damage +3","Lashing tail: Init +6, Attack +10, Defense +13, Damage +0"]],["Soak","+8 (leathery hide)"],["Wound Penalties","-1 (1-3), -3 (4-6), -5 (7-9), Banished (10+)"],["Vis","2 Ignem, 1 Rego"]],"description":["Although small, Pukis is long and thin. It can engage 2 opponents without penalty, attacking one with its jaws and the other with its quick tail. It is also burning hot, and can ignite easily flammable materials on touch.","Invisibility, 3 points, Init +6, Imaginem:","Pukis can turn itself completely invisible and inaudible, for as long as it chooses, or until it touches a person or animal.","Mischievous Flame, 2 points, Init +6, Ignem:","With a glance, Pukis can set anything slightly flammable aflame.","Sneak Thief, 5 points, Init +6, Terram:","By touching any object weighing less than 3 pounds, Pukis can instantly teleport the object to its home so that it appears at the edge of its master's hearth.","Sacred Fire, 0 points, Init +6, Ignem:","As long as Pukis lives in a particular hearth, and the fire is kept hot year round, the ashes from the fire can be collected for 1 pawn of Ignem per season.","First summoned by Baltic wizards, this Daimon takes the form of a small dragon of fire that dwells hearth or a fireplace. It enjoys napping amongst burning logs and coals, coiling its long-snake like body beneath the flames to conceal its presence. It will leave gifts for the master of the household, possibly stolen from somewhere else, and will attack strangers if they act destructively. If it is treated poorly, it will cause mischief before departing. The magus Andrilikes, a theurgist of the Novgorod tribunal, wrote a Hermetic ritual for summoning this lesser Daimon to his sanctum, and has given copies to several of his friends."],"page":"","latin":"Dragon of the Hearth","might":"10","size":"–2","blurb":"Although small, Pukis is long and thin. It can engage 2 opponents without penalty, attacking one with its jaws and the…","source":"ArM5 Core","id":27},{"name":"Revenant","realm":"Magic","fields":[["Magic Might","9 (Corpus)"],["Characteristics","Int -2, Per -2, Pre 0, Com -2, Str +3, Sta +3, Dex +1, Qik 0"],["Size","0"],["Confidence Score","1(3)"],["Virtues and Flaws","Baneful Circumstances (in daylight)"],["Personality Traits","Vengeful +6"],["Combat",["Fist: Init 0, Attack +7, Defense +4, Damage +5"]],["Soak","+11"],["Wound Penalties","-1(1-5), -3 (6-10), -5 (11-15), -5 (16–20), Destroyed (21+)"],["Abilities","Brawl 3 (fist)"],["Equipment","Tattered burial shroud, the revenant's dead, unfeeling fist strikes as if it were a bludgeon (see page 400)"],["Vis","2 Corpus in eyes (1 per eye)"]],"description":["Breath of Corruption, 1 point, Init +2, Auram","R: Special, D: Mom, T: Ind","The walking corpse can exhale foul humors, infecting a person within 2 paces with a disease (Ease Factor 9, effect as a Medium wound).","CrAu 20 (Base 10, +2 Range equivalent to Voice)","Rise from the Grave, 1 point, Init –1, Terram","R: Touch, D: Diameter, T: Part","The revenant can cause the earth over its grave to open for one Diameter so it may enter or leave. The ground then seals, leaving no trace of disturbance.","ReTe 5 (Base 2, +1 Touch, +1 Diameter, +1 Part)","A shriveled, leathery corpse; its eyes blaze with unnatural fury."],"page":"","latin":"Corpse-Like Form","might":"9","size":"0","blurb":"Breath of Corruption, 1 point, Init +2, Auram","source":"ArM5 Core","id":28},{"name":"Revenant","realm":"Magic","fields":[["Magic Might","6 (Corpus)"],["Characteristics","Cun -2, Per -2, Pre 0, Com -2, Str 0, Sta +3, Dex +2, Qik +1"],["Virtues and Flaws","Baneful Circumstances (in daylight), Weak Characteristics (x2)"],["Combat",["Bony Claws: Init +2, Attack +8, Defense +8, Damage +2"]],["Soak","+9"],["Wound Penalties","-1 (1-3), -3 (4-6), -5 (7-9), -5 (10-12), Destroyed (13+)"],["Abilities","Brawl 3 (claws)"],["Equipment","Tattered burial shroud"],["Vis","1 Corpus in skull"]],"description":["Rise from the Grave, 2 points, Init +2, Terram","R: Touch, D: Diameter, T: Part","The skeleton can cause the earth over its grave to open for one Diameter so it may enter or leave. The earth then seals, leaving no trace of disturbance.","ReTe 10 (Base 3, +1 Touch, +1 Diameter, +1 Part)","A leering skeleton whose bony fingers are as sharp as claws.","Note: A human skeleton weighs much less than a living person, so an animate skeleton's Size is -2."],"page":"","latin":"Skeletal Form","might":"6","size":"","blurb":"Rise from the Grave, 2 points, Init +2, Terram","source":"ArM5 Core","id":29},{"name":"Scitalis","realm":"Magic","fields":[["Magic Might","5 (Animal) Characteristics:"],["Size","-2"],["Virtues and Flaws","Great Presence, Poor Quickness, Weak Characteristics"],["Personality Traits","Lethargic +2, Territorial +2"],["Combat",["Fangs: Init -2, Attack +7, Defense +3, Damage -1"]],["Soak","+4"],["Fatigue Levels","OK, 0, -1, -3, –5, Unconscious"],["Wound Penalties","-1 (1-3), -3 (4-6), -5 (7-9), Incapacitated (10-12), Dead (13+)"],["Abilities","Brawl 3 (fangs), Ignem Resistance 3 (cold), Survival 2 (winter)"],["Vis","1 Imaginem in skin"]],"description":["Cun +1, Per +2, Pre +4, Com -3, Str -2, Sta +2, Dex 0, Qik -2","Dazzling Appearance, 0 points, Init –3, Mentem or Animal","R:Per, D: Conc, T: Spectacle","The scitalis can use its wondrous colors and appearance to stupefy those who look at it. Victims stand in slack-jawed amazement, unable to move, speak, or act, for as long as the scitalis concentrates. It uses this power to capture its prey, for it is a slow-moving creature.","ReMe(An) 45 (Base 15, +1 Conc, +4 Spectacle, +1 Animal requisite)","Venom, 0 points, Init n/a, Aquam","R:Touch, D: Sun, T: Ind","The scitalis' fangs drip a venom that causes a Medium Wound (if it penetrates Magic Resistance) unless its victim can make a Stamina roll against an Ease Factor of 9.","CrAq 30 (Base 10, +1 Touch, +2 Sun, +1 continuous effect)","The scitalis is a large snake, about six feet long and as thick as a man's arm. Its scales are patterned in a variety of spectacular colors.","The scitalis is a slow-moving serpent that relies on its marvelous appearance to stun its prey. The scitalis usually hunts by hiding near a water source or game trail. It typically preys on small animals, but has been known to attack humans if it feels threatened. Unlike mundane snakes, the blood of the scitalis is hot, enabling the serpent to remain active throughout the winter months."],"page":"","latin":"","might":"5","size":"-2","blurb":"Cun +1, Per +2, Pre +4, Com -3, Str -2, Sta +2, Dex 0, Qik -2","source":"ArM5 Core","id":30},{"name":"Sir Giles","realm":"Magic","fields":[["Magic Might","16 (Mentem)"],["Characteristics","Int -1, Per -1, Pre +1, Com 0, Str +2, Sta +1, Dex +2, Qik +2"],["Size","0"],["Confidence Score","2 (6)"],["Virtues and Flaws","Knight; Puissant Single Weapon, Self-Confident; Proud (Major); Baneful Circumstances (during the day)"],["Personality Traits","Proud +6, Belligerent +2, Brave +2"],["Reputations","Proud 3 (local)"],["Combat",["Lance & Heater, mounted: Init +2, Attack +17, Defense +16, Damage +7","Lance, dismounted: Init +3, Attack +9, Defense +7, Damage +9","Long Sword & Heater, mounted: Init +2, Attack +17, Defense +17, Damage +8","Long Sword & Heater: Init +2, Attack +14, Defense +14, Damage +8","Long Sword only: Init +2, Attack +13, Defense +10, Damage +8"]],["Soak","+10"],["Fatigue Levels","OK, -1, -3, -5, Unconscious"],["Wound Penalties","-1(1-5), -3 (6-10), -5 (11-15), Incapacitated (16+)"],["Abilities","(Area) Lore 3 (nobles), Animal Handling 3 (horses), Athletics 2 (running), Awareness 3 (in battle), Brawl 2 (fist), Concentration 1 (remaining invisible), Charm 1 (ladies), Etiquette 3 (nobles), Great Weapon 3 (long spear), Hunt 2 (deer), Intrigue 1 (noble courts), Leadership 3 (soldiers), Ride 5 (in battle), Single Weapon 5+2 (heater shield)"],["Equipment","Full chain mail, lance, heater, long sword, black destrier"],["Encumbrance","2 (4)"],["Vis","4 Mentem in lance"]],"description":["Age: n/a (30)","Donning the Corporeal Veil, 5 points, Init -1. Corpus:","Sir Giles can assume material form","Riding the Phantom Steed, 2 points, Init 0, Animal","R: Touch, D: Sun, T: Ind","When Sir Giles takes physical form, he can also materialize his war horse for an additional Might cost. He can dissolve the horse at will due to the Rego requisite. Use the statistics for a destrier.","Cr(Re)An 40 (Base 15, +1 Touch, +2 Sun, +1 Rego requisite, +1 Size)","Invisibility, 1 point, Init 0, Imaginem","R: Touch, D: Conc, T: Group","Even in material form, Sir Giles and his horse can become invisible when he wishes (though they can still be seen by Second Sight).","PeIm 20 (Base 4, +1 Touch, +1 Conc, +2 Group)","Ride in Dreams, 1 point, Init 0, Mentem","R: Touch, D: Sun, T: Ind","When in spirit form, Sir Giles can enter the dreams of a sleeping person whose name he knows, tormenting him with nightmares of a furious, dark knight. The victim must make a Stamina roll against an Ease Factor of Sir Giles' Presence + Leadership or lose a Long-Term Fatigue Level.","CrMe 15 (Base 4, +1 Touch, +2 Sun)","Sir Giles is a Magical apparition — a ghostly knight in black mail, riding a fearsome black destrier. His shield and surcoat are solid black without any heraldic device, and atop his helm is a crest shaped like a cockerel. If he removes his helm, he appears to be a rather handsome, well-groomed knight whose face shows an expression of fierce pride.","Not all ghosts belong to the Magic realm; there are Infernal and Faerie ghosts as well. Magical ghosts remain tied to the world through some overwhelming emotion or personal need. If its connection is somehow resolved, the ghost passes from the world, never to return."],"page":"","latin":"a Ghostly Knight","might":"16","size":"0","blurb":"Donning the Corporeal Veil, 5 points, Init -1. Corpus:","source":"ArM5 Core","id":31},{"name":"Stag of Virtue","realm":"Magic","fields":[["Magic Might","17 (Animal)"],["Characteristics","Cun – 2, Per + 2, Pre + 2, Com – 3, Str +4, Sta +3, Dex +1, Qik +2"],["Size","+2"],["Confidence Score","1 (3)"],["Virtues and Flaws","Ways of the Forest; Essential Virtue (healthy, minor), Ferocity (when at bay), Great Quickness, Lesser Immunity (fevers), Long-Winded, Puissant Athletics; Hatred (of serpents, major); Higher Purpose (protect its herd), Restricted Power (x2)"],["Personality Traits","Stag* +3, Noble +3, Healthy (Stamina) +3, Brave +2"],["Reputations","Noble 2 (local)"],["Combat",["Antlers: Init +4, Attack +10, Defense +10, Damage +7","Hooves: Init +4, Attack +8, Defense +9, Damage +5"]],["Soak","+7"],["Fatigue Levels","OK, 0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22-28), Dead (29+)"],["Abilities","Athletics 8+2 (sprinting), Awareness 5 (hunters), Brawl 5 (antlers), Stealth 3 (hiding in undergrowth), Survival 4 (forests)"],["Vis","3 Creo in right antler."]],"description":["Healing, 3 points, Init –8, Animal","R: Per, D: Mom, T: Ind","The stag can heal one of its own Heavy or lesser wounds. This is a Restricted Power: the stag must eat the herb dittany to activate it.","CrAn 25 (Base effect)","Delay the Serpent's Venom, 0 points, Init n/a, Aquam","R: Per, D: Sun, T: Ind","The Stag of Virtue is magically warded against poison. Any poison introduced into the Stag's body takes no effect until the next sunrise or sunset (whichever comes first). This power activates whenever such a poison is introduced, and thus has an Intellego requisite.","Re(In)Aq 20 (Base 5, +2 Sun, +1 Intellego requisite)","Alleviate the Serpent's Bite, 1 point, Init +1, Aquam","R: Per, D: Mom, T: Ind","A Stag of Virtue can permanently neutralize any poison already inside its body. This is a Restricted Power, which the Stag must drink water to activate.","PeAq 15 (Base 15)","\"...[W]hen the stag knows where the serpent is, he goes and fills his mouth with water and spits it down where the serpent is and draws him out ... and stamps him underfoot and thus kills him.\"","— Pierre de Beauvais","A Stag of Virtue is a great enemy of serpents and kills them whenever it can. It does this by filling its mouth with water and spitting it down the serpent's hole; when the serpent emerges to escape drowning, the Stag of Virtue tramples it to death.","A Stag of Virtue enjoys vigorous health and can live a very long time (in fact, like other Beasts of Virtue, it can live forever). To keep itself youthful and healthy, this stag swallows a live, venomous serpent. Then it drinks a large quantity of water to neutralize the venom. After this process, its antlers fall off and its vigor is restored. Hermetic experts concur that the Stag of Virtue actually consumes Magical serpents for this process and that it becomes weak and looks aged when it cannot find snakes to eat (such as during the winter). The Stag of Virtue lives only in places where Magical snakes can be found.","The right antler of a Stag of Virtue has healing powers and is greatly sought by hedge wizards and magi alike. The stag always buries its antlers after shedding them. Anyone who consumes the flesh of a Stag of Virtue gains a Lesser Immunity to fevers for Moon duration. The stag itself is immune to fevers and the venison transfers this immunity through the Law of Contagion."],"page":"","latin":"","might":"17","size":"+2","blurb":"The stag can heal one of its own Heavy or lesser wounds. This is a Restricted Power: the stag must eat the herb dittan…","source":"ArM5 Core","id":32},{"name":"Stellatus","realm":"Magic","fields":[["Magic Might","50 (Ignem)"],["Characteristics","Int +4, Per +4, Pre +7, Com +2, Str +8, Sta +8, Dex +3, Qik 0"],["Confidence Score","3 (12)"],["Virtues and Flaws","Second Sight"],["Personality Traits","Proud + 3"],["Reputations","The Powerful Dragon who Lives in the Mountains (local) 5"],["Combat",["Claws: Init +3, Attack +22, Defense +18, Damage +20"]],["Soak","+20"],["Wound Penalties","-1 (1-13), -3 (14-26), -5 (27-39), Incapacitated (40-52)"],["Abilities","[Area] Lore 5 (history), Awareness 8 (human beings), Brawl 7 (claws), Divine Lore 1 (saints), Faerie Lore 2 (knights), Folk Ken 2 (scholars), Guile 4 (keeping secrets), Infernal Lore 0 (1) (undead), Magic Lore 8 (dragons), Order of Hermes Lore 1 (Tytalus), Second Sight 8 (magical invisibility)"],["Equipment","Ancient treasure is piled high in his lair."],["Encumbrance","0 (0)"],["Vis","5 pawns of Ignem vis in each eye."]],"description":["Age: n/a","Decrepitude: n/a","Fatigue levels: OK, 0/0/0/0/0, -1, -3, -5, Unconscious","Human Form: 1 point, Init 0, Corpus:","The dragon can assume the form of a human being. This is always the same form, a man with dark hair and eves, in the prime of life. The transformation lasts until he eats or drinks, or until Stellatus uses the same power again to change back. The dragon has all his powers in human form, and the same Characteristics, but he is much weaker in combat and thus changes back if he needs to fight.","Instill Loyalty, 5 points, Init 0, Mentem:","Stellatus can make any individual whom he can see totally loyal. This does not remove free will, but the victim is completely loyal to the dragon, and this loyalty lasts as long as Stellatus is alive.","Fiery Breath, 1 point, Init +5, Ignem:","Stellatus can breathe fire. The fire extends in a cone from his mouth, out to a distance of 20 paces, where it is 20 paces across. The fire has an intensity of +15. Dodging it is a Oik + Athletics roll against an Ease Factor of 9. A failure means that the character is engulfed in the flames, taking +45 damage, a success by 3 points or less means that a limb is covered, for +30 damage, a success by 4 to 6 points (that is, success against Ease Factor 12) means that the character is only brushed by the flames, for +15 damage, while success by 7 points or more (that is, success against Ease Factor 15) means that the character dodges out of the fire entirely.","Master of Fire, 1 or more Might Points, Init 0, Ignem:","Stellatus can control fire. He can duplicate any Hermetic Rego Ignem spell of fourth magnitude or less at the cost of 1 Might point. For every additional Might point he spends, the level of the spell increases by one magnitude.","An enormous lizard with great wings, covered in scales of red so dark as to be almost black. His eyes are lit from within by a smoldering orange glow. Although he is a little on the small side for a dragon, he is larger than most houses.","Stellatus is an ancient dragon who has laired under the same mountain range for centuries. Most of the time he lies quietly in his lair, contemplating his treasure, or travels the area around in human form (he can go for weeks without eating or drinking). Every couple of centuries, he erupts in draconic form to carry out some plan or seize some item, and every decade or so some would-be hero disturbs him.","The dragon is aware of The Gift, but it inspires him with curiosity, making him less likely to simply kill magi who enter his lair. A Tytalus maga did spend some time challenging the dragon in various ways, and although Stellatus eventually killed her by rigging an entirely mundane rock-fall trap, he quite enjoyed the experience. He regards himself as superior to all Hermetic magi, and is firmly convinced that he is immune to their magic. With a Magic Resistance of 50, this is almost, but not quite, true."],"page":"","latin":"the Dragon","might":"50","size":"","blurb":"The dragon can assume the form of a human being. This is always the same form, a man with dark hair and eves, in the p…","source":"ArM5 Core","id":33},{"name":"Typical Giant","realm":"Magic","fields":[["Magic Might","12 (Corpus)"],["Characteristics","Int -3, Per +1, Pre 0, Com -3, Str +12, Sta +3, Dex +2, Qik -2"],["Confidence Score","1 (3)"],["Virtues and Flaws","Tough, Warrior, Wrathful (minor), Weak-Willed"],["Personality Traits","Oafish +3"],["Combat",["Cudgel: Init –2, Attack +12, Defense +5, Damage +19","Kick: Init –3, Attack +6, Defense +1, Damage +15","Stone: Init -3, Attack +7, Defense +2, Damage +14"]],["Soak","+9"],["Wound Penalties","-1 (1-10), -3 (11-20), -5 (21–30), Incapacitated (31–40), Dead (41+)"],["Fatigue Levels","OK, 0, -1, -3, -5, Unconscious"],["Abilities","Brawl 4 (kick), Great Weapon 5 (cudgel), (Living Language) 4 (coarse expressions), Thrown Weapon 3 (stone)"],["Powers","None"],["Equipment","Cudgel, Partial Fur Armor"],["Encumbrance","0"],["Vis","3 Corpus in skull"]],"description":["The common giant is an enormous, ugly man with bulging eyes, an oversized, squarish head, and a shapeless gash of a mouth full of crooked teeth. He stands about 20 feet tall and wears a crude garment stitched together from bear skins.","These statistics are for a typical giant of the sort found throughout the British Isles. Such giants have been known to form alliances with hedge wizards or faeries. Unlike many magical creatures, giants need to eat, drink, and breathe, and get old and die."],"page":"","latin":"","might":"12","size":"","blurb":"The common giant is an enormous, ugly man with bulging eyes, an oversized, squarish head, and a shapeless gash of a mo…","source":"ArM5 Core","id":34},{"name":"Water Elemental","realm":"Magic","fields":[["Magic Might","15 (Aquam)"],["Characteristics","Cun +4, Per –2, Pre 0, Com 0, Str +3, Sta +3, Dex +1, Qik –4"],["Size","0"],["Virtues and Flaws","Puissant Hunt, Tough, Ways of the River, Poor Memory, Short Attention Span, Simple Minded."],["Personality Traits","River + 3*"],["Combat",["Bludgeon: Init -4, Attack +8, Defense +3, Damage +6","Bludgeon*: Init -1, Attack +11, Defense +6, Damage +6"]],["Soak","+6"],["Wound Penalties","-1 & 1 Might point (1-5), -3 & 3, Might points (6-10), -5 & 5 Might points (11-15), Incapacitated & 5 Might points (16-20), Dead & all Might points (21+)"],["Abilities","Athletics 2 (when hunting), Brawl 3 (bludgeon), Hunt 3+3 (river banks), Penetration 2 (Chill Touch power), Swim 3 (speed)"],["Vis","3 pawns of Aquam, in body"]],"description":["* Includes Ways of the River","Drown, 0 points, Init +0, Aquam:","see insert on previous page for details.","Chill Touch, 2 point, Init 0, Ignem:","see insert on previous page for details","Crafter of Water, 1 – 3 points, Init –4 – Might Cost, Aquam:","duplicate any Creo Aquam or Rego Aquam spell of level 15 or below, at a cost of 1 Might point per magnitude of the spell.","Notes: This lympha haunts the river banks near its home, preying on the warmth of small creatures who dwell there."],"page":"","latin":"","might":"15","size":"0","blurb":"see insert on previous page for details.","source":"ArM5 Core","id":35},{"name":"Zwergenstimme","realm":"Magic","fields":[["Magic Might","15 (Imaginem)"],["Characteristics","Int 0, Per 0, Pre –1, Com +4, Str 0, Sta –1, Dex 0, Qik +3"],["Virtues and Flaws","Great Communication, Improved Characteristics, Sharp Ears"],["Personality Traits","Mischievous +3, Echo +3*"],["Reputations","Murderous 1 (Local)"],["Combat",["Thrown Rock: Init +3, Attack +4, Defense n/a Damage +5"]],["Abilities","Awareness 4 (sounds), Folk Ken 1 (fear), Guile 1 (mimicry), Music 2 (echoes), Thrown Weapon 4 (rocks)"],["Vis","3 pawns of Imaginem, as an immaterial echo"]],"description":["Master of Sound, variable points, Init +5 – Might cost, Imaginem:","The spirit can duplicate any non-Ritual spell involving sound up to Level 15, at a cost of 1 Might Point per magnitude of effect. (Te)Im15","Bring Down the Roof, 2 points, Init +3, Terram:","The Zwergenstimme can cause the roof of a cave to collapse, crushing any within it. This causes +20 damage, and seals the exit from the cave. PeTe 20 (base 3, +1 Touch, +2 Room, +2 Size)","Presence, 0 points, constant, Imaginem:","Grants awareness of everything that happens within the bounds of a specific domain chosen by the spirit. In essence, the spirit is coterminous with its associated landscape feature, so it is present simultaneously everywhere within its boundaries. The area controlled by the spirit can produce a yearly harvest of 2 pawns of vis of an appropriate Form, which manifests as physical objects within the controlled region. Harvesting this vis does not erode the spirit's Might. The echo spirit can haunt a series of caves (constituting a Structure).","Ghost Touch, variable cost, Init +2, Terram:","The spirit can hurl rocks at enemies. It uses the combat scores listed above, but each attack costs 1 Might point.","An echo. This spirit appears only as auditory species to those with Second Sight","This spirit of an echo lurks in caves or ravines. Its name literally means \"dwarf voice\" in German, and these spirits have been known to mislead lost humans by \"playing\" with them. The spirit certainly has no intent to harm; it doesn't even understand what harm is."],"page":"","latin":"","might":"15","size":"","blurb":"Master of Sound, variable points, Init +5 – Might cost, Imaginem:","source":"ArM5 Core","id":36},{"name":"Faerie Hounds","realm":"Faerie","fields":[["Faerie Might","5 (Animal)"],["Characteristics","Cun 0, Per +2, Pre -4, Com 0, Str 0, Sta +2, Dex +1, Qik +2"],["Size","+1"],["Virtues and Flaws","Faerie Sight, Improved Characteristics, Sharp Ears, Large; Incognizant, Reckless, Traditional Wards (varies)"],["Personality Traits","Loyal +3, Reckless +3, Brave +2"],["Combat",["Bite: (small teeth): Init +2, Attack +10, Defense +9, Damage +1*"]],["Soak","+2"],["Wound Penalties","-1 (1-6), -3 (7-12), -5 (13-18), Incapacitated (19-24), Dead (25+)"],["Pretenses","Athletics 5 (distance running), Awareness 6 (keeping watch), Brawl 5 (bite), Hunt 6 (track by scent)"],["Vis","1 pawn Animal, dog corpse"]],"description":["* In some cases faerie hounds have the Power Damaging Effect, which adds +5 to the damage score of their bite. This is usually visually obvious, for example their spittle ignites tiny flames on the ground, or their breath puffs like smoke because their teeth freeze like ice.","The powers below are commonly found in Faerie Hounds, but it is rare for a single hound to have more than two of them.","Damaging Effect: 2 points: Init 0, Varies:","Causes all of the faerie's weapons, which are part of its glamor, to take on a more deadly aspect for two minutes. The danger of the aspect varies according to the motif usual for the faerie, but always increases the weapon's Damage by +5.","Enthralling Sound: 3 points, Init –2, Mentem:","Used to cause terror and panic with its howl. This power also increases the intensity of an emotion that already exists. A stress roll with an appropriate Personality trait against an Ease Factor of 9 allows a victim to overcome this power's effect.","Enthrallment: 4 points, Init -2, Mentem:","Allows the facrie to take complete control of a single human's mind for a day, by making eye contact.","Fearful Flaming Eyes: 2 points, Init –2, Corpus:","Completely paralyzes a human who makes eye contact with the faerie.","Hound: 2 points, Init 0, Corpus:","Allows the faerie to know the direction and distance to its human quarry.","Flight: 0 points, constant +2, Animal:","The character is capable of flight. The character may use the Athletics skill to simulate difficult maneuvers, but may not engage in combat while flying incredibly swiftly. The faerie may not fly when heavily encumbered, or with a passenger of its Size or more, unless assisted by another faerie that shares the load.","Faerie hounds are usually of chunky, hunting breeds. Many have shining eyes, and almost all have black, white or green fur. These statistics also suit the hunting hounds of the courtly fae. This type of faerie hound often has a white coat, red ears and blue eyes.","Huge faerie dogs haunt the roads of much of Mythic Europe. They terrify, and sometimes kill, travelers. Some can run rapidly, and others run upon their hindlimbs when chasing humans, to have their teeth closer to the victim's throat."],"page":"","latin":"","might":"5","size":"+1","blurb":"* In some cases faerie hounds have the Power Damaging Effect, which adds +5 to the damage score of their bite. This is…","source":"ArM5 Core","id":37},{"name":"Faerie Knight","realm":"Faerie","fields":[["Faerie Might","10 (Corpus or Terram)"],["Characteristics","Int 0, Per 0, Pre -2, Com -2, Str +3, Sta +2, Dex +2, Qik +1"],["Size","+1"],["Virtues and Flaws","Faerie Sight, Faerie Speech, Large, Narrowly Cognizant, Observant, Sovereign Ward (varies), Vow (Chivalrous conduct), Oath of Fealty, Overconfident."],["Personality Traits","Arrogant +3, Courteous +3"],["Combat",["Brawl (gauntlet): Init +1, Attack +6, Defense +6, Damage +5","Long Sword and Heater Shield*: Init +3, Attack +10, Defense +9, Damage +9","Mace and Heater shield*: Init +2, Attack +9, Defense +8, Damage +11","Lance and Heater Shield (mounted)*: Init +3, Attack +10, Defense +8, Damage +8"]],["Soak","+9* Faerie metal scale, made of glamor using the Shift Human Shapes Power."],["Wound Penalties","-1 (1-6), -3 (7-12), -5 (13-18), Incapacitated (19-25), Dead (26+)"],["Pretenses","Awareness 1 (enemies), Brawl 3* (knights), Carouse 3 (feasts), Charm 1 (ladies), Etiquette 3 (chivalrous combat), Faerie Speech 5 (boasting), Hunt 2 (humans), Leadership 2 (guards), Ride 3 (horses), Single Weapon 4* (varies)."],["Equipment","Arms and armor. Has a faerie horse constructed of the knight's own glamour, so it flies when the knight does, and shares the knight's Magic Resistance."],["Vis","2 pawns, often rusty pieces of armor that the knight has poured its glamour into."]],"description":["* Does not include +3 to Attack and Defense for being mounted.","Many knights have far higher scores than this. These statistics are correct for faeries that plan to improve their Pretenses by losing to a character, then mirroring his experience gain for the season.","Damaging Effect: 1 point, Init -4, as per motif of court:","Causes all of the faerie's weapons, which are part of its glamor, to take on a more deadly aspect for two minutes. The danger of the aspect varies according to the motif usual for the faerie, but always increases the weapon's Damage by +5.","Flight, 2 points, constant, Corpus:","The character is capable of flight. The character may use the Athletics skill to simulate difficult maneuvers, but may not engage in combat while flying incredibly swiftly. The faerie may not fly when heavily encumbered, or with a passenger of its Size or more, unless assisted by another faerie that shares the load.","Shift Human Shapes: 1 point, Init 0, Corpus:","Allows the knight, who is usually armored to demonstrate his role, to remove the armor simply by thinking about it.","A knight clad in silver leaves of metal, astride a fine horse. These knights often display the motif of their court on their surcoat, shield and pavilion.","These faeries are often encountered outside courts, on lonely roads, and guarding bridges. They seek out defeat by humans as a way of gaining additional combat Pretenses. They are never seen with their armor off, so they may be a role that other faeries take on when they wish to enjoy some blood sport. Faerie Knights are more bound to the rules of chivalry than real knights, and so they do not use the Damaging Effect Power on their weapons against worthy foes."],"page":"","latin":"","might":"10","size":"+1","blurb":"* Does not include +3 to Attack and Defense for being mounted.","source":"ArM5 Core","id":38},{"name":"Great Lezi","realm":"Faerie","fields":[["Faerie Might","40 (Herbam)"],["Characteristics","For Size 0*: Int +3, Per +3, Pre -2, Com 0, Str +6*, Sta +3, Dex 0, Qik 0*"],["Size","varies from -10 to +7."],["Virtues and Flaws","3 x Great Characteristic; Faerie Sight, Faerie Speech, Highly Cognizant, 5 x Improved Characteristics, Sovereign Ward (may not leave forest), Some Lezis, particularly those with backward feet, are unable to harm humans who have turned all of their clothes backwards."],["Personality Traits","Loves Forest +5"],["Combat",["2 x Brawl (club)* Init:1-Size, Attack 8, Defense 7–Size, Damage 9+(Size x 2)"]],["Soak","+15"],["Wound Penalties","See chart."],["Pretenses","Animal Handling 9 (woodland creatures), Athletics 3 (striding), Awareness 9 (damage to forest), Bargain 3 (from position of strength), Brawl 6 (human interlopers), Carouse 3 (wine), Charm 2 (forest folk), Faerie Speech 5, Folk Ken 3 (forest folk), Forest Lore 9 (locations), Guile 2 (about woodland dangers), Leadership 9 (woodland creatures), Swim 3 (streams)."],["Equipment","Can fabricate an endless variety of material from the woodland."],["Vis","8 pawns, External vis, club"]],"description":["* For every +1 Size, add +2 Strength and subtract 1 Quickness. For every -1 in Size, subtract 2 Strength and add +1 Quickness.","* A Lezi may change size in increments of fractions of an inch, if it wishes.","* The lezi's arms are made of solid wood, and do damage like a club. They are wielded with the Brawl Pretense, even if the lezi generates clubs to use in battle.","Extended Glamour: 0 points, constant, Mentem:","Grants awareness of everything that happens within the bounds of the forest. In essence, the faerie is coterminous with the forest, so it is present simultaneously everywhere within its boundaries.","Focus Power (Manifestation): 5 points, Init –5*, Animal or Herbam:","Manifests the faerie's consciousness amongst animal and plant life its glamor touches, temporarily controlling their actions. This power allows the lezi to simulate any Creo Animal, Rego Animal, Creo Herbam or Rego Herbam effect with a value of 25 spell levels or less, targeted at the animals within its glamor and suiting its motif.","Focus Power (Woodland Change): 5 points, Init  -5*, Animal or Herbam:","Muto and Intellego effects only in Herbam and Animal.","Focus Power (Size Reduction): 5 points, Init -5, Corpus or Animal:","Greater Lezi are considered to naturally be Size +7, and use powers to live at a smaller Size.","Transform Into Animal*: 3 points, Init. -3, Animal:","Transforms the character into a land animal. Faeries retain the power of speech in animal form.","Transform Into Bird or Fish*: 3 points, Init: −3, Animal:","Transforms the character into a specified bird or fish. Faeries retain the power of speech in animal","Transform into Human:","This power costs the Lezi whatever it cost to transform away from the human shape.","Transform Into Object (Plant)*: 4 points, Init -4, Herbam:","In plant form, the lezi is capable of speech and limited movement.","* Add appropriate Quickness modifier, based on Size.","** Lezi are extraordinary in that they can change into any animal or plant from their woodland: they do not specify alternative forms as other creatures do.","The Forest Lord is found in Slavic lands. He usually appears as a tall, pale, bearded man with emerald eyes, but can take the shape of any plant or animal. He may change his size from that of a blade of grass to that of a tall tree. Many lezi have feet that face backward, and many are faunlike. Great Lezi command woodland animals, particularly wolves. The term \"great\" is used to compare this creature to the more common lezi, which is a form of faun."],"page":"","latin":"","might":"40","size":"varies from -10 to +7.","blurb":"* For every +1 Size, add +2 Strength and subtract 1 Quickness. For every -1 in Size, subtract 2 Strength and add +1 Qu…","source":"ArM5 Core","id":39},{"name":"Jumayl","realm":"Faerie","fields":[["Faerie Might","15 (Vim)"],["Characteristics","Int -1, Per +2, Pre 0, Com 0, Str +2, Sta +0, Dex +2, Qik +3"],["Confidence","1 (3)"],["Virtues and Flaws","Jinni, Faerie Speech, Highly Cognizant, Improved Characteristics, Second Sight, Skinchanger, Warrior, Well-Traveled, Wilderness Sense, Greater Malediction (keep any bargain made), Carefree, Dutybound (Bedouin honor code), Traditional Ward (Bismillah Invocation), Vulnerable to Folk Tradition."],["Personality Traits","Impulsive +3, Cheerful +3, Impious -1"],["Combat",["Long Sword: Init +5, Attack +14, Defense +9, Damage +8"]],["Soak","+3"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16–20), Dead (21+)"],["Pretenses","Animal Handling 3 (camels), Athletics 3 (running), Mythic Middle East Lore 4 (trade routes), Awareness 3 (alertness), Brawl 3 (dagger), Bows 5 (short bow), Carouse 2 (power drinking), Faerie Speech 5, al-Mushaqqar Lore 2 (drinking establishments), Faerie Lore 3 (jinn), Folk Ken 4 (mercenaries), Leadership 4 (battle), Ride 3 (camels), Second Sight 3 (jinn), Single Weapon 7 (long sword), Survival 2 (deserts), Theology: Islam 1 (jinn), Wilderness Sense 3 (find water)."],["Equipment","a fine damascene steel long sword, leather scale caravan guard armor, flashy jewelry"],["Vis","3 pawns of Vim vis, camel's tooth"]],"description":["Age: appears 25","Reputation: Skilled Caravan guard 2 (Mythic Middle East)","Cuirass of the Zephyr, 1 point, Init +3, Auram:","as Circling Winds of Protection with Duration of Recitation / Qira'a (as long as Jumayl keeps reciting verses of the Qur'an — equivalent to Concentration).","Blinding Light of the Pious, 1 point, Init +3, Ignem:","as Flash of the Scarlet Flames.","Tay al-Ard (Travel), 4 points, Init +1, Corpus:","this power instantly transports Jumayl and 2 individuals he holds hands with from one location to another that he has visited before or has an Arcane Connection to, regardless of distance. As Leap of Homecoming, with R: Touch, T: Group","Jumayl (\"little camel\") is a comely, lithe man of uncertain oriental appearance, alabaster skin and white hair. One eye is iridescent green, the other ocean blue. He favors swirling robes dyed a deep blue color over light leather armor, highlighted by gold jewelry.","This jinni, one of the jann, is a mercenary guide, forced to wander from caravanserai to caravanserai along the trade routes of the Levant, Arabia, Persia, Transoxiana, and beyond for a crime his brother committed. An excellent swordsman and skilled outdoorsman, he is well known among the Muslim merchants and even Levantine Redcaps for his easy-going nature and bravado in defending caravans from raiders and brigands. Like most Faerie jinn, he can change into an animal form — in his case, a white wild Bactrian camel using his Skinchanger Virtue.","Although immune to Fatigue like other faeries, Jumayl is unusually susceptible to the effects of mundane alcohol — a weakness that helps him to play his role within stories along the caravan routes. Unlike most faeries, his Might points, once spent, can only recover if he gets a full night's rest and eats a meal in the company of fellow travelers. This must be done within a human community, eating travel rations or caravanserai meals, drinking beverages fermented by humans and listening to humans sing or tell tales about their travels. For every eight hours the character rests, he recovers a number of Might Points equal to the prevailing Aura as modified by the Realm Interaction Table, or 1, whichever is greater. He does not actually need to eat or drink however. Jumayl knows enough about wizards to avoid leaving Arcane Connections carelessly and keeps his True Name a close secret."],"page":"","latin":"A Jinni Guide","might":"15","size":"","blurb":"Cuirass of the Zephyr, 1 point, Init +3, Auram:","source":"ArM5 Core","id":40},{"name":"Lord Marsyne","realm":"Faerie","fields":[["Faerie Might","50 (Aquam)"],["Characteristics","Int +2, Per +1, Pre +4, Com +1, Str 0, Sta 0, Dex 0, Qik 0"],["Confidence Score","2 (6)"],["Virtues and Flaws","Great Characteristics, Improved Characteristics x 2, Narrowly Cognizant"],["Personality Traits","Proud +3, Just +1, Forgiving -3"],["Reputations","Grants eternal youth 2 (local)"],["Combat",["Dodge: Init 0, Attack n/a, Defense 0, Damage n/a"]],["Soak","+25 (+5 against iron or steel weapons)"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20)"],["Pretenses","[Area] Lore 5 (nobility), Awareness 3 (in his castle), Charm 8 (human women), Etiquette 10 (courtly), Faerie Lore 6 (cold faeries), Folk Ken 5 (people making requests), Guile 5 (pretending to grant requests), Intrigue 4 (court politics), Leadership (servants) 7, Language (All) 5 (commands), Magic Lore 2 (Hermetic magic), Order of Hermes Lore 1 (Merinita)"],["Equipment","Anything he wants, although particularly elaborate items gained particularly quickly will be faerie glamor rather than real."],["Encumbrance","0 (0)"],["Vis","10 Aquam, in his blood."]],"description":["Age: n/a (40)","Commanding Presence, 1 point, Init +10, Mentem:","Anvone who can see Marsvne becomes awed by him, and gains a Personality Trait of Respectful to Lord Marsyne +3. Even magi must roll this Trait, if they fail to resist the spell. Disagreeing with him is Ease Factor 6, outright contradiction is Ease Factor 9, and attacking is Ease Factor 15. This power does not force obedience to the faerie's commands, but it does force you to be subtle about refusing.","Entomb, 10 points, Init –10, Mentem:","A single human target is entombed in ice. The effect is Mentem because it also suspends the target's awareness, so that he or she does not need to eat, drink, or breathe, and does not think, dream, or remember while in the ice. Marsyne can break the effect at will, or it can be dispelled. If it is broken, the person returns to awareness without, immediately, realizing that they were unconscious. People do, normally, age while entombed, and can die of old age.","Gift of Youth, 10 points, Init –10, Corpus:","This power targets a single woman, who stops aging. As long as she remains in Marsyne's castle, she does not age at all. If she leaves, she has the benefit of the Unaging Minor Virtue, so she might not realize that she is aging again. Once aging has restarted, it does not stop if the woman returns to the castle. The power only works on human women, and Marsyne normally only uses it on his wives.","Inner Warmth, 1 point, Init 0, Ignem:","The recipient of this gift is unaffected by mundane cold until she (or he) enters an aura aligned with a realm other than Faerie. (Simply leaving a Faerie aura for an area with no aura doesn't end it, but entering a Magic, Infernal, or Divine aura does.) The gift provides no protection against magical cold.","Lord of Ice, 1 or more points, Init +8, Aquam:","Marsyne can create any effect he wants involving ice, including effects that would require a Hermetic ritual. For every point he spends, up to a maximum of 5, the effect has three Hermetic magnitudes of power. Thus, if he spends 5 points, he can create a 15th magnitude effect.","Lord of the Castle, 0 points, Init +15, Mentem or Corpus:","Marsyne can command any one of his servants to do anything, and the command is irresistible. He can also take control of the servant's body, and move it like a puppet, or even make it fly through the air. The only limits are that he can only target one servant at once, and can only target beings who have voluntarily agreed to serve him. Most are faeries, but his wives also qualify.","Tall, well-built, and handsome, with white skin, pale blond hair, and eyes the clear gray of sea ice. He wears fine clothes in white and blue, and a crown of diamonds rests on his brow. He almost looks like a human being, but the authority in his voice belies that, as does the fact that literal ice water runs in his veins; when he bleeds, there are small crystals of ice in the water that flows out.","Lord Marsyne is the ruler of a faerie domain in the far north or in a range of high mountains. His home is a castle of fantastic beauty, made entirely of ice, and he has an extensive faerie retinue. Marsyne and his faeries act out an elaborate charade of the routines and festivals of mundane noble life, hunting strange creatures, holding tournaments, and even passing judgment on criminals within the court.","Most of the time, the court has little direct contact with humans. However, Lord Marsyne always has a human wife, and every so often he needs to find a new one. He always chooses a beautiful, young woman, and looks for some spark of creativity, independence, and spirit. He is quite taken by The Gift, and any beautiful, young Gifted woman in the area he is searching is very likely to be wooed. The wooing is utterly sincere, as the wife must return of her own free will.","Marsyne's wife plays an important role in the politics of the court, having her own set of faerie ladies-in-waiting and servants, and presiding over many of the tournaments. She also plays an important mystical role, as her presence and creativity allow the faeries to do new things. One thing she is not, is a physical wife to Lord Marsyne.","As long as the wife follows the rules of the court, everything is fine. Marsyne makes her unaging, and protects her from the cold. If she breaks the rules, however, Marsyne judges her, entombs her in ice, and seeks out a new wife. He has many entombed wives, as some of the rules are along the lines of the classic \"Do not go into this room. Here is the key.\"","It is also possible for a wife to win her freedom, either through a successful challenge by an external champion, or through her own wits. Lord Marsyne remains fond of any wife who wins her freedom fairly, because that is part of the rules, but any who simply flee are brought back and entombed in the ice."],"page":"","latin":"","might":"50","size":"","blurb":"Commanding Presence, 1 point, Init +10, Mentem:","source":"ArM5 Core","id":41},{"name":"Mateos","realm":"Faerie","fields":[["Faerie Might","10 (Herbam)"],["Characteristics","Int -1, Per 0, Pre -1, Com +3, Str -2, Sta +2, Dex 0, Qik -3"],["Size","-2"],["Virtues and Flaws","Narrowly Cognizant"],["Personality Traits","Convivial +3, Generous +2, Careful –2"],["Reputations","None"],["Combat",["Club: Init -2, Attack +4, Defense 0, Damage +1"]],["Soak","+2"],["Wound Penalties","-1 (1-3), -3 (4-6), -5 (7-9), Incapacitated (10–12)"],["Pretenses","Carouse 9 (drinking), Charm 4 (drunk people), Etiquette 2 (parties), Faerie Lore 3 (drinks), Folk Ken 3 (drunk people), Guile 9 (convincing people to drink more), Living Language 5 (metaphors for drinking and getting drunk), Music 1 (drinking songs), Single Weapon (club) 1"],["Equipment","Barrel of alcoholic drink."],["Encumbrance","3 (3)"],["Vis","1 pawn of Herbam in each hand."]],"description":["Age: n/a (40)","Heady Brew, 0 points, Init -10, Corpus:","Any drink served by Mateos is three times as intoxicating as normal. Drinks that were non-alcoholic to start with become as alcoholic as ale. This does not change the taste of the drink. The extra intoxication is a magical effect, with Penetration 10, and can be resisted.","Unending Drinks, 1 point, Init –10, Aquam:","For as long as he is serving a particular person, the drink in Mateos's barrel does not run out, even if he serves other people as well. If the chosen person (who is not the target of the power, and thus cannot resist) leaves, passes out, or stops drinking for any other reason, the contents of the barrel start to run out.","Mateos is the size of a child, with a large pot belly, full beard sprinkled with gray, and a slightly grubby apron. He is always smiling, and offers just about everyone he meets a drink from his barrel.","Mateos lives for parties, particularly parties with lots of drunkenness and stupid behavior. If he arrives somewhere where there isn't a party, he tries to start one. With his faerie ale (or wine, or cider), it doesn't usually take him very long. Once people start getting drunk, he tries to convince them to do ridiculous and embarrassing things. He does not usually encourage people to do things that could kill them, however. The parties normally finish with everyone but Mateos passed out on the floor.","The Gift makes Mateos feel that the Gifted individual is a killjoy opposed to parties, and someone to be hurried out of the way as soon as possible."],"page":"","latin":"the Faerie Butler","might":"10","size":"-2","blurb":"Any drink served by Mateos is three times as intoxicating as normal. Drinks that were non-alcoholic to start with beco…","source":"ArM5 Core","id":42},{"name":"Południca","realm":"Faerie","fields":[["Faerie Might","10 (Auram)"],["Characteristics","Int +1, Per 0, Pre +3/-3, Com 0, Str 0, Sta 0, Dex 0, Qik 0"],["Size","0"],["Virtues and Flaws","Faerie Sight, Faerie Speech; Incognizant, Sovereign Ward (running water), Traditional Wards (questions)"],["Personality Traits","Curious +3"],["Soak","+0"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20), Dead (21+)"],["Pretenses","Awareness 3 (laziness), Charm 2 (rural people), Faerie Speech 5 (rural people), Local Farms Lore 6 (stewardship), Profession: Farmer 6 (stewardship), Single Weapon 3 (rural people)"],["Vis","2 pawns (scythe, Ignem)"]],"description":["Combat","- Scythe: Init +1, Attack +6, Defense +4, Damage +5","Cause Fatigue: 0 points, Init 0, Ignem:","Causes the loss of a long-term fatigue level via heatstroke.","Shift Human Shapes: 1 point, Init –1, Corpus:","(beautiful to hideous within a range of +3/–3 Presenc
