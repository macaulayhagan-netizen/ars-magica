 Status","s":"Free","d":"A lay associate who supports the Knights Templar without taking the full vows."},{"n":"Templar Servant","k":"Virtue","c":"Social Status","s":"Free","d":"A servant at a Templar commandery, supported and paid by the order."},{"n":"Wanderer","k":"Virtue","c":"Social Status","s":"Free","d":"You belong to no community and live by casual work; Wealthy and Poor apply normally."},{"n":"Devil Child","k":"Virtue","c":"Mythic Companion","s":"Free","d":"Born of demonic parents, you are a Mythic Companion and gain Demonic Might or Demonic Powers free."},{"n":"Faerie Doctor","k":"Virtue","c":"Mythic Companion","s":"Free","d":"You are a Mythic Companion Faerie Doctor and gain the Dowsing Virtue free."},{"n":"Nephilim","k":"Virtue","c":"Mythic Companion","s":"Free","d":"You are one of the Nephilim and a Mythic Companion, gaining Strong Angelic Heritage free."},{"n":"Spirit Votary","k":"Virtue","c":"Mythic Companion","s":"Free","d":"A Mythic Companion who gains Second Sight free and 2 points of Virtues for every 1 point of Flaws."},{"n":"Ambitious","k":"Flaw","c":"Hermetic","s":"Major","d":"You must be the best or most powerful at something, and you refuse to be distracted from pursuing it."},{"n":"Avaricious","k":"Flaw","c":"Hermetic","s":"Major","d":"You crave wealth and hoard it rather than spend it; this can also fixate on books or vis."},{"n":"Blatant Gift","k":"Flaw","c":"Hermetic","s":"Major","d":"Your Gift openly unsettles people and frightens or enrages animals, worsening the usual social penalties."},{"n":"Chaotic Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"Your spontaneous magic is wild: you must declare a desired level, and the results swing unpredictably."},{"n":"Compassionate","k":"Flaw","c":"Hermetic","s":"Major","d":"You cannot bear others' suffering and will drive yourself to exhaustion to help anyone hurt or in trouble."},{"n":"Compulsion","k":"Flaw","c":"Hermetic","s":"Major","d":"You have an urge you struggle to resist, such as drinking, gambling, or boasting."},{"n":"Compulsive Lying","k":"Flaw","c":"Hermetic","s":"Major","d":"Telling the truth is genuinely hard for you, except where any lie would be obviously absurd."},{"n":"Deficient Technique","k":"Flaw","c":"Hermetic","s":"Major","d":"All Casting and Lab Totals using one Technique are halved (advancement is not)."},{"n":"Depraved","k":"Flaw","c":"Hermetic","s":"Major","d":"You work to undermine religion, sinning openly and avoiding the Dominion."},{"n":"Difficult Longevity Ritual","k":"Flaw","c":"Hermetic","s":"Major","d":"Anyone making a Longevity Ritual for you must halve their Lab Total; you can still make others' normally."},{"n":"Driven","k":"Flaw","c":"Hermetic","s":"Major","d":"A single life-shaping goal drives you, and you turn straight to a new one the moment you achieve it."},{"n":"Envious","k":"Flaw","c":"Hermetic","s":"Major","d":"You believe others are unfairly better off and scheme to ruin them and seize what they have."},{"n":"Environmental Magic Condition","k":"Flaw","c":"Hermetic","s":"Major","d":"Your Casting and Lab Totals are halved in a common condition, such as whenever you are indoors."},{"n":"Gender Nonconforming","k":"Flaw","c":"Hermetic","s":"Major","d":"You do not fit the behavior society expects of your assigned gender, drawing suspicion and friction."},{"n":"Generous","k":"Flaw","c":"Hermetic","s":"Major","d":"You give away your belongings to almost anyone who asks, keeping little for yourself."},{"n":"Greedy","k":"Flaw","c":"Hermetic","s":"Major","d":"You eat and drink to excess at every chance, often to your own harm."},{"n":"Hatred","k":"Flaw","c":"Hermetic","s":"Major","d":"You hate one person or group so deeply that hurting them dominates your life."},{"n":"Higher Purpose","k":"Flaw","c":"Hermetic","s":"Major","d":"A noble, altruistic cause guides you above petty concerns and can override your self-interest."},{"n":"Lecherous","k":"Flaw","c":"Hermetic","s":"Major","d":"You pursue sexual conquest widely, which constantly entangles you in trouble."},{"n":"Magic Addiction","k":"Flaw","c":"Hermetic","s":"Major","d":"Casting thrills you; once you start it is hard to stop, and you cast on and on until you collapse."},{"n":"Meddler","k":"Flaw","c":"Hermetic","s":"Major","d":"You compulsively try to fix other people's lives, wasting time and stirring resentment."},{"n":"Monastic Vows (Hermetic)","k":"Flaw","c":"Hermetic","s":"Major","d":"Vows of poverty, chastity, and obedience bar you from owning vis or marrying and constrain your magic items."},{"n":"Necessary Condition","k":"Flaw","c":"Hermetic","s":"Major","d":"To cast at all you must perform a set simple action (singing, spinning); if you cannot, you cannot cast."},{"n":"Obsessed","k":"Flaw","c":"Hermetic","s":"Major","d":"You fixate on a prized object, act, or ideal, neglecting more urgent matters."},{"n":"Optimistic","k":"Flaw","c":"Hermetic","s":"Major","d":"You are certain everything will turn out for the best, even when you accept you might fail."},{"n":"Overconfident","k":"Flaw","c":"Hermetic","s":"Major","d":"You have unshakable faith in your abilities and simply cannot imagine failure."},{"n":"Oversensitive","k":"Flaw","c":"Hermetic","s":"Major","d":"Something others merely dislike you find intolerable, and you may even start fights over it."},{"n":"Pagan","k":"Flaw","c":"Hermetic","s":"Major","d":"You follow no Church and are unbaptized, which alarms authorities and frightens common folk."},{"n":"Painful Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"Every spell you cast costs you the equivalent of a Fatigue level in pain."},{"n":"Pious","k":"Flaw","c":"Hermetic","s":"Major","d":"You devoutly follow your religion, embracing its demands and shunning what it forbids."},{"n":"Proud","k":"Flaw","c":"Hermetic","s":"Major","d":"You think yourself better than nearly everyone and demand the respect you feel you are owed."},{"n":"Rebellious","k":"Flaw","c":"Hermetic","s":"Major","d":"You resist any authority imposed on you and work against those who try to command you."},{"n":"Reckless","k":"Flaw","c":"Hermetic","s":"Major","d":"You rarely register danger and charge in without weighing the risks."},{"n":"Restriction","k":"Flaw","c":"Hermetic","s":"Major","d":"Under one uncommon condition (touching earth, certain targets) you cannot cast spells at all."},{"n":"Rigid Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"You cannot use vis while casting, so you cannot boost your spells or cast Ritual magic."},{"n":"Short-Ranged Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"Casting Totals are halved when you are not touching the target, and Lab Totals are halved for ranges beyond Touch."},{"n":"Study Requirement","k":"Flaw","c":"Hermetic","s":"Major","d":"You can study magic only in the presence of the relevant Art, such as a fire to study Ignem."},{"n":"The Constant Expression","k":"Flaw","c":"Hermetic","s":"Major","d":"You endlessly leak minor non-fatiguing spontaneous effects, causing constant distraction and odd problems."},{"n":"Twilight Prone","k":"Flaw","c":"Hermetic","s":"Major","d":"You must resist Twilight on a single magical botch rather than a double, so it strikes you far more often."},{"n":"Unnatural Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"None of your Creo rituals have a permanent effect, no matter how much vis you spend."},{"n":"Unstructured Caster","k":"Flaw","c":"Hermetic","s":"Major","d":"You can manage Formulaic magic only through extreme effort."},{"n":"Vow","k":"Flaw","c":"Hermetic","s":"Major","d":"You are sworn to something difficult (never to kill, never to speak), and breaking it is a grave matter."},{"n":"Vulnerable Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"Your magic is automatically dispelled under one uncommon condition, such as touching iron."},{"n":"Waster of Vis","k":"Flaw","c":"Hermetic","s":"Major","d":"You waste a quarter of any vis you use, though the lost pawns still count toward your botch dice."},{"n":"Weak Magic Resistance","k":"Flaw","c":"Hermetic","s":"Major","d":"Your Magic Resistance is much weaker in common, easily exploited circumstances, such as when wet or turned away."},{"n":"Weak Spontaneous Magic","k":"Flaw","c":"Hermetic","s":"Major","d":"You can never exert yourself for spontaneous magic, always dividing your Casting Score by 5."},{"n":"Weakness","k":"Flaw","c":"Hermetic","s":"Major","d":"You have a soft spot for someone or something that overrides duty and common sense."},{"n":"Wrathful","k":"Flaw","c":"Hermetic","s":"Major","d":"You anger easily over trifles, and your rage at real wrongs is terrible to behold."},{"n":"Bound Casting Tools","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your Verditius casting tools become lasting Arcane Connections to you."},{"n":"Bound Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"When you die, all your spells end and every item you made stops working."},{"n":"Brutal Artist","k":"Flaw","c":"Hermetic","s":"Minor","d":"Only for Jerbiton magi; you make and enjoy art your Housemates consider ugly."},{"n":"Careless Sorcerer","k":"Flaw","c":"Hermetic","s":"Minor","d":"You roll 2 extra botch dice when casting spells (still none if you would normally roll none)."},{"n":"Ceremonial Spontaneous Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"You can cast spontaneous spells only by slow Ceremonial Casting."},{"n":"Clumsy Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your aimed spells are unreliable: any aiming roll of 0 is an automatic botch."},{"n":"Consumed Casting Tools","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your casting tools are used up after use and take an hour each to remake; you cannot stockpile them."},{"n":"Corrupted Arts","k":"Flaw","c":"Hermetic","s":"Minor","d":"You learned an Art from a corrupted source, gaining +3 to Casting Totals when using it for selfish or sinful ends."},{"n":"Corrupted Spells","k":"Flaw","c":"Hermetic","s":"Minor","d":"At least 30 levels of your spells are corrupted, giving +3 to Casting and Penetration when used sinfully."},{"n":"Creative Block","k":"Flaw","c":"Hermetic","s":"Minor","d":"-3 to Lab Totals when inventing without a text or teacher, and experimentation goes worse."},{"n":"Cyclic Magic (negative)","k":"Flaw","c":"Hermetic","s":"Minor","d":"At a set time your magic weakens: -3 to all Lab Totals and Casting Scores then."},{"n":"Deficient Form","k":"Flaw","c":"Hermetic","s":"Minor","d":"All Casting and Lab Totals using one Form are halved (Magic Resistance and advancement excepted)."},{"n":"Deleterious Circumstances","k":"Flaw","c":"Hermetic","s":"Minor","d":"All your magic totals except Magic Resistance are halved under one uncommon circumstance."},{"n":"Difficult Spontaneous Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"You can never cast spontaneous magic without exerting yourself, though exerting works as normal."},{"n":"Disjointed Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"You gain no benefit from knowing similar spells or from Arts already invested in an item."},{"n":"Disorientating Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"After casting any spell you must spend a round recovering before you can act again."},{"n":"Exciting Experimentation","k":"Flaw","c":"Hermetic","s":"Minor","d":"When you experiment, roll two dice on the table and the storyguide applies the more dramatic result."},{"n":"Fettered Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"All your spells and any items you activate are Arcane Connections back to you."},{"n":"Flawed Parma Magica","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your Parma gives only half Magic Resistance against one Form; may be taken more than once."},{"n":"Harmless Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your Perdo spells never destroy permanently: targets recover once the duration ends."},{"n":"Hedge Wizard","k":"Flaw","c":"Hermetic","s":"Minor","d":"Other magi distrust your esoteric magic, leaving you a negative Reputation of 3 within the Order."},{"n":"Incompatible Arts","k":"Flaw","c":"Hermetic","s":"Minor","d":"You cannot use two specific Technique-and-Form combinations at all, even as requisites."},{"n":"Inconstant Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your magic stutters, so spells that need your ongoing guidance are easily disrupted."},{"n":"Infamous Master","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your master was despised, so magi expect little of you even if you have done nothing wrong."},{"n":"Limited Magic Resistance","k":"Flaw","c":"Hermetic","s":"Minor","d":"One of your Form scores never adds to Magic Resistance, though you keep a base of 0 without Parma."},{"n":"Loose Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your Advancement Total is halved whenever you try to master spells."},{"n":"Poor Formulaic Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"-5 to every roll to cast a Formulaic spell (Rituals are unaffected)."},{"n":"Short-Lived Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your spell durations shrink a step: a year becomes a moon, a moon a day, a sun a Diameter."},{"n":"Slow Caster","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your Formulaic spells take two rounds to cast, leaving you exposed in a fight."},{"n":"Spontaneous Casting Tools","k":"Flaw","c":"Hermetic","s":"Minor","d":"You must use casting tools for spontaneous spells too, juggling 15 of them, one per Art."},{"n":"Stockade Parma Magica","k":"Flaw","c":"Hermetic","s":"Minor","d":"You cannot lower your Parma, so even friendly spells must penetrate it to affect you."},{"n":"Susceptibility to Divine Power","k":"Flaw","c":"Hermetic","s":"Minor","d":"You suffer double the usual penalties and botch dice to your magic in a Divine aura."},{"n":"Susceptibility to Faerie Power","k":"Flaw","c":"Hermetic","s":"Minor","d":"Entering a Faerie aura, you must make a Stamina roll against its rating or become disoriented."},{"n":"Susceptibility to Infernal Power","k":"Flaw","c":"Hermetic","s":"Minor","d":"Entering an Infernal aura, you must roll Stamina against its rating or fall ill (-1 to all rolls)."},{"n":"Unimaginative Learner","k":"Flaw","c":"Hermetic","s":"Minor","d":"-3 to your rolls when you study from raw vis."},{"n":"Unpredictable Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"You always roll a stress die when using magic, risking a botch even while completely relaxed."},{"n":"Vulnerable Casting","k":"Flaw","c":"Hermetic","s":"Minor","d":"You lose 1 more Fatigue level than normal whenever casting fatigues you."},{"n":"Vulnerable to Folk Tradition","k":"Flaw","c":"Hermetic","s":"Minor","d":"Onlookers who notice your magic can disrupt it with simple folk rituals, like spitting or signing against evil."},{"n":"Warped Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your magic always carries the same unpleasant side effect, growing worse with the spell's level."},{"n":"Weak Enchanter","k":"Flaw","c":"Hermetic","s":"Minor","d":"Halve your Lab Total whenever you create or investigate an enchanted item."},{"n":"Weak Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your spells penetrate poorly: halve all Penetration Totals and the Penetration you instill into items."},{"n":"Weak Parens","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your master trained you poorly, so you begin with 60 fewer experience points and 30 fewer spell levels."},{"n":"Weak Scholar","k":"Flaw","c":"Hermetic","s":"Minor","d":"-6 to Lab Totals when working from others' lab texts, including when reinventing their spells."},{"n":"Weird Magic","k":"Flaw","c":"Hermetic","s":"Minor","d":"Your loose control means you roll one extra botch die whenever a spellcasting roll comes up 0."},{"n":"Age Quickly","k":"Flaw","c":"Supernatural","s":"Major","d":"You age twice as fast as normal, so your effective age climbs two years for every year that passes."},{"n":"Blatant Magical Air","k":"Flaw","c":"Supernatural","s":"Major","d":"Your Magical Air or Gift is so disturbing that others can barely stand to be near you."},{"n":"Bound to (Realm)","k":"Flaw","c":"Supernatural","s":"Major","d":"You sicken and cannot survive long outside a particular kind of supernatural aura."},{"n":"Bound to (Role) Role","k":"Flaw","c":"Supernatural","s":"Major","d":"You are physically bonded to some device, leaving you permanently tied to it."},{"n":"Broken Vessel","k":"Flaw","c":"Supernatural","s":"Major","d":"Your supernatural powers may be only temporary, and each failure with them drains that power further away."},{"n":"False Power","k":"Flaw","c":"Supernatural","s":"Major","d":"One of your Supernatural Virtues reads as Infernal under investigation, making you appear unholy."},{"n":"Greater Malediction","k":"Flaw","c":"Supernatural","s":"Major","d":"A supernatural curse hinders you as badly as any other Major Flaw."},{"n":"Horrifying Appearance – Snake Legs","k":"Flaw","c":"Supernatural","s":"Major","d":"You have serpent tails instead of legs; movement is mostly unhindered, but your appearance horrifies onlookers."},{"n":"Hunger for (Form) Magic","k":"Flaw","c":"Supernatural","s":"Major","d":"You depend on magic to live and must consume 1 pawn of vis each season matching one Form."},{"n":"Lycanthrope","k":"Flaw","c":"Supernatural","s":"Major","d":"On nights of the full moon you are cursed to become a dangerous predator such as a wolf or bear."},{"n":"Raised from the Dead","k":"Flaw","c":"Supernatural","s":"Major","d":"A miracle returned you to life, but you begin with at least 3 Warping points and gain another each year."},{"n":"(Form) Monstrosity","k":"Flaw","c":"Supernatural","s":"Minor","d":"You (usually an animal) bear a monstrous mutation tied to one magical Form."},{"n":"(Realm) Stigmatic","k":"Flaw","c":"Supernatural","s":"Minor","d":"In the presence of supernatural powers you occasionally manifest telltale physical phenomena."},{"n":"Baneful Circumstances","k":"Flaw","c":"Supernatural","s":"Minor","d":"Your supernatural nature leaves you weakened in fairly common situations, such as while touching the ground."},{"n":"Corrupted Abilities","k":"Flaw","c":"Supernatural","s":"Minor","d":"One or more Abilities came from a demon or corrupt source, giving +3 when used for selfish or sinful ends."},{"n":"Cursed Guile","k":"Flaw","c":"Supernatural","s":"Minor","d":"You roll 3 extra botch dice when using Guile, and people rarely believe you even when you are honest."},{"n":"Deteriorating Power","k":"Flaw","c":"Supernatural","s":"Minor","d":"One of your powers weakens over time, scaling with your age, spent Might, or Warping."},{"n":"Evil Eye","k":"Flaw","c":"Supernatural","s":"Minor","d":"Your gaze brings misfortune: characters making stress rolls in your presence roll an extra botch die."},{"n":"Exiled Atlantean","k":"Flaw","c":"Supernatural","s":"Minor","d":"An exiled Atlantean, you are tainted by the surface world and cannot return to your magic regio."},{"n":"Flawed Powers","k":"Flaw","c":"Supernatural","s":"Minor","d":"One of your major supernatural powers is limited or restricted in some fashion."},{"n":"Fluctuating Fortune","k":"Flaw","c":"Supernatural","s":"Minor","d":"Your finances swing wildly, counting as Wealthy one year and Poor the next."},{"n":"Folk Magic","k":"Flaw","c":"Supernatural","s":"Minor","d":"You can perform very minor magical tricks drawn from scraps of folk lore."},{"n":"Inscribed Shadow","k":"Flaw","c":"Supernatural","s":"Minor","d":"Glowing symbols mark your shadow, alarming common folk but easing other Criamon's reading of your stigmata (+3)."},{"n":"Lesser Malediction","k":"Flaw","c":"Supernatural","s":"Minor","d":"A supernatural curse hinders you about as much as a Minor General Flaw."},{"n":"Manifest Sin","k":"Flaw","c":"Supernatural","s":"Minor","d":"A past sin stains your spirit and is visible to those who can perceive hidden things."},{"n":"Monstrous Blood","k":"Flaw","c":"Supernatural","s":"Minor","d":"Exposure to the Magic realm left your true form with unfortunate supernatural traits."},{"n":"Necessary (Realm) Aura for (Ability)","k":"Flaw","c":"Supernatural","s":"Minor","d":"Without a particular supernatural aura present, you cannot focus on certain tasks."},{"n":"Prohibition","k":"Flaw","c":"Supernatural","s":"Minor","d":"A geas binds you; break its restriction and the curse strikes you in full force."},{"n":"Restricted Power","k":"Flaw","c":"Supernatural","s":"Minor","d":"One normally at-will supernatural power is limited in when or how you may use it."},{"n":"Slow Power","k":"Flaw","c":"Supernatural","s":"Minor","d":"One supernatural power needs an extra round of preparation to activate; repeatable for different powers."},{"n":"Stigmatic Catalyst","k":"Flaw","c":"Supernatural","s":"Minor","d":"Your presence sometimes causes symbolic marks to appear on unprotected people nearby."},{"n":"Susceptibility to Sunlight","k":"Flaw","c":"Supernatural","s":"Minor","d":"Bright sunlight pains and tires you, giving -2 to all sight rolls in bright conditions."},{"n":"Susceptibility to Warping","k":"Flaw","c":"Supernatural","s":"Minor","d":"Constant exposure to magic leaves you more vulnerable to Warping than most."},{"n":"Unruly Air","k":"Flaw","c":"Supernatural","s":"Minor","d":"Your presence pushes social situations to extremes, making good moods better and bad ones worse."},{"n":"Viaticarus","k":"Flaw","c":"Supernatural","s":"Minor","d":"You once received the last rites at death's door, leaving a supernatural mark upon you."},{"n":"Visions","k":"Flaw","c":"Supernatural","s":"Minor","d":"You often see symbolic, confusing images of the past, a possible future, or distant events."},{"n":"Warped by Magic","k":"Flaw","c":"Supernatural","s":"Minor","d":"Powerful magical forces from your adventures have left a lasting mark on you."},{"n":"Blind","k":"Flaw","c":"General","s":"Major","d":"You have little or no sight, so reading, missile weapons, and unfamiliar travel are beyond you."},{"n":"Crippled","k":"Flaw","c":"General","s":"Major","d":"Your legs are useless or gone; you cannot walk, only drag yourself or use a trolley."},{"n":"Deaf","k":"Flaw","c":"General","s":"Major","d":"You cannot hear at all, which makes understanding speech and communicating difficult."},{"n":"Dwarf","k":"Flaw","c":"General","s":"Major","d":"You are child-sized with Size -2, so wounds worsen in 3-point steps and you walk two-thirds normal speed."},{"n":"Enfeebled","k":"Flaw","c":"General","s":"Major","d":"You cannot exert yourself for more than seconds, so combat, chases, and long hikes leave you helpless."},{"n":"Leprosy","k":"Flaw","c":"General","s":"Major","d":"You have leprosy: a permanent -2 to Living Conditions (worse in a colony) and a heavy wound on every aging crisis."},{"n":"Low Self-Esteem","k":"Flaw","c":"General","s":"Major","d":"You think little of yourself and begin with no Confidence Score or points, ever."},{"n":"Magical Air","k":"Flaw","c":"General","s":"Major","d":"People and animals react to you as if you had The Gift; not available if you actually have it."},{"n":"Mute","k":"Flaw","c":"General","s":"Major","d":"You cannot speak, though you understand languages and can communicate by gesture or, with a Virtue, in writing."},{"n":"No Hands","k":"Flaw","c":"General","s":"Major","d":"Without hands, handwork is impossible and magi take -5 to all Casting Scores (offset by Subtle Magic or Still Casting)."},{"n":"Poor","k":"Flaw","c":"General","s":"Major","d":"You are poor for your class, must work three seasons a year, and can afford only the basics."},{"n":"Repellent","k":"Flaw","c":"General","s":"Major","d":"A demonic trait makes you fearsome to ordinary folk, giving -6 on all rolls that require their trust."},{"n":"The Falling Evil","k":"Flaw","c":"General","s":"Major","d":"You suffer random convulsions and blackouts that can strike at the worst possible moments."},{"n":"Ability Block","k":"Flaw","c":"General","s":"Minor","d":"You can never learn one whole class of Abilities, such as all Martial Abilities."},{"n":"Afflicted Tongue","k":"Flaw","c":"General","s":"Minor","d":"A speech impediment gives -2 to all rolls using your voice, including spoken spellcasting."},{"n":"Anchored to the (Land)","k":"Flaw","c":"General","s":"Minor","d":"You feel lonely and low whenever you cannot see or hear one particular type of environment."},{"n":"Apostate","k":"Flaw","c":"General","s":"Minor","d":"Having changed faiths, you have a bad Reputation of 4 among your old faith and some distrust from the new."},{"n":"Arthritis","k":"Flaw","c":"General","s":"Minor","d":"Stiff, painful joints give -3 to sustained or repetitive movement, and can sometimes disable you."},{"n":"Careless with (Ability)","k":"Flaw","c":"General","s":"Minor","d":"You are reckless with one important Ability, risking spectacular failures with it."},{"n":"Castratus","k":"Flaw","c":"General","s":"Minor","d":"Castrated before puberty, you are beardless and effeminate, with -3 on social rolls in Latin culture."},{"n":"Clumsy","k":"Flaw","c":"General","s":"Minor","d":"You are graceless, taking -3 on related rolls and an extra botch die on Dexterity actions."},{"n":"Craving for Travel","k":"Flaw","c":"General","s":"Minor","d":"You grow lonely and depressed unless you regularly expose yourself to new experiences."},{"n":"Curse of Slander","k":"Flaw","c":"General","s":"Minor","d":"Wherever you settle, ugly rumors about you soon spread, whether by bad luck or a curse."},{"n":"Devoted Parent/Child","k":"Flaw","c":"General","s":"Minor","d":"You are bound to a parent or child; being apart over a day brings anxiety and -1 to all rolls."},{"n":"Dhimmi","k":"Flaw","c":"General","s":"Minor","d":"A non-Muslim under Muslim rule, you pay the head tax and live under various social restrictions."},{"n":"Disfigured","k":"Flaw","c":"General","s":"Minor","d":"A visible disfigurement makes you ugly and easy to recognize, with -3 to looks-based Presence rolls."},{"n":"Environmental Sensitivity","k":"Flaw","c":"General","s":"Minor","d":"One uncommon condition (bad air, salt water, extreme heat) gives -3 to Stamina for debilitation checks."},{"n":"Failed Student","k":"Flaw","c":"General","s":"Minor","d":"You studied for a university license but failed your final examination."},{"n":"Feral Scent","k":"Flaw","c":"General","s":"Minor","d":"You carry the strong smell of a wild animal, so people instinctively keep their distance."},{"n":"Feral Upbringing","k":"Flaw","c":"General","s":"Minor","d":"Raised in the wilderness, you long could not speak and know little of human ways."},{"n":"Fish Out of Water (Terrain)","k":"Flaw","c":"General","s":"Minor","d":"You have an affinity for one terrain and feel awkward and ill at ease away from it."},{"n":"Flashbacks","k":"Flaw","c":"General","s":"Minor","d":"Combat or similar stress can trigger vivid, hard-to-ignore flashbacks of past horrors."},{"n":"Fragile Constitution","k":"Flaw","c":"General","s":"Minor","d":"Sickly and weak, you take -3 on all rolls to recover from wounds and disease."},{"n":"Frail","k":"Flaw","c":"General","s":"Minor","d":"You are easily hurt, with -3 to your Soak score."},{"n":"Gullible","k":"Flaw","c":"General","s":"Minor","d":"You are easily fooled, granting liars +1 to +3 on their Guile rolls against you."},{"n":"Hallucinations","k":"Flaw","c":"General","s":"Minor","d":"You suffer vivid hallucinations that feel like true visions but are only your imagination."},{"n":"Hobbled","k":"Flaw","c":"General","s":"Minor","d":"Both legs are badly damaged; you need crutches, move at half a mile per hour, and take -9 to move quickly."},{"n":"Hunchback","k":"Flaw","c":"General","s":"Minor","d":"A deformed body gives a grotesque look: -3 to agility and balance rolls and to looks-based Communication."},{"n":"Incomprehensible","k":"Flaw","c":"General","s":"Minor","d":"You convey knowledge so poorly that anyone learning from you or your books halves their Advancement Total."},{"n":"Independent Craftsman","k":"Flaw","c":"General","s":"Minor","d":"You work badly with others, treating your Leadership and Craft as 3 lower on any shared task."},{"n":"Infamous","k":"Flaw","c":"General","s":"Minor","d":"You have a bad Reputation of 4 for some notorious deeds."},{"n":"Jinxed","k":"Flaw","c":"General","s":"Minor","d":"You draw bad luck onto those around you, though you yourself roll no extra botch dice."},{"n":"Judged Unfairly","k":"Flaw","c":"General","s":"Minor","d":"People reliably misread you, distrusting and underestimating you no matter what you do."},{"n":"Lame","k":"Flaw","c":"General","s":"Minor","d":"One weakened leg slows you to about a mile per hour, so almost anyone can outrun you."},{"n":"Lingering Injury","k":"Flaw","c":"General","s":"Minor","d":"An old injury that never healed properly gives -1 to all rolls involving physical activity."},{"n":"Low Tolerance","k":"Flaw","c":"General","s":"Minor","d":"You handle pain and fatigue poorly: +1 to Fatigue penalties and +1 to wound penalties."},{"n":"Master of None","k":"Flaw","c":"General","s":"Minor","d":"You can never stick to one task or job for longer than a single season."},{"n":"Missing Ear","k":"Flaw","c":"General","s":"Minor","d":"You cannot place the direction of sounds and take -3 to hearing rolls."},{"n":"Missing Eye","k":"Flaw","c":"General","s":"Minor","d":"Poor depth perception gives -3 to missile and spell aiming and -1 to melee attacks."},{"n":"Missing Hand","k":"Flaw","c":"General","s":"Minor","d":"With one hand gone, climbing, combat, and other two-handed work take at least -3."},{"n":"Motion Sickness","k":"Flaw","c":"General","s":"Minor","d":"Riding or sailing makes you ill, doubling fatigue loss on long journeys (minimum two levels)."},{"n":"Night Terrors","k":"Flaw","c":"General","s":"Minor","d":"Frequent nightmares plague you; you must roll against Ease Factor 9 to avoid a night of terrors."},{"n":"No Sense of Direction","k":"Flaw","c":"General","s":"Minor","d":"You cannot follow directions and often confuse left and right."},{"n":"Nocturnal","k":"Flaw","c":"General","s":"Minor","d":"Your body wants to sleep until noon, giving -1 to all rolls between dawn and midday."},{"n":"Obese","k":"Flaw","c":"General","s":"Minor","d":"Your bulk gives -1 to rolls needing speed or grace and -3 to all Fatigue rolls."},{"n":"Offensive to (Beings)","k":"Flaw","c":"General","s":"Minor","d":"One class of beings reacts badly to you, meeting you with hostility or unease."},{"n":"Palsied Hands","k":"Flaw","c":"General","s":"Minor","d":"Shaking hands give -2 to all rolls that hold or wield objects, including weapons and spellcasting."},{"n":"Poor (Characteristic)","k":"Flaw","c":"General","s":"Minor","d":"Lower one Characteristic that is already -3 or worse by a further point."},{"n":"Poor Concentration","k":"Flaw","c":"General","s":"Minor","d":"A short attention span gives -3 to all Concentration rolls."},{"n":"Poor Eyesight","k":"Flaw","c":"General","s":"Minor","d":"Bleary vision gives -3 to sight rolls, including attack and defense, and stacks with Missing Eye."},{"n":"Poor Hearing","k":"Flaw","c":"General","s":"Minor","d":"-3 to hearing rolls, and you struggle to follow unfamiliar accents or dialects."},{"n":"Poor Living Conditions","k":"Flaw","c":"General","s":"Minor","d":"An extra -1 to your Living Conditions modifier leaves you more worn down by daily life."},{"n":"Poor Student","k":"Flaw","c":"General","s":"Minor","d":"-3 to all Advancement from teaching and books (other forms of study are unaffected, minimum 1)."},{"n":"Primitive Equipment","k":"Flaw","c":"General","s":"Minor","d":"You can use only the simplest tools, unable or unwilling to handle better equipment."},{"n":"Raised in the Gutter","k":"Flaw","c":"General","s":"Minor","d":"You handle the lower classes easily but clearly do not know how to act among your betters."},{"n":"Regular","k":"Flaw","c":"General","s":"Minor","d":"A strict religious rule binds you, so you must spend one free season each year on worship."},{"n":"Restricted Learning","k":"Flaw","c":"General","s":"Minor","d":"You can gain experience only in five Abilities chosen at character creation."},{"n":"Rolling Stone","k":"Flaw","c":"General","s":"Minor","d":"Having moved so often, you struggle to form attachments and take -1 to social rolls in any community."},{"n":"Savantism","k":"Flaw","c":"General","s":"Minor","d":"You are physically capable but simpleminded and slow-witted."},{"n":"Short of Breath","k":"Flaw","c":"General","s":"Minor","d":"You tire quickly, taking -3 to all Stamina rolls to avoid fatigue, including Concentration."},{"n":"Sleep Disorder","k":"Flaw","c":"General","s":"Minor","d":"You rarely sleep soundly, so you tend to nod off during quiet or boring stretches."},{"n":"Slow Reflexes","k":"Flaw","c":"General","s":"Minor","d":"You react poorly to surprises, taking -3 to Initiative when a quick response is needed."},{"n":"Small Frame","k":"Flaw","c":"General","s":"Minor","d":"Your Size is -1, so wounds worsen in 4-point steps instead of 5."},{"n":"Social Handicap","k":"Flaw","c":"General","s":"Minor","d":"Some trait keeps you from mixing easily, giving -3 on appropriate social rolls."},{"n":"Stuck in Your Ways","k":"Flaw","c":"General","s":"Minor","d":"Set in your old covenant's habits, you clash with how your new home does things."},{"n":"Tainted with Evil","k":"Flaw","c":"General","s":"Minor","d":"An air of corruption clings to you, so people feel ill at ease and a good Reputation is impossible."},{"n":"Unbearable to (Beings)","k":"Flaw","c":"General","s":"Minor","d":"One class of beings (humans, demons, or divine beings) cannot stand your presence."},{"n":"Uncertain Faith","k":"Flaw","c":"General","s":"Minor","d":"You struggle to fully express devotion, leaving your faith wavering."},{"n":"Uncontrollable Strength","k":"Flaw","c":"General","s":"Minor","d":"You do not know your own strength and sometimes cannot control it (Strength 0 or higher only)."},{"n":"Uninspirational","k":"Flaw","c":"General","s":"Minor","d":"You are bland and forgettable, with Presence and Communication capped at 0."},{"n":"Unlucky","k":"Flaw","c":"General","s":"Minor","d":"Chance frequently turns against you at the worst moments."},{"n":"Unspecialized","k":"Flaw","c":"General","s":"Minor","d":"You have no specialty in any of your Abilities."},{"n":"Warped Senses","k":"Flaw","c":"General","s":"Minor","d":"You are oversensitive to certain conditions, which alters your behavior in some uncommon situations."},{"n":"Weak Characteristics","k":"Flaw","c":"General","s":"Minor","d":"You have 3 fewer points to spend on Characteristics; may be taken twice, leaving only one point."},{"n":"Witch Marks","k":"Flaw","c":"General","s":"Minor","d":"Minor marks brand you to folk-lorists as a diabolist, risking blame, hounding, or worse."},{"n":"Busybody","k":"Flaw","c":"Personality","s":"Minor","d":"You pry into everyone's affairs and are skilled at coaxing out private secrets."},{"n":"Carefree","k":"Flaw","c":"Personality","s":"Minor","d":"You stay cheerful and untroubled in just about all circumstances."},{"n":"Church Upbringing","k":"Flaw","c":"Personality","s":"Minor","d":"Raised mostly by clerics, you may hold odd religious views and few worldly ties."},{"n":"Continence","k":"Flaw","c":"Personality","s":"Minor","d":"You abstain from sexual activity, whether by vow or by personal choice."},{"n":"Covenant Upbringing","k":"Flaw","c":"Personality","s":"Minor","d":"Raised in an isolated covenant, you find ordinary medieval society and religion strange."},{"n":"Delusion","k":"Flaw","c":"Personality","s":"Minor","d":"You wholeheartedly believe something untrue, such as that an imaginary friend is real."},{"n":"Depressed","k":"Flaw","c":"Personality","s":"Minor","d":"A dark outlook robs you of motivation and of pleasure in anything."},{"n":"Dutybound","k":"Flaw","c":"Personality","s":"Minor","d":"You follow a strict code that forbids useful but dishonorable acts like lying or stealing."},{"n":"Faerie Upbringing","k":"Flaw","c":"Personality","s":"Minor","d":"Raised by or among faeries, you see the world through their strange lens."},{"n":"Fear","k":"Flaw","c":"Personality","s":"Minor","d":"You are terrified of something you meet fairly often, which leaves you edgy in its presence."},{"n":"Fickle Nature","k":"Flaw","c":"Personality","s":"Minor","d":"You swing between two opposite behaviors with no middle ground; take a Personality Trait at +4 and its opposite at +4."},{"n":"Follower","k":"Flaw","c":"Personality","s":"Minor","d":"You rarely take the initiative and prefer to follow a decisive leader you can attach yourself to."},{"n":"Foreign Upbringing","k":"Flaw","c":"Personality","s":"Minor","d":"You hail from a remote, isolated corner of Mythic Europe and seem foreign to those around you."},{"n":"Grudge","k":"Flaw","c":"Personality","s":"Minor","d":"You hold a bitter grudge against someone in your normal social circle over a past event."},{"n":"Humble","k":"Flaw","c":"Personality","s":"Minor","d":"You readily assume others are more skilled and worthy than yourself."},{"n":"Imagined Folk Tradition Vulnerability","k":"Flaw","c":"Personality","s":"Minor","d":"You wrongly believe a folk method can undo your magic, which can still affect you mechanically."},{"n":"Lost Love","k":"Flaw","c":"Personality","s":"Minor","d":"Having lost your true love, you take little joy in life and give up easily when things turn hard."},{"n":"Magical Fascination","k":"Flaw","c":"Personality","s":"Minor","d":"You are obsessed with the supernatural, finding ordinary life hollow without it."},{"n":"Noncombatant","k":"Flaw","c":"Personality","s":"Minor","d":"You have no taste or talent for fighting and may freeze or flee in a battle."},{"n":"Pessimistic","k":"Flaw","c":"Personality","s":"Minor","d":"You always expect the worst and are sure misfortune will single you out."},{"n":"Poor Memory","k":"Flaw","c":"Personality","s":"Minor","d":"You badly struggle to recall one kind of thing, such as names, faces, or places."},{"n":"Reclusive","k":"Flaw","c":"Personality","s":"Minor","d":"You resent being disturbed and treat intrusions on your time as insults."},{"n":"Secretive","k":"Flaw","c":"Personality","s":"Minor","d":"You keep secrets even from allies, rarely explaining what you do or why."},{"n":"Seeker","k":"Flaw","c":"Personality","s":"Minor","d":"You are driven to hunt down ancient magic and arcane artifacts as a self-styled Seeker."},{"n":"Sheltered Upbringing","k":"Flaw","c":"Personality","s":"Minor","d":"Raised cut off from society, you are easily overwhelmed by the wider world."},{"n":"Short Attention Span","k":"Flaw","c":"Personality","s":"Minor","d":"You struggle to keep focus, so watching, listening, or following a plan is hard for you."},{"n":"Simple-Minded","k":"Flaw","c":"Personality","s":"Minor","d":"You can hold only one task in mind at a time and are easily confused without clear instructions."},{"n":"Slothful","k":"Flaw","c":"Personality","s":"Minor","d":"You are lazy and full of excuses for why nothing need be done right now."},{"n":"Soft-Hearted","k":"Flaw","c":"Personality","s":"Minor","d":"You cannot bear to cause or witness suffering, even an enemy's, and avoid danger for all."},{"n":"Temperate","k":"Flaw","c":"Personality","s":"Minor","d":"You never over-indulge in any sensual pleasures."},{"n":"Weak-Willed","k":"Flaw","c":"Personality","s":"Minor","d":"You look to others for guidance and badly need someone you can trust."},{"n":"A Deal with the Devil","k":"Flaw","c":"Story","s":"Major","d":"You sold your soul to the devil and are bound for damnation unless you can escape the bargain."},{"n":"Abandoned Apprentice","k":"Flaw","c":"Story","s":"Major","d":"Your master abandoned your Hermetic training; you cast like a magus but are not in the Order."},{"n":"Bigamist","k":"Flaw","c":"Story","s":"Major","d":"You secretly keep two spouses and households in two cities, forever juggling both lives."},{"n":"Black Sheep","k":"Flaw","c":"Story","s":"Major","d":"You are estranged from a prestigious family who want nothing to do with you, except to punish or use you."},{"n":"Curse of Venus","k":"Flaw","c":"Story","s":"Major","d":"You attract unwanted suitors and keep falling for the wrong people at the wrong times."},{"n":"Dark Secret","k":"Flaw","c":"Story","s":"Major","d":"A shameful secret haunts you, and discovery would bring rejection, ruin, or revenge."},{"n":"Dependent","k":"Flaw","c":"Story","s":"Major","d":"You feel bound to protect a weaker person who keeps needing your help."},{"n":"Diabolic Past","k":"Flaw","c":"Story","s":"Major","d":"You once ran with diabolists and, though reformed, remain haunted by that history."},{"n":"Difficult Underlings","k":"Flaw","c":"Story","s":"Major","d":"However carefully you choose them, your underlings always end up causing you trouble."},{"n":"Enemies","k":"Flaw","c":"Story","s":"Major","d":"A powerful foe, such as a baron, bishop, or outlaw band, actively works against you."},{"n":"Envied Beauty","k":"Flaw","c":"Story","s":"Major","d":"Your beauty draws jealousy and revulsion, especially from the vain of your own gender."},{"n":"Evil Destiny","k":"Flaw","c":"Story","s":"Major","d":"The Infernal has taken an interest in you for reasons you do not understand."},{"n":"Excommunicate","k":"Flaw","c":"Story","s":"Major","d":"Cast out of the Church, you have a bad Reputation of 3 there and cannot receive the sacraments."},{"n":"Favors","k":"Flaw","c":"Story","s":"Major","d":"You owe a debt to someone who may call it in at any time, with serious consequences for refusing."},{"n":"Feud","k":"Flaw","c":"Story","s":"Major","d":"Your family is locked in a feud with rivals of similar strength, and you are expected to take part."},{"n":"Fury","k":"Flaw","c":"Story","s":"Major","d":"A violent temper sometimes seizes you, throwing you into an uncontrollable, destructive rage."},{"n":"Indiscreet","k":"Flaw","c":"Story","s":"Major","d":"You cannot keep a secret, blurting things out unless you make an Intelligence roll against Ease Factor 9."},{"n":"Many Marriageable Daughters","k":"Flaw","c":"Story","s":"Major","d":"You have many daughters to marry off suitably, which keeps drawing you into stories."},{"n":"Mistaken Identity","k":"Flaw","c":"Story","s":"Major","d":"Someone who looks just like you commits crimes and outrages that get blamed on you."},{"n":"Monastic Vows","k":"Flaw","c":"Story","s":"Major","d":"You are sworn to poverty, chastity, and obedience to a religious superior."},{"n":"Oath of Fealty","k":"Flaw","c":"Story","s":"Major","d":"You are bound by an oath of loyalty to someone outside the covenant who may call on you (forbidden to magi by the Code)."},{"n":"Plagued by Supernatural Entity","k":"Flaw","c":"Story","s":"Major","d":"A supernatural being meddles in your life on a regular basis, dragging you into stories."},{"n":"Rector/Proctor","k":"Flaw","c":"Story","s":"Major","d":"As a university leader you answer for your colleagues' behavior and academic concerns."},{"n":"Servant of the (Land)","k":"Flaw","c":"Story","s":"Major","d":"A powerful magical creature once saved you, and in return set you a binding task."},{"n":"Supernatural Nuisance","k":"Flaw","c":"Story","s":"Major","d":"A kind of supernatural creature pesters you in minor ways whenever you are near them."},{"n":"Suppressed Gift","k":"Flaw","c":"Story","s":"Major","d":"You have The Gift but have lost access to its power through mishap or misfortune."},{"n":"Tainted Offspring","k":"Flaw","c":"Story","s":"Major","d":"Your child is marked by a demon for dark purposes, and you must struggle to protect them."},{"n":"Tormenting Master","k":"Flaw","c":"Story","s":"Major","d":"Your former master refuses to accept your Gauntlet and harasses you with political attacks."},{"n":"Tragic Life","k":"Flaw","c":"Story","s":"Major","d":"Demons have manipulated your life so that you react to key events to your own ruin."},{"n":"True Love (NPC)","k":"Flaw","c":"Story","s":"Major","d":"You have a true love who is an NPC, whose welfare and dangers keep pulling you into stories."},{"n":"Tzadik Nistar","k":"Flaw","c":"Story","s":"Major","d":"You are one of the 36 hidden righteous on whom the world depends, destined for a great moral test."},{"n":"Unbaptized","k":"Flaw","c":"Story","s":"Major","d":"You are an unbaptized Christian, perhaps to protect a supernatural nature that baptism might undo."},{"n":"Unhappily Married","k":"Flaw","c":"Story","s":"Major","d":"You married for money or politics rather than love and seek solace outside your marriage."},{"n":"University Dean","k":"Flaw","c":"Story","s":"Major","d":"You head a university, overseeing its dealings with the town and disputes among masters and students."},{"n":"Vendetta","k":"Flaw","c":"Story","s":"Major","d":"You are caught up in a Verditius vendetta, usually inherited, that stops just short of real injury."},{"n":"Vengeful Powers","k":"Flaw","c":"Story","s":"Major","d":"The Infernal watches your non-Infernal powers, twisting them with nasty side effects when used innocently."},{"n":"Wanderlust","k":"Flaw","c":"Story","s":"Major","d":"You cannot bear to stay in one place more than a season before the urge to travel takes you."},{"n":"Animal Companion","k":"Flaw","c":"Story","s":"Minor","d":"A loyal, clever (but mundane) animal travels with you, and its loss would devastate you."},{"n":"Beloved Rival","k":"Flaw","c":"Story","s":"Minor","d":"You have a rival who fiercely opposes you at every turn yet is just as fiercely protective of you."},{"n":"Blackmail","k":"Flaw","c":"Story","s":"Minor","d":"You hold a powerful person's secret and trade your silence for payments or favors."},{"n":"Close Family Ties","k":"Flaw","c":"Story","s":"Minor","d":"Your family is central to your life and still supports you, even at personal risk."},{"n":"Demonic Familiar","k":"Flaw","c":"Story","s":"Minor","d":"You are bound to a demon disguised as a familiar that lends you its senses and masks your taint."},{"n":"Employed by Company","k":"Flaw","c":"Story","s":"Minor","d":"You are a salaried agent of a merchant company, answerable to your employer."},{"n":"Faerie Friend","k":"Flaw","c":"Story","s":"Minor","d":"You have a faerie ally whose aid depends on its power and its whims."},{"n":"Heir","k":"Flaw","c":"Story","s":"Minor","d":"You stand to inherit land and perhaps wealth, but rivals may try to remove you from the succession."},{"n":"Hermetic Patron","k":"Flaw","c":"Story","s":"Minor","d":"You, a Redcap or magus, serve a Hermetic patron who calls on you from time to time."},{"n":"Impious Friend","k":"Flaw","c":"Story","s":"Minor","d":"A minor demon poses as your friend, usually unseen by those without the right senses."},{"n":"Magical (Being) Companion","k":"Flaw","c":"Story","s":"Minor","d":"An intelligent magical being travels with you and needs your regular care."},{"n":"Manufactured Ignorance","k":"Flaw","c":"Story","s":"Minor","d":"Demons feed you false evidence to sustain a delusion they have crafted for you."},{"n":"Mentor","k":"Flaw","c":"Story","s":"Minor","d":"An influential mentor gives you advice and minor aid, but will ask favors of you in return."},{"n":"Primogeniture Lineage","k":"Flaw","c":"Story","s":"Minor","d":"You are distantly in line to become Primus of House Verditius."},{"n":"Weak Personality","k":"Flaw","c":"Story","s":"Minor","d":"You lack strong traits, so all your Personality Traits must fall between +1 and -1."},{"n":"Outlaw","k":"Flaw","c":"Social Status","s":"Major","d":"You have been outlawed and live by your wits; you may take Martial Abilities and carry a Reputation of 2."},{"n":"Branded Criminal","k":"Flaw","c":"Social Status","s":"Minor","d":"A brand on your cheek marks past crime; you cannot be Wealthy but may take Martial Abilities."},{"n":"Companion Animal","k":"Flaw","c":"Social Status","s":"Minor","d":"You are another character's Animal Companion, with little control over your own life."},{"n":"Failed Journeyman","k":"Flaw","c":"Social Status","s":"Minor","d":"Expelled from your guild for misconduct, you may not legally practice or sell your trade in town."},{"n":"Failed Master","k":"Flaw","c":"Social Status","s":"Minor","d":"Having ruined your workshop, you must work as a journeyman to practice your trade legally."},{"n":"Failed Monk/Nun","k":"Flaw","c":"Social Status","s":"Minor","d":"You left or were expelled from monastic life, keeping some learning but bearing the stigma."},{"n":"Gabai","k":"Flaw","c":"Social Status","s":"Minor","d":"Appointed by the community, you serve as the local Jewish tax collector for community levies."},{"n":"Outcast","k":"Flaw","c":"Social Status","s":"Minor","d":"Rejected by ordinary society and tied to no covenant, you must make your own way alone."},{"n":"Outlaw Leader","k":"Flaw","c":"Social Status","s":"Minor","d":"You command a small band of three to six outlaws who look to you for leadership and provision."},{"n":"Outsider","k":"Flaw","c":"Social Status","s":"Minor","d":"You belong to a readily identified, distrusted group, such as Jews or foreigners in much of Europe."},{"n":"Surgical Empiricus","k":"Flaw","c":"Social Status","s":"Minor","d":"A narrowly trained surgeon, skilled in only a single aspect of Chirurgy."},{"n":"Usurer","k":"Flaw","c":"Social Status","s":"Minor","d":"You lend money at interest rates that many people consider abusive."}];const VF_BY_NAME=Object.fromEntries(VF.map(v=>[v.n,v]));const VF_ORDER=[["Virtue","Hermetic","Major"],["Virtue","Hermetic","Minor"],["Virtue","Supernatural","Major"],["Virtue","Supernatural","Minor"],["Virtue","Supernatural","Free"],["Virtue","General","Major"],["Virtue","General","Minor"],["Virtue","Social Status","Major"],["Virtue","Social Status","Minor"],["Virtue","Social Status","Free"],["Virtue","Mythic Companion","Free"],["Flaw","Hermetic","Major"],["Flaw","Hermetic","Minor"],["Flaw","Supernatural","Major"],["Flaw","Supernatural","Minor"],["Flaw","General","Major"],["Flaw","General","Minor"],["Flaw","Personality","Minor"],["Flaw","Story","Major"],["Flaw","Story","Minor"],["Flaw","Social Status","Major"],["Flaw","Social Status","Minor"]];const vfPoints=s=>s==="Major"?3:s==="Minor"?1:0;const BESTIARY=[{"name":"Adder","realm":"Animal","fields":[["Characteristics","Cun -1, Per -2, Pre -6, Com -6, Str -8, Sta +2, Dex +2, Qik +3"],["Size","-4"],["Confidence Score","0"],["Virtues and Flaws","Lightning Reflexes, Infamous"],["Qualities","Ambush Predator, Loathsome Appearance, Slippery, Venomous"],["Personality Traits","Hostile +2"],["Reputations","Venomous (local) 4"],["Combat",["Fangs: Init +3, Attack +8, Defense +7*, Damage -7; * +6 to Defense vs grapple attacks"]],["Soak","+2"],["Fatigue Levels","OK, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1), -3 (2), -5 (3), Incapacitated (4), Dead (5+)"],["Abilities","Awareness 2 (prey), Brawl 2 (fangs), Hunt 4 (rodents), Stealth 4 (stalking prey), Survival 3 (grassy areas)"],["Powers",["Venomous Bite: When the adder attacks, compare its Attack Advantage to the victim's armor Protection (not his Soak). If the adder's advantage is higher, the victim suffers the effects of adder venom as listed in the Poison Table on page 406, regardless of whether the bite inflicts an actual wound. The storyguide may adjust the required Attack Advantage for special circumstances: for instance, high boots might offer an effective Protection +3 against the adder's special attack even though they don't protect against normal attacks."]],["Natural Weapons",["Fangs: Init 0, Atk +3, Def +1, Dam +1."]]],"description":["The common adder is a small snake, usually about a foot and a half in length. Its color varies from pale grey or yellow to red, with diamond-shaped black markings along its back. Some individuals are completely black. The adder's head is triangular in shape.","The adder is a venomous snake commonly found throughout Mythic Europe (except in Ireland). It is hardy enough to hibernate through the winter. It hunts rodents, lizards, and frogs by hiding and waiting for prey to pass nearby. Its venom is weak and can sicken, but not usually kill, a man.","The adder is prone to attack reflexively when anything stumbles across its hiding-place (see the Lightning Reflexes Virtue). Because it's so thin and flexible, it gains a +6 bonus to Defense against grapple attacks."],"page":"","latin":"Viperis","might":"","size":"-4","blurb":"The common adder is a small snake, usually about a foot and a half in length. Its color varies from pale grey or yello…","source":"ArM5 Core","id":0},{"name":"Bear","realm":"Animal","fields":[["Characteristics","Cun +1, Per 0, Pre 0, Com -5, Str +6, Sta +4, Dex +2, Qik 0"],["Size","+2"],["Confidence Score","1 (3)"],["Virtues and Flaws","Ferocity (when injured), Improved Characteristics (x2), Tough, Greedy (minor), Reclusive"],["Qualities","Aggressive, Extra Natural Weapons (claws), Fast Runner, Grapple, Hardy, Imposing Appearance, Large Claws, Pursuit Predator, Tough Hide"],["Personality Traits","Brave +3, Slothful +3, Aggressive +2"],["Reputations","Ferocious (local) 2"],["Combat",["Claws: Init 0, Attack +13, Defense +9, Damage +10","Teeth: Init 0, Attack +11, Defense +7, Damage +7","Grapple: Init 0, Attack +7, Defense +5, Damage n/a"]],["Soak","+10"],["Fatigue Levels","OK, 0/0, -1/-1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22-28), Dead (29+)"],["Abilities","Athletics 3 (sprinting), Awareness 3 (prey), Brawl 5 (claws), Hunt 4 (deer), Survival 5 (foraging), Swim 3 (against the current)"],["Natural Weapons",["Large Claws: Init 0, Atk +5, Def +3, Dam +4;","Teeth: Init 0, Atk +3, Def +1, Dam +1."]]],"description":["The bear's tough hide and thick fur combine to give it a Protection of +3.","The bear is a large, shaggy beast that weighs up to fifty stone (700 pounds) and stands over seven feet tall on its hind legs. Its coat may be light brown or yellowish in color to black; most often, it is medium brown. The bear has large claws and makes a bellowing roar.","The only bear species that exists in Mythic Europe is known today as the brown bear. It can be found throughout Mythic Europe in forests, mountains, and even the northern tundra. Its range extends across North Africa and through Asia as well. It is most common in wilderness areas like the Pyrenees, the Alps, and Scandinavia and Russia.","The bear makes its lair in the earth, either in a cave or in a den it digs with its mighty claws. It lives mainly by foraging but can hunt and kill anything up to the size of a red deer. Men hunt the bear by setting deadfalls or chasing it with hounds. Few dare to engage it at close range with spears, for it is extremely powerful, and ferocious when wounded.","The brown bear can run quickly, gaining a +3 bonus to rolls involving running. It can stand on its hind legs so as to attack a man on horseback. It can climb trees and is a strong swimmer.","According to Pliny the Elder, the he-bear sleeps for forty days in winter and the she-bear sleeps for four months. The bear cub is born a shapeless lump of flesh until the she-bear licks it into the shape of a little bear."],"page":"","latin":"Ursus","might":"","size":"+2","blurb":"The bear's tough hide and thick fur combine to give it a Protection of +3.","source":"ArM5 Core","id":1},{"name":"Bull","realm":"Animal","fields":[["Characteristics","Cun –2, Per 0, Pre –4, Com –4, Str +5, Sta +3, Dex 0, Qik –1"],["Size","+2"],["Confidence Score","1 (3)"],["Virtues and Flaws","Affinity with Brawl, Ferocity (charging), Tough, Oversensitive (to provocation)"],["Qualities","Aggressive, Domesticated, Tough Hide"],["Personality Traits","Aggressive +2"],["Reputations","Strong 4 (local)"],["Combat",["Horns: Init 0, Attack +8, Defense +3, Damage +7"]],["Soak","+8"],["Fatigue Levels","OK, 0/0, -1/-1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22-28), Dead (29+)"],["Abilities","Athletics 4 (charging), Awareness 3 (predators), Brawl 5 (horns)"],["Natural Weapons",["Large horns: Init +2, Atk +3, Def +2, Dam +3."]]],"description":["The bull's tough hide has a Protection of +2.","These statistics are for a bull of the Spanish type, which is black in color, weighs about eighty stone (1120 pounds), and has sharp, inward-curving horns and a hump on its back.","There are many breeds of cattle in Mythic Europe, some of them larger than this specimen. Most breeds in Mythic Europe are short and broad-bodied and have long horns. They may be black, white, tan, red, or brown in color. Some breeds have a coat of shaggy fur. Pliny the Elder writes of magical bulls that live in India, but the statistics here are for a mundane bull.","The bull does not attack without reason, but it is easily — sometimes accidentally — provoked. When a bull charges, it exerts itself to gain an Attack bonus and may simultaneously spend Confidence.","In Spain, the Moorish nobles make a spectacle of fighting bulls from horseback on festival days. The sport of bull-baiting, where spectators watch a tethered bull being killed by a pack of dogs, is known throughout Mythic Europe. Bulls are somewhat clumsy fighters at first, but if they survive combat they quickly grow \"wise\" and become very dangerous. The speed with which they learn to fight is reflected in their Affinity with Brawl."],"page":"","latin":"Taurus","might":"","size":"+2","blurb":"The bull's tough hide has a Protection of +2.","source":"ArM5 Core","id":2},{"name":"Cat","realm":"Animal","fields":[["Characteristics","Cun 0, Per +1, Pre -2, Com -4, Str -7, Sta 0, Dex +3, Qik +4"],["Size","-3"],["Confidence Score","0"],["Virtues and Flaws","Perfect Balance, Puissant Awareness, Sharp Ears, Nocturnal"],["Qualities","Ambush Predator, Crafty, Good Jumper, Skilled Climber, Thick Fur"],["Personality Traits","Curious +4, Timid +2"],["Reputations","Evil 2 (local) This reputation is strongest in Celtic areas, and weaker or unknown in other places."],["Combat",["Claws: Init +3, Attack +8, Defense +10, Damage -5","Teeth: Init +4, Attack +8, Defense +7, Damage -6"]],["Soak","+1"],["Fatigue Levels","OK, 0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-2), -3 (3-4), -5 (5-6), Incapacitated (7-8), Dead (9+)"],["Abilities","Athletics 3 (jumping), Awareness 4+2 (at night), Brawl 2 (claws), Hunt 4 (mice), Stealth 4 (stalking)"],["Natural Weapons",["Claws: Init -1, Attack +2, Defense +3, Damage +2.","Teeth: Init 0, Attack +3, Defense +1, Damage +1."]]],"description":["The cat's dense fur gives it a Protection of +1.","In Mythic Europe, domestic cats are shorthaired and tend to have grey or yellow-orange fur with darker stripes, though black, white, and calico cats are not uncommon.","The European wildcat looks much like a large domestic cat with a thicker, shaggier coat and bushy tail. Its coat is grey-brown with black stripes and a white underbelly.","The cat has a reputation for evil among the common folk. They accuse it of stealing the breath of babies, though only supernatural cats can do such a thing. Cats are sometimes tolerated because they keep down the population of rats, but they are not commonly kept as pets and they are often killed by peasants out of superstition or cruelty. For some reason, the cat's bad reputation is unknown in England and it is looked upon more favorably in that land. Pliny the Elder says nothing about the cat's reputation, noting only that the cat is the natural enemy of mice and that its eyes are so keen it can see in the dark."],"page":"","latin":"Felis","might":"","size":"-3","blurb":"The cat's dense fur gives it a Protection of +1.","source":"ArM5 Core","id":3},{"name":"Courser","realm":"Animal","fields":[["Characteristics","Cun –2, Per 0, Pre 0, Com –4, Str +4, Sta +3, Dex –2, Qik +2"],["Size","+2"],["Confidence Score","0"],["Virtues and Flaws","Long-Winded, Improved Characteristics, Fear (loud noises), Non-combatant"],["Qualities","Domesticated, Fast Runner, Good Jumper, Herd Animal, Imposing Appearance, Tireless"],["Personality Traits","Skittish +3, Brave -2"],["Reputations","None"],["Combat",["Hooves: Init +4, Attack 0, Defense +4, Damage +5"]],["Soak","+3"],["Fatigue Levels","OK, 0/0, -1/-1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (16-21), Incapacitated (22-28), Dead (29+)"],["Abilities","Athletics 4 (long-distance running), Awareness 3 (noises)"],["Natural Weapons",["The weapon statistics for a courser's kick are Init +2, Atk +2, Def +2, Dam + 1."]]],"description":["The courser is a swift horse belonging to a mid-sized, athletic breed like the Andalusian. The Andalusian stallion is tall and strong, weighing about 80 stone (1120 pounds) and standing 15 hands (60 inches) high. It has a gracefully curving neck, a broad chest, straight back, and a flowing mane and tail. Its coat may be grey, black, chestnut, or roan.","The courser is a swift horse used by knights and nobles for hunting, traveling, and carrying important messages. The courser is not trained for battle and panics relatively easily; the statistics for its kick are given in case a character is unlucky enough to be next to a panic-stricken horse.","A light horse trained for battle is called a charger. To create a charger, replace the courser's Noncombatant Flaw with Proud (minor), change the Brave Personality Trait to zero, and give the animal a Brawl skill of 2 (hooves). Another kind of light horse is the palfrey, which is a riding horse chosen for its gentle gait and often ridden by inexperienced riders or by ladies. To convert a courser to a palfrey, reduce Quickness by two points and increase Dexterity by the same amount. Palfreys have the Noncombatant Flaw.","Any light horse — courser, charger, or palfrey — gets a +3 to rolls involving running or jumping."],"page":"","latin":"Equus","might":"","size":"+2","blurb":"The courser is a swift horse belonging to a mid-sized, athletic breed like the Andalusian. The Andalusian stallion is …","source":"ArM5 Core","id":4},{"name":"Destrier","realm":"Animal","fields":[["Characteristics","Cun –2, Per 0, Pre 0, Com –4, Str +6, Sta +3, Dex +1, Qik –1"],["Size","+3"],["Confidence Score","1 (3)"],["Virtues and Flaws","Ferocity (when ridden in battle), Improved Characteristics, Long-Winded, Proud (minor)"],["Qualities","Domesticated, Fast Runner, Herd Animal, Imposing Appearance, Tireless"],["Personality Traits","Loyal +2, Brave +1"],["Reputations","Aggressive (local) 1"],["Combat",["Hooves: Init +1, Attack +7, Defense +5, Damage +7"]],["Soak","+3"],["Fatigue Levels","OK, 0/0, -1/-1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-8), -3 (9-16), -5 (17-24), Incapacitated (25-32), Dead (33+)"],["Abilities","Athletics 5 (balancing), Brawl 3 (hooves)"],["Natural Weapons",["The weapon statistics for a destrier's kick are Init +2, Atk +2, Def +2, Dam + 1."]]],"description":["The destrier is a heavy warhorse. One breed used as destriers is the Percheron, a huge horse weighing over 140 stone (1960 pounds) and standing over 16 hands (64 inches) high at the withers. It has a heavy, slightly curved neck, a broad and deep chest, and powerful, stocky legs. Its coat is either grey or black in color.","The destrier, or heavy war horse, has been bred in Mythic Europe since at least the time of Charles Martel (8th century A.D.). Some of the large horse breeds in Mythic Europe are the Percheron, the Belgian, and the Friesian. These horses are used mainly for battle, farm work is done using oxen.","The destrier is almost always a stallion. It is highly trained so it will charge without fear when its rider commands. When pressed into melee, it can rear on its hind legs and lash out with its forehooves. Though huge, the destrier is agile and can balance on its hind legs for several combat rounds without difficulty. It is trained to fight independently of its rider, so it can help defend him if he should be dismounted or badly wounded.","Like all horses, the destrier is a fast runner and gains a +3 bonus to rolls involving speed. It is too heavy to be much of a jumper."],"page":"","latin":"Equus","might":"","size":"+3","blurb":"The destrier is a heavy warhorse. One breed used as destriers is the Percheron, a huge horse weighing over 140 stone (…","source":"ArM5 Core","id":5},{"name":"Falcon","realm":"Animal","fields":[["Characteristics","Cun –1, Per +3, Pre –1, Com –2, Str –6, Sta +2, Dex +1, Qik +6"],["Size","-3"],["Confidence Score","1 (3)"],["Virtues and Flaws","Ferocity (swooping attack), Keen Vision, Fragile Constitution"],["Qualities","Accomplished Flier, Extra Natural Weapons, Fast Flier, Keen Eyesight, Pursuit Predator"],["Personality Traits","Fierce +3"],["Reputations","None"],["Combat",["Talons: Init +5, Attack +6, Defense +12, Damage –4","Beak: Init +6, Atk +6, Defense +9, Damage -5"]],["Soak","-2"],["Fatigue Levels","OK, 0/0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-2), -3 (3-4), -5 (5-6), Incapacitated (7-8), Dead (9+)"],["Abilities","Athletics 5 (swift flight), Awareness 4 (spotting prey), Brawl 2 (talons), Hunt 4 (game birds), Survival 3 (cold climates)"],["Natural Weapons",["The weapon statistics for a falcon's talons are Init –1, Atk +2, Def +3, Dam +2.","The statistics for its beak are Init 0, Atk +3, Def +1, Dam +1."]]],"description":["These statistics are for a gyrfalcon, the largest and most prized of falcons. Its wingspan can exceed four feet. It has a short, hooked beak and dark eyes. Its plumage may be white, grey, or dark brown and has a banded pattern.","The falcon is among the swiftest of birds and hunts on the wing, overtaking its prey in flight. Nobles use falcons to hunt game birds such as partridge. In the wild, the gyrfalcon can kill prey as large as a goose, and usually hunts birds and small rodents. It lives in cold northern lands including Scandinavia, Iceland, and Russia.","Other, smaller species of falcon are Size –4. All falcons are fast fliers and gain a +3 bonus to rolls involving speed."],"page":"","latin":"Falco","might":"","size":"-3","blurb":"These statistics are for a gyrfalcon, the largest and most prized of falcons. Its wingspan can exceed four feet. It ha…","source":"ArM5 Core","id":6},{"name":"Hound","realm":"Animal","fields":[["Characteristics","Cun 0, Per +2, Pre -4, Com 0, Str 0, Sta +2, Dex +1, Qik +2"],["Size","0"],["Confidence Score","0"],["Virtues and Flaws","Improved Characteristics, Long-Winded, Sharp Ears, Reckless"],["Qualities","Domesticated, Keen Sense of Smell, Pack Animal, Pursuit Predator, Vocal"],["Personality Traits","Loyal +3, Reckless +3, Brave +2"],["Reputations","Loyal 2 (local)"],["Combat",["Bite: Init +2, Attack +8, Defense +7, Damage +1"]],["Soak","+2"],["Fatigue Levels","OK, 0/0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20), Dead (21+)"],["Abilities","Athletics 3 (distance running), Awareness 3 (keeping watch), Brawl 3 (bite), Hunt 4 (track by scent)"],["Natural Weapons",["The weapon statistics for a dog's bite are Init 0, Atk +3, Def +1, Dam +1."]]],"description":["These statistics are for a large hound such as the bloodhound. The bloodhound stands a little over two feet at the shoulder and weighs up to nine stone (126 pounds). It has large jowls, dangling ears, and a heavy tail. Its coat is short and may be tan, red, or liver in color.","There are many breeds of dogs in Mythic Europe, many of them similar to breeds that exist in our world (though they may be called by different names). The largest dogs are used for guarding livestock or hunting dangerous beasts like wolves, bears, and wild boars. They include the breeds like the bloodhound, elkhound, Rottweiler, mastiff, and great Dane. Smaller hounds, such as the greyhound, Basset hound, and Dalmatian, are Size -1 and are often used to hunt deer, fox, and small game. Medium-sized dogs (Size -2) include spaniels, used to chase small game and to flush game birds for falconers; terriers, which hunt badgers, stoats, and rats, and the Welsh corgi, a small cattle-herding dog. The smallest dogs (Size –3) include lap-dogs, small terriers bred for vermin control, and the tiny Italian greyhound. Several breeds that are popular in the real world, such as the German shepherd and most retrievers, did not exist in the Middle Ages. These statistics are for the bloodhound, and the Characteristics of other breeds may be different.","All dogs have a good sense of smell, and the bloodhound's sense is so keen it gets a +3 bonus to all related rolls. Dogs also get a +3 to endurance-related rolls due to their Long-Winded Virtue.","A pack of dogs may fight as a trained group under the leadership of a human Master of the Pack. Use the Master's Animal Handling score instead of his Leadership score to determine how many dogs he can command at a time."],"page":"","latin":"Canis","might":"","size":"0","blurb":"These statistics are for a large hound such as the bloodhound. The bloodhound stands a little over two feet at the sho…","source":"ArM5 Core","id":7},{"name":"Lion","realm":"Animal","fields":[["Characteristics","Cun +2, Per 0, Pre 0, Com 0, Str +6, Sta +3, Dex +2, Qik +1"],["Size","+2"],["Confidence Score","2 (6)"],["Virtues and Flaws","Ferocity (self-defense), Improved Characteristics (x2), Puissant Brawl, Self-Confident, Tough, Proud, Weakness (submission)"],["Qualities","Aggressive, Ambush Predator, Crafty, Good Jumper, Hardy, Imposing Appearance, Large Claws, Large Teeth, Tough Hide, Vocal"],["Personality Traits","Brave +5, Fierce +5"],["Reputations","Fierce (local) 4"],["Combat",["Claws: Init +1, Attack +15, Defense +12, Damage +10","Bite: Init +1, Attack +13, Defense +9, Damage +9"]],["Soak","+8"],["Fatigue Levels","OK, 0/0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22–28), Dead (29+)"],["Abilities","Athletics 5 (pouncing), Awareness 2 (smell), Brawl 5+2 (claws), Hunt 4 (deer), Stealth 4 (stalking), Survival 5 (arid climates)"],["Natural Weapons",["Large claws: Init 0, Attack +5, Defense +3, Damage +4;","Large teeth: Init 0, Attack +4, Defense +1, Damage +3."]]],"description":["Its hide gives it a Protection of +2.","The lion is a legendary beast more often depicted in artwork than encountered in the flesh. It can weigh up to 35 stone (490 pounds) and have a body length of over ten feet. It has a short, broad muzzle with powerful jaws and teeth. Its coat is tawny and the male lion has a dark, shaggy mane. The fearsome roar of the lion can be heard from a great distance.","Pliny the Elder writes that, during his time, lions were found in Europe only between the rivers Achelous and Mestus (in Greece), and that they also inhabited Syria and North Africa. The European lion was extinct before the middle ages in historical Europe, but might have survived in Mythic Europe. Pliny writes that there are two kinds of lions: those with long manes, which are bold; and those with curly manes, which are timid. These statistics are for the bold variety. Pliny also notes that the lion will not attack a man who lies prostrate before it.","The lion can make impressive leaps and gets +3 to jump-related rolls. It can easily leap high enough to attack a man on horseback."],"page":"","latin":"Leo","might":"","size":"+2","blurb":"The lion is a legendary beast more often depicted in artwork than encountered in the flesh. It can weigh up to 35 ston…","source":"ArM5 Core","id":8},{"name":"Stag","realm":"Animal","fields":[["Characteristics","Cun - 2, Per + 2, Pre 0, Com - 5, Str + 2, Sta + 2, Dex 0, Qik + 2"],["Size","+2"],["Confidence Score","0"],["Virtues and Flaws","Higher Purpose (protect the herd), Improved Characteristics"],["Qualities","Defensive Fighter, Extra Natural Weapons, Fast Runner, Good Jumper, Large Antlers, Sharp Ears"],["Personality Traits","Brave +1"],["Reputations","Noble (local) 2"],["Combat",["Antlers: Init +4, Attack +7, Defense +8, Damage +5","Hooves: Init +4, Attack +6, Defense +8, Damage +3","Dodge: Init +2, Attack n/a, Defense +7, Damage n/a"]],["Soak","+2"],["Fatigue Levels","OK, 0, -1, -3, -5, Unconscious"],["Wound Penalties","-1 (1-7), -3 (8-14), -5 (15-21), Incapacitated (22-28), Dead (29+)"],["Abilities","Athletics 4 (sprinting), Awareness 3 (predators), Brawl 4 (dodge), Survival 3 (woodlands)"],["Natural Weapons",["During the autumn and winter, a stag has antlers with the following weapon statistics: Init +2, Atk +3, Def +2, Dam +3.","In spring, it sheds its antlers and must fight with its hooves until the following autumn: Init +2, Atk +2, Def +2, Dam +1."]]],"description":["These statistics are for the red deer, one of the largest deer in Mythic Europe. Adult males average 40 to 50 stone in weight (560 to 700 pounds) depending on the richness of the available food supply, and may be up to 15 hands high—as tall as some horses, but more lightly built. The red deer's coat is reddish-brown in winter and tan in summer, with a lighter rump and underbelly. Stags have a shaggy mane of dark fur and an impressive rack of antlers over four feet across from tip to tip. They make a deep, bellowing roar during the autumn mating season.","The red deer lives in open woodlands, moors, and grasslands throughout Mythic Europe. It avoids dense, tangled forests but can be found in alpine forests and meadows. The species is called \"elk\" in contemporary North America. The size of the red deer varies from +1 where grazing is poor to +2 where the grass is rich and plentiful. Does are smaller than stags and lack antlers.","The red deer is a favorite quarry of hunters. In some places, only nobles are allowed to hunt it. The stag usually flees from combat, trying to draw enemies away from its herd, but it can fight if it must. All deer gain a +3 bonus to rolls involving running or jumping."],"page":"","latin":"Cervus","might":"","size":"+2","blurb":"These statistics are for the red deer, one of the largest deer in Mythic Europe. Adult males average 40 to 50 stone in…","source":"ArM5 Core","id":9},{"name":"Wild Boar","realm":"Animal","fields":[["Characteristics","Cun 0, Per 0, Pre -4, Com -5, Str +2, Sta +2, Dex 0, Qik +1"],["Size","0"],["Confidence Score","1 (3)"],["Virtues and Flaws","Berserk, Enduring Constitution, Ferocity (when cornered), Tough, Greedy (minor), Wrathful (minor)"],["Qualities","Aggressive, Hardy, Herd Animal, Tireless, Tough Hide"],["Personality Traits","Brave +4, Angry +3"],["Reputations","Ill-tempered (local) 2"],["Combat",["Tusks: Init +1, Attack +10, Defense +9, Damage +7","Tusks (berserk): Init +1, Attack +12, Defense +7, Damage +7"]],["Soak","+7"],["Fatigue Levels","OK, 0/0, 0/0, -2/-2, -4, Unconscious"],["Wound Penalties","-1 (1-5), -3 (6-10), -5 (11-15), Incapacitated (16-20), Dead (21+)"],["Abilities","Athletics 4 (sprinting), Awareness 3 (foraging), Brawl 5 (tusks), Survival 5 (forests)"],["Natural Weapons",["Tusks: Init 0, Atk +4, Def +2, Dam +5."]]],"description":["The boar's hide has a Protection of +2.","The wild boar has prominent tusks and a hairy ridge along its spine. It is densely covered in short bristles ranging in color from grey to black or brown. Its legs are longer than those of a domestic pig and it can run quickly for short distances.","The wild boar lives in forests throughout Mythic Europe, where it forages by night and rests by day. Wild swine travel in groups called sounders of twenty or more individuals, though they are also encountered singly.","In France and England the boar is called la bête noire, \"the black beast,\" for its evil temper. It is a favorite sport of noblemen, who hunt it from horseback using hounds, lances, and swords. According to Pliny the Elder, the wild boar toughens its hide by rubbing against trees.","Boars vary greatly in size, from eight stone (112 pounds) to more than thirty stone (420 pounds). The largest boars are Size +1."],"page":"","latin":"Aper","might":"","size":"0","blurb":"The wild boar has prominent tusks and a hairy ridge along its spine. It is densely covered in short bristles ranging i…","source":"ArM5 Core","id":10},{"name":"Wolf","realm":"Animal","fields":[["Characteristics","Cun +2, Per 0, Pre -2, Com 0, Str -1, Sta +3, Dex +2, Qik +2"],["Size","-1"],["Confidence Score","1 (3)"],["Virtues and Flaws","Improved Characteristics (x2), Ferocity (when hungry), Long-Winded, Sharp Ears, Compulsion (killing), Infamous"],["Qualities","Aggressive, Hardy, Keen Sense of Smell, Pack Animal/Pack Leader, Pursuit Predator, Sharp Ears, Thick Fur, Vocal"],["Personality Traits","Brave +3, Cowardly +3"],["Reputations","Bloodthirsty (local) 4"],["Combat",["Teeth: Init +2, Attack +11, Defense +9, Damage 0"]],["Soak","+4"],["Fatigue Levels","OK, 0/0, -1/-1, -3, -5, unconscious"],["Wound Penalties","-1 (1-4), -3 (5-8), -5 (9-12), Incapacitated (13-16), Dead (17+)"],["Abilities","Athletics 5 (distance running), Awareness 3 (smell), Brawl 5 (teeth), Hunt 4 (track by smell), Survival 3 (winter)"],["Natural Weapons",["Teeth: Init 0, Atk +3, Def +1, Dam +1."]]],"description":["Its thick fur gives it a Protection of +1.","The wolf has erect, triangular ears, a narrow muzzle, and a coat of shaggy fur. Its eyes are usually yellowish and have a steady, unsettling gaze. Its color may be any shade from pale grey through dark brown, often with lighter patches on the sides of the face and around the eyes. The wolf can bark, but its better-known sound is its eerie, piercing howl.","The wolf is found throughout Mythic Europe, the Middle East, and North Africa. According to Pliny the Elder, the wolves of northern regions are fierce while those of Africa and Egypt are weak","Wolves are greatly feared by commoners. They are hunted with large hounds because they kill livestock. In some lands, there is a bounty on their hides. Many tales attribute supernatural powers to wolves, but most wolves are mundane and have no powers at all.","The Flaws above reflect the medieval perception of the wolf as a wanton, bloodthirsty killer. Individual wolves, such as the Animal Companion of a player character, may substitute another Personality Flaw in place of the Compulsion. A wolf Animal Companion that goes around killing livestock could be disruptive to stories. Regardless of such a wolf's actual personality, mundanes are likely to treat it with a great deal of fear and suspicion.","The leader of a wolf pack has the additional Ability, Leadership 5 (wolves). A pack may fight as a trained group when its leader is present. A wolf pack is extremely dangerous."],"page":"","latin":"Lupus","might":"","size":"-1","blurb":"Its thick fur gives it a Protection of +1.","source":"ArM5 Core","id":11},{"name":"Adranus","realm":"Magic","fields":[["Magic Might","50 (Ignem)"],["Characteristics","Int +3, Per +3, Pre +2, Com +2, Str +3, Sta +2, Dex -1, Qik -2"],["Confidence Score","1 (3 points)"],["Virtues and Flaws","Ways of the Mountains, Improved Characteristics x5; Fury, Wrathful"],["Personality Traits","Wrathful +6, Slumbering +3"],["Reputations","Bringer of Death and Destruction 5 (Local)"],["Abilities","Sicily Lore 6 (mountains), Magic Lore 8 (underworld)"],["Vis","10 pawns of Ignem vis; 5 pawns per year can also be harvested from the crater at the volcano's summit."]],"description":["Crafter of Fire, variable points, Init -2 - Might cost, Ignem:","Duplicates any non-Ritual Creo Ignem or Rego Ignem spell no greater than 50th level at a cost of 1 Might point per magnitude of the effect.","Crafter of Earth, variable points, Init -2 - Might cost, Terram:","Duplicates any non-Ritual Creo Terram or Rego Terram spell no greater than 50th level at a cost of 1 Might point per magnitude of the effect.","Grant Visions, 5 points, Init –12, Vim:","The target gains the Visions Flaw. Adranus can grant the Flaw temporarily, in which case it does not recover the Might Points spent until it withdraws the Flaw, or permanently, in which case its Might Score is reduced by 5.","Grant Simple-Minded, 5 points, Init –12, Vim:","The target gains the Simple-Minded Flaw. Adranus can grant the Flaw temporarily, in which case it does not recover the Might Points spent until it withdraws the Flaw, or permanently, in which case its Might Scor
