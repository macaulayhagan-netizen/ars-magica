// --- storage shim: use Claude's window.storage if present, else localStorage ---
if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v == null ? null : {
        key,
        value: v
      };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return {
        key,
        value
      };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return {
        key,
        deleted: true
      };
    },
    async list(prefix = "") {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return {
        keys
      };
    }
  };
}

/* ---------- The Arts ---------- */
const TECHNIQUES = [["Creo", "I create", "Brings into being; produces ideal, perfect forms."], ["Intellego", "I perceive", "Gathers information; perceives and learns."], ["Muto", "I transform", "Changes a thing into something unnatural to it."], ["Perdo", "I destroy", "Degrades, harms, weakens, or annihilates."], ["Rego", "I control", "Commands a thing to behave according to its nature."]];
const FORMS = [["Animal", "animals", "#6b4a2b"], ["Aquam", "water", "#2a5f7a"], ["Auram", "air", "#74678f"], ["Corpus", "the human body", "#8a3a3a"], ["Herbam", "plants", "#4f6b3a"], ["Ignem", "fire & heat", "#c2502e"], ["Imaginem", "images & species", "#5a7d94"], ["Mentem", "the mind", "#b07a2e"], ["Terram", "earth & stone", "#5a4632"], ["Vim", "raw magical power", "#6f6f78"]];
const TECH_NAMES = TECHNIQUES.map(t => t[0]);
const FORM_NAMES = FORMS.map(f => f[0]);
const FORM_COLOR = Object.fromEntries(FORMS.map(f => [f[0], f[2]]));
const ART_GLOSS = Object.fromEntries([...TECHNIQUES.map(t => [t[0], t[1]]), ...FORMS.map(f => [f[0], f[1]])]);
const CHARACTERISTICS = [["Int", "Intelligence"], ["Per", "Perception"], ["Str", "Strength"], ["Sta", "Stamina"], ["Pre", "Presence"], ["Com", "Comm."], ["Dex", "Dexterity"], ["Qik", "Quickness"]];
const HOUSES = ["Bjornaer", "Bonisagus", "Criamon", "Ex Miscellanea", "Flambeau", "Guernicus", "Jerbiton", "Mercere", "Merinita", "Tremere", "Tytalus", "Verditius", "Unaffiliated"];
const KINDS = ["Magus", "Companion", "Grog"];

/* ---------- Spell parameter magnitudes (ArM5 + supplements present in data) ---------- */
const RANGE_MAG = {
  Personal: 0,
  Touch: 1,
  Eye: 1,
  Voice: 2,
  Road: 2,
  Sight: 3,
  "Water-way": 3,
  "Arcane Connection": 4
};
const DURATION_MAG = {
  Momentary: 0,
  Concentration: 1,
  Diameter: 1,
  Sun: 2,
  Ring: 2,
  Moon: 3,
  Fire: 3,
  Year: 4,
  Until: 4
};
const TARGET_MAG = {
  Individual: 0,
  Circle: 0,
  Part: 1,
  Touch: 1,
  Group: 2,
  Room: 2,
  Structure: 3,
  Hearing: 3,
  Bloodline: 3,
  Boundary: 4,
  Vision: 4,
  Special: 0
};
const RANGES = Object.keys(RANGE_MAG);
const DURATIONS = Object.keys(DURATION_MAG);
const TARGETS = Object.keys(TARGET_MAG);

/* ---------- Level <-> magnitude ladder (1,2,3,4,5,10,15,20,...) ---------- */
const rungOf = lvl => lvl <= 5 ? lvl : 4 + lvl / 5;
const levelOf = rung => rung <= 5 ? rung : (rung - 4) * 5;
function shiftLevel(baseLevel, deltaMag) {
  const r = Math.max(1, Math.round(rungOf(baseLevel) + deltaMag));
  return Math.max(1, Math.round(levelOf(r)));
}
function magSum(range, duration, target) {
  return (RANGE_MAG[range] ?? 0) + (DURATION_MAG[duration] ?? 0) + (TARGET_MAG[target] ?? 0);
}

/* ---------- Dice ---------- */
const d10 = () => Math.floor(Math.random() * 10); // 0..9

// Stress die: 1 explodes (reroll & double, repeating); 0 on the first die is a botch check.
function rollStressDie(botchDice = 1) {
  const chain = [];
  let mult = 1;
  let first = true;
  while (true) {
    const r = d10();
    chain.push(r);
    if (r === 1) {
      mult *= 2;
      first = false;
      continue;
    }
    if (r === 0 && first) {
      const botchRolls = Array.from({
        length: Math.max(0, botchDice)
      }, () => d10());
      const zeros = botchRolls.filter(b => b === 0).length;
      return {
        value: 0,
        chain,
        exploded: false,
        botchPossible: true,
        botchRolls,
        botches: zeros,
        botched: zeros > 0
      };
    }
    // 0 inside an explosion chain ends with value 0 (no botch); 2..9 keep value
    return {
      value: r * mult,
      chain,
      exploded: mult > 1,
      botchPossible: false,
      botchRolls: [],
      botches: 0,
      botched: false
    };
  }
}
const rollSimpleDie = () => d10(); // 0..9 face value

/* ---------- Casting helpers ---------- */
// With requisites, casting uses the LOWEST applicable Technique and the LOWEST applicable Form.
function effectiveArts(magus, spell) {
  const techs = [spell.technique, ...spell.requisites.filter(r => TECH_NAMES.includes(r.art)).map(r => r.art)];
  const forms = [spell.form, ...spell.requisites.filter(r => FORM_NAMES.includes(r.art)).map(r => r.art)];
  const tScore = Math.min(...techs.map(t => magus.arts[t] ?? 0));
  const fScore = Math.min(...forms.map(f => magus.arts[f] ?? 0));
  const tName = techs.reduce((a, b) => (magus.arts[a] ?? 0) <= (magus.arts[b] ?? 0) ? a : b);
  const fName = forms.reduce((a, b) => (magus.arts[a] ?? 0) <= (magus.arts[b] ?? 0) ? a : b);
  return {
    tScore,
    fScore,
    tName,
    fName
  };
}

/* ---------- Persistence (window.storage) ---------- */
const ROSTER_KEY = "arsmagica:roster:v1";
async function loadRoster() {
  try {
    const res = await window.storage.get(ROSTER_KEY);
    if (res && res.value) return JSON.parse(res.value);
  } catch (e) {/* no roster yet */}
  return [];
}
async function saveRoster(roster) {
  try {
    await window.storage.set(ROSTER_KEY, JSON.stringify(roster));
  } catch (e) {
    console.error("Could not save roster", e);
  }
}
const uid = () => Math.random().toString(36).slice(2, 10);
function blankMagus() {
  return {
    id: uid(),
    name: "",
    kind: "Magus",
    house: "Bonisagus",
    characteristics: Object.fromEntries(CHARACTERISTICS.map(c => [c[0], 0])),
    arts: Object.fromEntries([...TECH_NAMES, ...FORM_NAMES].map(a => [a, 0])),
    aura: 0,
    confidence: 3,
    notes: ""
  };
}
const tri = n => Math.abs(n) * (Math.abs(n) + 1) / 2;
function charPointsSpent(ch) {
  return CHARACTERISTICS.reduce((sum, [k]) => sum + Math.sign(ch[k]) * tri(ch[k]), 0);
}
const reduceMotion = () => typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

.am-castbar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin:18px 0 6px;}
.am-die{width:104px;height:110px;position:relative;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.5));transition:transform .12s;}
.am-die-shape{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
.am-die .d10-body{fill:#26386b;stroke:#6f82c4;stroke-width:2.5;stroke-linejoin:round;}
.am-die .d10-face{fill:#34488c;}
.am-die .d10-facets{fill:none;stroke:#6175ba;stroke-width:1;opacity:.65;stroke-linecap:round;}
.am-die-num{position:relative;z-index:2;font-family:'Cormorant Garamond';font-weight:700;font-size:38px;
  color:var(--gold-bright);transform:translateY(-10px);text-shadow:0 1px 3px rgba(0,0,0,.65);}
.am-die.rolling{animation:amspin .5s linear infinite;}
.am-die.botch .d10-body{fill:#4f1209;stroke:#c1502f;}
.am-die.botch .d10-face{fill:#7c2114;}
.am-die.botch .d10-facets{stroke:#c1502f;}
.am-die.botch .am-die-num{color:#f0d9b8;}
.am-die.crit .d10-body{stroke:var(--gold-bright);stroke-width:3;}
.am-die.crit{filter:drop-shadow(0 0 13px rgba(214,172,66,.7)) drop-shadow(0 8px 14px rgba(0,0,0,.5));}
@keyframes amspin{to{transform:rotate(360deg);}}
.am-chain{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.am-pip{width:32px;height:34px;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond';font-weight:700;font-size:16px;background:var(--ink2);color:var(--vellum);
  clip-path:polygon(50% 3%, 92% 37%, 73% 80%, 50% 97%, 27% 80%, 8% 37%);}
.am-pip.one{background:#3a331c;color:var(--gold-bright);}
.am-pip.zero{background:#3f140d;color:var(--rubric-bright);}

.am-verdict{font-family:'Cormorant Garamond';font-weight:700;text-align:center;font-size:clamp(28px,6vw,46px);
  letter-spacing:.5px;line-height:1;margin-top:6px;}
.am-verdict.cast{color:var(--gold);}
.am-verdict.fail{color:var(--txt-soft);}
.am-verdict.botch{color:var(--rubric);}
.am-verdict-sub{text-align:center;color:var(--txt-soft);font-size:16px;margin-top:2px;}

.am-zero-alert{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:14px;
  background:rgba(124,33,20,.12);border:1px solid var(--rubric);border-radius:5px;padding:10px 14px;
  color:var(--rubric);font-family:'Cormorant Garamond';font-weight:700;font-size:19px;text-align:center;}
.am-zero-alert .mk{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--rubric);color:#f3ecd8;
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.am-botch-steps{margin-top:14px;border:1px solid var(--line-soft);border-radius:6px;overflow:hidden;
  background:rgba(255,255,255,.25);}
.am-botch-steps .hd{background:rgba(124,33,20,.12);padding:9px 14px;font-family:'Cormorant Garamond';
  font-weight:700;color:var(--rubric);font-size:16px;letter-spacing:.3px;border-bottom:1px solid var(--line-soft);}
.am-bstep{display:flex;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line-soft);}
.am-bstep:last-child{border-bottom:none;}
.am-bstep .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--rubric);color:#f3ecd8;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Cormorant Garamond';}
.am-bstep .bd{font-size:14px;line-height:1.55;color:var(--txt-soft);}
.am-bstep .bd b{color:var(--txt);font-weight:700;}
.am-bstep.good .n{background:#5a7d3a;}

.am-lectern-desc{margin-top:14px;padding-top:13px;border-top:1px solid var(--line-soft);}
.am-lectern-desc p{margin:0 0 6px;font-size:14.5px;line-height:1.55;color:var(--txt-soft);}
.am-lectern-desc p:last-child{margin-bottom:0;}
.am-lectern-desc .lore{font-style:italic;color:var(--txt-faint);border-left:3px solid var(--line-soft);padding-left:9px;}

/* characteristics definition list */
.am-deflist{display:grid;gap:8px;margin:8px 0 4px;}
.am-def{display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:baseline;}
.am-def b{font-family:'Cormorant Garamond';font-weight:700;font-size:16px;color:var(--txt);}
.am-def span{font-size:14.5px;line-height:1.5;color:var(--txt-soft);}
@media (max-width:560px){.am-def{grid-template-columns:1fr;gap:1px;}}

/* houses */
.am-house-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin:6px 0 8px;}
.am-house{background:rgba(255,255,255,.42);border:1px solid var(--line-soft);border-left:4px solid var(--lapis);
  border-radius:4px;padding:11px 13px;}
.am-house .hn{font-family:'Cormorant Garamond';font-weight:700;font-size:18px;color:var(--txt);line-height:1.15;}
.am-house .hf{font-size:11.5px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.6px;margin:1px 0 6px;}
.am-house p{font-size:13.5px;line-height:1.5;color:var(--txt-soft);margin:0 0 7px;}
.am-house .hl{font-size:13px;color:var(--txt-soft);border-top:1px dashed var(--line-soft);padding-top:6px;}
.am-house .hl b{color:var(--lapis);}

/* world map */
.am-map{height:540px;border-radius:6px;overflow:hidden;border:1px solid var(--line-soft);background:#dcd3bf;}
.am-pin-wrap{background:transparent !important;border:0 !important;}
.am-pin{display:block;width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:var(--gold);border:2px solid #5b4a1e;box-shadow:0 1px 3px rgba(0,0,0,.5);}
.am-pop b{font-family:'Cormorant Garamond';font-size:15px;color:#241c14;}
.am-pop .t{font-size:12px;color:#5b4e3a;margin-top:2px;}
.am-pop .p{font-size:12px;color:#7d6c50;font-style:italic;margin-top:1px;}

.am-readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:1px;background:var(--line-soft);
  border:1px solid var(--line-soft);border-radius:4px;overflow:hidden;margin-top:14px;}
.am-readout .cell{background:#efe5cf;padding:8px 6px;text-align:center;}
.am-readout .cell .k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt-faint);font-weight:600;}
.am-readout .cell .v{font-family:'Cormorant Garamond';font-weight:700;font-size:24px;color:var(--txt);line-height:1.1;}
.am-readout .cell.tot{background:#e6d3a6;}
.am-readout .cell.tot .v{color:var(--lapis);}

.am-log{margin-top:16px;border-top:1px dashed var(--line-soft);padding-top:10px;}
.am-log-row{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:3px 0;color:var(--txt-soft);
  border-bottom:1px dotted rgba(154,135,98,.4);}
.am-log-row b{font-family:'Cormorant Garamond';color:var(--txt);font-weight:600;}

.am-empty{text-align:center;padding:40px 20px;color:var(--vellum-dim);}
.am-empty .big{font-family:'Cormorant Garamond';font-style:italic;font-size:24px;color:var(--vellum);}

.am-foot{text-align:center;color:var(--txt-faint);font-size:12.5px;margin-top:30px;color:#9a8a6c;}
.am-foot a{color:var(--gold);text-decoration:none;}

.am-flash{animation:amflash 1.4s ease;}
@keyframes amflash{0%{background:rgba(214,172,66,.5);}100%{background:transparent;}}

/* Info pop-outs */
.am-info{position:relative;display:inline-flex;align-items:center;margin-left:7px;}
.am-info-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--lapis);color:var(--lapis);
  background:rgba(42,74,156,.08);font-size:12px;font-weight:700;cursor:pointer;line-height:1;padding:0;
  display:inline-flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;}
.am-info-btn:hover{background:rgba(42,74,156,.18);}
.am-info-btn[aria-expanded="true"]{background:var(--lapis);color:#f3ecd8;}
.am-info-pop{position:absolute;z-index:50;top:calc(100% + 8px);left:0;width:min(330px,76vw);
  background:#f3ead4;border:1px solid var(--gold);border-radius:5px;padding:12px 14px;
  box-shadow:0 12px 30px rgba(0,0,0,.5);text-transform:none;letter-spacing:normal;
  font-family:'EB Garamond',serif;cursor:auto;}
.am-info-pop .arr{position:absolute;bottom:100%;left:14px;width:0;height:0;
  border:7px solid transparent;border-bottom-color:var(--gold);}
.am-info-pop h4{margin:0 0 5px;font-family:'Cormorant Garamond';font-size:18px;color:var(--rubric);
  font-weight:700;text-transform:none;letter-spacing:.3px;}
.am-info-pop p{margin:0;font-size:14px;line-height:1.5;color:var(--txt-soft);font-weight:400;}

/* Primer / how-to-play */
.am-guide{max-width:780px;}
.am-lead{font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.5;color:var(--txt);
  font-style:italic;margin:6px 0 16px;}
.am-guide h3{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;color:var(--rubric);
  margin:24px 0 6px;letter-spacing:.3px;}
.am-guide p{font-size:15.5px;line-height:1.6;color:var(--txt-soft);margin:0 0 10px;}
.am-guide p b,.am-guide li b{color:var(--txt);font-weight:700;}
.am-guide ul,.am-guide ol{margin:0 0 10px;padding-left:20px;color:var(--txt-soft);
  font-size:15.5px;line-height:1.6;}
.am-guide li{margin:5px 0;}
.am-roles{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin:8px 0 4px;}
.am-role{background:rgba(255,255,255,.42);border:1px solid var(--line-soft);border-left:4px solid var(--lapis);
  border-radius:3px;padding:10px 12px;}
.am-role b{font-family:'Cormorant Garamond';font-weight:700;font-size:17px;color:var(--txt);display:block;}
.am-role span{font-size:13.5px;color:var(--txt-soft);line-height:1.45;}
.am-callout{background:rgba(42,74,156,.08);border:1px solid var(--lapis);border-radius:4px;
  padding:12px 14px;margin:10px 0 12px;}
.am-callout .eq{font-family:'Cormorant Garamond';font-weight:700;font-size:18px;color:var(--lapis);line-height:1.4;}
.am-callout .nb{font-size:13.5px;color:var(--txt-soft);margin-top:5px;line-height:1.5;}
.am-rules-cta{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-top:24px;
  border-top:1px dashed var(--line-soft);padding-top:16px;}
.am-rules-cta a{display:inline-block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;
  background:var(--lapis);border:1px solid #1d356f;color:#f3ecd8;border-radius:3px;padding:9px 18px;
  text-decoration:none;transition:.16s;}
.am-rules-cta a:hover{background:var(--lapis-bright);}
.am-rules-cta .hint{font-size:13.5px;color:var(--txt-soft);font-style:italic;flex:1;min-width:200px;}
@media (prefers-reduced-motion: reduce){.am-die.rolling{animation:none;} .am-card:hover{transform:none;}}
