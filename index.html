tionWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"334","description":["You hang a small cape of raven feathers on your back and transform into a raven. You can resume human form at will, but doing so ends the spell."],"flavour":"","base":"20","modifiers":["+2 Sun"]},{"id":116,"name":"Curse of Circe","level":"30","technique":"Muto","form":"Corpus","requisites":[{"art":"Animal","free":false}],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"334","description":["Turns a person into a pig."],"flavour":"","base":"10","modifiers":["+2 Voice","+2 Sun"]},{"id":117,"name":"Stance of the Patient Tree","level":"35","technique":"Muto","form":"Corpus","requisites":[{"art":"Herbam","free":false}],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["You turn yourself into a tree about 12 feet high, with a trunk about a foot thick. You can sense only the most basic things, such as night and day, strong winds, and things that can affect a tree. You can resume human form at will, but doing so ends the spell. While in tree form, you do not heal any wounds or restore any Fatigue levels. The tree branch you use to let yourself change back determines the kind of tree you become, and you cannot cast the spell without the branch."],"flavour":"","base":"25","modifiers":["+2 Sun"]},{"id":118,"name":"Cloak of Mist","level":"40","technique":"Muto","form":"Corpus","requisites":[{"art":"Auram","free":false}],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["You turn yourself into a thick, cohesive mist of approximately human size. You can float through the air at walking speed and can see and hear what is going on around you. You can also seep through cracks, but cannot move through solid objects. You may return to human form at any time, but doing so ends the spell. As mist, you are subject to the forces of the wind. In order to cast this spell, you inhale some mist, and you keep the mist in your 'mouth' until you want to end the spell."],"flavour":"","base":"30","modifiers":["+2 Sun"]},{"id":119,"name":"Transform to Water","level":"40","technique":"Muto","form":"Corpus","requisites":[{"art":"Aquam","free":false}],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["You turn yourself into water, one pint for every pound of the your weight. As water, you can hold yourself together unless someone makes an effort to separate part of you from the rest. You can roll slowly across the ground, but cannot move uphill. You can hear sounds, feel things that touch you, and can sense temperature. You can resume human form at will, but doing so ends the spell. You cannot resume human form if a significant part of your body/water is separated from the rest. You pour a small amount of water into your hands when you cast the spell."],"flavour":"","base":"30","modifiers":["+2 Sun"]},{"id":120,"name":"The Silent Vigil","level":"45","technique":"Muto","form":"Corpus","requisites":[{"art":"Terram","free":false}],"range":"Personal","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["You can move into and become part of a rock formation that is at least twice your size. While in the stone, you can hear what is going on around you, but you cannot use other senses. The spell lasts until you come out, and you must come out where you went in. You have no need for food or drink, though you do age. Rolls to recover from Fatigue or wounds take twice as long to make while you are in the stone. Casting requisites are required for items you take with you into the stone."],"flavour":"","base":"25","modifiers":["+3 Moon","+1 for special effect"]},{"id":121,"name":"Mists of Change","level":"60","technique":"Muto","form":"Corpus","requisites":[{"art":"Animal","free":false}],"range":"Voice","duration":"Sun","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"335","description":["As this spell is cast, a whipping wind arises and patches of mist begin to roll across the landscape. Sometimes, a patch of mist suddenly envelops a person for a few seconds, during which time the victim cannot move. When the mist blows away, continuing its course, the person is left transformed into a random creature. Roll a simple die to determine the result:"],"flavour":"","base":"10","modifiers":["+2 Voice","+4 Year","+4 Bound"]},{"id":122,"name":"Touch of the Goose Feather","level":"5","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["The target lets out a loud sneeze. Spellcasters who sneeze must make Intelligence + Concentration stress rolls against an Ease Factor of 12 to maintain concentration, and others get –1 on most activities at the moment of the sneeze."],"flavour":"","base":"3","modifiers":["+2 Voice"]},{"id":123,"name":"Dust to Dust","level":"15","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["Turns a dead body or mindless undead body to dust in two rounds. The spell doesn't affect those undead possessed by spirits. To do this to an animal corpse requires a Perdo Animal spell."],"flavour":"","base":"5","modifiers":["+2 Voice"]},{"id":124,"name":"The Wound That Weeps","level":"15","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"335","description":["When casting this spell, you point at the victim and a large wound opens on his or her body. The wound is not a deep one, but it bleeds profusely. This is only a Light Wound, but it looks bad."],"flavour":"","base":"5","modifiers":["+2 Voice"]},{"id":125,"name":"Invocation of Weariness","level":"20","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["The target loses a Fatigue level. The phrases used with this spell are usually singsong melodies, which lull the victim into drowsiness."],"flavour":"","base":"10","modifiers":["+2 Voice"]},{"id":126,"name":"Bane of the Decrepit Body","level":"25","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["The target ages 5 years. Determine effects normally. This spell does not work on children younger than age 16."],"flavour":"","base":"15","modifiers":["+2 Voice"]},{"id":127,"name":"Curse of the Leprous Flesh","level":"25","technique":"Perdo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["This spell inflicts leprosy on the target, which causes a person's flesh to rot off in a matter of weeks a truly hideous sight. Much of the target's flesh literally hangs from his or her frame, and there is a pungent rotting smell about him at all times. The target takes an Incapacitating Wound from the disease, and must roll as normal to recover. The target also loses a point of Stamina by the time the disease ends. If the victim somehow survives this curse, he is shunned by mundane communities. If the victim succeeds in a Stamina roll against an Ease Factor of 6 when the spell is cast, he shakes off the disease, although he still feels unwell for a few days, and may have problems if an astute doctor realizes he is leprous."],"flavour":"","base":"20","modifiers":["+1 Touch"]},{"id":128,"name":"Grip of the Choking Hand","level":"25","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["The target feels an invisible, strangling hand on the throat. Each round, the target loses a Fatigue level. Once the target falls unconscious, the spell has no further effect. The spell works by seriously constricting the target's windpipe, hence the feeling. This constriction is not quite enough to kill, however."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Conc"]},{"id":129,"name":"Incantation of the Milky Eyes","level":"30","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["Blinds a target, leaving the eyes milky with cataracts. This heals as a Heavy Wound."],"flavour":"","base":"20","modifiers":["+2 Voice"]},{"id":130,"name":"Twist of the Tongue","level":"30","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["Twists the target's tongue into a spiral, completely destroying the ability to speak. A grave offense to a magus. The damage heals as a Medium Wound."],"flavour":"","base":"15","modifiers":["+2 Voice","+1 Part"]},{"id":131,"name":"Clenching Grasp of the Crushed Heart","level":"40","technique":"Perdo","form":"Corpus","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["When casting this spell, you make a clenching motion with your hand. The victim doubles over and dies at once."],"flavour":"","base":"30","modifiers":["+2 Voice"]},{"id":132,"name":"The Kiss of Death","level":"45","technique":"Perdo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"336","description":["The person you kiss dies a sudden death. The only mark on the corpse is the black imprint of your lips. You do not need to speak when casting this spell, and thus gain no penalty from silence. (This is why the spell is higher level than the guidelines would indicate.)"],"flavour":"","base":"30","modifiers":["+1 Touch","+2 for no words"]},{"id":133,"name":"Curse of the Unportended Plague","level":"55","technique":"Perdo","form":"Corpus","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"337","description":["Starts a plague in a city or other Boundary. Everyone within the boundary is afflicted with the disease when the ritual is complete, and suffers as described under Curse of the Leprous Flesh, on the previous page. The conditions causing the disease last but a moment, so people entering the area after the spell is cast are safe. Using, or even transcribing, this spell is rigorously discouraged by most of the Order of Hermes. (Note: the disease caused by this spell is not the later Bubonic Plague, which is unknown in Europe in 1220.)"],"flavour":"","base":"20","modifiers":["+3 Sight","+4 Bound"]},{"id":134,"name":"Curse of the Unruly Tongue","level":"5","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"337","description":["Causes the target to stutter and slur words. Communication rolls are at -3. Spoken spells are at -6 to the spellcasting roll, and there is an extra botch die."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Conc"]},{"id":135,"name":"Spasms of the Uncontrolled Hand","level":"5","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"337","description":["One of the target's hands spasms, causing him to drop anything he is holding in it. It keeps spasming for as long as you concentrate."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Conc"]},{"id":136,"name":"Rise of the Feathery Body","level":"10","technique":"Rego","form":"Corpus","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"337","description":["Allows the target to float vertically to any height, carrying up to 50 pounds, and rising as fast as smoke rises, slower if carrying a heavy load. The target cannot move horizontally through this spell."],"flavour":"","base":"4","modifiers":["+1 Touch","+1 Conc"]},{"id":137,"name":"Despair of the Quivering Manacles","level":"15","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"337","description":["Your target shakes vigorously from side to side without falling. Those affected get -3 on rolls requiring physical movement, and -1 to most other rolls."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Conc"]},{"id":138,"name":"Endurance of the Berserkers","level":"15","technique":"Rego","form":"Corpus","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Your body acts as though it were unwounded and unfatigued for as long as you concentrate. Keep track of the actual Fatigue levels that the body loses while \"berserk,\" because as soon as the spell wears off, you lose those levels. If you run out of Fatigue levels, the spell terminates immediately and you fall unconscious. A character under the influence of this spell does risk worsening wounds, but he may not notice."],"flavour":"","base":"10","modifiers":["+1 Conc"]},{"id":139,"name":"Gift of the Frog's Legs","level":"15","technique":"Rego","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Allows the target to leap up to 15 feet vertically or 25 feet horizontally (2 feet less for every Encumbrance point). The person must make a Dexterity - Encumbrance stress roll against an Ease Factor of 0 to land without injury. A miss indicates that he takes a Light Wound, and a botch indicates a Medium Wound. The target can only leap once for each casting of the spell, and that leap must be made within ten seconds. As with a frog's leap, a running start does not improve the leap."],"flavour":"","base":"10","modifiers":["+1 Touch."]},{"id":140,"name":"Lifting the Dangling Puppet","level":"15","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Lifts a person of Size +1 or less vertically into the air. Generally, you can make the target rise or descend as fast as smoke rises, but a heavier person rises more slowly and falls more quickly."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Conc"]},{"id":141,"name":"The Gift of Vigor","level":"20","technique":"Rego","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Transfers bodily energy from you to any target who is at a lower Fatigue level than you. You are thus at the target's current Fatigue level, and he or she assumes your previous level. If you lose a Fatigue level from casting this spell, the loss comes after the transfer. Magi have long looked for a way to restore their energy in order to cast more spells. This is the closest they've come."],"flavour":"","base":"15","modifiers":["+1 Touch"]},{"id":142,"name":"Awaken the Slumbering Corpse","level":"25","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Causes a corpse to function at your verbal command. Commands have to be very simple, like \"attack anyone who comes through here.\" The corpse used cannot have been buried by Church ceremony."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Conc"]},{"id":143,"name":"Strings of the Unwilling Marionette","level":"25","technique":"Rego","form":"Corpus","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["You can control the physical movements of a person, such as walking, standing, and turning. If the target resists the control, the movements are jerky. The target can yell, but you can prevent intelligible speech by controlling the target's mouth. The target must be conscious to be moved about."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Conc"]},{"id":144,"name":"Seven-league Stride","level":"30","technique":"Rego","form":"Corpus","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Transports you to any place within seven leagues either that you can see or that you have an Arcane Connection with. If you fail an Intelligence + Finesse stress roll against an Ease Factor of 9, your arrival goes slightly awry. For instance, you might fall when you appear, or just be facing the wrong way. A botch means you appear in the wrong place, perhaps even in a wall. Praefactus of Bonisagus's version of this spell always allows him to appear in a safe, unembarrassing place (assuming he doesn't fail his Finesse roll). All Praefactus's spells make him seem as dignified as possible - manifesting his wizard's sigil."],"flavour":"","base":"30","modifiers":[]},{"id":145,"name":"The Leap of Homecoming","level":"35","technique":"Rego","form":"Corpus","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"338","description":["Transports you to any place to which you have an Arcane Connection. Most magi use this to return to their laboratories."],"flavour":"","base":"35","modifiers":[]},{"id":146,"name":"The Walking Corpse","level":"35","technique":"Rego","form":"Corpus","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"339","description":["Turns a corpse into a nearly mindless servant that can follow your simple verbal commands faithfully but unimaginatively. Unless the corpse is preserved with *Charm Against Putrefaction* or the equivalent, the body decays normally, but even a skeleton can be animated."],"flavour":"","base":"10","modifiers":["+1 Touch","+4 Year"]},{"id":147,"name":"Conjure the Sturdy Vine","level":"5","technique":"Creo","form":"Herbam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"339","description":["Grows 10 paces of vine from a moderate quantity of wood, or from fertile soil. The vine is extremely strong and pliable, suitable for use as rope."],"flavour":"","base":"1","modifiers":["+2 Voice","+2 Sun"]},{"id":148,"name":"Trap of the Entwining Vines","level":"15","technique":"Creo","form":"Herbam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"339","description":["Causes strong, woody vines to grow rapidly from fertile earth. The vines cover a circle 2 paces across and reach 6 feet high. Anything caught within them is immobilized. To avoid the vines, the target must make a Quickness — Encumbrance stress roll against an Ease Factor of 9. To break out requires a Strength stress roll against an Ease Factor of 12 (allowed once a round). Someone not trapped can cut a trapped person free in two rounds, assuming proper tools. The vines weaken and wither to dust at sunrise or sunset."],"flavour":"","base":"1","modifiers":["+2 Voice","+2 Sun","+2 Group"]},{"id":149,"name":"Bridge of Wood","level":"20","technique":"Creo","form":"Herbam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"339","description":["Creates a bridge made from living leaves, vines, and wood. The bridge can reach up to 20 paces, and is five paces wide. It is sturdy enough to support creatures of up to Size +4."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+2 size"]},{"id":150,"name":"Wall of Thorns","level":"20","technique":"Creo","form":"Herbam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"339","description":["Within seconds, this spell creates a straight wall of woody, thorny bushes up to 20 paces long, 1 pace thick, and 4 paces high. The thorns, which are unnaturally resilient, have a +15 Soak, are cut by edged weapons only, and cutting through requires inflicting a Heavy Wound. Bodily forcing one's way through the wall requires a Strength stress roll against an Ease Factor of 9 and does +15 damage whether the attempt succeeds or fails. If the roll botches, an additional 5 points of damage are suffered. The wall grows out of existing bushes or fertile soil. A Dexterity + Athletics stress roll against an Ease Factor of 9 allows a character to scale the wall, but the character takes +10 damage in the process."],"flavour":"","base":"1","modifiers":["+2 Voice","+2 Sun","+2 Group","+1 size"]},{"id":151,"name":"Wall of Living Wood","level":"25","technique":"Creo","form":"Herbam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"339","description":["A straight wall of living oak is created, growing quickly from nearby trees, other plant growth, or fertile earth. The wall is 20 paces long, 1 pace thick, and 5 paces high. It can be scaled with a Dexterity + Athletics stress roll against an Ease Factor of 9."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+2 size"]},{"id":152,"name":"The Bountiful Feast","level":"35","technique":"Creo","form":"Herbam","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Special","ritual":true,"type":"standard","source":"ArM5 Core","page":"339","description":["This ritual, which must be cast at noon on the day after the winter solstice, attempts to ensure that all crops that grow within its target will be healthy and fruitful. The spell protects against non-magical blight and other diseases. It can't control the weather or prevent others from harming crops, but it does cause crops to be healthier, larger, and tastier than they otherwise would be. The target of this spell is the fields owned by those present at the ritual. The spell must be cast within the region affected by the spell, although that region need not be contiguous. Although food plants are affected most by this ritual, all plants are made healthier to some degree."],"flavour":"","base":"1","modifiers":["+1 Touch","+4 Year","+4 Special (equivalent to Boundary)","+1 Size (for a total of +4 Size","+3 from the guideline"]},{"id":153,"name":"Probe Nature's Hidden Lore","level":"4","technique":"Intellego","form":"Herbam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["Tells you what kind of plant you are touching. You also get an image of it in its natural habitat. Works with plant products as well as with plants themselves."],"flavour":"","base":"3","modifiers":["+1 Touch"]},{"id":154,"name":"Hunt for the Wild Herb","level":"5","technique":"Intellego","form":"Herbam","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Smell","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["When you cast this spell, you can smell one sort of plant, and follow the scent, as long as you continue to concentrate. You must have a sample of the type of plant you are looking for. A Perception stress roll against an Ease Factor of 6 is needed to follow the scent. If there is no plant of the relevant type fairly close by (close enough to smell), you smell nothing, although the spell still works."],"flavour":"","base":"2","modifiers":["+1 Conc","+2 Smell"]},{"id":155,"name":"Intuition of the Forest","level":"10","technique":"Intellego","form":"Herbam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["You engage in a type of communion with the woods that you are in, giving you an intuitive sense of how to get along in the forest, and how to get the most out of the forest without causing it harm. You get a +3 to all nature-oriented rolls (not including spells) when in a forest or similar area. Causing significant harm to the forest cancels this spell."],"flavour":"","base":"1","modifiers":["+1 Touch","+2 Sun","+2 Group"]},{"id":156,"name":"Shriek of the Impending Shafts","level":"15","technique":"Intellego","form":"Herbam","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Hearing","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["Lets you know where anything wooden will be in the immediate future by a shriek that sounds in the air in advance of the wood's coming. A piece of wood that is controlled may change course, so the spell is sometimes wrong. You get a +9 bonus on Defense scores against wooden weapons (provided that you have the freedom to dodge), and you can automatically dodge wooden missiles fired from more than ten paces away. The shriek is only audible to you, and it cannot be simulated by people making noises."],"flavour":"","base":"2","modifiers":["+2 Sun","+3 Hearing"]},{"id":157,"name":"Converse with Plant and Tree","level":"25","technique":"Intellego","form":"Herbam","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["You can speak with a plant for one conversation. The level of conversation depends on the type of plants; longer-lived and more noble plants have more to say. A single question and response takes ten to thirty minutes, with slower-growing plants speaking more slowly. Typically, plants can talk about the soil and about other plants around them, but have limited awareness of more momentary events, such as the passing of animals or people, unless that passing has a direct bearing on the plant (for example, a person cut its trunk). News can spread quickly through a forest when it has to, called from tree to tree on the wind. Bystanders cannot understand your conversation."],"flavour":"","base":"15","modifiers":["+1 Touch","+1 Conc"]},{"id":158,"name":"Pass the Unyielding Portal","level":"5","technique":"Muto","form":"Herbam","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"340","description":["Makes the wood of a door pliable, allowing the magus to bend it open regardless of most locks or bars."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Diameter"]},{"id":159,"name":"Transformation of the Thorny Staff","level":"10","technique":"Muto","form":"Herbam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Causes a length of wood (up to 6 feet in length) to grow thick, sharp thorns at whatever spots you touch. If the spell is cast on a staff, the thorns add +4 to the damage done by the staff."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun"]},{"id":160,"name":"Piercing Shaft of Wood","level":"10","technique":"Muto","form":"Herbam","requisites":[{"art":"Rego","free":false}],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Turns a piece of wood into a sleek, barbed, strong shaft that flies through the air at a target. Damage depends on the size of the item from which the shaft is formed: staff (upper size limit) +10, 2-foot branch +8, wand +5. This spell cannot miss, but it is resisted."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Rego effect"]},{"id":161,"name":"Rope of Bronze","level":"15","technique":"Muto","form":"Herbam","requisites":[{"art":"Terram","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Turns a piece of rope (made from plant material) into refined, superior bronze, which does not break under normal circumstances."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":162,"name":"Thaumaturgical Transformation of Plants to Iron","level":"20","technique":"Muto","form":"Herbam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Makes any plant, dead or alive, as hard as iron. Affects any amount of continuous plant material up to the size of a small tree. Sharp-edged plants can become deadly when they are made this hard."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+1 size"]},{"id":163,"name":"Stir the Slumbering Tree","level":"25","technique":"Muto","form":"Herbam","requisites":[{"art":"Mentem","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Raises any tree into a state of consciousness resembling that of a human. Such a tree can see and hear what is going on around it, and at a normal human level of perception. Such a tree may share some mental attributes or personality traits with the caster. The tree can rearrange its branches over the course of several hours, though too slowly for people to observe the movement from second to second. Most trees in magical areas are already awake."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+2 size"]},{"id":164,"name":"Curse of the Haunted Forest","level":"60","technique":"Muto","form":"Herbam","requisites":[{"art":"Perdo","free":false}],"range":"Touch","duration":"Year","durationWhile":"","target":"Group","ritual":true,"type":"standard","source":"ArM5 Core","page":"341","description":["Turns a previously normal small forest into a haunted and dangerous place. The trees become gnarled and hideous, and the imaginative can see menacing faces in them. The trees also become conscious and cruel; capable of sight, hearing, and limited movement. While they cannot uproot themselves, they can move their branches about, and can reach the ground in an hour or two. Only ill-tempered animals, such as boars and crows, live in these woods, and nothing in them is edible. The only knowledge of what might happen should this ritual be attempted in a faerie forest comes from ancient and disputed legends of the Order of Hermes."],"flavour":"","base":"4","modifiers":["+1 Touch","+4 Year","+2 Group","+5 size"]},{"id":165,"name":"Curse of the Rotted Wood","level":"5","technique":"Perdo","form":"Herbam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Causes a non-living wooden object to rot and fall apart. Objects up to the size of a single door can be affected, but things that size take up to two rounds to decay. Usually, large chunks of wood start falling off the target, and slowly crumble to smaller and smaller pieces, until only dust is left. Ferramentum of Verditius's version of this spell is very orderly as per his wizard's sigil. The decay of the object starts from the top and continues to the bottom, leaving only dust as it goes."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":166,"name":"Wizard's Autumn","level":"15","technique":"Perdo","form":"Herbam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["All the deciduous leaves (that is, those that normally fall in autumn) on the target plants turn brown and then fall to the ground. The full process takes a minute. This spell can affect a small grove of trees. The trees do not bud again until the next spring."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Group","+2 size"]},{"id":167,"name":"Plant's Withering Bane","level":"20","technique":"Perdo","form":"Herbam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Withers and destroys one living plant, up to and including a plant the size of a small tree."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 size"]},{"id":168,"name":"The Great Rot","level":"25","technique":"Perdo","form":"Herbam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"341","description":["Rots and destroys a large amount of dead wood, up to the amount found in a wooden house or small inn. Wooden structures creak and groan mightily for about a minute before collapsing."],"flavour":"","base":"4","modifiers":["+2 Voice","+2 Group","+1 size"]},{"id":169,"name":"Treading the Ashen Path","level":"30","technique":"Perdo","form":"Herbam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["As you walk through a forest after casting this spell, all the plant material 10 paces in front of you and 5 paces to either side withers and dies. Trees are reduced to bare trunks, while their leaves and all smaller plants turn to ash. You can walk for 7 miles with each casting of this spell. Use of this spell in faerie woods is not recommended. This spell was originally invented by a magus of House Flambeau, and he was awarded a prize for it by his primus."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Group","+3 size","+1 fancy effect (the spell effectively keeps being cast while the caster walks seven miles"]},{"id":170,"name":"Ward against Faeries of the Wood","level":"General","technique":"Rego","form":"Herbam","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"342","description":["Like Ward Against Faeries of the Waters (ReAq Gen), but for faeries of the wood. At some angles, at night, the ring appears to be a green-hued dome."],"flavour":"","base":"","modifiers":[]},{"id":171,"name":"Dance of the Staves","level":"5","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["Causes a pole, staff, haft, or any other long, thin, non-living wooden object to bend and lash about wildly for a few seconds and then stop suddenly. A whirling staff strikes its holder and does +4 Damage, with a possible bonus if the weapon at the head of the pole hits the person."],"flavour":"","base":"3","modifiers":["+2 Voice"]},{"id":172,"name":"Repel the Wooden Shafts","level":"10","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["Deflects a single blow of any weapon made of wood, up to the size of a twohanded club. The attack automatically misses, but the attacker still rolls to see if he or she botches (with two extra botch rolls for melee weapons). If you ordinarily carry a wooden staff, it must be tossed aside for the casting."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":173,"name":"Strike of the Angered Branch","level":"15","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["Causes a large tree branch to swing at a target. The branch's Attack score is equal to your Perception + Finesse. Damage is +10. You may strike repeatedly with the branch, striking once per round for as long as the spell lasts."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc","+1 Part"]},{"id":174,"name":"Tangle of Wood and Thorns","level":"15","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["Takes a length of wood that you designate and hurls it at a target (a Targeting roll is required). The wood wraps around and immobilizes the target (assuming that there is enough wood), who must make a Strength stress roll against an Ease Factor of 9 to break free (one attempt per round). If the victim ever botches, he cannot escape without outside help. If the length of wood has thorns, it does +6 damage when it hits, and again each time the target tries to break free, whether successful or not. When the caster stops concentrating, the target can escape on a Strength roll against an Ease Factor of 6."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc","+1 Muto requisite"]},{"id":175,"name":"Coils of the Entangling Plants","level":"20","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"342","description":["Animates all the grass and small plants within a field delineated from side to side by your outstretched arms and in front by no more than 15 paces of distance. The plants grab and wrap themselves around the people nearest to them (Strength stress roll of 9+ to break free, rolled once per minute). If a roll to break free ever botches, the victim cannot escape on his or her own. With a Concentration roll of 6+, you can release one individual a round."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc","+2 Group"]},{"id":176,"name":"Lord of the Trees","level":"25","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["Causes a tree to move its branches and bend its trunk in any way you mentally direct. A large tree striking with branches has Initiative +5, Attack +7, and Damage +10. Normal weapons are practically useless against large trees."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Conc","+2 size"]},{"id":177,"name":"The Treacherous Spear","level":"25","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["This spell animates a wooden or wooden-hafted melee weapon in someone else's hand, and makes that weapon attack its holder until the wielder is dead or the weapon is destroyed. When the spell is cast, the weapon tries to break its wielder's hold (Quickness – Encumbrance stress roll against an Ease Factor of 9 to hang on). On subsequent rounds, the wielder hangs on by making Strength stress rolls against an Ease Factor of 6, allowed once per round. If a roll to hold on ever botches, the wielder loses control of the weapon and is hit by it automatically (see below). While still in its wielder's grip, the weapon does not strike him or her, but does not strike on the wielder's behalf either. Once the weapon breaks free or is released, it attacks its wielder, using his Attack and Damage scores. The former wielder may fight the rebellious weapon. The weapon uses its defense rating as its Defense total. It has no Soak, and is 'killed' after it takes a wound depending on its size. One-handed weapons must take a Medium Wound, while two-handed weapons must take a Heavy Wound. The damage of thrusting and missile weapons is halved when attacking the renegade weapon."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Diam"]},{"id":178,"name":"Twist the Living Tree","level":"25","technique":"Rego","form":"Herbam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["You make a living tree bend into unusual positions. Depending on your needs, you can make a cage, a shelter, or a wall. Even the leaves can be commanded, maybe to form a solid roof that sheds rain. Takes one to ten minutes to complete (depending on the complexity of the new shape), during which time you must maintain concentration."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+2 size"]},{"id":179,"name":"Ward against Wood","level":"25","technique":"Rego","form":"Herbam","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["The caster is protected from nonenchanted wood, so that none of it can contact his body. If he is walking on a wooden surface, he is actually suspended very slightly above it."],"flavour":"","base":"15","modifiers":["+2 Sun"]},{"id":180,"name":"Freeing the Striding Tree","level":"30","technique":"Rego","form":"Herbam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["Like Lord of the Trees, above, but the tree can walk half as fast as a human can. If you botch a Concentration roll to maintain control, the tree attacks you, having been awakened and disturbed by this spell."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Conc","+2 size"]},{"id":181,"name":"Calling the Council of the Trees","level":"45","technique":"Rego","form":"Herbam","requisites":[{"art":"Intellego","free":false}],"range":"Touch","duration":"Moon","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"343","description":["You call all magical and potentially mobile trees within the woodland where you cast the ritual to the site of the ritual. The trees are compelled to come, and will likely be interested in whoever has called them. The attitude of the trees depends on the forest and the nature of the one who called. Once gathered, the trees hold meetings, summon ancient powers, and discuss the problems facing their kind. You may speak, and understand what the trees are discussing. The results of the conference may not be entirely in your favor. The trees remain animated for a month and may seek to return home before the end of that period."],"flavour":"","base":"5","modifiers":["+1 Touch","+3 Moon","+4 Bound"]},{"id":182,"name":"Moonbeam","level":"3","technique":"Creo","form":"Ignem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["Causes a gentle light, bright enough to read by, to shine down from above and illuminate the area described by your encircled arms. Lasts as long as you hold your arms in a circle."],"flavour":"","base":"1","modifiers":["+1 Touch","+1 Conc"]},{"id":183,"name":"Palm of Flame","level":"5","technique":"Creo","form":"Ignem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["A flame leaps up in your palm, which must be upturned for the spell's duration. The flame casts light like a torch, and can ignite very flammable items. It does no damage, and does not burn the caster."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Conc"]},{"id":184,"name":"Heat of the Searing Forge","level":"10","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"343","description":["Heats a piece of metal so that it is too hot to touch. Something the size of a breastplate or helmet does +5 damage if in direct contact with the skin for one round. For each additional round, more damage is done, the amount dropping by two points each round (+3 damage on round two, then +1). Smaller objects do less damage. Most metal armor has leather or cloth underneath that gives the victim a +3 Soak bonus against the heat."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":185,"name":"Lamp without Flame","level":"10","technique":"Creo","form":"Ignem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["This spell creates a steady light as bright as daylight on a cloudy day. The light has no apparent source, but illuminates an area about ten paces across, centered on a point indicated by the caster. This point may be a mobile item."],"flavour":"","base":"4","modifiers":["+1 Touch","+1 Conc"]},{"id":186,"name":"Blade of the Virulent Flame","level":"15","technique":"Creo","form":"Ignem","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["Forms a fire along the length of a metal blade. This flame doubles the weapon damage score for the blade (or adds +5, whichever is greater), and can start fires as well. If the spell is cast repeatedly on the same blade, the blade gets hot enough to melt after half an hour, which ends the spell. Letting the blade cool for half an hour between castings avoids this."],"flavour":"","base":"5","modifiers":["+1 Touch","+1 Diameter"]},{"id":187,"name":"Flash of the Scarlet Flames","level":"15","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["A brilliant red flash explodes in the air where you designate. If you target a person's face the target needs a Stamina stress roll against an Ease Factor of 9 to avoid temporary blindness. If the target botches the roll, he is permanently blinded. If temporarily blinded, he can try to make a simple Stamina roll against an Ease Factor of 9 each minute to recover. The flash is equivalent to looking straight at the sun. In Rose of Jerbiton's version of this spell, there is a faint odor of roses in the area where the flash explodes."],"flavour":"","base":"5","modifiers":["+2 Voice"]},{"id":188,"name":"Pilum of Fire","level":"20","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["A 2-foot, thick, spear-shaped jet of fire flies from your palms, doing +15 damage to the individual it hits."],"flavour":"","base":"10","modifiers":["+2 Voice"]},{"id":189,"name":"Arc of Fiery Ribbons","level":"25","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["A dozen multi-hued ribbons of flame leap from your hands and fly out as far as your voice carries, covering a 60-degree arc. All those in the arc take +10 damage."],"flavour":"","base":"5","modifiers":["+2 Voice","+2 Group"]},{"id":190,"name":"Coat of Flame","level":"25","technique":"Creo","form":"Ignem","requisites":[{"art":"Rego","free":false}],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["The target is swathed in fire, and takes +5 damage every round while the spell is in effect. That is, the damage must be rolled against Soak twenty times during the spell. The Rego requisite ensures that the fire does not spread."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Diam","+1 Rego requisite"]},{"id":191,"name":"Ball of Abysmal Flame","level":"35","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["A ball of flame shoots from your hand to strike a single target, doing +30 damage. Marius of Tremere's version of the spell causes the ball to make a loud bang when it hits the target. His sigil is a gaudiness in his spells."],"flavour":"","base":"25","modifiers":["+2 Voice; the ball appearing to shoot from your hand is a cosmetic effect"]},{"id":192,"name":"Circle of Encompassing Flames","level":"35","technique":"Creo","form":"Ignem","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"344","description":["Creates a circle of flames 6 feet high. The circle begins at a 1-pace radius, but you can make it shrink to a pillar or grow to a 3-pace radius as you concentrate if you cast with a Rego requisite. Anyone moving through the flames takes +20 damage. You cannot move the center of the circle."],"flavour":"","base":"20","modifiers":["+2 Voice","+1 Conc"]},{"id":193,"name":"Tales of the Ashes","level":"5","technique":"Intellego","form":"Ignem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Lets you see what the ashes you touch originally were, and how and when the object was burned. The latter two are divined from markings and signs in the ashes."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Conc"]},{"id":194,"name":"Shadows of the Fires past","level":"15","technique":"Intellego","form":"Ignem","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Allows you to see where fires have been in the past lunar month. A light red flickering haze appears where the fire was, and you gain an intuitive sense of when the fire was there. This spell does not look into the past, but detects the traces of fire."],"flavour":"","base":"3","modifiers":["+4 Vision"]},{"id":195,"name":"Vision of Heat's Light","level":"20","technique":"Intellego","form":"Ignem","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Allows you to see the heat of objects that are of human body temperature or hotter. Excellent for use in the dark, but it doesn't give true vision. You can see well enough to use a weapon, even a missile weapon, without penalty, but recognizing people is very difficult."],"flavour":"","base":"2","modifiers":["+2 Sun","+4 Vision"]},{"id":196,"name":"Eyes of the Flame","level":"35","technique":"Intellego","form":"Ignem","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Lets you see a fire to which you have an Arcane Connection. You can also see all those things which the fire illuminates."],"flavour":"","base":"10","modifiers":["+4 Arc","+1 Conc"]},{"id":197,"name":"Words of the Flickering Flame","level":"35","technique":"Intellego","form":"Ignem","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Allows you to converse with a fire, commonly very chaotic and distractible. Promising a fire more fuel might keep its interest. Fires are mostly aware of what they've burned, but they have a limited awareness of what goes on around them as well."],"flavour":"","base":"20","modifiers":["+2 Voice","+1 Conc"]},{"id":198,"name":"The Many-hued Conflagration","level":"5","technique":"Muto","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Makes a fire burn brightly in shifting colors for an instant. Each being looking at the fire must make a Stamina stress roll against an Ease Factor of 6 or be blinded for one round by the multicolored lights."],"flavour":"","base":"3","modifiers":["+2 Voice"]},{"id":199,"name":"Show of the Flames and Smoke","level":"10","technique":"Muto","form":"Ignem","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Causes smoke of different colors, streams of flame, and strange popping and sizzling noises to come from a fire. The effect is so spectacular that onlookers are either entranced or horrified, depending on the circumstances. The pyrotechnics might ignite nearby flammable objects and cause minor burns to those within 2 paces of the fire."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc"]},{"id":200,"name":"Hornet Fire","level":"10","technique":"Muto","form":"Ignem","requisites":[{"art":"Rego","free":false}],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Turns a fire into a swarm of fireballs, each the size of a large insect, that fly and harass at your command. Their burning touch gives one person within range both a –3 penalty on all rolls and two extra botch dice, but they do not cause actual damage."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Conc","+1 Rego requisite"]},{"id":201,"name":"Prison of Flames","level":"20","technique":"Muto","form":"Ignem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"345","description":["Turns a bonfire into a prison shaped like a miniature castle. A person thrown into the middle is not burned, but takes +15 damage if he or she tries to escape."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+1 Size"]},{"id":202,"name":"Trapping the Fire","level":"25","technique":"Muto","form":"Ignem","requisites":[{"art":"Terram","free":false}],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["This spell turns the heat and flames of a large campfire into a small, very hard object, such as a gem or a piece of metal. If the object is broken, the flame returns, but dies if there is nothing to burn."],"flavour":"","base":"5","modifiers":["+2 Voice","+2 Sun"]},{"id":203,"name":"Flames of Sculpted Ice","level":"35","technique":"Muto","form":"Ignem","requisites":[{"art":"Aquam","free":false}],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Turns a fire up to the size of a small house into ice. The ice forms beautiful sculptures of leaping flame, until it begins to melt. When the ice has melted halfway, the flames start again, but probably won't spread, because of wet surroundings."],"flavour":"","base":"5","modifiers":["+2 Voice","+2 Sun","+2 size"]},{"id":204,"name":"Gloom of Evening","level":"10","technique":"Perdo","form":"Ignem","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["The level of light in the target room drops substantially, making the room gloomy, with deep shadows everywhere."],"flavour":"","base":"2","modifiers":["+1 Touch","+1 Diam","+2 Room"]},{"id":205,"name":"Winter's Icy Touch","level":"10","technique":"Perdo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Causes the target to feel a chill and lose body heat. The target loses a Fatigue level."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":206,"name":"Soothe the Raging Flames","level":"20","technique":"Perdo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Eradicates the heat of a bonfire, which, however, continues to burn until the fuel already covered in flame is consumed. The flames do not spread, or harm anything beyond what they were already burning. If the fire is extinguished and relit, it will burn hot again, as it is now a different fire."],"flavour":"","base":"10","modifiers":["+2 Voice"]},{"id":207,"name":"Well without Light","level":"25","technique":"Perdo","form":"Ignem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Structure","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Removes light from the target structure. Only spells greater than level 25 can create light within this area. When casting this spell, magi typically clench a hand into a fist, and the light flows into the fist like a living entity, until the entire area is dark."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+3 Str"]},{"id":208,"name":"Conjuration of the Indubitable Cold","level":"25","technique":"Perdo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Cools the air within ten paces of the target, leaving it slightly below freezing. All nonliving things are chilled thoroughly, not just on the surface. All living things (except you, if you cast with a Rego requisite) lose one Fatigue level. House fires become as small as campfires, bonfires become as small as torch fires, and campfires and smaller fires go out."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Part","+2 size"]},{"id":209,"name":"Wizard's Icy Grip","level":"30","technique":"Perdo","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"346","description":["Chills a single target so that it takes +20 damage. If this is enough to kill, the target is frozen solid. Armor does not add to Soak against this spell."],"flavour":"","base":"20","modifiers":["+2 Voice"]},{"id":210,"name":"Wizard's Eclipse","level":"35","technique":"Perdo","form":"Ignem","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"346","description":["The sun is eclipsed within the target area, making it as dark as night. The darkness begins very suddenly — the superstitious are likely to panic, especially if they see that there is normal daylight just beyond the boundary of the spell."],"flavour":"","base":"2","modifiers":["+1 Touch","+1 Diam","+4 Bound","+3 size"]},{"id":211,"name":"Tremulous Vault of the Torch's Flame","level":"5","technique":"Rego","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"347","description":["Causes a fire to guiver a few seconds and then make a leap of up to 10 feet in any direction. A Targeting roll is required to hit a specific target. The flame stays at the spot it hits if it can burn there (see rules for fire damage on page 407). Otherwise, it simply scorches the spot and goes out (doing +5 damage)."],"flavour":"","base":"3","modifiers":["+2 Voice"]},{"id":212,"name":"Leap of the Fire","level":"10","technique":"Rego","form":"Ignem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"347","description":["Causes a bonfire to make a leap of up to 10 paces in any direction, where it catches if there is fuel, or burns out if there is none. Make a Targeting roll to hit a target; the flames do +10 damage."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 size"]},{"id":213,"name":"Light Shaft of the Night","level":"20","technique":"Rego","form":"Ignem","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"347","description":["Collects moonbeams and starlight into a single vertical shaft of soft, silvery light that moves under your control. It illuminates an area 15 paces across with light nearly equal to sunlight (if the moon is out) or moonlight (if the moon is not out). If the sky is overcast, the spell does not work. Can only be cast under the night sky."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc","+2 Group"]},{"id":214,"name":"Burst of the Sweeping Flames","level":"25","technique":"Rego","form":"Ignem","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"347","description":["This spell causes a fire to explode outwards from its source along the ground, as if a giant wind were blowing on it from above. The fire travels for no more than 10 paces, but it ferociously ignites anything in its path. The original fire is left dead, but in all probability a number of new fires will be started. The flames cause +5 to +15 damage, depending on the intensity of the original fire."],"flavour":"","base":"10","modifiers":["+ 2 magnitudes for the intensity of the fire)","+3 Sight"]},{"id":215,"name":"Ward against Heat and Flames","level":"25","technique":"Rego","form":"Ignem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"347","description":["Keeps heat and fire at bay, unable to approach within a couple of inches of the target. This renders the target immune to damage from flames or heat of intensity less than that of molten iron. The target gets a +15 Soak against all fire-related damage. Any fire doing less than +15 damage per round doesn't penetrate the ward. Such fires simply dim at the protected person's passing and flare back up after he or she is gone."],"flavour":"","base":"4","modifiers":["+2 for up to +15 damage","+1Touch","+2 Sun"]},{"id":216,"name":"Phantasm of the Talking Head","level":"10","technique":"Creo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"348","description":["Creates an illusory face on a wall or other flat object. The visage can speak during the spell's duration. Individual wizards' sigils can produce very interesting differences in how the voice sounds, how the face looks, and so on."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Diam","+1 intelligible speech"]},{"id":217,"name":"Phantasmal Animal","level":"20","technique":"Creo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"348","description":["Creates an image of any animal or beast up to the size of a pony (Size +1). Under your direct mental command, it moves about (within range) and makes appropriate noises. You need to be able to concentrate, and be within range, whenever you wish to direct the illusion to move in some manner. If you move out of range or stop concentrating, the illusion just freezes in place. The image does smell like an animal, but it has absolutely no effect on the sense of touch. Of course, a magus may not use this spell to create the image of an animal he or she does not know exists."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Diam","+2 move under your command"]},{"id":218,"name":"Phantasmal Fire","level":"20","technique":"Creo","form":"Imaginem","requisites":[{"art":"Ignem","free":false}],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"348","description":["Makes an image of a fire (up to the size of a large campfire) that dances, illuminates, crackles, and (apparently) warms. It does not spread, burn, or protect against cold. Makes a great joke at gatherings of House Flambeau, although creating a real fire is even more popular."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+1 for light from Ignem requisite"]},{"id":219,"name":"Phantasm of the Human Form","level":"25","technique":"Creo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"348","description":["Makes an image of a clothed and equipped person that can make noise. Under your direct, unspoken command, the person can move about, speak, and behave as a human does."],"flavour":"","base":"2","modifiers":["+2 Voice","+2 Sun","+2 move at your command","+1 intricacy"]},{"id":220,"name":"Haunt of the Living Ghost","level":"35","technique":"Creo","form":"Imaginem","requisites":[{"art":"Intellego","free":false}],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"348","description":["With this spell, you can instantly project your own image and voice to any designated spot that you have an Arcane Connection to (though troupes may wish to limit this range to some absolute distance like 300 miles). You can see and hear through the image. The image must appear in some medium, such as a fire, mirror, or pool. Some magi use this spell to attend inter-covenant councils without traveling the intervening distance. Because other magi can see you, this spell is not held to constitute scrying by magic. Using it through another covenant's Aegis counts as showing off, however."],"flavour":"","base":"2","modifiers":["+4 Arc","+1 Conc","+2 move at your command","+1 intricacy","+1 Intellego requisite"]},{"id":221,"name":"The Shadow of Human Life","level":"40","technique":"Creo","form":"Imaginem","requisites":[{"art":"Mentem","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"349","description":["The human image created (as in Phantasm of the Human Form) has limited freedom and simulated intellect. It functions as an independent human, albeit a stupid one, capable of interpreting general orders in new situations."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Sun","+1 intricacy","+6 Mentem requisite"]},{"id":222,"name":"Discern the Images of Truth and Falsehood","level":"General","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"general","source":"ArM5 Core","page":"349","description":["You can tell whether an image has been created or altered through a spell, seeing both the original and false images in the case of alterations. This spell must be at least 1 magnitude higher than an illusion in order to discern it. If you botch the spell, you mistake illusions for the real thing and reality for illusion. Your discernment is not limited to visual illusions, although you can only tell that a sound is illusory if you are looking at the apparent source."],"flavour":"","base":"","modifiers":["+1 Conc"]},{"id":223,"name":"Prying Eyes","level":"5","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"349","description":["You can see inside a room, as long as you can touch one of its walls. If the room is unlit or poorly lit, you can only see as much as you could if you were inside, but magical enhancements of your senses do apply. You may change your viewpoint within the room throughout the duration of the spell."],"flavour":"","base":"1","modifiers":["+1 Touch","+1 Conc","+2 Room"]},{"id":224,"name":"Discern Own Illusions","level":"15","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"349","description":["This spell makes your own illusions appear largely transparent to you, but still discernible."],"flavour":"","base":"1","modifiers":["+2 Sun","+4 Vision"]},{"id":225,"name":"The Ear for Distant Voices","level":"20","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"349","description":["You can hear what is happening in the place you designate. You must have an Arcane Connection with the place or with a person there."],"flavour":"","base":"1","modifiers":["+4 Arc","+1 Conc","+2 Room"]},{"id":226,"name":"Eyes of the Eagle","level":"25","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"349","description":["You see distant things clearly. No matter how far away something is, you can make out details as if it were only a foot or so from you. Things do not all appear to be a foot away; you can simply make out details as well as if they were. You can still judge distance accurately; in fact, more accurately than normal, to within an inch or so at a distance of several miles, since you can see as clearly as if you were judging distance a foot away."],"flavour":"","base":"3","modifiers":["+2 Sun","+4 Vision"]},{"id":227,"name":"Summoning the Distant Image","level":"25","technique":"Intellego","form":"Imaginem","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["You can see and hear what is happening in a distant place if you have some sort of Arcane Connection to either the location or a person there."],"flavour":"","base":"2","modifiers":["+4 Arc","+1 Conc","+2 Room"]},{"id":228,"name":"Taste of the Spices and Herbs","level":"5","technique":"Muto","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["A setting's worth of food or drink tastes and smells exactly as you designate."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Sun"]},{"id":229,"name":"Aura of Ennobled Presence","level":"10","technique":"Muto","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["The target appears more forceful, authoritative, and believable. Numerous subtle changes in appearance bring about this change, including a slight supernatural illumination of the face, a more erect posture, and a louder and smoother voice. The character gets a +3 on rolls to influence, lead, or convince others."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun"]},{"id":230,"name":"Notes of a Delightful Sound","level":"10","technique":"Muto","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["Causes all sounds in a room, particularly music, to be especially clear and sonorous. The notes are clearer, sharper, and more distinct"],"flavour":"","base":"1","modifiers":["+1 Touch","+2 Sun","+2 Room"]},{"id":231,"name":"Disguise of the Transformed Image","level":"15","technique":"Muto","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["Makes someone look, sound, feel, and smell different, though at least passably human."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":232,"name":"Image Phantom","level":"20","technique":"Muto","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"350","description":["Any one thing, including a living thing, can be made to appear as if it were something else of approximately the same shape and size. The illusion cannot be cast on things that have a shape or size improper to the final appearance. If the target moves or is moved in such a way that the illusion is inappropriate, it looks very strange indeed."],"flavour":"","base":"5","modifiers":["+1 Touch","+2 Sun"]},{"id":233,"name":"Dispel the Phantom Image","level":"General","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"351","description":["Destroys the image from any one CrIm spell whose level you match or exceed on a stress die + the level of your spell."],"flavour":"","base":"","modifiers":[]},{"id":234,"name":"Taste of the Dulled Tongue","level":"5","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["Hides the taste of any substance, liquid or solid."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Sun"]},{"id":235,"name":"Illusion of Cool Flames","level":"10","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["A source of heat, such as a fire, seems to lose its heat and drop to the surrounding temperature. It still, however, has its normal beneficial and harmful effects (that is, glowing coals still cook meat or burn a person's hand, though they do not feel hot)."],"flavour":"","base":"2","modifiers":["+2 Voice","+2 Sun"]},{"id":236,"name":"Invisibility of the Standing Wizard","level":"15","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["The target becomes invisible, but the spell is broken if the target moves (aside from breathing and shifting slightly in place). He still casts a shadow."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":237,"name":"Veil of Invisibility","level":"20","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["The target becomes completely undetectable to normal sight, regardless of what it does, but still casts a shadow."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+1 changing image"]},{"id":238,"name":"Removal of the Conspicuous Sigil","level":"20","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["Grooves, runes, writings, and similar markings are obscured so that they are not visible, but the overall shape of the medium remains constant. For example, runes carved into a sword blade can be made invisible, making the sword appear normal."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+1 Part"]},{"id":239,"name":"Silence of the Smothered Sound","level":"20","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["Makes one being or object incapable of producing sound. Magi who cannot utter their magic words suffer the normal penalties to their spellcasting rolls."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+1 changing image"]},{"id":240,"name":"Chamber of Invisibility","level":"25","technique":"Perdo","form":"Imaginem","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"351","description":["Causes a Group of creatures to become invisible. Any affected character who moves or is touched makes everyone visible. All members of the Group still cast shadows."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+2 Group"]},{"id":241,"name":"Restore the Moved Image","level":"General","technique":"Rego","form":"Imaginem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"352","description":["Cancels a ReIm spell that moves an image, putting the image back where it belongs, as long as you can match the spell's level on a stress die + the level of your spell. This spell targets the image."],"flavour":"","base":"","modifiers":[]},{"id":242,"name":"Illusion of the Shifted Image","level":"10","technique":"Rego","form":"Imaginem","requisites":[],"range":"V
