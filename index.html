oice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"352","description":["Makes any person or object appear to be a pace away from its actual position. The image cannot be placed in a solid object. As soon as the original or image moves, the spell ends."],"flavour":"","base":"2","modifiers":["+2 Voice","+2 Sun"]},{"id":243,"name":"Wizard's Sidestep","level":"10","technique":"Rego","form":"Imaginem","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"352","description":["Your image appears up to 1 pace from where you actually are, so attacks aimed there are likely to miss you. Whenever the image is successfully struck, it disappears and reappears in another spot. In combat, early attacks are aimed at the image, and so automatically miss you. Once the image has been hit once, you have a +9 bonus to Defense, as attackers must try to find you in a fairly large area."],"flavour":"","base":"2","modifiers":["+2 Sun","+1 changing image","+1 moved image matches changes"]},{"id":244,"name":"The Captive Voice","level":"30","technique":"Rego","form":"Imaginem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"352","description":["Captures a person's voice and places it in a bag. The person may not speak unless the bag is open, in which case the voice comes from the bag, not the victim's mouth. If the victim screams while the bag is shut, the bag vibrates visibly."],"flavour":"","base":"4","modifiers":["+2 Voice","+2 Sun","+1 Part","+1 changing image"]},{"id":245,"name":"Confusion of the Insane Vibrations","level":"30","technique":"Rego","form":"Imaginem","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"352","description":["The target of the spell sees everything vibrate back and forth at varying high speeds. In addition, sounds are displaced and seem to come from the wrong areas. Anyone trying to fight in these circumstances suffers –3 on Attack and Defense scores, and must roll two extra botch dice. The target is likely to become desperate and terribly confused. Navigation is exceedingly difficult. The visual effects of this spell are negated if the target is in complete darkness or if they close their eyes."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Conc","+4 Vision","+1 additional senses"]},{"id":246,"name":"Image from the Wizard Torn","level":"35","technique":"Rego","form":"Imaginem","requisites":[{"art":"Intellego","free":false}],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"352","description":["Your image separates from your body. It can speak whatever you say and do so in your voice, and you can see through its eyes. You must make an Int + Concentration stress roll for each solid object the image passes through and for each mile it travels. If you wish the image to be able to leave your sight, you must use an Arcane Connection to yourself (for example, a fingernail or a lock of hair) when you cast the spell. That connection becomes an integral part of the image, and when the spell ends, it falls to the ground wherever the image was located. As your image is away from your body, you are invisible and silent at your actual location. The image is your image, so while you may move it in space you may not have it sit down if you are standing. Further, it appears as if illuminated by whatever light is falling on you, no matter what the level of illumination is at the image."],"flavour":"","base":"15","modifiers":["+1 Conc","+1 additional sense","+1 moving image","+1 Intellego requisite"]},{"id":247,"name":"Illusion of the Misplaced Castle","level":"50","technique":"Rego","form":"Imaginem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"352","description":["Moves the image of any bounded structure or set of structures the size of a castle or less up to one mile from its actual position."],"flavour":"","base":"10","modifiers":["+2 Voice","+2 Sun","+4 Bound"]},{"id":248,"name":"Words of the Unbroken Silence","level":"10","technique":"Creo","form":"Mentem","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Lets you say two words directly to the mind of a target. The target can recognize your voice and knows that the message is of supernatural origin."],"flavour":"","base":"3","modifiers":["+3 Sight"]},{"id":249,"name":"Panic of the Trembling Heart","level":"15","technique":"Creo","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Creates an overpowering fear in one person of a specific object, person, or place."],"flavour":"","base":"4","modifiers":["+1 Eye","+2 Sun"]},{"id":250,"name":"Rising Ire","level":"15","technique":"Creo","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Makes the target furious at someone or something of your choice. A stress roll against an Ease Factor of 9 using an appropriate Personality Trait (like Calm) can hold the anger in check, but it is felt strongly regardless of the roll."],"flavour":"","base":"4","modifiers":["+1 Eye","+2 Sun"]},{"id":251,"name":"Memory of the Distant Dream","level":"20","technique":"Creo","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Inserts a full and complete memory into a person's mind. If the target gives the memory some thought and concentration, and makes an Intelligence roll against an Ease Factor of 9, the memory is revealed as false. When the duration expires, the memory vanishes, although the subject may remember remembering it."],"flavour":"","base":"5","modifiers":["+1 Eye","+2 Sun"]},{"id":252,"name":"Pains of the Perpetual Worry","level":"20","technique":"Creo","form":"Mentem","requisites":[],"range":"Eye","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Gives someone a nagging, taunting, painful emotion — a recurrent sense of anxiety, a fear of something he or she does not know, a fear of everything, and a fear of nothing. To have this spell cast on you is truly a curse."],"flavour":"","base":"4","modifiers":["+1 Eye","+3 Moon"]},{"id":253,"name":"Weight of a Thousand Hells","level":"25","technique":"Creo","form":"Mentem","requisites":[],"range":"Eye","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"353","description":["Causes the victim to feel the despair, anguish, pain, and sorrow of a thousand sinners in Hell. This is a horrible spell, for the victim loses almost all motivation and earthly cares. All he can feel is his own pain – endless, inexorable, and searing. Appropriate Personality Trait rolls suffer a harmful adjustment of –5, and the target suffers –2 on any rolls that require thought or concentration. The target has a strong tendency to do nothing but brood."],"flavour":"","base":"4","modifiers":["+1 Eye","+3 Moon","+1 complex effect"]},{"id":254,"name":"Gift of Reason","level":"35","technique":"Creo","form":"Mentem","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"354","description":["Permanently increases the target's Intelligence by 1 point, to no higher than 0."],"flavour":"","base":"30","modifiers":["+1 Touch"]},{"id":255,"name":"Sight of the Transparent Motive","level":"10","technique":"Intellego","form":"Mentem","requisites":[],"range":"Eye","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["Detects the general motive most powerfully influencing the target at the moment. General motives are such things as fear, anger, and greed, not specific things like the desire to look good before one's superiors."],"flavour":"","base":"5","modifiers":["+1 Eye"]},{"id":256,"name":"Perception of the Conflicting Motives","level":"15","technique":"Intellego","form":"Mentem","requisites":[],"range":"Eye","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["You can detect the conflicting motives behind one target's actions. Thus you might learn that a guard feels conflict between fear and duty. This spell is often used before application of a Muto or Rego spell, since it is usually easier to change a target's emotions after you've sensed them than it is to create emotions."],"flavour":"","base":"10","modifiers":["+1 Eve"]},{"id":257,"name":"Frosty Breath of the Spoken Lie","level":"20","technique":"Intellego","form":"Mentem","requisites":[],"range":"Eye","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["For as long as you maintain this spell, the target exhales a misty breath with each spoken lie. Small bits of ice form on the person's lips if the lie is particularly severe. In winter, when breath is visible anyway, lies produce a greater than normal amount of mist (the mist actually billows out). A target who makes a Communication + Guile stress roll against an Ease Factor of 15 can determine whether any given statement will be taken by the spell as a lie. The spell can be defeated through extensive and judicious application of Creo Auram and Perdo Auram spells, and a demon is able to manipulate it in any way it wishes, as demons are the embodiment of deception and are never caught in a lie if they do not wish to be. House Guernicus brought the Order this spell, and it is a very poor Quaesitor who is without it."],"flavour":"","base":"10","modifiers":["+1 Eye","+1 Conc"]},{"id":258,"name":"Posing the Silent Question","level":"20","technique":"Intellego","form":"Mentem","requisites":[],"range":"Eye","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["You can ask one silent mental question of the target, then detect the answer. The truth of the answer is limited by the knowledge of the target. Questions to the effect of \"What would you do if ...?\" often receive inaccurate replies. You are likely to get what the target thinks he would do, not necessarily what he would really do. The target of this spell does not notice the questioning unless he or she resists the spell, in which case they notice the attempt."],"flavour":"","base":"15","modifiers":["+1 Eye"]},{"id":259,"name":"Thoughts within Babble","level":"25","technique":"Intellego","form":"Mentem","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Hearing","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["You can understand the speech of those within the target area. Perception or Communication stress rolls are needed for difficult exchanges. You also understand people who misuse a language that you do speak; you know what they meant to say, as well as hearing what they actually said."],"flavour":"","base":"5","modifiers":["+1 Conc","+3 Hearing"]},{"id":260,"name":"Peering into the Mortal Mind","level":"30","technique":"Intellego","form":"Mentem","requisites":[],"range":"Eye","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"354","description":["You can thoroughly probe and understand the contents of the mind of the target, including his or her immediate and long-term motives, personal strengths and weaknesses, and other pertinent information."],"flavour":"","base":"25","modifiers":["+1 Eye"]},{"id":261,"name":"Recollection of Memories Never Quite Lived","level":"4","technique":"Muto","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"355","description":["Changes the target's memory of a detail into a similar, though different, memory. The target is no more sure of this manufactured memory than of the authentic one, so he may discover strange fabrications to be false."],"flavour":"","base":"1","modifiers":["+1 Eye","+2 Sun"]},{"id":262,"name":"Mind of the Beast","level":"30","technique":"Muto","form":"Mentem","requisites":[{"art":"Animal","free":false}],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"355","description":["You turn the mind of the target into that of an animal of your choice. The victim acts and thinks like that animal as much as possible; a person who thinks he is a bird will try to fly, but will not be able to. This can be dangerous for the target."],"flavour":"","base":"15","modifiers":["+1 Eye","+2 Sun"]},{"id":263,"name":"Past of Another","level":"35","technique":"Muto","form":"Mentem","requisites":[],"range":"Eye","duration":"Year","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"355","description":["The target's memories are completely rewritten, and he is unable to remember his actual life until the effect is dispelled or expires."],"flavour":"","base":"10","modifiers":["+1 Eye","+4 Year"]},{"id":264,"name":"Inmost Companion","level":"40","technique":"Muto","form":"Mentem","requisites":[{"art":"Animal","free":false}],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"355","description":["The target's mind is made physical as a bird. This bird normally stays close to the target's body, but need not. If the target has Magic Resistance, it protects both his body and mind, as normal. No matter how far it travels, the target's mind controls his body, as well as the bird's, as normal. In particular, it can see through both sets of sense organs. If the bird is killed, the target also dies, as his mind has been killed."],"flavour":"","base":"25","modifiers":["+1 Eye","+2 Sun"]},{"id":265,"name":"Vision of the Haunting Spirits","level":"40","technique":"Muto","form":"Mentem","requisites":[{"art":"Imaginem","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"355","description":["All spirits within the target area become visible, although they might remain unseen if hiding behind something. This includes the spirits of living people, which appear as the person normally does. If the person is invisible or otherwise changed from his normal shape, his normal appearance is superimposed on his current appearance."],"flavour":"","base":"15","modifiers":["+1 Touch","+2 Sun","+2 Room"]},{"id":266,"name":"Lay to Rest the Haunting Spirit","level":"General","technique":"Perdo","form":"Mentem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"355","description":["If your spell Penetrates the resistance of a ghost or similar spirit, it loses a number of points from its Might equal to the level of this spell. If this reduces the spirit's Might to zero, it vanishes, apparently destroyed. Philosophers concur that the spirit goes to the afterlife, or is perhaps weakened to helplessness, but is not actually destroyed. Souls, after all, are immortal."],"flavour":"","base":"","modifiers":[]},{"id":267,"name":"Tip of the Tongue","level":"5","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"355","description":["Causes the target to forget one word of your choosing. The target cannot remember that word for the spell's duration, but afterwards he can come up with the word without assistance by making an Intelligence + Concentration stress roll against an Ease Factor of 9. If the target fails he may try again, but each additional roll adds +1 to the difficulty."],"flavour":"","base":"3","modifiers":["+1 Eye","+1 Diam"]},{"id":268,"name":"Trust of Childlike Faith","level":"10","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["The target loses judgment and believes almost any passable lie for the duration of the spell. An Intelligence stress roll against an Ease Factor of 6 is allowed to resist. Truly incredible lies allow easier resistance rolls."],"flavour":"","base":"4","modifiers":["+1 Eye","+1 Diam"]},{"id":269,"name":"Calm the Motion of the Heart","level":"15","technique":"Perdo","form":"Mentem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["Removes one emotion from the target until it appears again naturally. An angry person stops being angry, and a curious one stops being inquisitive. Many a magus finds this spell useful for keeping his apprentice's nose out of his immediate business."],"flavour":"","base":"5","modifiers":["+2 Voice"]},{"id":270,"name":"Enchantment of Detachment","level":"15","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["Calms and greatly lowers the intensity of the target's current emotions."],"flavour":"","base":"4","modifiers":["+1 Eye","+2 Sun"]},{"id":271,"name":"Loss of But a Moment's Memory","level":"15","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["Removes up to five continuous minutes from a target's memory, leaving a blank. You target the loss of memory to a specific event or time. With an Intelligence stress roll against an Ease Factor of 9, the target realizes that memories of a certain period are missing. This Ease Factor can change, depending on how important the missing memory is and what sort of circumstances surrounded the event. Careful introspection over a period of time can allow reconstruction of much of the memory, but some details are lost forever."],"flavour":"","base":"10","modifiers":["+1 Eye"]},{"id":272,"name":"Blessing of Childlike Bliss","level":"25","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["Reduces an adult mind to a child's level. The target solves problems, reasons, and expresses emotions as would a three-year-old. Magi affected cannot cast spells. At first, anyway, the target is likely to be happy at having lost a world of cares and troubles that are no longer imaginable."],"flavour":"","base":"10","modifiers":["+1 Eye","+2 Sun"]},{"id":273,"name":"Passion's Lost Feeling","level":"25","technique":"Perdo","form":"Mentem","requisites":[],"range":"Eye","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["The target is unable to feel any sort of emotion and acts listlessly, without motivation or cares."],"flavour":"","base":"15","modifiers":["+1 Eye","+1 Conc"]},{"id":274,"name":"Black Whisper","level":"40","technique":"Perdo","form":"Mentem","requisites":[],"range":"Touch","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"356","description":["You whisper a magic sentence in the target's ear. It takes several seconds to speak the sentence, so an unwilling, able-bodied target can stop you. If you speak the whole sentence, the target must make a Stamina stress roll against an Ease Factor of 15 or go completely insane. You need not use your hands for this spell, but you must be able to speak."],"flavour":"","base":"15","modifiers":["+1 Touch","+3 Moon","+1 for not needing to gesture"]},{"id":275,"name":"Poisoning the Will","level":"65","technique":"Perdo","form":"Mentem","requisites":[],"range":"Touch","duration":"Moon","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"356","description":["You curse a place, be it a valley, town, city, or covenant. The curse gradually saps the will and vitality from the people there. They become less energetic, and slowly stop caring about the place, what happens there, other people, and finally themselves. Colors seem more drab and the days longer, and there is an all-pervading sense of boredom and lassitude. Strong-willed individuals and those with strong Personality Traits are less affected, but still suffer to an extent. All Personality Trait rolls while in the area suffer a -3modifier. This spell affects only those who are within the cursed area, including visitors to it. Those who leave the area are overwhelmed by the return of their vigor and sense of purpose."],"flavour":"","base":"4","modifiers":["+1 Touch","+3 Moon","+4 Bound","+5 size"]},{"id":276,"name":"Ring of Warding against Spirits","level":"General","technique":"Rego","form":"Mentem","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"357","description":["Only ghosts and spirits with current Magic Might higher than the spell's level can enter the ring you create. At certain angles, the ring may be seen as an orange-hued dome. This spell does not affect ghosts or spirits associated with the other realms."],"flavour":"","base":"","modifiers":[]},{"id":277,"name":"The Call to Slumber","level":"10","technique":"Rego","form":"Mentem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["The target becomes sleepy and falls asleep within a few seconds."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":278,"name":"Snap of Awakening","level":"10","technique":"Rego","form":"Mentem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["When you snap your fingers you instantly awaken the target from sleep to alert consciousness. Does not work on someone unconscious from Fatiguelevel loss, wounds, or magic."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":279,"name":"Confusion of the Numbed Will","level":"15","technique":"Rego","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["Confuses a person, who must make an Intelligence stress roll to take any direct action. A roll of 12+ ends the spell, while a roll of 9+ lets the character take the intended action, but the spell remains in effect. Any lower roll means the character is confused and takes some other type of action. When it is imperative for the victim to take an action, the storyguide should allow an appropriate modifier to the roll. While under this spell, a character always strikes last in combat and gets at least a -1 on all attacking and defending rolls."],"flavour":"","base":"4","modifiers":["+1 Eye","+2 Sun"]},{"id":280,"name":"Aura of Rightful Authority","level":"20","technique":"Rego","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["The target of the spell is strongly inclined to obey you, as if you were his natural superior."],"flavour":"","base":"5","modifiers":["+1 Eve","+2 Sun"]},{"id":281,"name":"Coerce the Spirits of the Night","level":"20","technique":"Rego","form":"Mentem","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["Makes a ghost obey you as long as you can coerce it with threats, such as a threat to defile its grave or to banish it to Hell. The more lurid and dramatic the threat, the more cooperative the ghost is. If the spell penetrates the ghost's Magic Resistance, roll Communication + Leadership to see how effective your threats are. The storyguide should always give a bonus or penalty that depends on the potency of the threat, and any roll other than a botch will compel at least minimal obedience."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Conc"]},{"id":282,"name":"Scent of Peaceful Slumber","level":"20","technique":"Rego","form":"Mentem","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["Everyone in the room falls asleep over a few seconds, with the smell of lilacs in their nostrils"],"flavour":"","base":"4","modifiers":["+2 Voice","+2 Room"]},{"id":283,"name":"Visions of the Infernal Terrors","level":"30","technique":"Rego","form":"Mentem","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"357","description":["Causes everything the target sees to look and sound terrifying. The world looks basically the same, save that everything is hideously transformed somehow. The target must roll a stress die, adding his Stamina and adding or subtracting an appropriate Personality Trait to see what the effects are. The nature of the Personality Trait used determines how it affects the Stamina roll. A Trait like Brave makes you resistant to fear, while one like Cowardly reduces the result of your roll.","| 1–5       | Incapacitated with fear, permanent –1 to Stamina                                |","| 6–9       | Incapacitated with fear                                                         |","| 10–15     | Flee, fight at –6 if cornered or obstructed                                     |","| 16+       | Carry on, -3 on all rolls                                                       |"],"flavour":"","base":"10","modifiers":["+2 Voice","+2 Sun"]},{"id":284,"name":"Enslave the Mortal Mind","level":"40","technique":"Rego","form":"Mentem","requisites":[],"range":"Eye","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"358","description":["Enables you to completely control the loyalty, emotions, desires, interests, and activities of any person. People revert to normal when the spell ends, and may be extremely angry with the magus."],"flavour":"","base":"25","modifiers":["+1 Eye","+2 Sun"]},{"id":285,"name":"Incantation of Summoning the Dead","level":"40","technique":"Rego","form":"Mentem","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"358","description":["Calls up a person's ghost. You must be on the spot where the person died, or must have the corpse (either of these constitutes an Arcane Connection). Alternatively, you can summon any ghost that haunts the area you are in, if you know the ghost's full name, according to the Law of Names. Those buried by Church ceremony and those have who gone straight to heaven (that is, saints and crusaders, as opposed to the normal folk who must wait for a time before going on) are not available for summoning. This spell is a ritual because it can summon those who are beyond the mortal world, as long as they are not in heaven. If the ghost has Magic Resistance, you must penetrate that resistance in order to summon it."],"flavour":"","base":"15","modifiers":["+4 Arc","+1 Conc"]},{"id":286,"name":"The Shrouded Glen","level":"40","technique":"Rego","form":"Mentem","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"358","description":["Enchants the Boundary in which the ritual is cast so that anyone moving through it is subtly diverted, effectively keeping some place within it from being discovered accidentally. Anyone not actively searching for the hidden place never finds it. Those actively searching can find the place by making a Perception stress roll against an Ease Factor of 12 (allowed once per day). If the surrounding terrain is more difficult to search than the average forest, the Ease Factor increases. Likewise, the Ease Factor drops if the terrain is more open than a forest, and completely open terrain is unsuitable for this spell. Once a searcher spots the hidden place, the spell does not prevent approach. Those who are present for the ritual are unaffected by the spell. This spell mimics the properties of many faerie forests."],"flavour":"","base":"3","modifiers":["+1 Touch","+4 Year","+4 Bound"]},{"id":287,"name":"Exchange of the Two Minds","level":"55","technique":"Rego","form":"Mentem","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Group","ritual":true,"type":"standard","source":"ArM5 Core","page":"358","description":["This spell switches the minds (but not the souls) of two creatures. A new body greatly confuses those who are unprepared for the shock, and even those who are ready take a day to adjust completely. Magi who transport their own minds into younger, healthier bodies usually find that having a strong body entails having powerful passions that interfere with the clear thinking needed to pursue the magical Arts. Both people involved must make a Stamina stress roll against an Ease Factor of 3, rolled before the switch is made, to survive the transfer. If only one person fails the roll, that person dies and the spell fails. The other target is unaffected."],"flavour":"","base":"20","modifiers":["+1 Touch","+4 Year","+2 Group"]},{"id":288,"name":"Seal the Earth","level":"15","technique":"Creo","form":"Terram","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["Creates enough dirt to fill in a pit of up to 6 paces across and 3 paces deep."],"flavour":"","base":"1","modifiers":["+2 Voice","+2 Sun","+2 Group"]},{"id":289,"name":"Touch of Midas","level":"20","technique":"Creo","form":"Terram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"359","description":["This spell creates a roughly spherical lump of gold about six inches across. This weighs about eighty pounds, and is enough money to keep a peasant family in comfort for about three hundred years."],"flavour":"","base":"15","modifiers":["+1 Touch"]},{"id":290,"name":"Wall of Protecting Stone","level":"25","technique":"Creo","form":"Terram","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["Makes a wall of granite up to 25 paces wide, 4 paces high, and 1 pace thick. One needs miner's tools to break through it, though it can be toppled if it is not connected to a support on its side or top."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+2 size"]},{"id":291,"name":"Conjuring the Mystic Tower","level":"35","technique":"Creo","form":"Terram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"359","description":["An elaborately carved tower, formed from a single block of stone, rises out of the ground. The tower stands 80 feet high and is 30 feet wide, with a foundation set 20 feet into the ground. You determine the design of the chambers within."],"flavour":"","base":"3","modifiers":["+1 Touch","+4 size","+3 elaborate design"]},{"id":292,"name":"Probe for Pure Silver","level":"4","technique":"Intellego","form":"Terram","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Smell","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["You can smell silver, and follow the scent."],"flavour":"","base":"2","modifiers":["+2 Smell"]},{"id":293,"name":"Eyes of the Eons","level":"10","technique":"Intellego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["Determines the age of any nonliving target to within 10% of its actual age."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":294,"name":"Eyes of the Treacherous Terrain","level":"15","technique":"Intellego","form":"Terram","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["You can tell intuitively if any natural terrain you see is treacherous, such as if a rock field is prone to sliding."],"flavour":"","base":"2","modifiers":["+1 Conc","+4 Vision"]},{"id":295,"name":"The Miner's Keen Eye","level":"20","technique":"Intellego","form":"Terram","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["You can see any one type of mineral (gold, diamond, sand), specified at the time of casting, through up to 3 paces of intervening material. You have a good idea of how much is there and how pure it is, if appropriate."],"flavour":"","base":"2","modifiers":["+1 Conc","+4 Vision","+1 see through intervening material"]},{"id":296,"name":"Tracks of the Faerie Glow","level":"25","technique":"Intellego","form":"Terram","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"359","description":["Causes even faintly perceptible tracks of a specific being to glow with a faint magic light, making them stand out when you are within 30 paces of them. The glow provides a bonus to Tracking rolls, which depends on the relationship between the target being tracked and the terrain. If the target is magically related to the terrain, +2; native to the terrain, +4; neutral to the terrain, +6; inimical to the terrain, +8. Tracking at night without a light source doubles the bonus. The more faint the tracks are, the more dimly they glow, so the storyguide may also modify the bonus based on the length of time since the target passed."],"flavour":"","base":"4","modifiers":["+1 Conc","+4 Vision"]},{"id":297,"name":"Stone Tell of the Mind That Sits","level":"30","technique":"Intellego","form":"Terram","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"360","description":["Allows you to talk with natural stone. A stone's answers feel slow and ponderous, but do not actually take any longer than a normal conversation. Though a stone is usually willing to talk, its direction sense and awareness of quickly moving things (such as people) are limited."],"flavour":"","base":"20","modifiers":["+1 Touch","+1 Conc"]},{"id":298,"name":"Sense the Feet That Thread the Earth","level":"30","technique":"Intellego","form":"Terram","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"","description":["You touch the earth and feel what is moving along the ground within a mile of where you stand. You can tell the direction, distance, weight, number, and manner of movement of moving things. For instance, you might sense \"a single 50-stone creature slithering toward us, a hundred rods in that direction.\" This spell is derived from the Terram tradition from which Guernicus the Founder came, and does not fit well into Hermetic theory."],"flavour":"","base":"4","modifiers":["+1 Touch","+1 Conc","+1 Part","+3 size"]},{"id":299,"name":"Dream of the Mind That Sits","level":"50","technique":"Intellego","form":"Terram","requisites":[{"art":"Creo","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"360","description":["Allows you to probe the memories of a spirit within a natural stone object. The spell also perfects those memories. Probing the memories of such a spirit is extremely slow. A typical session lasts between six and twelve hours, during which the caster is oblivious to the outside world. The spell allows the caster to perceive the memories of the spirit. The spirit's senses are limited and slow, but its memory of them is very long. Using this spell the caster can relive events witnessed by the spirit, as it recalls them. Larger stone objects have more powerful spirits and so have better perceptions. Precisely what level of detail an individual spirit can perceive is up to the storyguide."],"flavour":"","base":"30","modifiers":["+1 Touch","+2 Sun","+1 Creo effect"]},{"id":300,"name":"The Crystal Dart","level":"10","technique":"Muto","form":"Terram","requisites":[{"art":"Rego","free":false}],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"360","description":["The spell transforms a stone into a 10-inch crystal dart that rises from the ground at your feet, floats into the air, and speeds off like an arrow at a target that is within Voice range. It does +5 damage (because of the sharp edges of the crystal as much as its speed), and always hits its target, although it must Penetrate Magic Resistance to have any real effect."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Rego requisite"]},{"id":301,"name":"Supple Iron and Rigid Rope","level":"10","technique":"Muto","form":"Terram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["Makes a flexible object stiff or a stiff object flexible. Casting requisites of Forms appropriate to the materials affected are required. Note that, despite the name, this spell is not high enough level to affect iron."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun"]},{"id":302,"name":"Rock of Viscid Clay","level":"15","technique":"Muto","form":"Terram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["Softens rock enough that it may be dug out, molded, and otherwise manipulated in the same way that hard river clay can be. The rock is slightly sticky. The spell affects rock in a roughly spherical shape with a three-foot diameter."],"flavour":"","base":"2","modifiers":["+1 stone","+1 Touch","+2 Sun","+1 Part"]},{"id":303,"name":"Edge of the Razor","level":"20","technique":"Muto","form":"Terram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["Sharpens any metal edge to a degree unequaled by manual methods. An edged or pointed weapon gains a +2 bonus to Damage. Good-natured magi reward grogs by enchanting their weapons in this way, although since the resulting sword is resisted by Magic Resistance they rarely do this for all their grogs."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+2 metal"]},{"id":304,"name":"Earth That Breaks No More","level":"20","technique":"Muto","form":"Terram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["Turns a volume of packed dirt up to ten cubic paces into stone."],"flavour":"","base":"2","modifiers":["+1 stone","+1 Touch","+2 Sun","+1 Part","+1 size"]},{"id":305,"name":"Object of Increased Size","level":"20","technique":"Muto","form":"Terram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["This spell enlarges an inanimate object originally no bigger than a large chest. The object doubles in each dimension and increases its weight eight times. The size increase is based on the object's original, natural size, so casting the spell more than once on an object has no effect. Noble elements like gold, silver, and gems, are not affected by this spell. If any part of the item resists growth, the item as a whole does not grow. Casting requisites are required for the appropriate Form for the target."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+1 stone"]},{"id":306,"name":"Teeth of the Earth Mother","level":"35","technique":"Muto","form":"Terram","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["You cause twenty pointed pillars of white marble to spring up from the ground to a height of 12 feet, forming a circle 3 paces in diameter. At their tops, the pillars are thin and as sharp as spears. At the base, where they touch, they are 18 inches thick. When the pillars spring up, they can be used to cage people, to form a wall, or simply to skewer enemies. Climbing to the top of the pillars requires three Dexterity + Athletics stress rolls against an Ease Factor of 12, and the tops break away when the target reaches them, causing the victim to fall. Skewering a target does +25 damage, possibly more on following rounds if the victim struggles or is exceptionally heavy. When the spell ends, the pillars crumble to dust."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+2 Group","+2 fancy effect"]},{"id":307,"name":"Fist of Shattering","level":"10","technique":"Perdo","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["An object of stone or weaker material up to a pace across breaks apart. The appropriate Form for the target is a casting requisite."],"flavour":"","base":"3","modifiers":["+1 stone","+2 Voice"]},{"id":308,"name":"Rusted Decay of Ten-score Years","level":"10","technique":"Perdo","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["After the spell is cast, the metal of the target becomes so thoroughly rusted that it breaks if used in any demanding way (for example, used to strike a blow in combat or to pry open a door). It also loses any sharpness it might once have had."],"flavour":"","base":"2","modifiers":["+2 metal","+2 Voice"]},{"id":309,"name":"Pit of the Gaping Earth","level":"15","technique":"Perdo","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["The dirt in a circle 6 paces across recedes into the ground, leaving a pit 9 feet deep. If the target area contains material other than dirt, that material is not affected."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Part","+1 size"]},{"id":310,"name":"Obliteration of the Metallic Barrier","level":"20","technique":"Perdo","form":"Terram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"361","description":["Reg: Rego","Shatters a barrier of metal or stone up to one foot thick. Those within one pace of the barrier, on the opposite side from you, take +10 Damage. Alchemically refined and magical metals may be able to withstand this spell."],"flavour":"","base":"3","modifiers":["+2 metal","+1 Touch","+1 size","+1 Rego to fling the fragments away"]},{"id":311,"name":"Stone to Falling Dust","level":"20","technique":"Perdo","form":"Terram","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"362","description":["One solid non-living object turns to a pile of dust. The object must be a base Individual or smaller, so a stone item can be a pace across while a metal item can only be one tenth that size in total. A casting requisite may be required, of the Form appropriate to the target."],"flavour":"","base":"3","modifiers":["+2 metal/gems","+3 Sight"]},{"id":312,"name":"End of the Mighty Castle","level":"25","technique":"Perdo","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Structure","ritual":false,"type":"standard","source":"ArM5 Core","page":"362","description":["A single stone structure, such as a castle keep or manor house, crumbles to dust and small pebbles. Anyone inside at the time takes +10 damage from falling and having stones land on them, possibly more if the structure is particularly large."],"flavour":"","base":"3","modifiers":["+1 stone","+2 Voice","+3 Str"]},{"id":313,"name":"Cascade of Rocks","level":"40","technique":"Perdo","form":"Terram","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"362","description":["Makes a cliff collapse, causing an avalanche. The effects depend on the size of the cliff and what lies below it."],"flavour":"","base":"3","modifiers":["+1 stone","+3 Sight","+1 Part","+4 size"]},{"id":314,"name":"Ward against Faeries of the Mountain","level":"General","technique":"Rego","form":"Terram","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"362","description":["As Ward Against Faeries of the Waters (ReAq Gen), but for faeries of earth and stone. At some angles at night, the ring may be seen as a dark brown dome."],"flavour":"","base":"","modifiers":[]},{"id":315,"name":"Unseen Arm","level":"5","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"362","description":["Slowly moves a nonliving thing, like a mug, instrument, or small pouch of coins; it cannot oppose intentional resistance. Magi use this spell to manipulate things at a distance, but the spell cannot be used to pull something from a person's hand or to move something that is held. Casting requisites of an appropriate Form for the target are required."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Conc"]},{"id":316,"name":"Trackless Step","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Touch","duration":"Special","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["You leave no tracks in the earth until you come to a stop, such as to rest or fight. This spell draws on pre-Hermetic traditions, and does not perfectly fit the categories of Hermetic magic."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Special (based on Concentration)","+1 Part"]},{"id":317,"name":"Invisible Sling of Vilano","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Hurl a stone (of a size that could be thrown with a mundane sling) at a target within range. Unlike Wielding the Invisible Sling, this spell hurls the stone as a projectile. An aiming roll is required to hit the intended target, but if it succeeds, Magic Resistance offers no protection. The stone inflicts +5 damage on impact and has a range increment of 20 paces."],"flavour":"","base":"5","modifiers":["+1 Touch"]},{"id":318,"name":"Wielding the Invisible Sling","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Hurls any nearby object that could normally be thrown by a person at any target within range. The object must not be held down or otherwise restrained. Damage depends on the object thrown, up to +5 for a fist-sized stone. The object always hits, but it is resisted by Magic Resistance. Casting requisites of an appropriate Form for the target are required."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":319,"name":"The Forgiving Earth","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Loosens earth in a 15-pace-by-15-pace area to a depth of one foot, making packed dirt as loose as plowed ground."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Part","+1 size"]},{"id":320,"name":"The Unseen Porter","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Like *Unseen Arm* (ReTe 5), but it can carry large objects such as crates. Roughly speaking, it has the capabilities of a very strong person (Str +5). The heavier the object is, the slower the unseen porter moves. If delicacy is required, high Finesse stress rolls (Ease Factor 12 or so) are needed. The spell can only carry inanimate objects, and cannot carry you. It also cannot lift things more than 6 feet above the ground. Casting requisites of an appropriate Form for the target are required."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc"]},{"id":321,"name":"Unyielding Earth","level":"10","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Compacts the surface of the ground in a 15-pace-by-15-pace area to a depth of one foot, making it more solid. Mud becomes as soft earth, and soft earth becomes as packed dirt."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Part","+1 size"]},{"id":322,"name":"The Earth's Carbuncle","level":"15","technique":"Rego","form":"Terram","requisites":[{"art":"Muto","free":false}],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Causes a 1-pace circle of ground to become jagged stone, just under the surface, and those fragments burst into the air. Anyone standing on the circle is thrown into the air and hit with flying debris. Damage is +10."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Part","+1 Muto requisite"]},{"id":323,"name":"Hands of the Grasping Earth","level":"15","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Reg: Muto","Earthen hands from beneath the target rise out of the ground, and grasp the target's ankles. To break free requires a Strength stress roll of 15+. (One attempt is allowed per round, and each requires a Fatigue roll.) Each hand can be destroyed by beating its +25 Soak roll (hacking weapons do double normal damage) and inflicting a Light Wound."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Diam","+1 Part"]},{"id":324,"name":"Crest of the Earth Wave","level":"20","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Creates a wave in the earth that starts at your feet and travels out to the range of your Voice in a designated direction. It starts as a narrow ripple and within 5 paces reaches its full size of 5 feet high and 30 paces wide. It moves about 50 paces per round. Those caught in its path must make Dexterity stress rolls against an Ease Factor of 12 to leap over the wave, or they are tossed aside and take +10 Damage. The wave overturns trees and damages buildings in its path."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Part","+2 size"]},{"id":325,"name":"Creeping Chasm","level":"30","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Creates a chasm that runs from the ground in front of your feet towards some target within range that you designate. The chasm travels about 4 paces per round, growing wider as it travels, reaching a maximum width of 20 feet at a distance of 30 paces. The chasm is 20 to 30 feet deep, and the sides are likely to collapse, so any caught in it are in a bit of a bind. To avoid the growing chasm, a target must make a Quickness stress roll against an Ease Factor of 9. The spell effect lasts a moment, creating the stresses that then open the chasm over a few rounds. The normal forces of the earth tend to close the chasm in a week or so, but may not in some locations."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Part","+3 size","+1 fancy effect"]},{"id":326,"name":"Earth Shock","level":"30","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"363","description":["Shakes the ground in a 100 pace radius. All affected by this spell must make a Quickness - Encumbrance stress roll against an Ease Factor of 10 or fall. Apply these modifiers: standing still, +2; on solid stone, +2; moving slowly, +0; on earth, +0; running, -2; standing on a narrow bridge, -6."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Part","+4 size"]},{"id":327,"name":"The Earth Split Asunder","level":"30","technique":"Rego","form":"Terram","requisites":[],"range":"Voice","duration":"Special","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"364","description":["Creates a 5-foot-wide, 60-foot-long, 10-footdeep crack in the ground. It opens on one round, stays open for another round, and closes at the start of a third round, crushing all within it for +25 damage. You must maintain concentration for all three rounds, or the pit slowly closes, over an hour's time, rather than shutting quickly and violently. To avoid the pit, those in its vicinity other than the caster must make a Quickness stress roll against an Ease Factor of 9. Falling in incurs +5 damage. To escape, another such roll is made. Unless outside help is provided, people in the pit only get one chance to escape."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Special based on Mom","+1 Part","+2 size","+1 fancy effect"]},{"id":328,"name":"Hermes' Portal","level":"75","technique":"Rego","form":"Terram","requisites":[],"range":"Arcane Connection","duration":"Year","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"364","description":["Creates a magical portal through which people, animals, and objects can travel almost instantaneously. The ritual must be cast twice, simultaneously at two different locations, and after the rituals are performed, there is a magical connection between them. The magi conducting each ritual must have an Arcane Connection (such as a clod of dirt) to the other location when they are conducting the ritual. The portal is activated by some command word or ritual determined when the portal is enchanted. Inanimate things and unwilling creatures may be transmitted if someone else says the command word, and pushes the subject through."],"flavour":"","base":"","modifiers":[]},{"id":329,"name":"Restore the Faded Threads","level":"General","technique":"Creo","form":"Vim","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"365","description":["Once a spell trace has been found or suspected, this spell is used to make it examinable. This spell temporarily restores spell traces to a fresh state (as if they had just expired). The spell will restore spell traces of negative magnitude up to the magnitude of this spell –3. The trace must still be existent to be affected (magnitude -9 or greater). Versions of this spell also exist for all standard Targets. Diameter duration is normally long enough to conduct Intellego Vim investigations of the spell traces."],"flavour":"","base":"","modifiers":["+1 Touch","+1 Dia"]},{"id":330,"name":"Shell of False Determinations","level":"General","technique":"Creo","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"general","source":"ArM5 Core","page":"365","description":["Creates a \"shell\" of magic on an item, helping to shield it from investigation by other magi. All attempts to investigate the magic item give false information about its powers unless half of the level of the shell is exceeded by the magus's Investigation roll."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":331,"name":"Shell of Opaque Mysteries","level":"General","technique":"Creo","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"general","source":"ArM5 Core","page":"365","description":["This spell is similar to Shell of False Determinations (above), but it causes all attempts to investigate the magic item to utterly fail, unless the level of the ritual is exceeded by the magus's Investigation roll. Once a magus determines the presence of a particular shell (that is, by overcoming it), it has no more power against him or her."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":332,"name":"The Phantom Gift","level":"15","technique":"Creo","form":"Vim","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"365","description":["The target of the spell becomes tainted with magic as most magi are. Beasts and people react to the target as though he were a magus. Those who normally associate with the victim do not become hostile, but do give him or her a wider berth. The spell has no effect on those who already have The Gift, including those blessed with the Gentle Gift."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun"]},{"id":333,"name":"The Enigma's Gift","level":"30","technique":"Creo","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"365","description":["The target of the spell gains four Warping Points (plus the normal one for being affected by a powerful supernatural effect, in most cases) and, if a Hermetic magus, must check to see whether he enters Twilight in the normal way. Although the burst of magic that causes the Warping lasts but a moment, the resulting Warping is permanent."],"flavour":"","base":"20","modifiers":["+2 Voice"]},{"id":334,"name":"The Invisible Eye Revealed","level":"General","technique":"Intellego","form":"Vim","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Touch","ritual":false,"type":"general","source":"ArM5 Core","page":"366","description":["The caster can feel any magical means currently being used to spy on him. The representation varies in a way that depends on the spell, but it often feels like something touching the magus's back. For example, a magus being spied upon with Enchantment of the Scrying Pool might feel wet fingers, while a magus who is being tracked by The Inexorable Search might feel a finger running over his skin. This spell detects the use of Intellego spells of up to double the level of this spell. A special spell is required because most Intellego spells are designed to be subtle, and they are more subtle at higher levels."],"flavour":"","base":"","modifiers":[]},{"id":335,"name":"Sense of Magical Power","level":"2","technique":"Intellego","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"366","description":["This spell tells the caster whether he is currently in a Magic aura. It does not give any further information. Other spells do the same for other kinds of aura."],"flavour":"","base":"1","modifiers":["+1 Touch"]},{"id":336,"name":"Scales of the Magical Weight","level":"5","technique":"Intellego","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"366","description":["When casting this spell, you typically hold your hands straight out from your body, place a known amount of Vim vis in your left hand (usually one pawn), and then place an unknown amount of vis in your right hand. After casting the spell, you may sense how heavy the unknown vis is in relation to the known, determining the number of pawns present. If you cast the spell without anything to measure the unknown vis against, you only have a very general idea of how valuable it is. The spell cannot be used to determine the amount of raw vis invested in an enchanted item."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":337,"name":"Sense the Nature of Vis","level":"5","technique":"Intellego","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"367","description":["You can tell what Art a supply of raw vis is connected to. To you, the vis appears to glow with an aura that is appropriate to the Technique or Form that the vis is associated with. Creo is white, Intellego gold, Muto constantly fluctuating, Perdo black, Rego purple, Animal brown, Aquam blue, Auram violet, Corpus dark red, Herbam green, Imaginem pearly blue, Ignem bright red, Mentem orange, Terram dark brown, and Vim silver. Some of the colors are very similar, but are easy to distinguish if the item is held steadily and studied for a few seconds."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":338,"name":"Piercing the Faerie Veil","level":"20","technique":"Intellego","form":"Vim","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"367","description":["This spell allows the caster to see through the boundaries of Faerie regiones, and therefore divine the path to the next level (more details about regiones are given on page 420). There are separate but related spells for Divine, Magical and Infernal regiones."],"flavour":"","base":"3","modifiers":["+1 Conc","+4 Vision"]},{"id":339,"name":"Sense of the Lingering Magic","level":"30","technique":"Intellego","form":"Vim","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Hearing","ritual":false,"type":"standard","source":"ArM5 Core","page":"367","description":["This spell can detect the presence of many magical residues, even from weak spells, as well as giving the presence and power of active spells. It does not grant any information apart from the power, however. The residue must be of at least zero magnitude."],"flavour":"","base":"10","modifiers":["+1 Conc","+3 Hearing"]},{"id":340,"name":"Sight of the Active Magics","level":"40","technique":"Intellego","form":"Vim","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"367","description":["You can see spells as \"auras\" around things and people. The color of the aura indicates the Form of the spell working on a subject, the color matching the appropriate one described in Sense the Nature of Vis (page 367). The Technique of a spell working on the subject is recognized by the aura's shape, not color. Creo and Rego are both very orderly auras. Muto is constantly shifting, and Intellego usually is as well, but more slowly. A Perdo aura is usually in fragments. Thus, a magus with both Endurance of the Berserkers and The Invisible Eye Revealed upon him has a very controlled, orderly aura of deep red around his or her entire body, and the magus's eyes are surrounded with slowly shifting auras of a silvery hue. You should be warned: Imaginem or Vim spells may be used to disguise auras. Also note that this spell will detect the residues of some spells."],"flavour":"","base":"5","modifiers":["+1 Conc","+4 Vision","+2 Techniques and Forms"]},{"id":341,"name":"Mirror of Opposition (form)","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"368","description":["Cast on another spell while the other spell is being cast, this causes the targeted spell to have the exact opposite of its normal effects. This effect works on spells up to half the (level – 5) of the Mirror of Opposition spell. The effects of the inversion are up to the storyguide to determine, but the target of the inverted spell usually remains the same as that of the original spell. The inverted spell cannot overcome any limitations of Hermetic magic. For example, if a Momentary Perdo Corpus spell is cast, the inversion is probably a Creo Corpus spell of Sun duration. There are ten versions of this spell, each affecting spells of one of the Hermetic forms."],"flavour":"","base":"","modifiers":["+2 Voice"]},{"id":342,"name":"Shroud Magic","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"368","description":["This spell allows a magus to suppress or alter the sigil in a spell that is currently being cast. The spell to be shrouded can be up to double the Shroud's level, and *Shroud Magic* has the same sigil (or lack of) as that given to the shrouded spell."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":343,"name":"The Sorcerer's Fork","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"368","description":["This spell splits another spell (whose level must be less than or equal to the level of this spell) into two or more identical spells of reduced power, which may be cast against two or more separate targets. Each resulting spell has the same Range and Target (target category, that is — the actual target may be different) as the original spell, but the power of the effect is divided by the number of resulting split spells. The precise effect is at storyguide discretion. One casting die is rolled, and the Penetration total is split between the spells. *The Sorcerer's Fork* must be equal to or greater than the level of the spell that is to be split. The split spell has a targeting penalty as for multiple casting (see page 225). If the casting magus is not cooperating, all the split spells will strike the original target."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":344,"name":"Wizard's Boost (Form)","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"368","description":["You cast this spell as another spell of a level less than or equal to this one is cast. The effect of the other spell increases 5 levels in power, but not past the level of the Wizard's Boost. The effects of the extra 5 levels of power are for the storyguide to determine. A Wizard's Boost may never affect a single spell more than once. There are ten versions of this spell, one for each Hermetic Form."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":345,"name":"Wizard's Communion","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"general","source":"ArM5 Core","page":"369","description":["This spell lets magi combine their power to cast spells. The group of magi work together to cast a specified spell through the unified power of the Communion. Only one extra magus may join the Communion for each 5 levels of the specified spell being cast. One of the magi in the group must also know the specified spell, or cast it from a Casting Tablet (page 263). Only one magus in the group needs to cast the spell. The magus who casts the Wizard's Communion need not be the one who casts the main spell, and normally it is better for them to be different. More than one magus in the group may cast this spell. In this case, add the total levels of successfully cast Wizard's Communion to get the effective level of the Wizard's Communion for this casting. This combined total must be at least twice the level of the specified spell being cast. One magus must roll for success as if casting the specified spell himself. However, the target number for the spellcasting roll is the spell's level divided by the number of magi participating in the Communion. So if five magi participate to cast a 50th level spell, the caster would have to successfully cast a 10th level spell — with all the relevant requisites, of course. This method of casting adds one botch die per magus participating. If the spell botches, all participants gain Warping Points and must check for Twilight if they gain two or more. Communion is a remnant of Mercurian rituals, so it does not perfectly fit into the guidelines of Hermetic theory."],"flavour":"","base":"","modifiers":[]},{"id":346,"name":"Wizard's Reach (Form)","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"369","description":["The range of the targeted spell increases by one category. You may not affect a single spell more than once with this spell, and the targeted spell must be at least one magnitude lower in level than this spell. There are ten versions of *Wizard's Reach*, one for each Form."],"flavour":"","base":"","modifiers":["+2 Voice"]},{"id":347,"name":"Wizard's Vigil","level":"General","technique":"Muto","form":"Vim","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"general","source":"ArM5 Core","page":"370","description":["This spell functions as *Wizard's Communion*, except that the longer duration allows it to be used with Ritual spells. For the purposes of its effect, treat it as a *Wizard's Communion* of two magnitudes lower."],"flavour":"","base":"","modifiers":[]},{"id":348,"name":"Demon's Eternal Oblivion","level":"General","technique":"Perdo","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"370","description":["Weakens and possibly destroys a creature with Infernal Might. If the spell penetrates the creature's Magic Resistance, the creature loses Might Score equal to the spell's level."],"flavour":"","base":"","modifiers":["+2 Voice"]},{"id":349,"name":"Disenchant","level":"General","technique":"Perdo","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"general","source":"ArM5 Core","page":"370","description":["You make a Hermetic magic item lose all its powers permanently if the level of this spell + a stress die (no botch) equals or exceeds the highest level of the enchantments in the item. The enchantment is utterly destroyed, as is all of the vis that was used in the magic item. The object left is in all ways a mundane item, but could be invested with enchantments again at a later time."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":350,"name":"Masking the Odor of Magic","level":"General","technique":"Perdo","form":"Vim","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"369","description":["Prevents the detection of a magic spell, or of a magic power in an item or being, by InVi magic, unless the level of the InVi spell exceeds twice the level of this spell – 5 (for example, exceeds 20 for a level 15 version)."],"flavour":"","base":"","modifiers":["+1 Touch","+2 Sun"]},{"id":351,"name":"Unravelling the Fabric of (Form)","level":"GENERAL","technique":"Perdo","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"","description":["This spell will cancel the effects of any one spell of a specified Form whose level is less than or equal to (spell level + 10 + stress die (no botch)). There are 10 variants that cover each Hermetic Form, and a number of much rarer variants for different kinds of non-Hermetic magic."],"flavour":"","base":"","modifiers":["+2 Voice"]},{"id":352,"name":"Wind of Mundane Silence","level":"General","technique":"Perdo","form":"Vim","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Room","ritual":false,"type":"general","source":"ArM5 Core","page":"370","description":["You raise a metaphorical \"breeze\" that blows the magic away from an area, canceling the effects of any spell there. You can cancel the effects of any spell if, with this spell, you can double the level of the spell on a stress die + the level of your spell. The spell must Penetrate to affect effects on a creature with Magic Resistance, including Parma Magica. If the spell penetrates, and its level + the stress die is double Parma Magica x 5, then this spell dispels the Parma Magica. Wind of Mundane Silence does not affect spells of Momentary duration. Magical things near the area of the Wind wave slightly from the \"breeze.\""],"flavour":"","base":"","modifiers":["+2 Voice","+2 Room"]},{"id":353,"name":"Aegis of the Hearth","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Boundary","ritual":true,"type":"general","source":"ArM5 Core","page":"370","description":["This ritual protects a covenant in a way similar to the way in which a Parma Magica protects a magus. It provides very strong protection against supernatural effects and creatures that originate from outside the boundary of the Aegis, and much weaker and less consistent protection against supernatural effects originating within the Aegis. The ritual also allows certain individuals to be excluded from the effects of the Aegis, so that it does not hinder their supernatural powers at all. These individuals are referred to as \"natives\" of the Aegis in this description, and other individuals, and the effects they create, are referred to as \"foreign\". \"Native\" and \"foreign\" are determined for a particular casting of an Aegis. Each casting of Aegis of the Hearth determines who and what is native and foreign without reference to any other Aegis, even if it is a new Aegis being cast, by the same group of magi on the same boundary, to replace their covenant's old Aegis.","No foreign supernatural creature with Might, of any type, can cross the boundary of the Aegis unless its Might exceeds the level of the Aegis. The Aegis of the Hearth must Penetrate the creature's Magic Resistance in order to have this effect. A foreign supernatural creature that is within the Aegis when it is created is not expelled, although it does suffer the limits to its powers described later. If the creature were to leave the Aegis, it would need to have a higher Might than the Aegis, or resist the Aegis, in order to enter again. A spirit with Might that is capable of possessing another creature may enter the Aegis inside that creature, as long as it remains entirely passive. It is aware of what is going on, but cannot act in any way, including to end the possession. If the vessel becomes a native of the Aegis, the possessing spirit also does. The spirit can, however, have its invitation revoked (see later) separately from that of its vessel, if the person revoking the invitation knows that the spirit is there.","Any foreign supernatural effect that originates from outside the Aegis and would affect anything inside the Aegis must Penetrate a Magic Resistance equal to the level of the Aegis of the Hearth to take effect. If it fails to Penetrate, the effect fails completely and harmlessly. This applies to all effects, including Intellego effects that would not normally be blocked by Magic Resistance, and effects that would move something across the boundary of the Aegis.","This also applies to an existing foreign supernatural effect that tries to cross the boundary. If the effect cannot Penetrate the Aegis, it is dispelled. However, if the spell is cast on someone with Magic Resistance, for example an invisibility spell on a magus, then the Aegis must Penetrate the magus's Magic Resistance in order to dispel the effect. This includes such effects as the Parma Magica, Hermetic Longevity Rituals, Familiar Bonds, and Talisman Bonds. However, the last three of these are automatically sustained by the underlying magic, and so immediately come back into effect once the magus has entered the Aegis. Parma Magica must be raised again, in the normal way.","Any foreign supernatural effect originating within the boundary of the Aegis must subtract half the level of the Aegis from any Casting Total or equivalent. If
