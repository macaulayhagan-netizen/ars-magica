 the effect does not have a Casting Total, as for an effect from an enchanted item, then half the level of the Aegis is subtracted from its Penetration. If the effect has neither a Casting Total nor a Penetration, like the Parma Magica, it is not hindered by the Aegis once it is inside. The supernatural powers of creatures with Might that have been able to enter the Aegis are affected in the same way as any other foreign supernatural effect: this effect does not need to Penetrate Magic Resistance, unlike the exclusion effect.","Participants who have The Gift and have been opened to the Hermetic Arts are referred to here as \"participating magi\", although they may, for example, be apprentices. Participating magi, and only participating magi, can invite other individuals into the Aegis. This involves giving the individual a token that was designated as part of the ritual. Individuals that are invited in this way become natives of the Aegis. Any participating magus can also revoke an invitation, whether issued by themselves or by someone else. They do not need to retrieve the token in order to do this. Invitations and revocations can only be issued to specific individuals — it is not possible to revoke \"all invitations\", for example — but the individual does not need to be present. Invitations and revocations are effective even if the participating magus is mistaken about the identity of the individual. A participating magus can attempt to revoke an invitation even if they do not know for sure that a particular individual has been invited into the Aegis. If they were, then the invitation is revoked, but if they were not, this obviously has no effect. A creature with Might whose invitation is withdrawn is affected in the same way as a creature with Might who was within the Aegis when it was created. Individuals who participated in the ritual, including participants who are not participating magi, cannot be cast out of the ritual; they are native until the Aegis expires, or is dispelled.","Enchanted items can also be native to the Aegis. There are three main classes. The first is items that were within the boundary at the time the Aegis was raised. Unlike creatures with Might, non-sentient items become native to the Aegis simply by being present. The second class is items created within the Aegis by someone native to the Aegis. The third is items deliberately and directly activated by a native of the Aegis. Covenfolk who will use enchanted items may, therefore, participate in the Aegis ritual, but many enchanted items do not need Penetration, and thus can be used within the Aegis without any problems. The set of native items, like the set of native people, resets every time the Aegis is recast. Items, however, cannot be invited into the Aegis."],"flavour":"","base":"","modifiers":[]},{"id":354,"name":"Circular Ward against Demons","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"371","description":["All creatures with Infernal Might equal to or less than the level of the spell are unable to enter the circle or harm those within it. If you cast the spell again, the stronger ring dispels the weaker, regardless of the order of casting. Some magi cast this spell before going to sleep at night. At night, from certain angles, the ring may be seen as a silver-hued dome."],"flavour":"","base":"","modifiers":[]},{"id":355,"name":"Maintaining the Demanding Spell","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"372","description":["You cast this spell on a spell that you have already cast and are maintaining through concentration. The spell that requires concentration is then automatically maintained for the duration of this spell, whether you concentrate or not. You cannot change the effects of the first spell without concentrating on it again. For instance, you can use The Unseen Arm (ReTe 5) to hold an object in the air without concentrating, but to move the object still requires concentration. A Stamina + Concentration stress roll against an Ease Factor of 6 must be made in order to cast this spell while keeping the first one going (a lower roll than normal because this is what the spell is designed for). This spell only works on spells of equal or lower level."],"flavour":"","base":"","modifiers":["+1 Touch","+1 Diam"]},{"id":356,"name":"Opening the Intangible Tunnel","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"372","description":["You can open a magical channel from yourself to some target, allowing you to cast any spell with a range greater than Personal on that target. The tunnel does not, of itself, grant any sense impressions of the target — you must cast appropriate spells through it if you wish to see.","If the target of the spell has Magic Resistance, you must Penetrate that resistance to open the tunnel. Spells cast through the tunnel must also Penetrate Magic Resistance normally."],"flavour":"","base":"","modifiers":["+4 Arc","+1 Conc"]},{"id":357,"name":"Suppressing the Wizard's Handiwork","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"general","source":"ArM5 Core","page":"372","description":["Cancels one spell that you have cast, but only as long as you concentrate. When concentration is broken the effects of the spell return. The level of the spell to be suppressed must be less than or equal to the level of this spell. The effects of the spell being suppressed take about one round to fade out, and then another round to return after concentration is broken. The spell to be affected must be active to be suppressed — in particular, it may not be of Momentary duration. Common uses of this spell include providing access to some place normally blocked by magic (for example, having a MuTe blocking the door to your lab, and then suppressing it to enter), and avoiding traps (such as suppressing a *Watching Ward* [ReVi Gen] on your rear door). This spell is designed to be held while you do something else, so the magus gets a +3 bonus to all Concentration rolls."],"flavour":"","base":"","modifiers":["+1 Touch","+1 Conc"]},{"id":358,"name":"Watching Ward","level":"General","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Special","durationWhile":"","target":"Individual","ritual":true,"type":"general","source":"ArM5 Core","page":"372","description":["Watching Ward puts another spell on a given target on hold until that spell is triggered by a simple condition, which is determined when this ritual is cast. The target of the Watching Ward must be present for the entire casting ritual. When the conditions you specify come to pass, the suspended spell takes effect."],"flavour":"","base":"","modifiers":["+1 Touch"]},{"id":359,"name":"Gather the Essence of the Beast","level":"15","technique":"Rego","form":"Vim","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"372","description":["Concentrates the raw vis in a corpse into one part of that corpse, which can then be removed. This spell lets you gather all the raw vis you find without lugging around entire corpses of beasts. Note that the vis in many magical creatures is already concentrated in this manner in some specific organ, though this spell will allow you to relocate that vis if you wish."],"flavour":"","base":"10","modifiers":["+1 Touch"]}];/* ---------- The Arts ---------- @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=UnifrakturMaguntia&display=swap');

.am-root{
  --ink:#211b16; --ink2:#18130f; --ink3:#2c241d;
  --vellum:#e9dec6; --vellum2:#ddcfae; --vellum-dim:#cdbd97;
  --line:#b7a37b; --line-soft:#9a8762;
  --lapis:#2a4a9c; --lapis-bright:#3a63c7;
  --rubric:#a8341f; --rubric-bright:#c4452b;
  --gold:#b8902f; --gold-bright:#d6ac42;
  --txt:#241c14; --txt-soft:#5b4e3a; --txt-faint:#7d6c50;
  font-family:'EB Garamond', Georgia, serif;
  color:var(--vellum);
  background:
    radial-gradient(1200px 700px at 50% -10%, #2c241c 0%, rgba(44,36,28,0) 60%),
    radial-gradient(900px 600px at 100% 110%, #241b14 0%, rgba(36,27,20,0) 55%),
    var(--ink);
  min-height:100vh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.am-root *{box-sizing:border-box;}
.am-wrap{max-width:1080px;margin:0 auto;padding:0 20px 80px;}

/* Header / spine nav */
.am-head{padding:34px 0 18px;text-align:center;position:relative;}
.am-mark{font-family:'UnifrakturMaguntia',serif;font-size:clamp(38px,7vw,68px);
  color:var(--gold-bright);line-height:1;letter-spacing:1px;
  text-shadow:0 2px 0 rgba(0,0,0,.4);}
.am-sub{font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--vellum-dim);font-size:clamp(15px,2.4vw,19px);letter-spacing:.5px;margin-top:2px;}
.am-rule{height:1px;background:linear-gradient(90deg,transparent,var(--line-soft) 18%,var(--gold) 50%,var(--line-soft) 82%,transparent);
  margin:18px auto 0;max-width:560px;}
.am-nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px;}
.am-tab{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;letter-spacing:.6px;
  color:var(--vellum-dim);background:transparent;border:1px solid transparent;border-radius:3px;
  padding:8px 18px;cursor:pointer;transition:.18s;text-transform:uppercase;}
.am-tab:hover{color:var(--gold-bright);}
.am-tab.on{color:var(--ink);background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  box-shadow:0 2px 10px rgba(0,0,0,.4);}

/* Vellum panel */
.am-panel{background:linear-gradient(180deg,#ece1c9,#e2d4b6);color:var(--txt);
  border:1px solid #8d7649;border-radius:5px;
  box-shadow:0 10px 28px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
  position:relative;}
.am-panel::after{content:"";position:absolute;inset:0;border-radius:5px;pointer-events:none;
  box-shadow:inset 0 0 60px rgba(120,90,40,.18);}
.am-pad{padding:22px 24px;}

h2.am-h{font-family:'Cormorant Garamond',serif;color:var(--rubric);font-weight:700;
  font-size:26px;letter-spacing:.4px;margin:0 0 4px;}
.am-eyebrow{font-family:'EB Garamond',serif;text-transform:uppercase;letter-spacing:3px;
  font-size:11px;color:var(--txt-faint);font-weight:600;}
.am-muted{color:var(--txt-soft);}
.am-faint{color:var(--txt-faint);}
.am-i{font-style:italic;}

/* Buttons (on vellum) */
.am-btn{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;letter-spacing:.4px;
  border-radius:3px;padding:8px 16px;cursor:pointer;transition:.16s;border:1px solid;}
.am-btn-pri{background:var(--lapis);border-color:#1d356f;color:#f3ecd8;}
.am-btn-pri:hover{background:var(--lapis-bright);}
.am-btn-ghost{background:transparent;border-color:var(--line-soft);color:var(--txt);}
.am-btn-ghost:hover{border-color:var(--lapis);color:var(--lapis);}
.am-btn-danger{background:transparent;border-color:#b08a7e;color:var(--rubric);}
.am-btn-danger:hover{background:var(--rubric);color:#f3ecd8;border-color:var(--rubric);}
.am-btn:disabled{opacity:.45;cursor:not-allowed;}

/* Inputs */
.am-input,.am-select,.am-area{font-family:'EB Garamond',serif;font-size:16px;color:var(--txt);
  background:rgba(255,255,255,.5);border:1px solid var(--line-soft);border-radius:3px;
  padding:7px 10px;width:100%;}
.am-input:focus,.am-select:focus,.am-area:focus{outline:none;border-color:var(--lapis);
  box-shadow:0 0 0 2px rgba(42,74,156,.18);}
.am-label{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--txt-faint);font-weight:600;margin:0 0 4px;}

.am-grid{display:grid;gap:14px;}
@media(min-width:680px){.am-cols-2{grid-template-columns:1fr 1fr;}}

/* Stepper for numbers */
.am-step{display:flex;align-items:center;gap:0;border:1px solid var(--line-soft);border-radius:3px;
  overflow:hidden;background:rgba(255,255,255,.45);flex-shrink:0;}
.am-step button{border:none;background:transparent;color:var(--lapis);font-size:18px;width:30px;height:32px;
  cursor:pointer;font-family:'Cormorant Garamond',serif;}
.am-step button:hover{background:rgba(42,74,156,.12);}
.am-step .v{flex:1;text-align:center;font-variant-numeric:tabular-nums;font-size:17px;min-width:34px;}

/* Roster cards */
.am-roster{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
.am-card{background:linear-gradient(180deg,#ece1c9,#ded0b0);border:1px solid #8d7649;border-radius:5px;
  padding:16px 16px 14px;cursor:pointer;transition:.18s;position:relative;
  box-shadow:0 6px 16px rgba(0,0,0,.35);}
.am-card:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.45);}
.am-card.sel{outline:2px solid var(--gold);}
.am-seal{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#c4452b,#7c2114);box-shadow:inset 0 -2px 4px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;color:#f0e3d0;font-family:'Cormorant Garamond';font-weight:700;font-size:14px;}
.am-card .nm{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;color:var(--txt);
  line-height:1.1;padding-right:34px;}
.am-card .ho{font-style:italic;color:var(--txt-soft);font-size:15px;}

/* Art grid */
.am-arts{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
.am-art{display:flex;flex-direction:column;align-items:stretch;gap:5px;background:rgba(255,255,255,.4);
  border:1px solid var(--line-soft);border-left-width:4px;border-radius:3px;padding:7px 9px;}
.am-art .an{min-width:0;}
.am-art .an b{font-family:'Cormorant Garamond';font-weight:600;font-size:16px;color:var(--txt);
  display:block;line-height:1.05;}
.am-art .an small{display:block;color:var(--txt-faint);font-size:11px;font-style:italic;margin-top:-2px;}

/* Grimoire list */
.am-filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:16px;}
.am-filters > div{flex:1;min-width:130px;}
.am-spell-list{display:flex;flex-direction:column;gap:8px;}
.am-spell{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  background:linear-gradient(180deg,#ece1c9,#e3d5b6);border:1px solid #9a875f;border-left-width:5px;
  border-radius:4px;padding:10px 14px;cursor:pointer;transition:.14s;}
.am-spell:hover{transform:translateX(2px);box-shadow:0 4px 14px rgba(0,0,0,.3);}
.am-tf{font-family:'Cormorant Garamond';font-weight:700;font-size:13px;letter-spacing:.5px;
  color:#fff;padding:3px 8px;border-radius:3px;white-space:nowrap;text-align:center;min-width:64px;}
.am-spell .sn{font-family:'Cormorant Garamond';font-weight:600;font-size:19px;color:var(--txt);line-height:1.1;}
.am-spell .sd{font-size:13px;color:var(--txt-soft);}

/* bestiary */
.am-beast-latin{font-style:italic;color:var(--txt-faint);font-weight:400;font-size:13px;}
.am-statblock{margin-top:12px;border:1px solid var(--line-soft);border-radius:6px;overflow:hidden;}
.am-stat-row{display:grid;grid-template-columns:150px 1fr;gap:12px;padding:7px 11px;
  border-bottom:1px solid var(--line-soft);font-size:13.5px;line-height:1.45;}
.am-stat-row:last-child{border-bottom:none;}
.am-stat-row:nth-child(odd){background:rgba(255,255,255,.28);}
.am-stat-k{font-family:'Cormorant Garamond';font-weight:700;font-size:14.5px;color:var(--txt);}
.am-stat-v{color:var(--txt-soft);}
.am-stat-v>div{margin-bottom:2px;}
@media(max-width:640px){.am-stat-row{grid-template-columns:1fr;gap:1px;}.am-stat-k{font-size:13px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.4px;}}
.am-lvl{font-family:'Cormorant Garamond';font-weight:700;font-size:22px;color:var(--lapis);
  text-align:right;line-height:1;}
.am-lvl small{display:block;font-size:10px;letter-spacing:1.5px;color:var(--txt-faint);font-weight:600;}

/* tags */
.am-chip{display:inline-block;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;
  padding:2px 7px;border-radius:99px;border:1px solid;margin-right:5px;}
.am-chip.ritual{color:var(--gold);border-color:var(--gold);}
.am-chip.gen{color:var(--lapis);border-color:var(--lapis);}

/* Modal */
.am-scrim{position:fixed;inset:0;background:rgba(15,11,8,.72);z-index:40;display:flex;
  align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;}
.am-modal{max-width:760px;width:100%;}

/* Casting chamber */
.am-words{display:flex;flex-wrap:wrap;gap:10px;align-items:stretch;}
.am-word{flex:1;min-width:128px;}
.am-incant{font-family:'Cormorant Garamond';font-weight:700;font-style:italic;font-size:clamp(26px,5vw,40px);
  text-align:center;color:var(--ink2);letter-spacing:.5px;line-height:1.05;}
.am-incant .req{font-size:.5em;font-style:normal;color:var(--txt-soft);vertical-align:middle;}
.am-eqn{display:flex;flex-wrap:wrap;gap:6px 10px;justify-content:center;align-items:baseline;
  font-family:'Cormorant Garamond';font-size:20px;color:var(--txt-soft);margin-top:6px;}
.am-eqn b{color:var(--txt);font-weight:700;}
.am-eqn .op{color:var(--txt-faint);}

/* Dice (signature) */
.am-castbar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin:18px 0 6px;}
.am-die{width:104px;height:110px;position:relative;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.5));transition:transform .12s;}
.am-die-shape{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
.am-die .d10-body{fill:#26386b;stroke:#6f82c4;stroke-width:2.5;stroke-linejoin:round;}
.am-die .d10-face{fill:#34488c;}
.am-die .d10-facets{fill:none;stroke:#6175ba;stroke-width:1;opacity:.65;stroke-linecap:round;}
.am-die-num{position:relative;z-index:2;font-family:'Cormorant Garamond';font-weight:700;font-size:38px;
  color:var(--gold-bright);transform:translateY(-10px);text-shadow:0 1px 3px rgba(0,0,0,.65);}
.am-die.rolling{animation:amspin .5s linear infinite;}
.am-die.botch .d10-body{fill:#4f1209;stroke:#c1502f;}
.am-die.botch .d10-face{fill:#7c2114;}
.am-die.botch .d10-facets{stroke:#c1502f;}
.am-die.botch .am-die-num{color:#f0d9b8;}
.am-die.crit .d10-body{stroke:var(--gold-bright);stroke-width:3;}
.am-die.crit{filter:drop-shadow(0 0 13px rgba(214,172,66,.7)) drop-shadow(0 8px 14px rgba(0,0,0,.5));}
@keyframes amspin{to{transform:rotate(360deg);}}
.am-chain{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.am-pip{width:32px;height:34px;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond';font-weight:700;font-size:16px;background:var(--ink2);color:var(--vellum);
  clip-path:polygon(50% 3%, 92% 37%, 73% 80%, 50% 97%, 27% 80%, 8% 37%);}
.am-pip.one{background:#3a331c;color:var(--gold-bright);}
.am-pip.zero{background:#3f140d;color:var(--rubric-bright);}

.am-verdict{font-family:'Cormorant Garamond';font-weight:700;text-align:center;font-size:clamp(28px,6vw,46px);
  letter-spacing:.5px;line-height:1;margin-top:6px;}
.am-verdict.cast{color:var(--gold);}
.am-verdict.fail{color:var(--txt-soft);}
.am-verdict.botch{color:var(--rubric);}
.am-verdict-sub{text-align:center;color:var(--txt-soft);font-size:16px;margin-top:2px;}

.am-zero-alert{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:14px;
  background:rgba(124,33,20,.12);border:1px solid var(--rubric);border-radius:5px;padding:10px 14px;
  color:var(--rubric);font-family:'Cormorant Garamond';font-weight:700;font-size:19px;text-align:center;}
.am-zero-alert .mk{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--rubric);color:#f3ecd8;
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.am-botch-steps{margin-top:14px;border:1px solid var(--line-soft);border-radius:6px;overflow:hidden;
  background:rgba(255,255,255,.25);}
.am-botch-steps .hd{background:rgba(124,33,20,.12);padding:9px 14px;font-family:'Cormorant Garamond';
  font-weight:700;color:var(--rubric);font-size:16px;letter-spacing:.3px;border-bottom:1px solid var(--line-soft);}
.am-bstep{display:flex;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line-soft);}
.am-bstep:last-child{border-bottom:none;}
.am-bstep .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--rubric);color:#f3ecd8;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Cormorant Garamond';}
.am-bstep .bd{font-size:14px;line-height:1.55;color:var(--txt-soft);}
.am-bstep .bd b{color:var(--txt);font-weight:700;}
.am-bstep.good .n{background:#5a7d3a;}

.am-lectern-desc{margin-top:14px;padding-top:13px;border-top:1px solid var(--line-soft);}
.am-lectern-desc p{margin:0 0 6px;font-size:14.5px;line-height:1.55;color:var(--txt-soft);}
.am-lectern-desc p:last-child{margin-bottom:0;}
.am-lectern-desc .lore{font-style:italic;color:var(--txt-faint);border-left:3px solid var(--line-soft);padding-left:9px;}

/* characteristics definition list */
.am-deflist{display:grid;gap:8px;margin:8px 0 4px;}
.am-def{display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:baseline;}
.am-def b{font-family:'Cormorant Garamond';font-weight:700;font-size:16px;color:var(--txt);}
.am-def span{font-size:14.5px;line-height:1.5;color:var(--txt-soft);}
@media (max-width:560px){.am-def{grid-template-columns:1fr;gap:1px;}}

/* houses */
.am-house-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin:6px 0 8px;}
.am-house{background:rgba(255,255,255,.42);border:1px solid var(--line-soft);border-left:4px solid var(--lapis);
  border-radius:4px;padding:11px 13px;}
.am-house .hn{font-family:'Cormorant Garamond';font-weight:700;font-size:18px;color:var(--txt);line-height:1.15;}
.am-house .hf{font-size:11.5px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.6px;margin:1px 0 6px;}
.am-house p{font-size:13.5px;line-height:1.5;color:var(--txt-soft);margin:0 0 7px;}
.am-house .hl{font-size:13px;color:var(--txt-soft);border-top:1px dashed var(--line-soft);padding-top:6px;}
.am-house .hl b{color:var(--lapis);}
.am-house-desc{font-size:12.5px;line-height:1.45;color:var(--txt-soft);margin:6px 2px 0;
  border-left:3px solid var(--lapis);padding-left:8px;}

/* virtues & flaws (editor) */
.am-vf-empty{font-size:13.5px;color:var(--txt-faint);font-style:italic;padding:8px 0 2px;}
.am-vf-row{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.42);
  border:1px solid var(--line-soft);border-left:4px solid var(--lapis);border-radius:4px;
  padding:9px 11px;margin-bottom:8px;}
.am-vf-row.flaw{border-left-color:var(--rubric);}
.am-vf-row .bd{flex:1;min-width:0;}
.am-vf-row .nm{font-family:'Cormorant Garamond';font-weight:700;font-size:16px;color:var(--txt);line-height:1.15;}
.am-vf-row .meta{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-faint);margin:1px 0 4px;}
.am-vf-row .ds{font-size:13px;line-height:1.5;color:var(--txt-soft);}
.am-vf-row .rm{flex-shrink:0;background:none;border:1px solid var(--line-soft);border-radius:4px;
  color:var(--rubric);cursor:pointer;font-size:17px;line-height:1;padding:2px 9px;}
.am-vf-row .rm:hover{background:rgba(124,33,20,.1);}

/* world map (image + overlaid markers) */
.am-imap{position:relative;width:100%;margin:2px 0;}
.am-imap-img{width:100%;display:block;border-radius:6px;border:1px solid var(--line-soft);
  box-shadow:0 4px 16px rgba(0,0,0,.35);}
.am-mk{position:absolute;transform:translate(-50%,-50%);background:none;border:none;padding:6px;margin:-6px;
  cursor:pointer;line-height:0;z-index:2;}
.am-mk-dot{display:block;width:14px;height:14px;border-radius:50%;background:var(--gold);
  border:2px solid #4a3a14;box-shadow:0 1px 4px rgba(0,0,0,.7);transition:transform .12s;}
.am-mk:hover{z-index:6;}
.am-mk:hover .am-mk-dot{transform:scale(1.35);}
.am-mk.on{z-index:9;}
.am-mk.on .am-mk-dot{transform:scale(1.35);background:var(--gold-bright);}
.am-mk-pop{position:absolute;left:50%;bottom:150%;transform:translateX(-50%);width:max-content;max-width:210px;
  background:var(--vellum);border:1px solid var(--lapis);border-radius:5px;padding:7px 10px;text-align:left;
  box-shadow:0 6px 18px rgba(0,0,0,.45);z-index:10;line-height:1.3;cursor:default;}
.am-mk-pop.left{left:auto;right:50%;transform:translateX(0);}
.am-mk-pop b{font-family:'Cormorant Garamond';font-weight:700;font-size:15px;color:var(--txt);}
.am-mk-pop .t{font-size:12px;color:var(--lapis);margin-top:2px;}
.am-mk-pop .p{font-size:12px;color:var(--txt-faint);font-style:italic;margin-top:1px;}

.am-readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:1px;background:var(--line-soft);
  border:1px solid var(--line-soft);border-radius:4px;overflow:hidden;margin-top:14px;}
.am-readout .cell{background:#efe5cf;padding:8px 6px;text-align:center;}
.am-readout .cell .k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt-faint);font-weight:600;}
.am-readout .cell .v{font-family:'Cormorant Garamond';font-weight:700;font-size:24px;color:var(--txt);line-height:1.1;}
.am-readout .cell.tot{background:#e6d3a6;}
.am-readout .cell.tot .v{color:var(--lapis);}

.am-log{margin-top:16px;border-top:1px dashed var(--line-soft);padding-top:10px;}
.am-log-row{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:3px 0;color:var(--txt-soft);
  border-bottom:1px dotted rgba(154,135,98,.4);}
.am-log-row b{font-family:'Cormorant Garamond';color:var(--txt);font-weight:600;}

.am-empty{text-align:center;padding:40px 20px;color:var(--vellum-dim);}
.am-empty .big{font-family:'Cormorant Garamond';font-style:italic;font-size:24px;color:var(--vellum);}

.am-foot{text-align:center;color:var(--txt-faint);font-size:12.5px;margin-top:30px;color:#9a8a6c;}
.am-foot a{color:var(--gold);text-decoration:none;}

.am-flash{animation:amflash 1.4s ease;}
@keyframes amflash{0%{background:rgba(214,172,66,.5);}100%{background:transparent;}}

/* Info pop-outs */
.am-info{position:relative;display:inline-flex;align-items:center;margin-left:7px;}
.am-info-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--lapis);color:var(--lapis);
  background:rgba(42,74,156,.08);font-size:12px;font-weight:700;cursor:pointer;line-height:1;padding:0;
  display:inline-flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;}
.am-info-btn:hover{background:rgba(42,74,156,.18);}
.am-info-btn[aria-expanded="true"]{background:var(--lapis);color:#f3ecd8;}
.am-info-pop{position:absolute;z-index:50;top:calc(100% + 8px);left:0;width:min(330px,76vw);
  background:#f3ead4;border:1px solid var(--gold);border-radius:5px;padding:12px 14px;
  box-shadow:0 12px 30px rgba(0,0,0,.5);text-transform:none;letter-spacing:normal;
  font-family:'EB Garamond',serif;cursor:auto;}
.am-info-pop .arr{position:absolute;bottom:100%;left:14px;width:0;height:0;
  border:7px solid transparent;border-bottom-color:var(--gold);}
.am-info-pop h4{margin:0 0 5px;font-family:'Cormorant Garamond';font-size:18px;color:var(--rubric);
  font-weight:700;text-transform:none;letter-spacing:.3px;}
.am-info-pop p{margin:0;font-size:14px;line-height:1.5;color:var(--txt-soft);font-weight:400;}

/* Primer / how-to-play */
.am-guide{max-width:780px;}
.am-lead{font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.5;color:var(--txt);
  font-style:italic;margin:6px 0 16px;}
.am-guide h3{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;color:var(--rubric);
  margin:24px 0 6px;letter-spacing:.3px;}
.am-guide p{font-size:15.5px;line-height:1.6;color:var(--txt-soft);margin:0 0 10px;}
.am-guide p b,.am-guide li b{color:var(--txt);font-weight:700;}
.am-guide ul,.am-guide ol{margin:0 0 10px;padding-left:20px;color:var(--txt-soft);
  font-size:15.5px;line-height:1.6;}
.am-guide li{margin:5px 0;}
.am-roles{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin:8px 0 4px;}
.am-role{background:rgba(255,255,255,.42);border:1px solid var(--line-soft);border-left:4px solid var(--lapis);
  border-radius:3px;padding:10px 12px;}
.am-role b{font-family:'Cormorant Garamond';font-weight:700;font-size:17px;color:var(--txt);display:block;}
.am-role span{font-size:13.5px;color:var(--txt-soft);line-height:1.45;}
.am-callout{background:rgba(42,74,156,.08);border:1px solid var(--lapis);border-radius:4px;
  padding:12px 14px;margin:10px 0 12px;}
.am-callout .eq{font-family:'Cormorant Garamond';font-weight:700;font-size:18px;color:var(--lapis);line-height:1.4;}
.am-callout .nb{font-size:13.5px;color:var(--txt-soft);margin-top:5px;line-height:1.5;}
.am-rules-cta{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-top:24px;
  border-top:1px dashed var(--line-soft);padding-top:16px;}
.am-rules-cta a{display:inline-block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;
  background:var(--lapis);border:1px solid #1d356f;color:#f3ecd8;border-radius:3px;padding:9px 18px;
  text-decoration:none;transition:.16s;}
.am-rules-cta a:hover{background:var(--lapis-bright);}
.am-rules-cta .hint{font-size:13.5px;color:var(--txt-soft);font-style:italic;flex:1;min-width:200px;}
@media (prefers-reduced-motion: reduce){.am-die.rolling{animation:none;} .am-card:hover{transform:none;}}

nds) to reach far above your normal output."},{"n":"Major Magical Focus","k":"Virtue","c":"Hermetic","s":"Major","d":"Within a broad specialty (weather, the dead, emotions) you add the lower of your two Arts again to all Casting and Lab Totals — a large, defining boost."},{"n":"Mercurian Magic","k":"Virtue","c":"Hermetic","s":"Major","d":"Heir to the Roman priests of Mercury, you excel at Ritual magic and at casting in concert with others, though your spontaneous magic is weaker."},{"n":"Mythic Blood","k":"Virtue","c":"Hermetic","s":"Major","d":"You descend from a legendary wizard or supernatural being, gaining a lasting minor magical power, a related Minor Magical Focus, and one effect needing no words or gestures."},{"n":"Adept Laboratory Student","k":"Virtue","c":"Hermetic","s":"Minor","d":"+6 to Lab Totals when working from another magus's lab texts, including when reinventing their spells."},{"n":"Affinity with Art","k":"Virtue","c":"Hermetic","s":"Minor","d":"One Hermetic Art advances 50% faster (and its starting experience is boosted by half), and you may push it past normal limits."},{"n":"Atlantean Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You know several useful extensions to Hermetic magic preserved from the sorcery of exiled Atlanteans."},{"n":"Boosted Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"Spend a pawn of vis while casting a Formulaic spell to raise its Range, Duration, Target, or size by one magnitude; repeatable on the same spell."},{"n":"Cautious Sorcerer","k":"Virtue","c":"Hermetic","s":"Minor","d":"You roll 3 fewer botch dice when casting any spell and when working in the laboratory."},{"n":"Clan Ilfetu","k":"Virtue","c":"Hermetic","s":"Minor","d":"A Bjornaer of Clan Ilfetu, you received extra training in the House's secret rituals."},{"n":"Cyclic Magic (positive)","k":"Virtue","c":"Hermetic","s":"Minor","d":"Your magic is attuned to a natural cycle (solar, lunar, seasonal) and grows stronger at set times: +3 to all Casting Totals then."},{"n":"Deft Form","k":"Virtue","c":"Hermetic","s":"Minor","d":"With one Form you take no penalty for casting without standard words or gestures, even while in an inhuman shape."},{"n":"Enduring Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"Your spells linger: the storyguide secretly rolls a simple die and multiplies the spell's duration by it (Momentary, Concentration, and Ring spells excepted)."},{"n":"Exotic Casting","k":"Virtue","c":"Hermetic","s":"Minor","d":"You cast Hermetic spells by non-standard methods, so your words and gestures differ from the norm and confuse magi trying to follow your work."},{"n":"Extractor of (Form) Vis","k":"Virtue","c":"Hermetic","s":"Minor","d":"You can draw one Form's vis from a magic aura whose features embody that Form, such as Aquam by a lake or Corpus at a grave."},{"n":"Faerie Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You are initiated into Faerie Magic and House Merinita, starting with the Faerie Magic Ability at 1 (free for all Merinita magi)."},{"n":"Fast Caster","k":"Virtue","c":"Hermetic","s":"Minor","d":"+3 Initiative to cast spells in combat, and +3 to your fast-casting speed rolls."},{"n":"Free Study","k":"Virtue","c":"Hermetic","s":"Minor","d":"+3 to Source Quality whenever you study an Art from raw vis."},{"n":"Gorgiastic","k":"Virtue","c":"Hermetic","s":"Minor","d":"Descended from magi who left House Criamon, you may learn Enigmatic Wisdom and Criamon Lore."},{"n":"Guest of House Criamon","k":"Virtue","c":"Hermetic","s":"Minor","d":"You count politically as a Criamon magus but are built using any other House's rules, membership being offered as a formality."},{"n":"Harnessed Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You can cancel any of your own ongoing spells just by concentrating, even effects invested in items you made."},{"n":"Heartbeast","k":"Virtue","c":"Hermetic","s":"Minor","d":"You are initiated into the Bjornaer Mystery and have a Heartbeast (true animal form), starting with Heartbeast 1 (free for all Bjornaer magi)."},{"n":"Hermetic Prestige","k":"Virtue","c":"Hermetic","s":"Minor","d":"Other magi look up to you regardless of merit, giving you a Reputation of 4 within the Order."},{"n":"Imbued with the Spirit of (Form)","k":"Virtue","c":"Hermetic","s":"Minor","d":"Having absorbed an elemental's power, you gain benefits tied to one Form, but beings with Might in that Form can sense your nature nearby."},{"n":"Inventive Genius","k":"Virtue","c":"Hermetic","s":"Minor","d":"+3 to Lab Totals when inventing without a text or teacher, and +6 when you experiment."},{"n":"Life Boost","k":"Virtue","c":"Hermetic","s":"Minor","d":"Spend extra Fatigue levels while casting a Formulaic or Ritual spell for +5 to the total each, ideal for boosting Penetration."},{"n":"Magical Memory","k":"Virtue","c":"Hermetic","s":"Minor","d":"You needn't keep lab texts of your own creations; your memory lets you reproduce them as though you had the text."},{"n":"Mastered Spells","k":"Virtue","c":"Hermetic","s":"Minor","d":"You begin with 50 experience points to spend mastering spells you already know."},{"n":"Masterpiece","k":"Virtue","c":"Hermetic","s":"Minor","d":"You were allowed to keep the lesser enchanted item you made to pass your Gauntlet, so you start play already owning it."},{"n":"Method Caster","k":"Virtue","c":"Hermetic","s":"Minor","d":"+3 to the Casting Total of every Formulaic and Ritual spell you cast."},{"n":"Minor Magical Focus","k":"Virtue","c":"Hermetic","s":"Minor","d":"Within a narrow field (e.g. healing, self-transformation) you add the lower of your two Arts again to Casting and Lab Totals."},{"n":"Mystical Choreography","k":"Virtue","c":"Hermetic","s":"Minor","d":"Your ceremonial magic is much faster, requiring only five minutes per magnitude."},{"n":"Performance Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You disguise spellcasting inside a mundane performance you excel at, using that Ability in place of voice and gestures."},{"n":"Personal Vis Source","k":"Virtue","c":"Hermetic","s":"Minor","d":"You alone can gather a small yearly supply of raw vis, roughly a tenth of the covenant's expected annual haul."},{"n":"Potent Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"Within a narrow field you add a bonus (often +3 or more) to Casting and Lab Totals; it stacks with a Focus, and you may have several such fields."},{"n":"Puissant Art","k":"Virtue","c":"Hermetic","s":"Minor","d":"+3 to one Art whenever you use it, though not when learning, teaching, or writing about it. May be taken twice."},{"n":"Quiet Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You cast at no penalty using only a soft voice, or at just -5 with no voice at all. Take it twice to remove even that penalty."},{"n":"Secondary Insight","k":"Virtue","c":"Hermetic","s":"Minor","d":"Whenever you study a Technique, you also gain 1 experience point in each of any four Forms you choose."},{"n":"Side Effect","k":"Virtue","c":"Hermetic","s":"Minor","d":"Your spells carry an extra, generally useful effect whose intensity grows with the spell's level."},{"n":"Skilled Parens","k":"Virtue","c":"Hermetic","s":"Minor","d":"Your master trained you well: you begin with an extra 60 experience points and 30 levels of spells from apprenticeship."},{"n":"Special Circumstances","k":"Virtue","c":"Hermetic","s":"Minor","d":"In one uncommon situation (during a storm, while touching the target) you gain +3 to Casting Totals and Magic Resistance."},{"n":"Spell Improvisation","k":"Virtue","c":"Hermetic","s":"Minor","d":"When casting spontaneously, add the magnitude of a known, similar Formulaic spell as a bonus to your total."},{"n":"Study Bonus","k":"Virtue","c":"Hermetic","s":"Minor","d":"Studying an Art in the presence of its Form or Technique gives +2 to vis study rolls or +2 to a text's Quality."},{"n":"Subtle Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You cast without gestures at no penalty; exaggerated gestures still grant their usual bonus."},{"n":"Tethered Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You can pass control of your non-Ritual spells to another person for the spell's duration, as if they were the caster."},{"n":"The Enigma","k":"Virtue","c":"Hermetic","s":"Minor","d":"You are initiated into the Criamon Mystery, starting with Enigmatic Wisdom at 1 (free for all Criamon magi)."},{"n":"Verditius Magic","k":"Virtue","c":"Hermetic","s":"Minor","d":"You are initiated into Verditius Magic and House Verditius, gaining its enchanting Mysteries (free for all Verditius magi)."},{"n":"Withstand Casting","k":"Virtue","c":"Hermetic","s":"Minor","d":"When casting fatigues you, you lose 1 fewer Fatigue level than normal (minimum 1); spells that wouldn't fatigue you still don't."},{"n":"Bee King","k":"Virtue","c":"Supernatural","s":"Major","d":"Descended from bee faeries, you can command and speak with bees and gain related faerie-blood benefits."},{"n":"Blood of the Nephilim","k":"Virtue","c":"Supernatural","s":"Major","d":"Angelic ancestry grants you a Divine Might score and access to supernatural powers from that heritage."},{"n":"Command Animals","k":"Virtue","c":"Supernatural","s":"Major","d":"You can mentally command all mundane animals of one species (Command Animals 1)."},{"n":"Corpse Magic","k":"Virtue","c":"Supernatural","s":"Major","d":"You can work minor magic on and through corpses (Corpse Magic 1)."},{"n":"Curse-Throwing","k":"Virtue","c":"Supernatural","s":"Major","d":"You can cure a disease or lift a curse by transferring it onto another person (Curse-Throwing 1)."},{"n":"Demonic Blood","k":"Virtue","c":"Supernatural","s":"Major","d":"One parent was a demon, making you an Infernal being with Infernal Might (Corpus) 5, which grants you Magic Resistance."},{"n":"Embitterment","k":"Virtue","c":"Supernatural","s":"Major","d":"You can turn a person hostile toward a target of your choosing (Embitterment 1)."},{"n":"Entrancement","k":"Virtue","c":"Supernatural","s":"Major","d":"By locking eyes and giving a spoken command you can control another's will (Entrancement 1)."},{"n":"Focus Power","k":"Virtue","c":"Supernatural","s":"Major","d":"You have a flexible supernatural power with a narrow range of effects, used much like spontaneous casting within one theme."},{"n":"Greater Benediction","k":"Virtue","c":"Supernatural","s":"Major","d":"A supernatural blessing grants you a benefit equal in scope to other Major Virtues, defined with the storyguide."},{"n":"Greater Immunity","k":"Virtue","c":"Supernatural","s":"Major","d":"You are completely immune to one common and deadly hazard, such as fire or iron weapons (aging excepted)."},{"n":"Greater Power","k":"Virtue","c":"Supernatural","s":"Major","d":"You wield a single at-will supernatural power roughly equal to a Formulaic spell of level 50 or lower."},{"n":"Greater Purifying Touch","k":"Virtue","c":"Supernatural","s":"Major","d":"With a touch and one Fatigue level you can cure a single serious, normally unrecoverable disease."},{"n":"Hex","k":"Virtue","c":"Supernatural","s":"Major","d":"You can curse enemies with dire predictions that tend to come true (Hex 1), usually an Infernal power."},{"n":"Immune to Disease","k":"Virtue","c":"Supernatural","s":"Major","d":"Marked as a powerful demon's property, you can never be harmed by any disease."},{"n":"Induction","k":"Virtue","c":"Supernatural","s":"Major","d":"You can make others perceive things that are not there (Induction 1)."},{"n":"Ritual Power","k":"Virtue","c":"Supernatural","s":"Major","d":"You have one at-will supernatural power equal to a Ritual spell of level 25 or lower."},{"n":"Sense Passions","k":"Virtue","c":"Supernatural","s":"Major","d":"You can read the hearts of others, sensing their fears, weaknesses, and dark thoughts (Sense Passions 1)."},{"n":"Shapeshifter","k":"Virtue","c":"Supernatural","s":"Major","d":"You can transform into one or more mundane animal forms (Shapeshifter 1)."},{"n":"Skinchanger (Dove)","k":"Virtue","c":"Supernatural","s":"Major","d":"A stronger Skinchanger: you can turn into a dove at will, without needing an animal-skin item."},{"n":"Spiritual Pact","k":"Virtue","c":"Supernatural","s":"Major","d":"You hold a pact with a powerful Magic spirit, gaining access to its power in return for loyal service."},{"n":"Strong Faerie Blood","k":"Virtue","c":"Supernatural","s":"Major","d":"Potent faerie ancestry grants several faerie abilities, slowed aging, and related benefits."},{"n":"Summon Animals","k":"Virtue","c":"Supernatural","s":"Major","d":"You can summon animals to your side (Summon Animals 1)."},{"n":"Supernatural Beauty","k":"Virtue","c":"Supernatural","s":"Major","d":"Your mystic beauty calls heroism, folk magic, and royal power to your defense when you are threatened."},{"n":"Whistle Up The Wind","k":"Virtue","c":"Supernatural","s":"Major","d":"You can raise winds simply by whistling (Whistle Up The Wind 1)."},{"n":"(Land) Regio Network","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can travel an extensive network of regiones tied to one environment, such as lakes, the sky, or caves."},{"n":"Amorphous","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can take on any human form, provided it is not the recognizable likeness of a real person."},{"n":"Animal Ken","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can converse with animals as though they were people (Animal Ken 1)."},{"n":"Crafter's Healing","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can magically heal wounds by touching them with the tools of your trade."},{"n":"Demonic Might","k":"Virtue","c":"Supernatural","s":"Minor","d":"Requires Demonic Blood; your Infernal Might rises by 2 and your corpse yields Corpus vis on death."},{"n":"Demonic Powers","k":"Virtue","c":"Supernatural","s":"Minor","d":"Requires Demonic Blood; you gain an extra 20 levels of Infernal powers."},{"n":"Dowsing","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can find nearby things using a dowsing rod and intuition (Dowsing 1)."},{"n":"Dust Devil","k":"Virtue","c":"Supernatural","s":"Minor","d":"A Skinchanger variant: you can become a Size +1 dust devil at will and steer its movement."},{"n":"Enchanting (Ability)","k":"Virtue","c":"Supernatural","s":"Minor","d":"Through one art form (music, dance, storytelling, craft) you can magically stir emotions and beliefs in others."},{"n":"Eye of Hephaestus","k":"Virtue","c":"Supernatural","s":"Minor","d":"By touch you judge a crafted item's quality, instantly sense any flaw, and may tell if it is magical."},{"n":"Fabric Ripper","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can supernaturally tear apart any item made from plant or animal fibers."},{"n":"Faerie Blood","k":"Virtue","c":"Supernatural","s":"Minor","d":"Distant faerie ancestry gives you intuitive insight into the fae and minor related benefits."},{"n":"Familiarity with the Fae","k":"Virtue","c":"Supernatural","s":"Minor","d":"+2 to all social interaction rolls with faeries, thanks to your natural grasp of their ways."},{"n":"Feather Messenger","k":"Virtue","c":"Supernatural","s":"Minor","d":"While in bird form you can send messages on the wind; available only to characters who can become birds."},{"n":"Folk Magic","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can perform very minor magical tricks drawn from scraps of folk lore."},{"n":"Font of Knowledge","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can supernaturally recall information you never actually learned (Font of Knowledge 1)."},{"n":"Frightful Presence","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can contort your face into a vision of terror or radiate overwhelming awe to unsettle onlookers."},{"n":"Gender Shift","k":"Virtue","c":"Supernatural","s":"Minor","d":"Each midnight you may switch between consistent male and female forms that resemble blood kin."},{"n":"Homing Instinct","k":"Virtue","c":"Supernatural","s":"Minor","d":"You always know the route to a number of fixed locations equal to your Intelligence (minimum 1)."},{"n":"Immunity to Cold","k":"Virtue","c":"Supernatural","s":"Minor","d":"Ordinary cold neither harms nor discomforts you, though magically created cold still does."},{"n":"Infernal Heirloom","k":"Virtue","c":"Supernatural","s":"Minor","d":"You inherited a working magic item made by a demon and may use it without dealing with that demon."},{"n":"Kassalan Exorcism","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can perform minor exorcisms learned from the Mortuary Society of Kassala."},{"n":"Leather Ripper","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can supernaturally destroy leather objects, causing strapped armor to fall apart."},{"n":"Lesser Benediction","k":"Virtue","c":"Supernatural","s":"Minor","d":"A supernatural blessing equal in scope to other Minor Virtues, defined with the storyguide."},{"n":"Lesser Immunity","k":"Virtue","c":"Supernatural","s":"Minor","d":"You are immune to one hazard that is rare, not deadly, or both."},{"n":"Lesser Power","k":"Virtue","c":"Supernatural","s":"Minor","d":"You have one or more at-will supernatural powers totaling 25 levels or less of effect."},{"n":"Lesser Purifying Touch","k":"Virtue","c":"Supernatural","s":"Minor","d":"With a touch and one Fatigue level you can cure a single minor or commonly survivable illness."},{"n":"Magic Sensitivity","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can often sense magic, but it leaves you exposed: subtract your score from your Magic Resistance."},{"n":"Magical Blood","k":"Virtue","c":"Supernatural","s":"Minor","d":"Exposure to the Magic realm gave your true form special supernatural properties."},{"n":"Maker of Textured Vessels","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can press mystical patterns into pottery before firing, with one shape per level of Craft: Potter."},{"n":"Maker of Water Vessels","k":"Virtue","c":"Supernatural","s":"Minor","d":"Drinking from your magical pottery lets someone swap an Ability for your Craft: Potter score."},{"n":"Master of (Form) Creatures","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can tame unintelligent beings whose Might matches one Form; may be taken once for each Form."},{"n":"Muse","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can grant Free Expression to another character, or double the Free Expression an artist already has."},{"n":"Persona","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can adopt one or more flawless disguises, altering both appearance and mannerisms (Persona 1)."},{"n":"Personal Power","k":"Virtue","c":"Supernatural","s":"Minor","d":"You have one at-will supernatural power equal to a Formulaic spell of level 25 or lower."},{"n":"Premonitions","k":"Virtue","c":"Supernatural","s":"Minor","d":"You sense when something is wrong or about to go wrong (Premonitions 1)."},{"n":"Ripper","k":"Virtue","c":"Supernatural","s":"Minor","d":"By spending a Fatigue level you can shred one piece of cloth or disembowel one animal at Sight range, wordlessly."},{"n":"Second Sight","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can see through illusions, invisibility, and into spirits and regio boundaries (Second Sight 1)."},{"n":"See in Darkness","k":"Virtue","c":"Supernatural","s":"Minor","d":"You see in complete darkness, though no farther than you would by normal daylight."},{"n":"Sense Holiness and Unholiness","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can feel the presence of good and evil around you (Sense Holiness and Unholiness 1)."},{"n":"Skinchanger","k":"Virtue","c":"Supernatural","s":"Minor","d":"While holding a special animal-skin item, you can transform into that animal."},{"n":"Strong Angelic Heritage","k":"Virtue","c":"Supernatural","s":"Minor","d":"Purer angelic blood grants you a Divine Might score and powers; requires Blood of the Nephilim."},{"n":"Unaging","k":"Virtue","c":"Supernatural","s":"Minor","d":"You no longer age: aging points build only toward Decrepitude and never lower your Characteristics."},{"n":"Unbound Tongue","k":"Virtue","c":"Supernatural","s":"Minor","d":"In any non-human form you can still speak your languages, and as a magus may still cast by voice."},{"n":"Variable Power","k":"Virtue","c":"Supernatural","s":"Minor","d":"One of your supernatural powers grows stronger over time, scaling with age, Might, Warping, or an Ability."},{"n":"Voice of the (Land)","k":"Virtue","c":"Supernatural","s":"Minor","d":"You can speak with creatures native to one environment, who rarely treat you as a threat or as prey."},{"n":"Wilderness Sense","k":"Virtue","c":"Supernatural","s":"Minor","d":"You are mystically attuned to the ways of the wild (Wilderness Sense 1)."},{"n":"Wisdom from Ignorance","k":"Virtue","c":"Supernatural","s":"Minor","d":"A Sufi insight tied to calligraphy and the aesthetics of the enigma grants you unusual understanding."},{"n":"Commanding Aura","k":"Virtue","c":"Supernatural","s":"Free","d":"A divine gift of Church office: your authority carries supernatural weight, usually paired with Senior Clergy."},{"n":"Death Prophecy","k":"Virtue","c":"General","s":"Major","d":"A condition has been set on your death, and until it is met you cannot die, though you can still be badly hurt."},{"n":"Ghostly Warder","k":"Virtue","c":"General","s":"Major","d":"A caring ghost watches over you, visible and audible only to you and to those with Second Sight."},{"n":"Giant Blood","k":"Virtue","c":"General","s":"Major","d":"Giant ancestry makes you huge and powerful, with Size +1 (or more) and bonuses to Strength and Stamina."},{"n":"Guardian Angel","k":"Virtue","c":"General","s":"Major","d":"A divine watcher gives you spiritual and practical guidance and may step in to protect you."},{"n":"License of Absence","k":"Virtue","c":"General","s":"Major","d":"As a priest you are excused from some clerical duties, freeing time for study or adventure."},{"n":"Magical Warder","k":"Virtue","c":"General","s":"Major","d":"A magical being accompanies you, watching over you and keeping you from harm."},{"n":"Powerful Relic","k":"Virtue","c":"General","s":"Major","d":"You own a potent holy relic with True Faith 3 and one agreed-upon supernatural power."},{"n":"True Faith","k":"Virtue","c":"General","s":"Major","d":"Your devout faith gives you a True Faith score of 1 (which can grow), shielding and empowering you against evil."},{"n":"Ways of the (Land)","k":"Virtue","c":"General","s":"Major","d":"You are deeply at home in one type of terrain, gaining substantial bonuses to most actions taken there."},{"n":"Wealthy","k":"Virtue","c":"General","s":"Major","d":"You are rich for your class and need not work, leaving three seasons each year free for study or adventuring."},{"n":"Academic Concentration (Subject)","k":"Virtue","c":"General","s":"Minor","d":"+3 to Artes Liberales for one of its seven subjects, your area of concentration."},{"n":"Affinity with Ability","k":"Virtue","c":"General","s":"Minor","d":"One Ability advances 50% faster (and its starting experience is boosted by half). Repeatable for different Abilities."},{"n":"All According to Plan","k":"Virtue","c":"General","s":"Minor","d":"Once per session you may reroll a botch die by describing the contingency you had prepared."},{"n":"Alluring to (Beings)","k":"Virtue","c":"General","s":"Minor","d":"One class of beings (animals, faeries, or magic beings) finds you especially attractive and well-disposed."},{"n":"Apt Student","k":"Virtue","c":"General","s":"Minor","d":"+5 to Source Quality whenever you are taught or trained by another."},{"n":"Aptitude for (Sin)","k":"Virtue","c":"General","s":"Minor","d":"A demon-granted knack lets you commit one particular kind of sin more effectively."},{"n":"Arcane Lore","k":"Virtue","c":"General","s":"Minor","d":"You may take Arcane Abilities at creation and gain 50 experience points for them (no Parma Magica without The Gift)."},{"n":"Aristotelian Training","k":"Virtue","c":"General","s":"Minor","d":"You were schooled in the New Aristotle, learning from recently translated texts rather than the standard curriculum."},{"n":"Berserk","k":"Virtue","c":"General","s":"Minor","d":"You can enter a combat rage (Angry +2 or more) that grants bonuses to attack and Soak but is hard to control."},{"n":"Book Learner","k":"Virtue","c":"General","s":"Minor","d":"+3 effective Quality whenever you study from books."},{"n":"Cautious with (Ability)","k":"Virtue","c":"General","s":"Minor","d":"You roll 2 fewer botch dice whenever you must roll them for one chosen Ability."},{"n":"Clear Thinker","k":"Virtue","c":"General","s":"Minor","d":"+3 to resist lies, confusion, befuddlement, and trickery, whether mundane or magical."},{"n":"Common Sense","k":"Virtue","c":"General","s":"Minor","d":"When you are about to do something foolish for the setting, the storyguide warns you — ideal for new players."},{"n":"Convoluted Mind","k":"Virtue","c":"General","s":"Minor","d":"Long exposure to demons lets you understand how their scheming minds work."},{"n":"Craft Guild Training","k":"Virtue","c":"General","s":"Minor","d":"Above-average craft training grants 50 bonus experience points for your trade."},{"n":"Educated","k":"Virtue","c":"General","s":"Minor","d":"Having attended a grammar or cathedral school, you may take Academic Abilities at character creation."},{"n":"Educated (Bardic)","k":"Virtue","c":"General","s":"Minor","d":"You attended a Hibernian bardic school and may take its Academic Abilities at creation."},{"n":"Educated (Hebrew)","k":"Virtue","c":"General","s":"Minor","d":"You studied in a yeshivah and may take Academic Abilities at character creation."},{"n":"Educated (Islamic)","k":"Virtue","c":"General","s":"Minor","d":"You studied in a mosque or Qur'an school and may take Academic Abilities at creation."},{"n":"Educated (Vernacular)","k":"Virtue","c":"General","s":"Minor","d":"Tutored for trade and leadership, you gain practical learning suited to a merchant family."},{"n":"Enduring Constitution","k":"Virtue","c":"General","s":"Minor","d":"Reduce Fatigue penalties by 1 and total wound penalties by 1 (minimum 0), and gain +3 to resist pain."},{"n":"Enticer of Multitudes","k":"Virtue","c":"General","s":"Minor","d":"An Inspirational variant that rouses crowds only toward evil and cannot calm them again."},{"n":"Falls Like a Cat","k":"Virtue","c":"General","s":"Minor","d":"You take no injury from falls up to three times your height, or six times if you can catch handholds."},{"n":"Famous","k":"Virtue","c":"General","s":"Minor","d":"You enjoy a positive Reputation of 4, of any kind and however it was earned."},{"n":"Ferocity","k":"Virtue","c":"General","s":"Minor","d":"Like a magus you have Confidence points, but only while your natural animal ferocity is triggered."},{"n":"Finding Hidden Loot","k":"Virtue","c":"General","s":"Minor","d":"+9 to Awareness when searching a confined space whose contents you can move about freely."},{"n":"Forgettable Face","k":"Virtue","c":"General","s":"Minor","d":"People struggle to recall or describe you afterward, so you often slip notice and blame."},{"n":"Free Expression","k":"Virtue","c":"General","s":"Minor","d":"+3 to all rolls to create an original work of art."},{"n":"Good Teacher","k":"Virtue","c":"General","s":"Minor","d":"+3 to the Quality of books you write and +5 to Source Quality for anyone you teach."},{"n":"Gossip","k":"Virtue","c":"General","s":"Minor","d":"Local contacts keep you informed; on a simple roll of 6+ you hear interesting news before almost anyone."},{"n":"Great (Characteristic)","k":"Virtue","c":"General","s":"Minor","d":"Raise one Characteristic that is already +3 by a further point, to a maximum of +5."},{"n":"Hermetic Experience","k":"Virtue","c":"General","s":"Minor","d":"You have had past dealings with the Order of Hermes and know something of its magi."},{"n":"Improved Characteristics","k":"Virtue","c":"General","s":"Minor","d":"You gain 3 extra points to spend on Characteristics (still capped at +3 without Great Characteristic). Repeatable."},{"n":"Independent Study","k":"Virtue","c":"General","s":"Minor","d":"+2 to Source Quality from Practice and +3 to Source Quality from Adventure experience."},{"n":"Indescribable Face","k":"Virtue","c":"General","s":"Minor","d":"Your features are so unremarkable that others can rarely give a useful description of you."},{"n":"Inoffensive to (Beings)","k":"Virtue","c":"General","s":"Minor","d":"One class of beings never reacts badly to you, ignoring even an otherwise unsettling aura."},{"n":"Inspirational","k":"Virtue","c":"General","s":"Minor","d":"+3 to others' relevant Personality Trait rolls when you rally them with words or example."},{"n":"Intuition","k":"Virtue","c":"General","s":"Minor","d":"A natural sense lets you make the right decision more often than luck alone can explain."},{"n":"Jack-of-All-Trades","k":"Virtue","c":"General","s":"Minor","d":"You roll no extra botch dice when attempting an Ability in which you have no score."},{"n":"Just an Instant","k":"Virtue","c":"General","s":"Minor","d":"After a few seconds in a room you notice anything of interest on its open surfaces without an Awareness roll."},{"n":"Keen Sense of Smell","k":"Virtue","c":"General","s":"Minor","d":"+3 to all rolls involving smell, including following tracks by scent."},{"n":"Keen Vision","k":"Virtue","c":"General","s":"Minor","d":"+3 to all rolls involving sight, though not to missile attacks."},{"n":"Knows People","k":"Virtue","c":"General","s":"Minor","d":"Your wide acquaintance lets you match other people's needs and favors to your own advantage."},{"n":"Large","k":"Virtue","c":"General","s":"Minor","d":"Your Size is +1, so you stand six to seven feet tall and take wounds in 6-point steps instead of 5."},{"n":"Latent Magical Ability","k":"Virtue","c":"General","s":"Minor","d":"You have an untrained supernatural talent that may surface during play; until then it lies dormant."},{"n":"Learn (Ability) from Mistakes","k":"Virtue","c":"General","s":"Minor","d":"The first time each session you botch or just fail with one Ability, you gain 5 experience points in it."},{"n":"Light Touch","k":"Virtue","c":"General","s":"Minor","d":"You have unusually quick, precise hands and excellent fine coordination."},{"n":"Lightning Reflexes","k":"Virtue","c":"General","s":"Minor","d":"When surprised you react almost instantly, rolling Quickness to act before you can even think."},{"n":"Linguist","k":"Virtue","c":"General","s":"Minor","d":"All Languages advance 25% faster, and starting language experience is boosted by a quarter."},{"n":"Long-Winded","k":"Virtue","c":"General","s":"Minor","d":"+3 to all Fatigue rolls, though this does not help spellcasting."},{"n":"Luck","k":"Virtue","c":"General","s":"Minor","d":"+1 to +3 on rolls where luck matters more than skill or talent."},{"n":"Magian Lineage","k":"Virtue","c":"General","s":"Minor","d":"You are true-blood kin of the Persian Magians, a heritage common among Zoroastrian priests."},{"n":"Magic Items","k":"Virtue","c":"General","s":"Minor","d":"You begin with 25 extra levels of magic items, and your items improve faster over time."},{"n":"Magical Mount","k":"Virtue","c":"General","s":"Minor","d":"You have a loyal mount or guard-beast with Cunning and a Magic Might of up to 25 that obeys simple commands."},{"n":"Mentored by Demons","k":"Virtue","c":"General","s":"Minor","d":"Demons teach you faster than any human master, but only the Abilities that serve their plans."},{"n":"Mild Aging","k":"Virtue","c":"General","s":"Minor","d":"+1 to your Living Conditions modifier on aging rolls and +3 to survive an aging crisis."},{"n":"Natural Leader","k":"Virtue","c":"General","s":"Minor","d":"Your commanding manner makes others inclined to do as you say."},{"n":"Perfect Balance","k":"Virtue","c":"General","s":"Minor","d":"+6 to any roll to keep your footing, avoid falling, or cross narrow ledges."},{"n":"Perfect Eye for (Commodity)","k":"Virtue","c":"General","s":"Minor","d":"You never misjudge the value of one commodity and its products, even by touch alone."},{"n":"Physician of Salerno","k":"Virtue","c":"General","s":"Minor","d":"You trained at the renowned School of Salerno, the finest source of medical learning."},{"n":"Piercing Gaze","k":"Virtue","c":"General","s":"Minor","d":"Your intent stare unnerves people, as though you are peering into their souls."},{"n":"Prestigious Student","k":"Virtue","c":"General","s":"Minor","d":"A well-off university student attended by two or three personal servants."},{"n":"Privileged Upbringing","k":"Virtue","c":"General","s":"Minor","d":"A comfortable upbringing grants 50 bonus experience points for General, Academic, or Martial Abilities."},{"n":"Protection","k":"Virtue","c":"General","s":"Minor","d":"A powerful patron shields you, so those who know your favored status treat you with care."},{"n":"Puissant Ability","k":"Virtue","c":"General","s":"Minor","d":"+2 to one Ability whenever you use it, though not when learning, teaching, or improving it."},{"n":"Rapid Convalescence","k":"Virtue","c":"General","s":"Minor","d":"+3 to all rolls to recover from wounds."},{"n":"Rat Up a Drainpipe","k":"Virtue","c":"General","s":"Minor","d":"You move through built-up areas as if unobstructed, gaining a real edge in urban chases."},{"n":"Relic","k":"Virtue","c":"General","s":"Minor","d":"You own a minor holy relic with True Faith 1; it can be set into another item but has no powers of its own."},{"n":"Reserves of Strength","k":"Virtue","c":"General","s":"Minor","d":"Once per day you gain +3 effective Strength for a single action, then must make two Fatigue rolls."},{"n":"Schooled in Crime","k":"Virtue","c":"General","s":"Minor","d":"Trained in the criminal arts, you gain 50 bonus experience points for thievery-related Abilities."},{"n":"Self-Confident","k":"Virtue","c":"General","s":"Minor","d":"You start with Confidence 2 and five Confidence points instead of the usual three."},{"n":"Sharp Ears","k":"Virtue","c":"General","s":"Minor","d":"+3 to all rolls involving hearing."},{"n":"Skilled Smuggler","k":"Virtue","c":"General","s":"Minor","d":"You can hide a dagger-sized item on you, imposing -9 on others' Awareness, and swap it out in minutes."},{"n":"Social Contacts","k":"Virtue","c":"General","s":"Minor","d":"You have a broad network of acquaintances in one social circle to call on for information."},{"n":"Strong-Willed","k":"Virtue","c":"General","s":"Minor","d":"+3 on any roll requiring strength of will, so coercion rarely moves you."},{"n":"Student of (Realm)","k":"Virtue","c":"General","s":"Minor","d":"+2 to all uses of the Lore for one realm of power: Magic, Faerie, Divine, or Infernal."},{"n":"Tainted Treasure","k":"Virtue","c":"General","s":"Minor","d":"You hold a great fortune that is cursed to bring harm, won by an ancestor's dark bargain."},{"n":"Templar Prestige","k":"Virtue","c":"General","s":"Minor","d":"As a Templar you are widely respected and admired among your brother knights."},{"n":"Temporal Influence","k":"Virtue","c":"General","s":"Minor","d":"You carry some political weight, with a leader's ear and the ability to lead common folk at times."},{"n":"Tough","k":"Virtue","c":"General","s":"Minor","d":"+3 to your Soak, letting you shrug off physical punishment."},{"n":"Trained Assassin","k":"Virtue","c":"General","s":"Minor","d":"Available only with a Nizari social status, you are schooled in the assassin's deadly craft."},{"n":"Troupe Upbringing","k":"Virtue","c":"General","s":"Minor","d":"Raised among traveling entertainers, you gain +2 to rolls in one approved field of Abilities."},{"n":"True Love (PC)","k":"Virtue","c":"General","s":"Minor","d":"An unbreakable bond to your true love steadies you, lending strength whenever you suffer or despair."},{"n":"Unaffected by The Gift","k":"Virtue","c":"General","s":"Minor","d":"The Gift and Magical Air in others never bother you, not even a Blatant Gift."},{"n":"Venus' Blessing","k":"Virtue","c":"General","s":"Minor","d":"+3 to Communication and Presence with characters who might be attracted to you."},{"n":"Warrior","k":"Virtue","c":"General","s":"Minor","d":"You may take Martial Abilities at creation and gain 50 bonus experience points that must be spent on them."},{"n":"Well-Traveled","k":"Virtue","c":"General","s":"Minor","d":"You get along easily across the region and gain 50 bonus experience points for languages, Area Lores, and social Abilities."},{"n":"Archieunuch","k":"Virtue","c":"Social Status","s":"Major","d":"A high-ranking, influential eunuch who enjoys the status and privilege of the most important court eunuchs."},{"n":"Capo","k":"Virtue","c":"Social Status","s":"Major","d":"You head a trading company with branches in two or more cities, wielding real commercial power."},{"n":"Cathedral School Master","k":"Virtue","c":"Social Status","s":"Major","d":"You teach at a cathedral school; you need Latin 5, Artes Liberales 5, and Teaching 3 or more."},{"n":"Doctor in (Faculty)","k":"Virtue","c":"Social Status","s":"Major","d":"A graduate of a university's higher faculty (medicine, law, or theology), licensed to instruct students."},{"n":"Guild Dean","k":"Virtue","c":"Social Status","s":"Major","d":"You are the ultimate authority of your guild, making its key decisions and representing it politically."},{"n":"Landed Noble","k":"Virtue","c":"Social Status","s":"Major","d":"You hold land, serfs, and men-at-arms, owing fealty upward and commanding a household of servants and guards."},{"n":"Lasiq","k":"Virtue","c":"Social Status","s":"Major","d":"A proven Nizari assassin who has completed seven killings and leads up to six fida'is; may take Martial Abilities."},{"n":"Magister in Artibus","k":"Virtue","c":"Social Status","s":"Major","d":"A Master of Arts of a European university who has completed the required two years of teaching."},{"n":"Magister in Medicina","k":"Virtue","c":"Social Status","s":"Major","d":"A doctor of medicine from a great medical school, with the same standing as Doctor in (Faculty)."},{"n":"Master Bard","k":"Virtue","c":"Social Status","s":"Major","d":"An Anruth, a master of the bardic trade after at least nine years of study."},{"n":"Muqtaʿ","k":"Virtue","c":"Social Status","s":"Major","d":"Holder of an iqta land-grant in the Islamic world, much like a landed noble, with income and military duties."},{"n":"Partner","k":"Virtue","c":"Social Status","s":"Major","d":"You hold a large stake in a wealthy trading company, living as well as a minor noble but without the arms."},{"n":"Redcap","k":"Virtue","c":"Social Status","s":"Major","d":"Though unGifted, you are a full member of the Order of Hermes and House Mercere, serving as a messenger."},{"n":"Rosh Beth Din","k":"Virtue","c":"Social Status","s":"Major","d":"Head of a rabbinic court; you need age plus Hebrew 5, Rabbinic Law 5, and Theology: Judaism 5."},{"n":"Senior Clergy","k":"Virtue","c":"Social Status","s":"Major","d":"A bishop, abbot, abbess, or similar Church leader with access to the Church's resources and added duties."},{"n":"Senior Master","k":"Virtue","c":"Social Status","s":"Major","d":"A long-established guild master who has risen to authority in the guild's self-governance."},{"n":"Templar Commander","k":"Virtue","c":"Social Status","s":"Major","d":"A commander of the Knights Templar with authority over the order across a province or preceptory."},{"n":"Venditor","k":"Virtue","c":"Social Status","s":"Major","d":"A selling-agent who barters a Verditius maga's goods to mundane buyers, often a minor noble or cleric."},{"n":"Almogaten","k":"Virtue","c":"Social Status","s":"Minor","d":"Leader of a band of Almogavar raiders, responsible for a dozen men; may take Martial Abilities."},{"n":"Almogavar","k":"Virtue","c":"Social Status","s":"Minor","d":"A member of a roving mercenary-raider band living by a code of honor and mutual loyalty."},{"n":"Baccalaureus","k":"Virtue","c":"Social Status","s":"Minor","d":"Holder of a Bachelor of Arts after completing a three-year university program."},{"n":"Beadle","k":"Virtue","c":"Social Status","s":"Minor","d":"A university dean's assistant who carries insignia, collects dues, and makes official announcements."},{"n":"Brother Chaplain","k":"Virtue","c":"Social Status","s":"Minor","d":"A priest of a crusading order, bound by vows of obedience, poverty, and chastity, answerable only to the pope."},{"n":"Brother Knight","k":"Virtue","c":"Social Status","s":"Minor","d":"A knight of a holy crusading order, sworn to lifelong obedience, poverty, and chastity."},{"n":"Brother Sergeant","k":"Virtue","c":"Social Status","s":"Minor","d":"A non-noble member of a crusading order under the same vows, though less strictly enforced."},{"n":"Bureaucrat","k":"Virtue","c":"Social Status","s":"Minor","d":"A civil administrator or scribe (katib) who may take Academic Abilities. Available to men only."},{"n":"Clerk","k":"Virtue","c":"Social Status","s":"Minor","d":"A literate professional (scribe, accountant, lawyer, functionary) who may take Academic Abilities at creation."},{"n":"Custos","k":"Virtue","c":"Social Status","s":"Minor","d":"A high-status covenant employee who may take one restricted Ability group: Martial, Academic, or Arcane."},{"n":"Emir","k":"Virtue","c":"Social Status","s":"Minor","d":"Like a Knight, but a Muslim noble likely as skilled in hunting, religion, and culture as in war."},{"n":"Eunuch","k":"Virtue","c":"Social Status","s":"Minor","d":"A trained Byzantine court servant (steward, scribe, accountant), likely employed by a noble or covenant."},{"n":"Factor","k":"Virtue","c":"Social Status","s":"Minor","d":"You manage a trading house's interests in one city, with strong social standing and wide connections."},{"n":"Failed Apprentice","k":"Virtue","c":"Social Status","s":"Minor","d":"You were apprenticed to a magus but never finished, your Gift incomplete or lost."},{"n":"Falconer","k":"Virtue","c":"Social Status","s":"Minor","d":"You train hawks and falcons for a noble patron and hold an honored place in the household."},{"n":"Fidaʾi","k":"Virtue","c":"Social Status","s":"Minor","d":"A devoted Nizari agent trained to carry out a master's orders, including assassination."},{"n":"Forge-Companion","k":"Virtue","c":"Social Status","s":"Minor","d":"An unGifted craftsman serving a Verditius magus; you gain 50 experience points for the Crafts your master practices."},{"n":"Gentleman/woman","k":"Virtue","c":"Social Status","s":"Minor","d":"A minor (perhaps illegitimate) member of a noble family, addressed as Lord or Lady but not in line to inherit."},{"n":"Guild Apprentice","k":"Virtue","c":"Social Status","s":"Minor","d":"A youth aged 10 to 20 learning a trade under a guild master by binding contract."},{"n":"Guild Master","k":"Virtue","c":"Social Status","s":"Minor","d":"A master craftsman who may practice and hire legally; may take Academic Abilities at creation."},{"n":"Ineslemen","k":"Virtue","c":"Social Status","s":"Minor","d":"A member of a Tuareg religious tribe, granted authority over disputes and freedom from feudal demands."},{"n":"Journeyman","k":"Virtue","c":"Social Status","s":"Minor","d":"A trained guild craftsman who works for a master for wages under guild supervision."},{"n":"Jurist","k":"Virtue","c":"Social Status","s":"Minor","d":"A medieval lawyer (judge, advocate, or procurator) who may take Latin, Artes Liberales, and Civil and Canon Law."},{"n":"Knight","k":"Virtue","c":"Social Status","s":"Minor","d":"A noble warrior who, unless Poor, owns quality weapons, armor, and a horse."},{"n":"Lone Redcap","k":"Virtue","c":"Social Status","s":"Minor","d":"A Redcap with no Mercer House ties, so you receive no magic items or Longevity Rituals."},{"n":"Mamluk","k":"Virtue","c":"Social Status","s":"Minor","d":"A freed military slave, trained from childhood as an elite soldier and educated in Islam."},{"n":"Marshal","k":"Virtue","c":"Social Status","s":"Minor","d":"The specialist who runs a noble's stables, an honored household post."},{"n":"Master of Kennels","k":"Virtue","c":"Social Status","s":"Minor","d":"You run a noble patron's kennels, responsible for the hounds' training, breeding, and health."},{"n":"Mazdean Priest","k":"Virtue","c":"Social Status","s":"Minor","d":"An ordained Zoroastrian mobed who performs the faith's rituals and ceremonies."},{"n":"Mendicant Friar","k":"Virtue","c":"Social Status","s":"Minor","d":"A Franciscan or Dominican friar who travels preaching and serving the poor and the sick."},{"n":"Mercenary Captain","k":"Virtue","c":"Social Status","s":"Minor","d":"You lead a small mercenary company of 5 to 10, much like a knight-errant without the prestige."},{"n":"Merchant Adventurer","k":"Virtue","c":"Social Status","s":"Minor","d":"You command a ship and crew with capital for cargo, though possibly burdened by heavy debts."},{"n":"Notary","k":"Virtue","c":"Social Status","s":"Minor","d":"A legal official who drafts contracts, witnesses charters, and seals documents for lords or towns."},{"n":"Perfectus","k":"Virtue","c":"Social Status","s":"Minor","d":"A Cathar leader who preaches the Gospel and abstains from meat, sex, and worldly entanglements."},{"n":"Priest","k":"Virtue","c":"Social Status","s":"Minor","d":"An ordained priest able to perform the Mass, Penance, and Extreme Unction."},{"n":"Rabbi","k":"Virtue","c":"Social Status","s":"Minor","d":"An ordained teacher and wise man of the Jewish community, respected and sought for guidance."},{"n":"Religious","k":"Virtue","c":"Social Status","s":"Minor","d":"A monk, nun, hermit, or similar; you may take Academic Abilities (Wealthy and Poor rarely fit)."},{"n":"Senior Bard","k":"Virtue","c":"Social Status","s":"Minor","d":"A bard of five or six years' training, ranked Cano or Cli, with a Local Reputation of 2 as a storyteller."},{"n":"Shadchan","k":"Virtue","c":"Social Status","s":"Minor","d":"A trusted Jewish marriage-arranger who matches families by wealth, background, and character."},{"n":"Simple Student","k":"Virtue","c":"Social Status","s":"Minor","d":"A university student without a degree yet (14-16), gaining 30 experience points per finished year in Latin or Artes Liberales."},{"n":"Sufi","k":"Virtue","c":"Social Status","s":"Minor","d":"A Muslim mystic seeking union with God through asceticism, led by a shaykh within a tariqa."},{"n":"Templar Administrator","k":"Virtue","c":"Social Status","s":"Minor","d":"Nominally a Templar brother, you really administer the order's many holdings and activities."},{"n":"Templar Office Holder","k":"Virtue","c":"Social Status","s":"Minor","d":"You hold a post in the local Templar hierarchy, such as deputy commander or marshal."},{"n":"Templar Specialist","k":"Virtue","c":"Social Status","s":"Minor","d":"A skilled Templar employee, such as a smith, notary, scribe, or translator, filling a needed role."},{"n":"Town Magistrate","k":"Virtue","c":"Social Status","s":"Minor","d":"A town judicial officer with a small staff of up to five minor officials."},{"n":"Troubadour/Trobairitz","k":"Virtue","c":"Social Status","s":"Minor","d":"A wandering minstrel-poet of the southern-French tradition, now spread across western Europe."},{"n":"University Grammar Teacher","k":"Virtue","c":"Social Status","s":"Minor","d":"You teach grammar to a university's younger members and may take Latin and Artes Liberales."},{"n":"Wise One","k":"Virtue","c":"Social Status","s":"Minor","d":"A mystic, seer, or healer of the common folk, usually magical and likely to take a supernatural Virtue."},{"n":"ʿAlim","k":"Virtue","c":"Social Status","s":"Minor","d":"A respected Muslim scholar learned in the Qur'an and religious law."},{"n":"Apprentice","k":"Virtue","c":"Social Status","s":"Free","d":"A Gifted child taken on by an experienced Hermetic magus, with the troupe's approval."},{"n":"Bard","k":"Virtue","c":"Social Status","s":"Free","d":"A trained poet-musician of the Gaelic tradition, accorded respect and able to take fitting Abilities."},{"n":"Covenfolk","k":"Virtue","c":"Social Status","s":"Free","d":"A member of a covenant's staff, supported by the covenant so your living standard matches its wealth."},{"n":"Craftsman","k":"Virtue","c":"Social Status","s":"Free","d":"You live by making and selling goods, usually as a free town resident; Wealthy and Poor apply normally."},{"n":"Domestic Animal","k":"Virtue","c":"Social Status","s":"Free","d":"You are an animal owned by a covenant or character, fed and housed in return for service."},{"n":"Hermetic Magus","k":"Virtue","c":"Social Status","s":"Free","d":"You are a member of the Order of Hermes; all magi must take this status, and only magi may."},{"n":"Laborer","k":"Virtue","c":"Social Status","s":"Free","d":"A trained worker whose valued trade provides a service rather than a finished good."},{"n":"Male Guild Sponsor","k":"Virtue","c":"Social Status","s":"Free","d":"A woman admitted to a male guild trade through her father or husband, and allowed to work it."},{"n":"Merchant","k":"Virtue","c":"Social Status","s":"Free","d":"You live by buying and selling, from peddler to traveling trader; Wealthy and Poor apply normally."},{"n":"Nuntius","k":"Virtue","c":"Social Status","s":"Free","d":"A university messenger who carries mail and money between students and their families."},{"n":"Paid Rights","k":"Virtue","c":"Social Status","s":"Free","d":"A formal allowance, chiefly for women, to hold an authority that society usually restricts to men."},{"n":"Peasant","k":"Virtue","c":"Social Status","s":"Free","d":"A free worker of the land who may hire labor if wealthy or be hired out if poor."},{"n":"Shamash","k":"Virtue","c":"Social Status","s":"Free","d":"The synagogue's servant, responsible for its upkeep and readiness for the community."},{"n":"Sofer","k":"Virtue","c":"Social Status","s":"Free","d":"The scribe who writes new Torah scrolls and repairs existing ones as the community requires."},{"n":"Templar Confrere/Consoeur","k":"Virtue","c":"Social
