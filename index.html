// --- storage shim: use Claude's window.storage if present, else localStorage ---
if(typeof window!=="undefined"&&!window.storage){window.storage={async get(key){const v=localStorage.getItem(key);return v==null?null:{key,value:v};},async set(key,value){localStorage.setItem(key,value);return{key,value};},async delete(key){localStorage.removeItem(key);return{key,deleted:true};},async list(prefix=""){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(prefix))keys.push(k);}return{keys};}};}const{useState,useEffect,useRef,useMemo,useCallback}=React;/* ============================================================
   ARS MAGICA — Hermetic Companion
   - Character (magus) creation + persistent roster
   - Grimoire of 372 spells (Iron-Bound Tome collection)
   - Casting Chamber: edit a spell's "words" (Te+Fo, R/D/T),
     watch the level recompute, then roll the stress die.
   Rules: ArM 5th Edition (stress/simple die, R/D/T magnitudes).
   ============================================================ */const SPELLS=[{"id":0,"name":"Soothe Pains of the Beast","level":"20","technique":"Creo","form":"Animal","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"316","description":["This spell looks much like a ritualistic \"laying on of hands\" seen in many churches. You kneel and press your hands to the wound while reciting a quiet incantation. The spell cures one Light Wound suffered by the animal."],"flavour":"","base":"15","modifiers":["+1 Touch"]},{"id":1,"name":"True Rest of the Injured Brute","level":"20","technique":"Creo","form":"Animal","requisites":[],"range":"Touch","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"316","description":["The injured target gets a +9 bonus to all Recovery rolls made while the spell is in effect."],"flavour":"","base":"4","modifiers":["+1 Touch","+3 Moon"]},{"id":2,"name":"Weaver's Trap of Webs","level":"35","technique":"Creo","form":"Animal","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"316","description":["In casting this spell, you point and from the indicated initial location, a huge net of spider webs grows, filling an area 5 paces by 5 paces by 6 feet high. With supports, the webs can hang vertically, forming a wall, otherwise they act like a net. When the webs are through growing after a few seconds, they are as thick as string and as strong as iron. Everyone caught in the area of the webs is immobilized. Getting free requires a Strength stress roll of 12+, or someone who is not trapped may use an edged weapon to free a victim, which takes three rounds. Contrary to widespread rumor, fire is ineffective against these webs. Webs may continue to trap victims in the future, as long as the spell lasts and they aren't completely hacked apart."],"flavour":"","base":"5","modifiers":["+2 Voice","+2 Sun","+2 Group (total mass of the spiderwebs is still less than ten basic Individuals"]},{"id":3,"name":"The Wizard's Mount","level":"35","technique":"Creo","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"316","description":["Creates a horse, which is normal in every way except that it is not disturbed by The Gift."],"flavour":"","base":"15","modifiers":["+1 Touch","+2 Sun","+1 size"]},{"id":4,"name":"Curse of the Ravenous Swarm","level":"50","technique":"Creo","form":"Animal","requisites":[{"art":"Rego","free":false}],"range":"Touch","duration":"Moon","durationWhile":"","target":"Group","ritual":true,"type":"standard","source":"ArM5 Core","page":"316","description":["Calls a swarm of locusts or other destructive insects upon an area, which destroys wild plant life and fields. When the spell's duration ends, all the insects disappear, leaving nothing but the damage. The Rego requisite ensures that the insects only devastate the area desired by the caster."],"flavour":"","base":"5","modifiers":["+1 Touch","+3 Moon","+2 Group","+2 size","+1 extra effect from requisite"]},{"id":5,"name":"Image of the Beast","level":"5","technique":"Intellego","form":"Animal","requisites":[],"range":"Arcane Connection","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"316","description":["Gives you a hazy mental image of an animal you have an Arcane Connection to. Wounds caused by an animal are an Arcane Connection to that animal with a lifetime of a few hours. This spell can thus be used to find out what was responsible for an attack. All spells cast by Chavin of Tytalus can be recognized because they promote or advocate war or violence. In his version of this spell, the claws and teeth of the beast appear more dangerous."],"flavour":"","base":"1","modifiers":["+4 Arcane Connection"]},{"id":6,"name":"Shiver of the Lycanthrope","level":"10","technique":"Intellego","form":"Animal","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Touch","ritual":false,"type":"standard","source":"ArM5 Core","page":"317","description":["You feel a sudden shiver if you are touching a person or beast that is actually a lycanthrope. Variants of this spell detect other types of shapechanger, but not Bjornaer with Heartbeasts."],"flavour":"","base":"4","modifiers":["+1 Concentration","+1 Touch"]},{"id":7,"name":"Opening the Tome of the Animal's Mind","level":"25","technique":"Intellego","form":"Animal","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"317","description":["You touch the head of the animal in question and read its memories of the past day. The further the animal is from human, the harder it is to read its memories accurately. If you simply scan the beast's memories, not looking for anything special, you get the memories the beast thinks are most important. If you are trying to get a specific fact, you need a Perception + Finesse stress roll against an Ease Factor of 6, or 12 if the fact is obscure. Since normal animals are sensitive to magic, they resist your touch and try to shy away from you both when the spell is cast and while the spell continues to function. This can be quite a problem with larger animals."],"flavour":"","base":"15","modifiers":["+1 Touch","+1 Concentration"]},{"id":8,"name":"Hunter's Sense","level":"30","technique":"Intellego","form":"Animal","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Hearing","ritual":false,"type":"standard","source":"ArM5 Core","page":"317","description":["You sense the shapes and primary motivations of all animals above a certain size that you can hear, or could hear if they were making a noise. You decide the size threshold when you cast the spell, such as \"all animals larger than a fox.\" The 'noise' of an animal's shape is louder the larger it is, while the 'noise' of its motivations increases depending on how intense the motivation is. A rabbit fleeing from a fox would sound fearful, very loudly. The fox's motivation might be fairly quiet, especially if recent hunting had been good."],"flavour":"","base":"4","modifiers":["+2 Sun","+3 Hearing","+1 for shape and primary motivation"]},{"id":9,"name":"Beast of Outlandish Size","level":"15","technique":"Muto","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"317","description":["Changes the Size of an animal by +1. This change modifies Strength by +2, the range for each wound level increases by one, and Quickness falls by one. The new beast is of huge size, and looks much more impressive than its former self. Townspeople may run in fear of it, and there is little doubt among them that it is a creature of magic."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":10,"name":"Doublet of Impenetrable Silk","level":"15","technique":"Muto","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Change an item made of animal material — silk, wool, or leather — so it cannot be cut or penetrated by weapons. A simple cloth doublet becomes the equivalent of armor with no Load and a +3 Soak bonus. Armor made of guilted material or any kind of leather improves its Protection by an additional +3. The magic does not make the armor better at absorbing shock, so this +3 bonus is the limit that can be bestowed without changing the material into something completely different. At the storyguide's option, the bonus given by this spell may not apply against strictly blunt weapons like clubs and staves."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":11,"name":"Growth of the Creeping Things","level":"15","technique":"Muto","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Causes an insect, mouse, toad, or other small (Size -8 or smaller) creature to grow to four times its normal size. If it was venomous before, it is even more venomous now. Semi-venomous creatures, like most spiders, have poison with an Ease Factor of 6 that does a Light Wound."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun"]},{"id":12,"name":"Beast of Minuscule Proportions","level":"20","technique":"Muto","form":"Animal","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Reduces the size of an animal by 2. This modifies Strength by -4, reduces the range for each wound type by two points, and increases Quickness by +2. The beast appears to be the runt of its litter."],"flavour":"","base":"","modifiers":["+2 Voice","+2 Sun"]},{"id":13,"name":"The Beast Remade","level":"25","technique":"Muto","form":"Animal","requisites":[{"art":"Corpus","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Gives one land beast a human form, though its intellect remains the same. Some feature of the animal is retained in the human form. A former dog might have an exceptionally hairy human body, and a former cat might let loose an occasional \"meow.\" Once transformed, the beast is disoriented for a while before it becomes used to its new body."],"flavour":"","base":"10","modifiers":["+1 Touch","+2 Sun"]},{"id":14,"name":"Transformation of the Ravenous Beast to the Torpid Toad","level":"25","technique":"Muto","form":"Animal","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Turns any animal into a toad. A newly created toad will hold a certain terror for peasants and serfs, because many believe toads exude a poisonous substance from their skin."],"flavour":"","base":"5","modifiers":["+2 Voice","+2 Sun"]},{"id":15,"name":"Steed of Vengeance","level":"35","technique":"Muto","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Turns a horse into a ferocious magical mount. Its coat becomes a deep black and its eves a fiery red, its teeth transform into fangs, its hooves become razor-sharp, and it occasionally breathes steam from its mouth — the horse seems a creature from Hell itself. All its Attack rolls get a +5 bonus. The horse tolerates a magus rider. When the spell wears off, the horse must make a Stamina stress roll against an Ease Factor of 9 or die from shock."],"flavour":"","base":"15","modifiers":["+1 Touch","+2 Sun","+1 size"]},{"id":16,"name":"Decay Fur and Hide","level":"10","technique":"Perdo","form":"Animal","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["Destroys an object made of animal fur or hide, including wool and leather. Marius of Tremere's version of this spell has the target disappear in an impressive puff of smoke."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":17,"name":"Agony of the Beast","level":"15","technique":"Perdo","form":"Animal","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"318","description":["After you point at the beast and cast this spell, it begins lashing wildly about, upsetting any nearby objects, and howling in great pain. In order to do anything else, the beast must make a Stamina + Size stress roll against an Ease Factor of 9 each round."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Concentration"]},{"id":18,"name":"Blunt the Viper's Fangs","level":"20","technique":"Perdo","form":"Animal","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["Blunt the claws, teeth, talons, or other natural weapons of a beast. Only sharp weapons may be affected: this spell does not affect a weapon such as a horse's hoof or a giant snake's coils. The blunted weapon has its total damage (including Attack Advantage) reduced to half (round up). The beast may recover from the effect as if it were a Light Wound. The spell may affect animals of size up to +4."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 size"]},{"id":19,"name":"The Falcon's Hood","level":"25","technique":"Perdo","form":"Animal","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["Destroys an animal's vision. The blindness heals as if it is a Medium Wound. The title refers to the hood used to cover a falcon's eyes when it is not hunting. When cast by Asaron of Flambeau, this spell causes the animals it targets to bear a faint silhouette of a flame in their eves."],"flavour":"","base":"20","modifiers":["+1 Touch"]},{"id":20,"name":"Cripple the Howling Wolf","level":"25","technique":"Perdo","form":"Animal","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["When casting this spell, you commonly make an abrupt snapping motion with your hands. One of the target's legs breaks cleanly. The animal cannot walk on that leg, but the damage heals as a Medium Wound. Note that the target need not be a wolf, and that you cannot choose which leg."],"flavour":"","base":"15","modifiers":["+2 Voice"]},{"id":21,"name":"Ward against the Beasts of Legend","level":"General","technique":"Rego","form":"Animal","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"319","description":["No magical beast whose Magic Might is equal to or less than the level can affect anyone within the Circle or, if it is within the Circle, affect those outside. When a magus is making this and most other wards, a common gesture employed is the Fig Sign. The magus balls his or her right hand into a fist, placing the thumb between the index and middle fingers. A magus traveling to Italy should be warned that this sign is a deadly insult in that country."],"flavour":"","base":"","modifiers":[]},{"id":22,"name":"Disguise of the Putrid Aroma","level":"5","technique":"Rego","form":"Animal","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["The target takes no interest in you as long as you continue to concentrate, and do not threaten it. A carnivore treats you as if you were simply something it does not eat. It retains normal interest, however, in anyone else nearby."],"flavour":"","base":"2","modifiers":["+2 Voice","+1 Concentration"]},{"id":23,"name":"Circle of Beast Warding","level":"5","technique":"Rego","form":"Animal","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["The caster inscribes a circle that no normal beast will cross."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Ring"]},{"id":24,"name":"Soothe the Ferocious Bear","level":"10","technique":"Rego","form":"Animal","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["Calms an animal until it is threatened or aroused again. You must speak soothingly or musically to it, and something as simple as approaching it may arouse it again."],"flavour":"","base":"4","modifiers":["+2 Voice"]},{"id":25,"name":"Panic of the Elephant's Mouse","level":"15","technique":"Rego","form":"Animal","requisites":[],"range":"Eye","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"319","description":["Makes an animal afraid of the target by preying upon its instinctive fears, causing it to attempt escape by the quickest, most feasible means possible. The animal may make a Size stress roll against an Ease Factor of 9 to resist. (The title refers to the elephant's legendary fear of mice, but note that this spell cannot actually affect elephants, as they are too large.)"],"flavour":"","base":"5","modifiers":["+1 Eye","+1 Concentration"]},{"id":26,"name":"Viper's Gaze","level":"15","technique":"Rego","form":"Animal","requisites":[],"range":"Eye","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"320","description":["Holds an animal rigid as long as you maintain eye contact with it and concentrate on it."],"flavour":"","base":"5","modifiers":["+1 Eye","+1 Concentration"]},{"id":27,"name":"The Gentle Beast","level":"25","technique":"Rego","form":"Animal","requisites":[],"range":"Eye","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"320","description":["Calms an animal, making it nearly fearless. It does not resist being ridden, shaved, or whatever else you can think of. If the animal enters combat, is extremely frightened, or incurs any kind of wound, the spell ends. The animal must be Size +4 or less."],"flavour":"","base":"10","modifiers":["+1 Eye","+1 Concentration","+1 size"]},{"id":28,"name":"Mastering the Unruly Beast","level":"25","technique":"Rego","form":"Animal","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"320","description":["You can make an animal perform any act it is capable of. You can only issue new commands while touching the animal, but the animal will carry them out without requiring constant contact. Further, the animal will allow you to touch it throughout the duration of the spell. It is difficult to maintain control of particularly stubborn or fierce animals, such as mules or boars — creatures with appropriate Personality Traits may roll against an Ease Factor of 12 each round. When Chavin of Tytalus casts this spell, the creature acts surly and unfriendly while going about its tasks, even when Chavin doesn't specifically tell it to act that way."],"flavour":"","base":"15","modifiers":["+1 Touch","+1 Concentration"]},{"id":29,"name":"Commanding the Harnessed Beast","level":"30","technique":"Rego","form":"Animal","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"320","description":["You implant a complicated command into an animal, which it carries out to the best of its abilities. The command must involve completing a certain task, such as finding a certain person. Vague orders, like \"protect me,\" do not work. If the animal does not complete the task before the end of the spell approaches, it becomes desperately ferocious, especially at night."],"flavour":"","base":"15","modifiers":["+1 Touch","+2 Sun"]},{"id":30,"name":"Footsteps of Slippery Oil","level":"5","technique":"Creo","form":"Aquam","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"320","description":["From each of the next ten footsteps the caster of this spell takes, nonflammable grease spreads out, leaving a slick area 10 paces wide. Dexterity stress rolls are required to remain upright whenever a character on the oil does something more challenging than walking. A roll against an Ease Factor of 6 is needed for the average maneuver, with Ease Factors of up to 15 needed to (for example) make a right turn at full speed on a smooth, greased surface. The duration is the length of time that the oil lasts. This spell was invented by a rather good-natured magus, and the gestures associated with the most common variations of the spell are as comical as the effects themselves. You stand first on one leg, and then the other, vigorously rubbing the bottom of each upturned foot, as if spreading on a salve."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Diam"]},{"id":31,"name":"Creeping Oil","level":"15","technique":"Creo","form":"Aquam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"321","description":["Saturates a porous material with flammable oil. When casting this spell, you make a flicking motion with your index finger and thumb, as if propelling something at the target. A dot of oil appears on the target after the spell is finished, and slowly spreads over the target, saturating enough cloth to cover a person. If used on a person's clothes and ignited, the oil does +12 damage the first round, +6 the second, and +0 the third."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun"]},{"id":32,"name":"Mighty Torrent of Water","level":"20","technique":"Creo","form":"Aquam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"321","description":["A 3-foot-diameter jet of water sprays from your outstretched arms towards your target. The target of this gusher of water takes +10 damage and must make a Strength + Size stress roll against an Ease Factor of 9 or be sent flying back. Marbaid of Flambeau's wizard's sigil is connected to his obsession with blood. In his version of the spell the target is hit by a gush of blood, and the stains do not go away until sunrise/sunset. This does not require a requisite, as it is a purely cosmetic effect."],"flavour":"","base":"10","modifiers":["+2 Voice"]},{"id":33,"name":"Deluge of Rushing and Dashing","level":"40","technique":"Creo","form":"Aquam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"321","description":["Causes a stream to flood, starting at the stream's nearest point to you and continuing downstream. The results of this spell are generally quite impressive. As the stream overflows its original bed, it becomes a raging torrent, sucking in everything near it. Damage from the spell can last for many years. As long as you concentrate, the stream remains at flood levels. Anyone caught near the stream when it floods is struck by the rush of water (+10 damage), caught up in the flood, and dragged along. Every round, a victim makes a Strength + Swim stress roll against an Ease Factor of 9. Success means the character escapes the flood. Otherwise, the character loses one Fatigue level and takes +5 damage. Any who fall unconscious drown. This roll is repeated until the character either escapes the flood or dies."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Concentration","+3 size"]},{"id":34,"name":"Clear Sight of the Naiad","level":"5","technique":"Intellego","form":"Aquam","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"321","description":["You can see as clearly through water as through air, for a single moment."],"flavour":"","base":"1","modifiers":["+4 Vision"]},{"id":35,"name":"Subtle Taste of Poison and Purity","level":"5","technique":"Intellego","form":"Aquam","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Taste","ritual":false,"type":"standard","source":"ArM5 Core","page":"321","description":["You can taste all of the properties of any liquid or mixture of liquids. Unlike *Touch of the Pearls*, you can use this sense on any number of liquids during the duration of the spell, but you must taste the liquids in question."],"flavour":"","base":"4","modifiers":["+1 Concentration"]},{"id":36,"name":"Touch of the Pearls","level":"5","technique":"Intellego","form":"Aquam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"322","description":["Tells you whether a liquid you hold or touch is poisonous, just as a pearl sometimes does. Safer than Subtle Taste of Poison and Purity, as you don't have to taste the possibly poisonous liquid. In Verdan of Ex Miscellanea's version of the spell, poisonous liquids turn a faint green. According to his sigil, all his spells involve the color green."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":37,"name":"Call of the Rushing Waters","level":"15","technique":"Intellego","form":"Aquam","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"322","description":["Allows you to find any natural body of water for which you have an Arcane Connection (for example, a vial of water from it). Once you cast the spell, you can hear the water while you concentrate. Following the sound eventually brings you to the water, but you must make simple Perception rolls against an Ease Factor of 6 to follow the sound accurately (roll once per day for long journeys). If you break concentration, you must cast the spell again. A body of water that does not move or that makes little noise requires a roll against an Ease Factor of 9 to be traced."],"flavour":"","base":"2","modifiers":["+4 Arcane Connection","+1 Concentration"]},{"id":38,"name":"Voice of the Lake","level":"25","technique":"Intellego","form":"Aquam","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"322","description":["You can hold a conversation with a body of water. A body of water usually knows about things directly in contact with it, such as boats and fish. Genuine lakes are too complex for this spell to affect; they are not Individuals of Aquam."],"flavour":"","base":"15","modifiers":["+1 Touch","+1 Concentration"]},{"id":39,"name":"Enchantment of the Scrying Pool","level":"30","technique":"Intellego","form":"Aquam","requisites":[{"art":"Imaginem","free":false}],"range":"Touch","duration":"Year","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"322","description":["Turns a body of water into a scrying pool. Innately magical people (including most companions with mystical powers) who look into the pool can see any spot they know of that is within sight of some natural body of water. The view you get is the same view that someone would have from a low boat on the water either close to shore or far from shore, as desired. Maximum range for scrying is 500 miles; the range of the spell is the range to the pool when the spell is cast. This ritual is not entirely of Hermetic magic, and does not conform to the normal InAq guidelines. It is an old Mercurian ritual that has become known throughout the Order, and which appears to use one body of water as an Arcane Connection to any other body of water. A number of theoreticians would like to make that work more generally, but so far this has not proved possible."],"flavour":"","base":"","modifiers":[]},{"id":40,"name":"Incantation of Putrid Wine","level":"15","technique":"Muto","form":"Aquam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"322","description":["Makes all liquids within the target room vile, and malodorous. The room where this spell is cast may not lose the stench for weeks or months. Note that this spell only affects liquids that are in the room when it is cast, and they remain malodorous even if removed from the room."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Sun","+2 Room"]},{"id":41,"name":"Lungs of the Fish","level":"20","technique":"Muto","form":"Aquam","requisites":[{"art":"Auram","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Turns water into air as it enters your lungs, allowing you to breathe water as you do air. This spell puzzles Hermetic theoreticians, as it behaves like a dynamic container target despite not being a container target. All known attempts to create analogous effects have failed, even though analysis of this spell has not revealed any sign of non-Hermetic influence, or integrated experimentation. Most magi just point to it as an example of how Hermetic magic is not fully understood, and get on with their lives."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Sun","+1 Part"]},{"id":42,"name":"Vile Water of Sterility","level":"45","technique":"Muto","form":"Aquam","requisites":[],"range":"Touch","duration":"Year","durationWhile":"","target":"Group","ritual":true,"type":"standard","source":"ArM5 Core","page":"323","description":["Ruins a body of water up to the size of a small lake, making it unfit for natural habitation and consumption. The water becomes dark and murky, and noxious fumes emanate from it. Vegetation on the banks either dies or becomes corrupt. Nearby trees become gnarled and blackened, and land animals flee the area."],"flavour":"","base":"4","modifiers":["+1 Touch","+4 Year","+2 Group","+2 size"]},{"id":43,"name":"Comfort Of The Drenched Traveler","level":"5","technique":"Perdo","form":"Aquam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Dries a person and his or her clothes."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":44,"name":"Parching Wind","level":"20","technique":"Perdo","form":"Aquam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Removes most of the water from any object, including plants (with a Herbam requisite), possibly making the object brittle and fragile. With a Corpus or Animal requisite, the spell can affect humans or animals. This causes +10 damage, against which armor is no defense, and makes the target extremely thirsty."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Part"]},{"id":45,"name":"Closing the Earth's Gate","level":"25","technique":"Perdo","form":"Aquam","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Dries a single spring, so that it never flows again. This spell targets the spring, not the water in it at a particular time, so the spring does not start to flow again later."],"flavour":"","base":"20","modifiers":["+1 Touch"]},{"id":46,"name":"Curse of the Desert","level":"25","technique":"Perdo","form":"Aquam","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Removes virtually all the fluid from the target's body, doing +15 damage, which armor does not protect against. The target must drink within a few minutes of being struck with this spell, or it dies. Casting requisites are Animal for beasts, and Corpus for humans."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Part"]},{"id":47,"name":"Calling the Odious Drought","level":"50","technique":"Perdo","form":"Aquam","requisites":[{"art":"Auram","free":false}],"range":"Touch","duration":"Year","durationWhile":"","target":"Boundary","ritual":true,"type":"standard","source":"ArM5 Core","page":"323","description":["Causes a drought over the surrounding area. Only one-tenth the normal rain falls, streams dry up, and rivers dwindle."],"flavour":"","base":"5","modifiers":["+1 Touch","+4 Year","+4 Boundary"]},{"id":48,"name":"Ward against Faeries of the Waters","level":"General","technique":"Rego","form":"Aquam","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"323","description":["No water faerie whose Faerie Might is equal to or less than the level of the spell can affect those targeted by the spell. Faeries cannot directly or indirectly break the magic circle, nor can they use ranged attacks or magic to affect those within it. Seen from certain angles at night, the ring appears as a light blue dome."],"flavour":"","base":"","modifiers":[]},{"id":49,"name":"Cloak of the Duck's Feathers","level":"5","technique":"Rego","form":"Aquam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"323","description":["Makes water run off one object or creature, protecting the target and the target's apparel from dampness. The spell is broken if the target is submerged in water."],"flavour":"","base":"1","modifiers":["+1 Touch","+2 Sun","+1 for slightly unnatural control"]},{"id":50,"name":"Break the Oncoming Wave","level":"10","technique":"Rego","form":"Aquam","requisites":[],"range":"Personal","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Breaks all waves and torrents of water (including magical ones) just before they touch you. The water either crashes to the ground or flows around you in a truly impressive display. In Ferramentum of Verditius's version of this spell, the water breaks precisely one inch from the target, leaving a very clean line showing where the waves stopped. All of his spells may be recognized by their orderliness."],"flavour":"","base":"5","modifiers":["+1 Conc"]},{"id":51,"name":"Breath of Winter","level":"15","technique":"Rego","form":"Aquam","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Turns a circle of water up to five paces across into snow. The Duration ensures that it will not melt until the spell expires, no matter how warm the weather."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+1 Part"]},{"id":52,"name":"Push of the Gentle Wave","level":"15","technique":"Rego","form":"Aquam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["A low wave is formed to propel a small boat slowly through the water. When casting this spell, you commonly make a pushing gesture. This spell, and other similar ones, pick out a particular current in the body of water and make it behave as desired, and thus have Individual Targets. In Silva of Merinita's version of this spell, the wave occasionally drifts or bobs about, as if it is happy and playful."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Conc"]},{"id":53,"name":"Bridge of Frost","level":"30","technique":"Rego","form":"Aquam","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Causes a thick layer of frost (firm enough to walk on) to form on the surface of a body of water. The frost can take any shape up to fifteen paces in any direction. In Cralian of Tremere's version of this spell, the frost is so crystal clear that it can hardly be seen. All of his spells are very subtle."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+1 Part","+1 size","+1 to allow various shapes"]},{"id":54,"name":"Chaos of the Angry Waves","level":"30","technique":"Rego","form":"Aquam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Causes water to churn wildly, overturning small water craft and forcing Swim rolls at -6, in a circular area 20 paces across."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Conc","+1 Part","+1 size"]},{"id":55,"name":"Parting the Waves","level":"30","technique":"Rego","form":"Aquam","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Parts a body of water, revealing a dry path 5 paces wide along the bottom. Very large bodies of water are too large for the Group target, and are thus unaffected."],"flavour":"","base":"10","modifiers":["+1 Touch","+1 Conc","+2 Group"]},{"id":56,"name":"Waves of Drowning and Smashing","level":"30","technique":"Rego","form":"Aquam","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Raises a wave 5 feet high and 30 paces wide, which can submerge swimmers, overturn rowboats, and damage sailing ships. It starts as a small, curved wave and grows for the first 10 paces, at which point it reaches maximum size. If it travels 100 paces without striking an object large enough to break it up, it dissipates."],"flavour":"","base":"10","modifiers":["+3 Sight","+1 size"]},{"id":57,"name":"Ice of Drowning","level":"35","technique":"Rego","form":"Aquam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"324","description":["Turns part of the water in a circle 10 paces across into large, jagged chunks of ice and drives them to pound against anything on the water's surface. The ice can punch holes in small boats but does not damage ships. Any swimmers in the area take +15 damage, and suffer -6 and two extra botch checks on Swim rolls."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Concentration","+1 Part","+1 size","+1 additional effect"]},{"id":58,"name":"Pull of the Watery Grave","level":"35","technique":"Rego","form":"Aquam","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"325","description":["Creates a strong undertow that pulls any object smaller than a rowboat 25 fathoms (150 feet) into the depths. Each of those caught in the undercurrent must make a Strength + Swim stress roll against an Ease Factor of 9 to avoid being dragged down. A roll is made each round that the spell is maintained."],"flavour":"","base":"10","modifiers":["+3 Sight","+1 Conc","+1 size"]},{"id":59,"name":"Tower of Whirling Water","level":"35","technique":"Rego","form":"Aquam","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"325","description":["From a large body of water you form a waterspout that moves under your mental direction. It causes a simple die + 15 damage to anyone it hits (no Attack roll necessary). In addition, those struck must make a Quickness stress roll against an Ease Factor of 6 to avoid being sucked up by the waterspout. Those who fail are helplessly pulled into the spout and begin to drown immediately. When the waterspout fails, they fall up to 20 feet to the water's surface. If you direct the waterspout to move across land, you must make an Intelligence + Concentration stress roll against an Ease Factor of 9 each round to maintain it."],"flavour":"","base":"10","modifiers":["+2 Voice","+1 Conc","+2 Group"]},{"id":60,"name":"Neptune's Wrath","level":"40","technique":"Rego","form":"Aquam","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"325","description":["A gigantic wave is created in a very large body of water. The wave, which is only 20 feet high but up to a mile wide, is capable of capsizing ships at sea, smashing and drowning people near shore, and seriously damaging coastline communities. The tidal wave needs 5 miles of water surface to build itself up to proper proportions. The magus cannot control the wave without casting another spell."],"flavour":"","base":"10","modifiers":["+3 Sight","+3 size"]},{"id":61,"name":"Air's Ghostly Form","level":"5","technique":"Creo","form":"Auram","requisites":[],"range":"Touch","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"325","description":["A thick fog forms around the magus, extending outwards for several paces. A breeze can push the fog around. The fog dissipates at its natural rate, and may be too thin to restrict sight within a minute."],"flavour":"","base":"2","modifiers":["+1 Touch","+1 Diam","+1 unnatural (the spell can be cast indoors"]},{"id":62,"name":"Chamber of Spring Breezes","level":"5","technique":"Creo","form":"Auram","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"325","description":["Creates a breeze of fresh air that continually moves throughout a room, keeping the air continuously breathable even if the room is airtight. Rose of Jerbiton's version of this spell always causes the air to smell of roses. The breeze can be created outdoors, but there it has little effect."],"flavour":"","base":"1","modifiers":["+1 Touch","+2 Sun","+1 unnatural"]},{"id":63,"name":"Jupiter's Resounding Blow","level":"10","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Creates a thunderclap, anyone directly underneath must make a Stamina stress roll against an Ease Factor of 9 or be deafened. If deafened, the target gets another Stamina simple roll each minute against the same Ease Factor and recovers on a success. If the first roll botches, the victim is rendered deaf for a month."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 unnatural (the spell functions indoors"]},{"id":64,"name":"Stench of the Twenty Corpses","level":"10","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Creates a horrible stench of rotting corpses. All those within fifty paces of the target point must make Stamina stress rolls against an Ease Factor of 6 or act with a -3 penalty on all rolls. Anyone who botches the roll vomits and is incapacitated for (10 - Stamina) rounds."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Diam"]},{"id":65,"name":"Wreaths of Foul Smoke","level":"10","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Thick, yellow, sulfurous smoke rises up from the spot you designate, spreading and thinning naturally, but thick enough to block sight in a radius of about five paces around the point of origin. For each round anyone breathes the smoke, a Stamina stress roll against an Ease Factor of 3 must be made or a Fatigue level is lost. Once a character is Unconscious, further failed rolls result in the character taking a Light Wound each time. The area where the spell is cast will be damaged: small plants wilt and die, and tree growth is stunted. A faint stench of sulfur clings for days to anything exposed to the smoke."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Diam"]},{"id":66,"name":"Broom of the Winds","level":"15","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Whips up violent, swirling winds around the target. The target must make a Size stress roll against an Ease Factor of 9 to remain standing. If the target is braced or holding onto some support, he may also make a Strength stress roll against an Ease Factor of 9. If both rolls fail, the target is knocked in a random direction. The target may be damaged, depending on whether he strikes anything."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 unnatural"]},{"id":67,"name":"Charge of the Angry Winds","level":"15","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["A wall of wind roars away from you, starting up to 10 paces away and continuing until it dissipates naturally. The wind is confined by any existing barriers, but if unconfined it can be up to a hundred paces wide. All within the area must make a Dexterity + Size stress roll against an Ease Factor of 9 or fall down and be blown along by the winds. The rolls must be made at the start of the gale and each subsequent round that the wind is maintained. You must concentrate on the gale. Missile fire into or out of the gale is futile, and marching against the gale requires a Strength + Size stress roll against an Ease Factor of 15. Failure in this attempt mandates another Dexterity + Size stress roll against an Ease Factor of 12 to keep from falling."],"flavour":"","base":"3","modifiers":["+2 Voice","+1 Conc","+1 unnatural"]},{"id":68,"name":"Circling Winds of Protection","level":"20","technique":"Creo","form":"Auram","requisites":[{"art":"Rego","free":false}],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Surrounds you with winds that circle at great speed. Since the wind picks up dust and other small, loose objects, you may be obscured. Anyone standing near enough to attack you with a hand weapon must make a Size stress roll against an Ease Factor of 9 at the beginning of each round or be blown back. Melee Attack rolls against you are at –3, and missile or thrown attacks are at –9."],"flavour":"","base":"3","modifiers":["+1 Touch","+1 Conc","+2 unnatural","+1 Rego effect"]},{"id":69,"name":"Clouds of Rain and Thunder","level":"25","technique":"Creo","form":"Auram","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Creates a small but severe rainstorm, including lightning and winds. The storm gathers and breaks in a few seconds as the caster concentrates, and dissipates with similar speed when he stops doing so. Note that reducing the Range for this spell makes the storm increasingly unnatural, so versions of this spell with lower Range still have the same level."],"flavour":"","base":"3","modifiers":["+3 Sight","+1 Conc","+2 Group"]},{"id":70,"name":"Clouds of Summer Snow","level":"25","technique":"Creo","form":"Auram","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Creates clouds that drop snow over an area about half a mile across. The clouds gather over a few seconds at the beginning of the spell, and dissipate over the same sort of time when the caster stops concentrating. The spell does not affect temperature."],"flavour":"","base":"2","modifiers":["+3 Sight","+1 Conc","+2 Group","+1 Size"]},{"id":71,"name":"Pull of the Skybound Winds","level":"30","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Makes winds rise upward, pulling one object, creature, or person up to 50 feet into the sky before letting that target drop. Even a small building can be torn from its foundation, though such a building can be no larger than 20 feet to a side, and cannot be built out of a material heavier than stout wood. Uprooted objects fall randomly, unless you make a Finesse stress roll against an Ease Factor of 12 to choose where the objects will fall."],"flavour":"","base":"5","modifiers":["+2 Voice","+1 Conc","+2 unnatural"]},{"id":72,"name":"Wings of the Soaring Wind","level":"30","technique":"Creo","form":"Auram","requisites":[{"art":"Rego","free":false}],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"326","description":["Generates a massive gust of air around you that supports and pushes you along through the air at speeds up to 40 miles per hour. Hovering in place is difficult, and requires a Finesse roll against an Ease Factor of 9 per round. It is dangerous for extended travel, because if you lose concentration, you are likely to sustain serious injuries (+15 damage, on average, although it may be more if the magus was very high up)."],"flavour":"","base":"5","modifiers":["+1 Touch","+1 Conc","+2","+1 Rego requisite"]},{"id":73,"name":"The Incantation of Lightning","level":"35","technique":"Creo","form":"Auram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"327","description":["A lightning bolt shoots forth from your outstretched hand in the direction you are pointing, doing +30 damage to a single target it hits. There must be nothing between you and the target. Those near the target must make Size stress rolls against an Ease Factor of 6 to remain standing."],"flavour":"","base":"5","modifiers":["+2 Voice","+4 unnatural"]},{"id":74,"name":"Breath of the Open Sky","level":"40","technique":"Creo","form":"Auram","requisites":[],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"327","description":["You can call up a wind capable of devastating the countryside. You must stand under the open sky to cast this spell. While you cast the spell, a breeze picks up, blowing from you in the direction you are facing. When the ritual is completed, the wind strengthens to a gale roaring over the visible countryside and beyond, strong enough to topple wooden structures and knock down trees. The wind does not weaken while it is within your sight, but loses its force naturally where you cannot see it. If you turn away from your original facing for more than a few seconds, you have to make a Concentration roll against an Ease Factor of 12 to maintain the spell. If you turn away for a minute or more, the spell ends. The air behind you is still."],"flavour":"","base":"5","modifiers":["+1 Touch","+1 Conc","+4 size","+1 unnatural"]},{"id":75,"name":"Wrath of Whirling Winds and Water","level":"65","technique":"Creo","form":"Auram","requisites":[],"range":"Sight","duration":"Sun","durationWhile":"","target":"Group","ritual":true,"type":"standard","source":"ArM5 Core","page":"327","description":["This spell creates an immense storm. 40 or more miles wide, of hurricane intensity. The storm builds up while you cast the ritual, and dissipates in a few seconds when the spell's duration ends. The gale-force winds and lashing waves cause immense damage along shorelines, and the winds, rain, and lightning cause extensive damage inland as well. Visibility is reduced to a few paces, missile fire is futile, and travel is nearly suicidal. Weak structures are blown over, and all but the most seaworthy ships are certain to founder unless they can be beached before the storm reaches full intensity. The storm is not under the caster's control, and moves normally."],"flavour":"","base":"5","modifiers":["+3 Sight","+2 Sun","+2 Group","+5 size"]},{"id":76,"name":"Sailor's Foretaste of the Morrow","level":"15","technique":"Intellego","form":"Auram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"327","description":["You know precisely what tomorrow's weather will be, and you gain a general impression about the weather for the week ahead. This intuition only applies to the place where you cast the spell, and is based on extrapolating current conditions, so it is occasionally wrong (precise, but inaccurate). Still, it would take something like an interfering magical being, or a volcanic eruption, to throw the prediction off."],"flavour":"","base":"4","modifiers":["+1 Touch","+2 Group"]},{"id":77,"name":"True Sight of the Air","level":"15","technique":"Intellego","form":"Auram","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Vision","ritual":false,"type":"standard","source":"ArM5 Core","page":"327","description":["Lets you see clearly through all manner of obfuscation in the air nearby, including smoke, fog, and dust, even if the obfuscation is magical."],"flavour":"","base":"1","modifiers":["+2 Sun","+4 Vision"]},{"id":78,"name":"Whispering Winds","level":"15","technique":"Intellego","form":"Auram","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"327","description":["The winds bear their tidings to your ears, allowing you to hear words spoken by any group of people within your line of sight, provided no solid barrier (including glass) intervenes. This spell is an adaptation of an effect known to Bjornaer the Founder, and fits poorly into the normal framework of Hermetic magic."],"flavour":"","base":"","modifiers":[]},{"id":79,"name":"Eyes of the Bat","level":"25","technique":"Intellego","form":"Auram","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Hearing","ritual":false,"type":"standard","source":"ArM5 Core","page":"327","description":["You can move about confidently in complete darkness by sensing air and its boundaries (for example, where solid objects are). You 'hear' the boundaries of the air, so it does not permit fine discriminations. On the other hand, you can 'hear' boundaries behind you."],"flavour":"","base":"4","modifiers":["+2 Sun","+3 Hearing"]},{"id":80,"name":"Rain of Stones","level":"20","technique":"Muto","form":"Auram","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"328","description":["Reg: Terram","Turns rain into stones as it falls, causing +0 damage every two rounds (they're small stones), and maybe less if the rain is very light. People under cover are not affected. The stones revert to water when the spell expires. If it stops raining before the spell ends, no more rain is transformed, even if a different rain storm starts."],"flavour":"","base":"4","modifiers":["+2 Voice","+2 Sun"]},{"id":81,"name":"Talons of the Winds","level":"20","technique":"Muto","form":"Auram","requisites":[{"art":"Rego","free":false}],"range":"Voice","duration":"Diameter","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"328","description":["Transforms a wind into an abrasive medium that tears and claws at everything in its path. Soft materials like leaves and cloth are shredded, and people take +4 damage from innumerable bloody cuts and abrasions. This spell cannot be cast if there is not a breeze of some sort blowing, thus making it difficult to use effectively indoors. The caster is not affected by the spell, even if the wind is blowing directly at him. In Ossium of Bjornaer's version of this spell a strange keening can be heard in the air as it cuts through targets. Ossium's wizard's sigil manifests by making many of his spells eerie or frightening."],"flavour":"","base":"4","modifiers":["+2 Voice","+1 Diam","+1 Rego requisite (additional effect: protect the caster"]},{"id":82,"name":"Infernal Smoke of Death","level":"40","technique":"Muto","form":"Auram","requisites":[],"range":"Voice","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"328","description":["Turns normal smoke from a fire into a thick, corrosive cloud. Anyone immersed in the cloud of smoke takes +25 corrosion damage, against which armor provides only half its normal Protection value. Soft materials like cloth, fur, paper, and leather are charred and ruined by exposure to the noxious vapor. While you concentrate, any new smoke becomes corrosive. The smoke is heavier than air, so rolls along the ground, pooling in low spots. The damage represents normal exposure to the vapor, and may be modified if characters spend unusually short or long times within it."],"flavour":"","base":"25","modifiers":["+2 Voice","+1 Conc"]},{"id":83,"name":"Fog of Confusion","level":"45","technique":"Muto","form":"Auram","requisites":[{"art":"Imaginem","free":false},{"art":"Rego","free":false}],"range":"Touch","duration":"Year","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"328","description":["Turns a bank of fog up to six miles across into a silvery mist too thick to see through. Random screams, thumps, hisses, and other noises harass and confuse anyone within the fog, perhaps even leading them into danger. People have extreme difficulty navigating through the fog, especially through unknown territory. No more than seven people, who must be present at the ritual, can see normally through the fog. The fog does not dissipate until the spell expires."],"flavour":"","base":"2","modifiers":["+1 Touch","+4 Year","+4 Size","+1 Imaginem requisite","+1 Rego requisite"]},{"id":84,"name":"Rain of Oil","level":"50","technique":"Muto","form":"Auram","requisites":[{"art":"Aquam","free":false}],"range":"Sight","duration":"Sun","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"329","description":["Turns rain into droplets of oil. Within the spell's duration, the rain of oil continues as long as the storm does, drenching the landscape with flammable liquid. The oil will evaporate at a natural rate after the rain ceases. A Creo Ignem spell can ignite the storm so that the oil burns as it falls, but this requires a Group target large enough to catch all the raindrops. Lighting the oil after it has landed is much easier."],"flavour":"","base":"4","modifiers":["+3 Sight","+2 Sun","+5 size"]},{"id":85,"name":"Room of Stale Air","level":"15","technique":"Perdo","form":"Auram","requisites":[],"range":"Voice","duration":"Momentary","durationWhile":"","target":"Room","ritual":false,"type":"standard","source":"ArM5 Core","page":"329","description":["Makes the air in a room stuffy and uncomfortable. Any creatures that breathe air suffer a –3 penalty on all rolls involving physical exertion. In addition, for each round of exertion a character must make a simple Stamina roll against an Ease Factor of 6 or lose a Fatigue level. This may cause panic in some creatures or people. The speed at which the air refreshes itself depends on how well ventilated the room is."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Room"]},{"id":86,"name":"Quiet the Raging Winds","level":"20","technique":"Perdo","form":"Auram","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"329","description":["Stops all wind from blowing, leaving only calm air. This spell is not powerful enough to affect winds caused by Ritual magic, and only affects winds blowing on the caster when it is cast. Under normal circumstances, the winds will not pick up again for at least an hour or so."],"flavour":"","base":"5","modifiers":["+1 Touch","+2 Group"]},{"id":87,"name":"The Cloudless Sky Returned","level":"45","technique":"Perdo","form":"Auram","requisites":[],"range":"Sight","duration":"Momentary","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"329","description":["This spell clears the sky within your vision of any clouds or other meteorological activity short of a hurricane or tornado, either naturally occurring or caused by magic. The clouds take a few seconds to clear, during which time you must concentrate on them. This spell only affects meteorological activity in progress at the moment of casting, and is not powerful enough to dispel a weather condition caused by Ritual magic. In Ferramentum's version of this spell, the clouds clear from the sky in an orderly manner, as if they were soldiers marching on parade."],"flavour":"","base":"10","modifiers":["+3 Sight","+2 Group","+2 size"]},{"id":88,"name":"Ward against Faeries of the Air","level":"General","technique":"Rego","form":"Auram","requisites":[],"range":"Touch","duration":"Ring","durationWhile":"","target":"Circle","ritual":false,"type":"general","source":"ArM5 Core","page":"329","description":["As Ward Against Faeries of the Water (ReAq Gen), but for faeries of the air. The faerie cannot directly or indirectly break the magic circle, nor can they use ranged attacks or magic to affect those within it. From some angles at night, the ring may be seen as a violethued dome."],"flavour":"","base":"","modifiers":[]},{"id":89,"name":"Wind at the Back","level":"5","technique":"Rego","form":"Auram","requisites":[],"range":"Touch","duration":"Special","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"329","description":["An existing breeze follows you until you stop traveling for more than ten minutes. It causes phenomena you pass through (fog, haze) to follow you."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Special (based on Concentration"]},{"id":90,"name":"Ward against Rain","level":"10","technique":"Rego","form":"Auram","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"330","description":["No rain falls on the caster, no matter how bad the weather."],"flavour":"","base":"4","modifiers":["+2 Sun"]},{"id":91,"name":"Clouds of Thunderous Might","level":"30","technique":"Rego","form":"Auram","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"330","description":["Gathers pre-existing clouds and winds into a small storm. The storm gathers at a normal speed, but is under the caster's control as long as he can see it. The caster may use the control granted by this spell to dissipate small storms as well. If the caster does not dissipate the storm before stopping concentrating, the storm continues as normal."],"flavour":"","base":"4","modifiers":["+3 Sight","+1 Conc","+2 Group"]},{"id":92,"name":"Gathering of the Stormy Might","level":"40","technique":"Rego","form":"Auram","requisites":[],"range":"Sight","duration":"Concentration","durationWhile":"","target":"Group","ritual":false,"type":"standard","source":"ArM5 Core","page":"330","description":["As for Clouds of Thunderous Might, but the storm is larger, possibly covering the entire visible sky. Again, it is under the caster's control."],"flavour":"","base":"4","modifiers":["+3 Sight","+1 Conc","+2 Group","+2 size"]},{"id":93,"name":"Bind Wound","level":"10","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"332","description":["This spell binds the target's wounds, so that he can undertake any activity without the risk of worsening the wounds. He still suffers from the wound penalties, however, and cannot heal naturally while under the influence of this spell. Typically, you place your hands on the target and pass them over his wounds, which magically seal themselves and stop bleeding."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun"]},{"id":94,"name":"Charm against Putrefaction","level":"10","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"332","description":["Prevents decay of a human corpse, or of a severed body part. Necromancers use it to preserve their revived corpses."],"flavour":"","base":"2","modifiers":["+1 Touch","+3 Moon"]},{"id":95,"name":"The Chirurgeon's Healing Touch","level":"20","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["This spell heals a single Light Wound suffered by the person touched. This spell does not heal damage from poison or disease."],"flavour":"","base":"15","modifiers":["+1 Touch"]},{"id":96,"name":"Gentle Touch of the Purified Body","level":"20","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["The target is cured of a Light Wound caused by poison or disease. This spell does not heal damage caused by injury."],"flavour":"","base":"15","modifiers":["+1 Touch"]},{"id":97,"name":"Purification of the Festering Wounds","level":"20","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Moon","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"332","description":["The target gains a +9 bonus to Recovery rolls, as long as he has been under the influence of this spell for the whole of the recovery interval. The recovery interval is counted from the time that the spell is cast, any previous time is ignored."],"flavour":"","base":"4","modifiers":["+1 Touch","+3 Moon"]},{"id":98,"name":"Restoration of the Defiled Body","level":"25","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["Removes the crippling or malignant after-effects of any injury, poison, or disease, or of premature aging. The effects of natural aging cannot be undone by this or any spell. This spell does not heal wounds, only extra effects."],"flavour":"","base":"20","modifiers":["+1 Touch"]},{"id":99,"name":"The Severed Limb Made Whole","level":"25","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["A limb that has been detached from the body can be reattached, but any decay that has occurred on the severed limb remains after the limb is reattached. After a day of decomposition, a limb is weak. After seven days, it is nearly useless and infects the character on whom it is replaced (Stamina stress roll against an Ease Factor of 6 or take a Medium Wound). If it's been severed for more than two weeks, the limb is completely useless."],"flavour":"","base":"25","modifiers":["+1 Touch","-1 because the old limb is needed"]},{"id":100,"name":"Cheating the Reaper","level":"30","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["Resolves a major (or less severe) crisis caused by aging. The target still requires rest for the remainder of the season to recover fully. Note that each application of this spell causes Warping. See page 392 for details on crises."],"flavour":"","base":"25","modifiers":["+1 Touch"]},{"id":101,"name":"Incantation of the Body Made Whole","level":"40","technique":"Creo","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["Heals all damage to a human body at the conclusion of the ritual. The spell can only heal wounds, not such damage as missing limbs, or diseases and damage from poisons."],"flavour":"","base":"35","modifiers":["+1 Touch"]},{"id":102,"name":"The Shadow of Life Renewed","level":"75","technique":"Creo","form":"Corpus","requisites":[{"art":"Mentem","free":false}],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":true,"type":"standard","source":"ArM5 Core","page":"332","description":["Brings the semblance of life to a corpse. During the ritual, healing spells work on the corpse, which is important because the body must be physically whole or else it simply dies again once it is brought back to life. For each day that the person has been dead, roll for aging. When the ritual is complete, roll a simple die to determine the success of the attempt:","| 4–5  | Automaton with no Abilities over 3 |","| 6–7  | Automaton, but Abilities as a normal person's |","| 9–10 | Person with will, but no personality. The revived person is not truly alive and cannot gain experience points. Must make an aging roll at the beginning of each year of existence, regardless of age. This is the closest the Order has gotten to raising the dead. |"],"flavour":"","base":"70","modifiers":["+1 Touch"]},{"id":103,"name":"Sight of the True Form","level":"General","technique":"Intellego","form":"Corpus","requisites":[],"range":"Personal","duration":"Momentary","durationWhile":"","target":"Vision","ritual":false,"type":"general","source":"ArM5 Core","page":"333","description":["You see the true, original form of any person whose form has been changed or masked. This spell can see through mundane masks and disguises at level 10, and can see through the effects of other spells that are equal to or lower than the level of this spell.","(Variable base)"],"flavour":"","base":"","modifiers":[]},{"id":104,"name":"Physician's Eye","level":"5","technique":"Intellego","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["Determines the general health of a single person. Specific afflictions appear to you as areas of yellow coloration on the person's body. A Perception + Medicine stress roll is required to identify unusual diseases. The Ease Factor is determined by the rarity of the disease."],"flavour":"","base":"4","modifiers":["+1 Touch"]},{"id":105,"name":"Revealed Flaws of Mortal Flesh","level":"10","technique":"Intellego","form":"Corpus","requisites":[],"range":"Touch","duration":"Momentary","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["You are able to find any medical defects in a person or being that you are touching. This provides more, and more specific, information than Physician's Eye."],"flavour":"","base":"5","modifiers":["+1 Touch"]},{"id":106,"name":"Whispers through the Black Gate","level":"15","technique":"Intellego","form":"Corpus","requisites":[{"art":"Mentem","free":false}],"range":"Touch","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["You can speak through the barrier — the figurative \"gate\" — that stands between the dead and the living, to one corpse that has not yet decayed into a skeleton. The corpse cannot have been buried in Church burial, nor have belonged to a spirit that went straight to Heaven (for example, a saint or a crusader). The spirit that you speak with is not compelled to tell the truth; you can, of course, find ways to coerce or trick it into doing so. All those around you can hear the voice of the corpse."],"flavour":"","base":"5","modifiers":["+1 Touch","+1 Conc"]},{"id":107,"name":"The Inexorable Search","level":"20","technique":"Intellego","form":"Corpus","requisites":[],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["Determines the location of a specific person. To cast the spell you need a map and an Arcane Connection. After casting the spell, you can move your finger over the map at the rate of one hour per square foot of map. When your finger passes over the person's location as represented on the map, you sense the person's presence. (If the person is not in the area covered by the map, no sensations result.) You can locate the person to within a thumb's width on the map. A similar spell allows you to search for a dead body (Tracing the Trail of Death's Stench)."],"flavour":"","base":"3","modifiers":["+4 Arc","+1 Conc"]},{"id":108,"name":"The Eye of the Sage","level":"30","technique":"Intellego","form":"Corpus","requisites":[{"art":"Imaginem","free":false}],"range":"Arcane Connection","duration":"Concentration","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["Lets you see a specific person and what is within one pace of that person. The image is clear enough to allow reading."],"flavour":"","base":"4","modifiers":["+4 Arc","+1 Conc","+1 requisite"]},{"id":109,"name":"Eyes of the Cat","level":"5","technique":"Muto","form":"Corpus","requisites":[{"art":"Animal","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["The target gains the eyes of a cat, which allow him or her to see in near darkness (but not in absolute darkness, such as a lightless subterranean cavern)."],"flavour":"","base":"2","modifiers":["+1 Touch","+2 Sun"]},{"id":110,"name":"Disguise of the New Visage","level":"15","technique":"Muto","form":"Corpus","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["The target's facial features are transformed to any approximately human configuration you choose. In Cralian of Tremere's version of this spell, the new visage is always as unassuming as possible."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+1 Part"]},{"id":111,"name":"Preternatural Growth and Shrinking","level":"15","technique":"Muto","form":"Corpus","requisites":[],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"333","description":["Adds +1 to the target's normal Size or decreases it by up to 2 points."],"flavour":"","base":"3","modifiers":["+1 Touch","+2 Sun","+1 because the spell allows growth or two kinds of shrinking"]},{"id":112,"name":"Arm of the Infant","level":"20","technique":"Muto","form":"Corpus","requisites":[],"range":"Voice","duration":"Sun","durationWhile":"","target":"Part","ritual":false,"type":"standard","source":"ArM5 Core","page":"334","description":["Shrinks a person's arm to half its original length and makes it pudgy, like an infant's."],"flavour":"","base":"3","modifiers":["+2 Voice","+2 Sun","+1 Part"]},{"id":113,"name":"Gift of the Bear's Fortitude","level":"25","technique":"Muto","form":"Corpus","requisites":[],"range":"Personal","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"334","description":["Your flesh becomes resistant to physical damage. You get +3 to your Soak. Your flesh is tough and insensitive; any rolls that involve a sensitive touch (such as for picking a lock) are at -1."],"flavour":"","base":"15","modifiers":["+2 Sun"]},{"id":114,"name":"Shape of the Woodland Prowler","level":"25","technique":"Muto","form":"Corpus","requisites":[{"art":"Animal","free":false}],"range":"Touch","duration":"Sun","durationWhile":"","target":"Individual","ritual":false,"type":"standard","source":"ArM5 Core","page":"334","description":["You place a wolf skin over yourself or another, and the target changes into a wolf. The target may change back at will, ending the spell. Before casting this spell, you must first, of course, acquire the skin of a wolf, if you want to be able to end the spell early."],"flavour":"","base":"10","modifiers":["+1 Touch","+2 Sun"]},{"id":115,"name":"Cloak of Black Feathers","level":"30","technique":"Muto","form":"Corpus","requisites":[{"art":"Animal","free":false}],"range":"Personal","duration":"Sun","dura
